name: legit workflow
# An Actions-only surface: environment addressing is the correct form here. NOTE this fixture
# is fed through --files-from at the fixture root, so it IS audited (it is not under
# .github/workflows/ and no exclusion applies to it) — it goes unflagged because the YAML
# `- run:` line's head token is `-`, not a gh head. The population exclusion itself is
# exercised separately, by the exroot fixtures under exroot/.github/workflows/.
env:
  GITHUB_REPOSITORY: owner/repo
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - run: gh api "repos/$GITHUB_REPOSITORY/check-runs"
