# actionlint configuration.
#
# actionlint validates `with:` inputs against a BUNDLED metadata snapshot of
# popular actions, not against the action's real action.yml. Its snapshot for
# actions/create-github-app-token predates the v3 `client-id` input, so it both
# rejects `client-id` as undefined and demands the `app-id` we deliberately
# replaced (v3 emits "Input 'app-id' has been deprecated with message: Use
# 'client-id' instead." on every mint). Upstream v3 declares BOTH as optional;
# only `private-key` is required:
#
#   $ gh api repos/actions/create-github-app-token/contents/action.yml?ref=v3
#     client-id:   required=False
#     app-id:      required=False
#     private-key: required=True
#
# The two ignores below are pinned to that ONE action by name, so a genuine
# typo'd input on any other action — or on this action's other inputs — still
# fails the lint. Delete this file once actionlint's bundled DB carries v3's
# inputs (track: rhysd/actionlint popular-actions dataset).
paths:
  .github/workflows/**.yml:
    ignore:
      - 'input "client-id" is not defined in action "actions/create-github-app-token'
      - 'missing input "app-id" which is required by action "actions/create-github-app-token'
