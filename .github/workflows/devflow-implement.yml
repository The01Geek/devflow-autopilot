name: DevFlow (implement)

# Heavy listener for /devflow:implement. Fires on a BARE `/devflow:implement
# <#>` comment, review, or new-issue body/title. It does NOT require `@claude`,
# and there is NO label trigger — a human `/devflow:implement <#>` comment is
# itself a native, no-App user event.
#
# Why bare-command only: this workflow runs claude-code-action in AGENT mode
# with an explicit, synthesised `/devflow:implement <n>` prompt (the `gate` job
# resolves the number). Agent mode needs no trigger phrase. Every trigger below
# negates `@claude`, so an `@claude /devflow:implement` comment is ceded to
# Anthropic's stock claude.yml (TAG mode) — an anti-pattern, since that listener
# has no DevFlow plugin — and the two workflows can never double-fire. DevFlow
# never touches claude.yml.
#
# Cost control: agent mode runs for ANY actor, so the `gate` job authorizes the
# sender (an allowed bot OR an `allowed_users` login with write/admin/maintain
# access) before the heavy `claude` job runs. See scripts/resolve-implement-trigger.sh.
#
# This workflow reads `claude_implement.effort` (e.g. "high") so the planning +
# write-the-tests phases get more reasoning budget than the light `/devflow:*`
# flows in devflow.yml, without inflating every command's cost.
#
# Keep the plugin_marketplaces, plugins, and claude_args sections in sync with
# devflow.yml so the skill surface is identical across listeners.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request_review:
    types: [submitted]

jobs:
  # Duplicates the config job in devflow.yml verbatim except for the
  # `effort` source (`claude_implement.effort` vs `claude.effort`). A
  # workflow_call indirection would buy nothing here — the config is
  # ~15 lines and the call would be more.
  config:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.extract.outputs.enabled }}
      base_branch: ${{ steps.extract.outputs.base_branch }}
      claude_model: ${{ steps.extract.outputs.claude_model }}
      allowed_bots: ${{ steps.extract.outputs.allowed_bots }}
      allowed_users: ${{ steps.extract.outputs.allowed_users }}
      effort: ${{ steps.extract.outputs.effort }}
      allowed_tools_extra: ${{ steps.extract.outputs.allowed_tools_extra }}
    steps:
      - uses: actions/checkout@v6
      - id: cfg
        uses: ./.github/actions/read-project-config
      - id: extract
        env:
          CONFIG_JSON: ${{ steps.cfg.outputs.json }}
        run: |
          set -euo pipefail
          {
            echo "enabled=$(echo "$CONFIG_JSON" | jq -r '.workflows.claude // false')"
            echo "base_branch=$(echo "$CONFIG_JSON" | jq -r '.base_branch')"
            echo "claude_model=$(echo "$CONFIG_JSON" | jq -r '.claude_model')"
            echo "allowed_bots=$(echo "$CONFIG_JSON" | jq -r '.claude.allowed_bots')"
            # Human logins allowed to trigger /devflow:implement (AND-filter on
            # top of the collaborator-permission gate; '*' = any collaborator).
            echo "allowed_users=$(echo "$CONFIG_JSON" | jq -r '.claude.allowed_users // "*"')"
            echo "effort=$(echo "$CONFIG_JSON" | jq -r '.claude_implement.effort // "medium"')"
            # Repo-specific extra allowlist for the implement path. Independent
            # from devflow.yml's `claude.allowed_tools` — the heavy path does NOT
            # inherit the light path's extras, so adopters list every extra tool
            # they want during /devflow:implement under `claude_implement.allowed_tools`.
            # Emits a leading-comma string (",Bash(make:*),…") or "".
            echo "allowed_tools_extra=$(echo "$CONFIG_JSON" | jq -r '.claude_implement.allowed_tools // [] | if length > 0 then "," + join(",") else "" end')"
          } >> "$GITHUB_OUTPUT"

  # Authorization + target-number gate. The action runs in AGENT mode below
  # (explicit prompt), which executes for ANY actor, so this job is the cost
  # control: it runs the resolver, which authorizes the sender (allowed bot OR
  # write/admin/maintain collaborator) and resolves the issue number. The
  # `claude` job runs ONLY when should_run=true. Coarse event matching stays in
  # this job's `if:` so irrelevant events never spin a runner.
  gate:
    needs: config
    if: |
      needs.config.outputs.enabled == 'true' &&
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/devflow:implement') && !contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '/devflow:implement') && !contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '/devflow:implement') && !contains(github.event.review.body, '@claude')) ||
        (github.event_name == 'issues' && github.event.action == 'opened' && ((contains(github.event.issue.body, '/devflow:implement') && !contains(github.event.issue.body, '@claude')) || (contains(github.event.issue.title, '/devflow:implement') && !contains(github.event.issue.title, '@claude'))))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read   # checkout the resolver script; collaborator check uses GITHUB_TOKEN
    outputs:
      should_run: ${{ steps.resolve.outputs.should_run }}
      number: ${{ steps.resolve.outputs.number }}
    steps:
      - uses: actions/checkout@v6
      - id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          # `sender` is present on every event here and equals the actor:
          # commenter / reviewer / issue opener / labeller respectively.
          ACTOR: ${{ github.event.sender.login }}
          ALLOWED_BOTS: ${{ needs.config.outputs.allowed_bots }}
          ALLOWED_USERS: ${{ needs.config.outputs.allowed_users }}
          # issue.number for issues + issue_comment (PRs are issues); falls back
          # to pull_request.number for the review events.
          CONTEXT_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          # Only the populated field contributes; passed as an env var (not
          # interpolated into bash), so arbitrary body text cannot inject.
          TRIGGER_TEXT: ${{ github.event.comment.body || github.event.review.body || format('{0} {1}', github.event.issue.title, github.event.issue.body) }}
        run: |
          set -euo pipefail
          # Vendored path: install.sh copies the plugin into
          # .claude/plugins/devflow/, so consumer repos have the script there,
          # NOT at scripts/ (repo root). Matches every other workflow's
          # invocation convention (e.g. devflow-review.yml's
          # .claude/plugins/devflow/scripts/dismiss-stale-rejections.sh).
          RESOLVER=.claude/plugins/devflow/scripts/resolve-implement-trigger.sh
          # Fail CLOSED (not a hard red workflow) if the plugin wasn't vendored,
          # with an actionable root cause. A bare `bash <missing>` under set -e
          # would exit non-zero with only a cryptic "No such file or directory"
          # and no signal to the requester about why their command did nothing.
          if [ ! -f "$RESOLVER" ]; then
            echo "::error::devflow resolver not found at $RESOLVER — has install.sh vendored the plugin into this repo? Skipping the /devflow:implement run." >&2
            { echo "should_run=false"; echo "number="; } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          bash "$RESOLVER" >> "$GITHUB_OUTPUT"

  claude:
    needs: [config, gate]
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Matches devflow.yml. /devflow:implement reads the diff via
          # three-dot notation against `origin/main` (`git diff
          # origin/main...HEAD`), which internally computes a merge-base.
          # Depth 50 covers the realistic case (PRs typically ≤ a few
          # dozen commits behind main); long-lived branches that drift
          # past that will error out visibly on the missing merge-base.
          fetch-depth: 50

      # Provision the runtime (Python / Node / pip cache / deps) from
      # `.devflow/config.json`'s `setup` block. The logic lives in the
      # setup-project-env composite action so devflow.yml and
      # devflow-implement.yml share ONE copy (checkout above gives the action
      # the repo + config to read). See docs/cloud-setup.md for the rationale.
      - id: cfg
        uses: ./.github/actions/read-project-config
      - uses: ./.github/actions/setup-project-env
        with:
          config_json: ${{ steps.cfg.outputs.json }}

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: ${{ needs.config.outputs.allowed_bots }}

          # Always agent mode: the gate resolved a single issue number, so the
          # action never depends on `@claude` or on reading the raw body.
          # Anthropic's stock claude.yml (tag mode) therefore never double-fires
          # on a bare `/devflow:implement <n>` comment.
          prompt: ${{ format('/devflow:implement {0}', needs.gate.outputs.number) }}

          # Agent mode is silent by default; surface a progress comment so the
          # requester sees the run was picked up (applies to all paths now).
          track_progress: true

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Keep plugin_marketplaces, plugins, and claude_args in sync
          # with devflow.yml — both listeners must expose the same skill
          # surface so that whether a flow hits the light or heavy path
          # is invisible to users invoking /devflow:* commands.
          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-official.git
            ./

          plugins: |
            pr-review-toolkit@claude-plugins-official
            code-review@claude-plugins-official
            feature-dev@claude-plugins-official
            superpowers@claude-plugins-official
            claude-md-management@claude-plugins-official
            devflow@devflow-marketplace

          base_branch: ${{ needs.config.outputs.base_branch }}
          claude_args: >-
            --model ${{ needs.config.outputs.claude_model }}
            ${{ needs.config.outputs.effort != 'medium' && format('--effort {0}', needs.config.outputs.effort) || '' }}
            --allowed-tools
            "Read,
            Write,
            Edit,
            Glob,
            Grep,
            LS,
            Skill,
            Agent,
            TodoWrite,
            EnterPlanMode,
            ExitPlanMode,
            WebFetch,
            WebSearch,
            Bash(git add:*),
            Bash(git commit:*),
            Bash(git push:*),
            Bash(git pull:*),
            Bash(git fetch:*),
            Bash(git status:*),
            Bash(git diff:*),
            Bash(git log:*),
            Bash(git show:*),
            Bash(git checkout:*),
            Bash(git branch:*),
            Bash(git stash:*),
            Bash(git rm:*),
            Bash(git mv:*),
            Bash(git restore:*),
            Bash(git revert:*),
            Bash(git blame:*),
            Bash(git ls-files:*),
            Bash(git rev-parse:*),
            Bash(git merge-base:*),
            Bash(gh pr create:*),
            Bash(gh pr edit:*),
            Bash(gh pr comment:*),
            Bash(gh pr diff:*),
            Bash(gh pr view:*),
            Bash(gh pr review:*),
            Bash(gh pr ready:*),
            Bash(gh pr list:*),
            Bash(gh pr checks:*),
            Bash(gh pr status:*),
            Bash(gh pr reopen:*),
            Bash(gh issue view:*),
            Bash(gh issue comment:*),
            Bash(gh issue list:*),
            Bash(gh issue edit:*),
            Bash(gh issue create:*),
            Bash(gh issue reopen:*),
            Bash(gh issue status:*),
            Bash(gh search:*),
            Bash(gh label list:*),
            Bash(gh repo view:*),
            Bash(gh run view:*),
            Bash(gh run list:*),
            Bash(gh workflow view:*),
            Bash(gh workflow list:*),
            Bash(gh api:*),
            Bash(jq:*),
            Bash(.claude/plugins/devflow/scripts/config-get.sh:*),
            Bash(.claude/plugins/devflow/scripts/workpad.py:*),
            Bash(.claude/plugins/devflow/scripts/parse-acs.py:*),
            Bash(.claude/plugins/devflow/scripts/branch-for-issue.py:*),
            Bash(.claude/plugins/devflow/scripts/file-deferrals.py:*),
            Bash(.claude/plugins/devflow/scripts/match-deferrals.py:*),
            Bash(pip install:*),
            Bash(pip:*),
            Bash(python:*),
            Bash(python3:*),
            Bash(python -m:*),
            Bash(python3 -m:*),
            Bash(ruff:*),
            Bash(ruff check:*),
            Bash(ruff format:*),
            Bash(pytest:*),
            Bash(mypy:*),
            Bash(grep:*),
            Bash(rg:*),
            Bash(find:*),
            Bash(wc:*),
            Bash(sort:*),
            Bash(uniq:*),
            Bash(cut:*),
            Bash(tr:*),
            Bash(xargs:*),
            Bash(awk:*),
            Bash(sed:*),
            Bash(diff:*),
            Bash(comm:*),
            Bash(cat:*),
            Bash(head:*),
            Bash(tail:*),
            Bash(less:*),
            Bash(ls:*),
            Bash(tree:*),
            Bash(file:*),
            Bash(stat:*),
            Bash(date:*),
            Bash(pwd:*),
            Bash(realpath:*),
            Bash(dirname:*),
            Bash(basename:*),
            Bash(which:*),
            Bash(type:*),
            Bash(env:*),
            Bash(echo:*),
            Bash(printf:*),
            Bash(test:*),
            Bash(touch:*),
            Bash(mkdir:*),
            Bash(rmdir:*),
            Bash(rm:*),
            Bash(mv:*),
            Bash(cp:*),
            Bash(tee:*)${{ needs.config.outputs.allowed_tools_extra }}"
