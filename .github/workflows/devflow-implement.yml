name: DevFlow (implement)

# `run-name` embeds the issue thread the command was posted on so the gate's
# duplicate check can recognise a second /devflow:implement on the same thread
# while a run is in flight (see scripts/dedupe-implement-run.sh). Quoted because
# the value contains characters YAML would otherwise mis-parse.
run-name: "DevFlow implement (issue ${{ github.event.issue.number }})"

# Heavy listener for /devflow:implement. Fires ONLY on a BARE `/devflow:implement
# <#>` real comment on an ISSUE — a genuine user action. It is issues-only: a PR
# comment is also an `issue_comment` in GitHub's API, but the gate `if:` requires
# `github.event.issue.pull_request == null` and the resolver re-checks via
# IS_PULL_REQUEST, so a comment on a pull request never starts a run (this is
# what stops the weekly audit-report comment from self-triggering on the state
# PR). It does NOT trigger from an issue description body or title (the phrase
# merely *quoted* in a description must never start a run), it does NOT require
# `@claude`, and there is NO label trigger.
#
# Why bare-command only: this workflow runs claude-code-action in AGENT mode
# with an explicit, synthesised `/devflow:implement <n>` prompt (the `gate` job
# resolves the number). Agent mode needs no trigger phrase. The gate `if:`
# negates `@claude`, so an `@claude /devflow:implement` comment is ceded to
# Anthropic's stock claude.yml (TAG mode) — an anti-pattern, since that listener
# has no DevFlow plugin — and the two workflows can never double-fire. DevFlow
# never touches claude.yml.
#
# Cost control: agent mode runs for ANY actor, so the `gate` job authorizes the
# sender (an allowed bot OR an `allowed_users` login with write/admin/maintain
# access) before the heavy `claude` job runs. See scripts/resolve-implement-trigger.sh.
#
# This workflow reads `devflow_implement.effort` (e.g. "high") so the planning +
# write-the-tests phases get more reasoning budget than the light `/devflow:*`
# flows in devflow.yml, without inflating every command's cost.
#
# Keep the plugin_marketplaces, plugins, and claude_args sections in sync with
# devflow.yml so the skill surface is identical across listeners.

on:
  issue_comment:
    types: [created]

jobs:
  # Duplicates the config job in devflow.yml verbatim except for the
  # `effort` source (`devflow_implement.effort` vs `devflow.effort`). A
  # workflow_call indirection would buy nothing here — the config is
  # ~15 lines and the call would be more.
  config:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.extract.outputs.enabled }}
      base_branch: ${{ steps.extract.outputs.base_branch }}
      claude_model: ${{ steps.extract.outputs.claude_model }}
      allowed_bots: ${{ steps.extract.outputs.allowed_bots }}
      allowed_users: ${{ steps.extract.outputs.allowed_users }}
      effort: ${{ steps.extract.outputs.effort }}
      allowed_tools_extra: ${{ steps.extract.outputs.allowed_tools_extra }}
      devflow_version: ${{ steps.extract.outputs.devflow_version }}
      workpad_marker: ${{ steps.extract.outputs.workpad_marker }}
    steps:
      - uses: actions/checkout@v6
      - id: cfg
        uses: ./.github/actions/read-project-config
      - id: extract
        env:
          CONFIG_JSON: ${{ steps.cfg.outputs.json }}
        run: |
          set -euo pipefail
          ENABLED=$(echo "$CONFIG_JSON" | jq -r '.workflows.devflow // false')
          # `// empty` collapses a missing/null allowlist to a real empty string.
          # Fail loud only when the workflow is ENABLED — a config left on the
          # pre-2.2.5 `claude.allowed_bots` key would otherwise propagate a
          # literal "null" allowlist that silently matches no bot. Disabled repos
          # skip the check (allowed_bots is read only downstream of the enabled
          # gate), so this never breaks an intentionally-off install. Mirrors the
          # guard in devflow-runner.yml.
          ALLOWED_BOTS=$(echo "$CONFIG_JSON" | jq -r '.devflow.allowed_bots // empty')
          if [ "$ENABLED" = "true" ] && [ -z "$ALLOWED_BOTS" ]; then
            echo "::error::devflow.allowed_bots is missing from .devflow/config.json (a pre-2.2.5 config may still use the old 'claude.allowed_bots' key — see CHANGELOG 2.2.5 migration)"
            exit 1
          fi
          {
            echo "enabled=$ENABLED"
            echo "base_branch=$(echo "$CONFIG_JSON" | jq -r '.base_branch')"
            echo "claude_model=$(echo "$CONFIG_JSON" | jq -r '.claude_model')"
            echo "allowed_bots=$ALLOWED_BOTS"
            # Human logins allowed to trigger /devflow:implement (AND-filter on
            # top of the collaborator-permission gate; '*' = any collaborator).
            echo "allowed_users=$(echo "$CONFIG_JSON" | jq -r '.devflow.allowed_users // "*"')"
            echo "effort=$(echo "$CONFIG_JSON" | jq -r '.devflow_implement.effort // "high"')"
            # Repo-specific extra allowlist for the implement path. Independent
            # from devflow.yml's `devflow.allowed_tools` — the heavy path does NOT
            # inherit the light path's extras, so adopters list every extra tool
            # they want during /devflow:implement under `devflow_implement.allowed_tools`.
            # Emits a leading-comma string (",Bash(make:*),…") or "".
            echo "allowed_tools_extra=$(echo "$CONFIG_JSON" | jq -r '.devflow_implement.allowed_tools // [] | if length > 0 then "," + join(",") else "" end')"
            # Pinned plugin ref for the vendor-plugin fetch branch (thin installs).
            echo "devflow_version=$(echo "$CONFIG_JSON" | jq -r '.devflow_version // empty')"
            # Effective workpad marker, passed to the resolver's self-trigger guard.
            echo "workpad_marker=$(echo "$CONFIG_JSON" | jq -r '.devflow.workpad_marker // "<!-- devflow:workpad -->"')"
          } >> "$GITHUB_OUTPUT"

  # Authorization + target-number gate. The action runs in AGENT mode below
  # (explicit prompt), which executes for ANY actor, so this job is the cost
  # control: it runs the resolver, which authorizes the sender (allowed bot OR
  # write/admin/maintain collaborator) and resolves the issue number. The
  # `claude` job runs ONLY when should_run=true. Coarse event/issue-context
  # matching stays in this job's `if:` (issue_comment with no PR context) so
  # irrelevant events — including PR comments — never spin a runner.
  gate:
    needs: config
    if: |
      needs.config.outputs.enabled == 'true' &&
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request == null &&
      contains(github.event.comment.body, '/devflow:implement') && !contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: read        # checkout the resolver script; collaborator check uses GITHUB_TOKEN
      issues: write         # react step + duplicate notice on issue comments
      pull-requests: write  # parity with devflow.yml's gate (shared react-to-trigger.sh); harmless on the issues-only path
      actions: read         # dedupe step: `gh run list` to detect an in-flight run
    outputs:
      should_run: ${{ steps.resolve.outputs.should_run }}
      number: ${{ steps.resolve.outputs.number }}
      duplicate: ${{ steps.dedupe.outputs.duplicate }}
    steps:
      - uses: actions/checkout@v6
      # Materialize the plugin into the workspace so the resolver/dedupe/react
      # scripts exist at .devflow/vendor/devflow/scripts/ (committed → self →
      # fetch). Without it a thin consumer — or this source repo — fails closed
      # at "resolver not found".
      - uses: ./.github/actions/vendor-plugin
        with:
          ref: ${{ needs.config.outputs.devflow_version }}
      - id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          # `sender` is present on the issue_comment event and equals the
          # commenter (the actor).
          ACTOR: ${{ github.event.sender.login }}
          ALLOWED_BOTS: ${{ needs.config.outputs.allowed_bots }}
          ALLOWED_USERS: ${{ needs.config.outputs.allowed_users }}
          # The issue the comment is attached to; the fallback target when
          # TRIGGER_TEXT carries no explicit number.
          CONTEXT_NUMBER: ${{ github.event.issue.number }}
          # Only a real issue comment body contributes — never an issue
          # description. Passed as an env var (not interpolated into bash), so
          # arbitrary body text cannot inject.
          TRIGGER_TEXT: ${{ github.event.comment.body }}
          SELF_COMMENT_MARKER: ${{ needs.config.outputs.workpad_marker }}
          # Non-null only for a comment on a PR (a PR comment is also an
          # issue_comment). The resolver declines such a trigger — issues-only
          # backstop for the gate `if:`'s `pull_request == null` filter.
          IS_PULL_REQUEST: ${{ github.event.issue.pull_request != null }}
        run: |
          set -euo pipefail
          # Vendored path: install.sh copies the plugin into
          # .devflow/vendor/devflow/, so consumer repos have the script there,
          # NOT at scripts/ (repo root). Matches every other workflow's
          # invocation convention (e.g. devflow-review.yml's
          # .devflow/vendor/devflow/scripts/dismiss-stale-rejections.sh).
          RESOLVER=.devflow/vendor/devflow/scripts/resolve-implement-trigger.sh
          # Fail CLOSED (not a hard red workflow) if the plugin wasn't vendored,
          # with an actionable root cause. A bare `bash <missing>` under set -e
          # would exit non-zero with only a cryptic "No such file or directory"
          # and no signal to the requester about why their command did nothing.
          if [ ! -f "$RESOLVER" ]; then
            echo "::error::devflow resolver not found at $RESOLVER — has install.sh vendored the plugin into this repo? Skipping the /devflow:implement run." >&2
            { echo "should_run=false"; echo "number="; } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          bash "$RESOLVER" >> "$GITHUB_OUTPUT"

      # Duplicate detection: only when the resolver authorized + resolved a run.
      # Decides `duplicate=true` if an OLDER /devflow:implement run for this same
      # issue/PR thread is still active, so the heavy `claude` job below is
      # skipped and the in-flight run is left untouched. Fails OPEN (the script
      # emits duplicate=false on any error), so a query blip never swallows a
      # legitimate single request.
      - id: dedupe
        if: ${{ steps.resolve.outputs.should_run == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          CONTEXT_NUMBER: ${{ github.event.issue.number }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          DEDUPE=.devflow/vendor/devflow/scripts/dedupe-implement-run.sh
          # Fail OPEN if the plugin wasn't vendored: a missing dedupe check must
          # not block a legitimate run — emit duplicate=false and let it proceed.
          if [ ! -f "$DEDUPE" ]; then
            echo "::warning::dedupe script not found at $DEDUPE; not deduping (run proceeds)." >&2
            echo "duplicate=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          bash "$DEDUPE" >> "$GITHUB_OUTPUT"

      # Optional, opt-in: mint ONE App token DOWNSCOPED to this job's
      # user-visible posts — the trigger reaction and the duplicate-ignored
      # notice below (no contents/workflows: this job neither reads code with
      # it nor pushes; the early workpad comment below deliberately stays on
      # github.token — detection is marker-based, so authorship never matters). Same opt-in/fail-loud/downscope contract as the review
      # mint in devflow-runner.yml — see docs/cloud-setup.md. NOTE: fail-loud
      # means a configured-but-broken App fails THIS gate job (and so blocks
      # the run) — deliberate, so a broken App is never silently degraded
      # around. Minted only when a consumer will actually run (should_run
      # gates both the reaction and the notice), so the common
      # unauthorized/non-command rejection path stays mint-free.
      - name: Mint downscoped reaction token (optional)
        id: gate_app_token
        if: ${{ vars.DEVFLOW_APP_ID != '' && steps.resolve.outputs.should_run == 'true' }}
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.DEVFLOW_APP_ID }}
          private-key: ${{ secrets.DEVFLOW_APP_PRIVATE_KEY }}
          permission-issues: write
          permission-pull-requests: write

      # Early acknowledgement: react on the triggering comment the moment we know
      # /devflow:implement is authorized, resolvable, AND not a duplicate, long
      # before the heavy `claude` job runs. Best-effort and continue-on-error so
      # a reaction hiccup never blocks the run. Skipped for duplicates — those
      # get the explanatory notice below instead of a silent reaction.
      - name: Acknowledge trigger
        if: ${{ steps.resolve.outputs.should_run == 'true' && steps.dedupe.outputs.duplicate != 'true' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.gate_app_token.outputs.token || github.token }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_ID: ${{ github.event.comment.id }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        # Invoked via `bash` (not bare-exec) so it works regardless of whether
        # the vendored copy kept its executable bit — matching the resolver's
        # `bash "$RESOLVER"` above. A missing file errors visibly but is
        # absorbed by continue-on-error (best-effort ack).
        run: bash .devflow/vendor/devflow/scripts/react-to-trigger.sh

      # Early workpad: post the run's single comment NOW — before the heavy
      # `claude` job boots and provisions its runtime (setup-project-env:
      # Python/Node/services/deps). The workpad is a pure acknowledgment that
      # needs none of that, so creating it here (right after auth + dedupe) is
      # the earliest the requester can see a durable "job started" comment. The
      # `claude` job's Phase 1.3 detects this workpad via `workpad.py id` and
      # resumes it (filling Plan + Acceptance Criteria into the same comment) —
      # it never posts a second one. Best-effort: continue-on-error so a hiccup
      # never blocks the run. The `workpad.py id` guard below skips creation
      # when a workpad already exists (a re-trigger on the same thread), but the
      # *real* guarantee against two concurrent runs both creating one is the
      # upstream `dedupe` step (this step only runs when duplicate != 'true');
      # the `id` guard can't be atomic on its own.
      - name: Create workpad (early acknowledgement)
        if: ${{ steps.resolve.outputs.should_run == 'true' && steps.dedupe.outputs.duplicate != 'true' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          NUMBER: ${{ steps.resolve.outputs.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          WP=.devflow/vendor/devflow/scripts/workpad.py
          if [ ! -f "$WP" ]; then
            echo "::warning::workpad.py not vendored at $WP; skipping early workpad (the claude job will create it)." >&2
            exit 0
          fi
          # Skip CREATE if a workpad already exists (re-trigger / earlier run, incl.
          # a stall-backstop auto-resume) so the claude job resumes it instead of
          # getting a duplicate — but first deterministically refresh its Run: link
          # to THIS run. Without this the link keeps pointing at the ORIGINAL run,
          # so an operator watching a stalled/retried run can't click through to the
          # currently-active job's logs. This write happens at the workflow (gate)
          # level, so it lands regardless of whether the subsequent claude job goes
          # on to execute Phase 1.3 — it is not conditioned on the duplicate-run
          # outcome beyond this step's own existing if: gate. Best-effort, mirroring
          # the create-failure path below: warn on failure and exit 0 regardless, so
          # a workpad-update hiccup never fails the gate job or blocks the run.
          if python3 "$WP" id "$NUMBER" >/dev/null 2>&1; then
            if ! python3 "$WP" update "$NUMBER" --run-link "[View run]($RUN_URL)"; then
              echo "::warning::early workpad Run-link refresh failed for #$NUMBER; the claude job will refresh it in Phase 1.3 instead." >&2
            fi
            echo "Workpad already exists for #$NUMBER — refreshed Run link to this run; leaving the rest for the claude job to resume."
            exit 0
          fi
          BODY="$(mktemp)"
          # Deterministic label-based PRE-RENDER only: YAML cannot judge issue
          # content, so this trims the bug-only "reproduction captured" sub-item by
          # the 'bug' LABEL. It is a heuristic, NOT the authority: Phase 1.3's
          # `--reconcile-reproduction` (keyed on the recorded CONTENT classification,
          # issue #449) is the authoritative correction that reconciles this skeleton
          # to the classification on every entry — so a bug filed without the label
          # gains the row and a mislabelled feature request loses it there. Only trim
          # when the label lookup SUCCEEDS and a 'bug' label is absent; if the lookup
          # fails, fall back to rendering it (render-on-lookup-failure — a bug issue
          # must not silently lose the row, and 1.3 reconciles it regardless). The
          # assignment in the `if` condition is exempt from set -e.
          REPRO_FLAG=""
          if LABELS="$(gh issue view "$NUMBER" --json labels --jq '.labels[].name' 2>/dev/null)"; then
            grep -qix bug <<<"$LABELS" || REPRO_FLAG="--no-reproduction"
          fi
          # Emit an explicit warning on failure rather than letting
          # continue-on-error swallow it silently — the claude job still
          # creates the workpad in Phase 1.3, so the run is unaffected, but an
          # operator gets a breadcrumb (mirrors the missing-workpad.py warning).
          if ! { python3 "$WP" new-body "$NUMBER" --run-link "[View run]($RUN_URL)" $REPRO_FLAG > "$BODY" \
                 && python3 "$WP" create "$NUMBER" "$BODY"; }; then
            echo "::warning::early workpad create failed for #$NUMBER; the claude job will create it instead." >&2
            exit 0
          fi

      # Duplicate notice: tell the requester their command was ignored because a
      # run for this issue/PR is already in flight. Best-effort. CRITICAL: the
      # body must contain NO DevFlow trigger phrase — this comment is itself an
      # issue_comment[created] event, and a trigger phrase here would re-enter
      # the gate and could loop. Worded to avoid `/devflow:` and `@claude`.
      - name: Notice — duplicate ignored
        if: ${{ steps.resolve.outputs.should_run == 'true' && steps.dedupe.outputs.duplicate == 'true' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.gate_app_token.outputs.token || github.token }}
          REPO: ${{ github.repository }}
          NUMBER: ${{ steps.resolve.outputs.number }}
        run: |
          set -euo pipefail
          NOTE="⏳ An implement run for this issue is already in progress — ignoring this duplicate request and leaving the running one untouched. It will finish on its own; re-issue the command once it completes if you need another pass."
          # Capture gh's stderr into the warning so a permissions/rate-limit
          # failure is distinguishable from a transient blip (same diagnostic
          # discipline as react-to-trigger.sh) — without it, the requester gets
          # no notice AND the log gives no actionable reason.
          # REST (not `gh issue comment` porcelain): this step now runs under
          # the repo-scoped App installation token when configured, and
          # GraphQL-resolving porcelain fails silently under repo-scoped
          # tokens (CLAUDE.md gotcha, #228).
          if ! err="$(gh api --method POST "repos/$REPO/issues/$NUMBER/comments" -f body="$NOTE" 2>&1 >/dev/null)"; then
            echo "::warning::could not post duplicate-ignored notice on #$NUMBER (continuing): ${err//$'\n'/ }" >&2
          fi

  claude:
    needs: [config, gate]
    if: needs.gate.outputs.should_run == 'true' && needs.gate.outputs.duplicate != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: write # write scope so actions/cache can save the pip cache (read alone → "cache write denied: token has no writable scopes"); superset still lets Claude read CI results on PRs
    env:
      # Authorize the Stop-hook `--persist` telemetry PUSH on this WRITABLE tier
      # (issue #469 AC5). This job holds contents:write, so the branch push
      # succeeds here; the read-only `review` tier (devflow-runner.yml) deliberately
      # leaves this UNSET so `--persist` fails closed to staging-only. Set at JOB
      # level so it reaches the Stop-hook subprocess claude-code-action spawns —
      # the base-branch .claude/settings.json (restored in every claude-code-action
      # job) cannot distinguish tiers, so the operand must come from the job env,
      # not the hook command. (Platform premise — the job env propagates into the
      # Stop-hook subprocess; see the workpad's unverified-boundary note.)
      DEVFLOW_TELEMETRY_PUSH: '1'
    steps:
      # Optional, opt-in: mint a GitHub App installation token at full
      # installation scope (notably Contents: write + Workflows: write — no
      # permission-* downscope, unlike the per-site tokens elsewhere in these
      # workflows) so the agent's git push can edit
      # .github/workflows/ files (which the built-in GITHUB_TOKEN is hard-blocked
      # from). Gated on the DEVFLOW_APP_ID repository VARIABLE: unset/empty → the
      # step is skipped and both the checkout token and github_token below fall
      # back to GITHUB_TOKEN, leaving behavior byte-for-byte unchanged for
      # consumers who do not opt in. NO continue-on-error: a configured-but-broken
      # App (invalid/rotated key) fails the job here rather than silently
      # degrading to GITHUB_TOKEN. The App permissions come from the installation,
      # not the job's permissions: block.
      #
      # MUST precede the checkout below, whose `token:` it feeds — see the
      # checkout comment. Kept in sync with the same step in devflow.yml.
      - name: Mint workflow-capable token (optional)
        id: app-token
        if: ${{ vars.DEVFLOW_APP_ID != '' }}
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.DEVFLOW_APP_ID }}
          private-key: ${{ secrets.DEVFLOW_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Matches devflow.yml. /devflow:implement reads the diff via
          # three-dot notation against `origin/main` (`git diff
          # origin/main...HEAD`), which internally computes a merge-base.
          # Depth 50 covers the realistic case (PRs typically ≤ a few
          # dozen commits behind main); long-lived branches that drift
          # past that will error out visibly on the missing merge-base.
          fetch-depth: 50
          # LOAD-BEARING (issue #357): the credential actions/checkout persists
          # here is what `git push` actually authenticates with — NOT the
          # `github_token` handed to claude-code-action below. checkout@v6 writes
          # the auth header to an external config file wired in via
          # `includeIf.gitdir:` (covering `.git/worktrees/*` too), NOT to
          # `.git/config`; claude-code-action's `git config --unset-all
          # http.<server>/.extraheader` therefore matches nothing ("No existing
          # authentication headers to remove"), and its subsequent
          # `git remote set-url origin https://x-access-token:<app-token>@…`
          # loses to that surviving preemptive `Authorization:` header. Result
          # with an unseeded checkout: every push authenticates as
          # github-actions[bot], whose App has no `workflows` permission, so a
          # push touching .github/workflows/ dies with "refusing to allow a
          # GitHub App to create or update workflow … without workflows
          # permission" while every other push succeeds. Seed the App token here
          # and the header carries it instead. Skipped mint → GITHUB_TOKEN,
          # identical to checkout's own default.
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}

      # Materialize the plugin (committed → self → fetch) so claude-code-action
      # loads it from .devflow/vendor/devflow/ and the agent's helper scripts
      # resolve at the literal workspace path the allowlist below grants.
      - uses: ./.github/actions/vendor-plugin
        with:
          ref: ${{ needs.config.outputs.devflow_version }}

      # Provision the runtime (Python / Node / pip cache / deps) from
      # `.devflow/config.json`'s `setup` block. The logic lives in the
      # setup-project-env composite action so devflow.yml and
      # devflow-implement.yml share ONE copy (checkout above gives the action
      # the repo + config to read). See docs/cloud-setup.md for the rationale.
      - id: cfg
        uses: ./.github/actions/read-project-config
      - uses: ./.github/actions/setup-project-env
        with:
          config_json: ${{ steps.cfg.outputs.json }}

      # ── Long-run credential refresh (issue #487) ──────────────────────────
      # A GitHub App installation token expires 60 minutes after minting and
      # cannot be renewed. The two steps below keep a writer-job run push- and
      # gh-capable past that hour when the opt-in App is configured (gated on the
      # SAME vars.DEVFLOW_APP_ID != '' condition as the app-token mint above, so
      # an unconfigured consumer's behavior is byte-identical to today).
      #
      # DELIBERATELY a DETACHED process, not a `background:` step: actionlint
      # (CI's raven-actions/actionlint@v2) rejects the unrecognized `background:`
      # step key, so the refresher is spawned with `nohup … &` in a normal step
      # that survives into the claude step. The private key is piped to the
      # refresher's stdin (never argv, never disk — a pipe, not a here-string),
      # and the detached refresher is launched with `env -u` (dropping the key var)
      # so its exec-time environment — hence /proc/<pid>/environ, readable by the
      # concurrent same-uid (prompt-injectable) claude step — never holds the PEM.
      # The step-level env var exists ONLY so THIS short-lived launcher shell (gone
      # before the claude step) can pipe it; an in-process `unset` alone would NOT
      # scrub the long-lived refresher's /proc environ, which snapshots exec time
      # (proc(5)). The loop traps TERM/exits 0, so the job conclusion never rides on
      # it; the `if: always()` pidfile-kill step retires it. See docs/cloud-setup.md.
      - name: Start credential refresher (optional)
        id: refresher
        if: ${{ vars.DEVFLOW_APP_ID != '' }}
        env:
          DEVFLOW_APP_ID: ${{ vars.DEVFLOW_APP_ID }}
          DEVFLOW_APP_PRIVATE_KEY: ${{ secrets.DEVFLOW_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          # No scripts/… self-repo fallback here (unlike the always() Stop step): this
          # step runs right after `vendor-plugin` on the same sequential job, so the
          # vendored path is always present — a fallback would be dead code. Do NOT add
          # one in a wrong-direction "reconcile" with the Stop step.
          printf '%s' "$DEVFLOW_APP_PRIVATE_KEY" \
            | env -u DEVFLOW_APP_PRIVATE_KEY \
                nohup bash .devflow/vendor/devflow/scripts/refresh-app-credentials.sh loop \
                >"$RUNNER_TEMP/devflow-refresh.log" 2>&1 &
          disown || true
          echo "credential refresher started (detached); log: $RUNNER_TEMP/devflow-refresh.log"

      # Install scripts/gh-fresh.sh as a `gh` wrapper so agent-side gh resolves
      # its token at call time from the refresher-maintained token file. Wired
      # ahead of the real gh on PATH via GITHUB_PATH — direct skill-fence gh
      # calls, DevFlow's resolver-routed gh-callers (whose PATH probe finds the
      # wrapper when DEVFLOW_GH is unset), and post-claude steps all reach it.
      # Deliberately NOT exported as a process-global DEVFLOW_GH (issue #533):
      # GITHUB_ENV values persist into every later step — including a repo test
      # process — where a non-empty DEVFLOW_GH outranks fixture PATH stubs by
      # resolver design; DEVFLOW_GH stays an explicit caller/test seam. The body
      # is the checked-in seven-output-validated installer, which resolves the
      # real gh's ABSOLUTE path before the GITHUB_PATH prepend takes effect (a
      # name-based lookup in later steps would otherwise recurse into the
      # wrapper) and fails the job before the agent on the first missing output.
      # No scripts/… self-repo fallback here (same rationale as the Start step
      # above): this runs right after `vendor-plugin`, so the vendored tree is
      # present — at the consumer's pinned `devflow_version`. A pin predating
      # this installer has no such file, and the step fails LOUDLY (rc 127,
      # before the agent) until workflows and the pin are refreshed together
      # (see docs/install.md's update section). The installer's own output-2
      # wrapper-SOURCE lookup carries a vendored-or-repo fallback — that is a
      # different path (the gh-fresh.sh bytes to copy), not this invocation.
      - name: Install fresh-gh wrapper (optional)
        if: ${{ vars.DEVFLOW_APP_ID != '' }}
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          bash .devflow/vendor/devflow/scripts/install-gh-wrapper.sh
      # ── Third-party model provider resolution (issue #313) ─────────────────
      # Resolve this section's (devflow_implement) provider decision from
      # .devflow/config.json via the single-sourced inline jq RESOLVER below.
      # The RESOLVER program is byte-identical across devflow.yml,
      # devflow-implement.yml, and devflow-runner.yml (lib/test/run.sh pins that
      # identity); only the `--arg section` value differs. An empty decision (no
      # provider) reproduces today's Anthropic-OAuth wiring for a given
      # `claude_model` (one deliberate change: an empty resolved model now fails
      # loud instead of rendering `--model null`) — the provider path is strictly
      # opt-in. See docs/cloud-setup.md.
      - name: Resolve model provider
        id: provider
        env:
          CONFIG_JSON: ${{ steps.cfg.outputs.json }}
          SECTION: devflow_implement
        run: |
          set -euo pipefail
          # devflow-provider-resolver BEGIN (single-sourced; keep byte-identical across the three cloud workflows — lib/test/run.sh pins it)
          RESOLVER='
          (if (. | type) == "object" then . else {} end) as $cfg
          | (if (($cfg[$section]) | type) == "object" then $cfg[$section] else {} end) as $sec
          | ($sec.provider) as $praw
          | (if (($sec.claude_model) | type) == "string" and ($sec.claude_model != "") then $sec.claude_model else ($cfg.claude_model // "") end) as $model
          | if ($praw == null or $praw == "") then
              {provider:"", base_url:"", auth:"", timeout_ms:"", effort_supported:true, model:$model, env:{}}
            elif (($praw) | type) != "string" then
              {error:"invalid_provider", section:$section, provider:"", detail:"section provider must be a string"}
            else
              (if (($cfg.providers) | type) == "object" then $cfg.providers else {} end) as $provs
              | if (($provs[$praw]) | type) != "object" then
                  {error:"undefined_provider", section:$section, provider:$praw, detail:"provider is not defined in the providers map"}
                elif ((($provs[$praw].base_url) | type) != "string" or ($provs[$praw].base_url == "")) then
                  {error:"incomplete_provider", section:$section, provider:$praw, detail:"provider entry has no base_url"}
                elif (($provs[$praw].auth) as $a | ($a != "bearer" and $a != "api_key")) then
                  {error:"incomplete_provider", section:$section, provider:$praw, detail:"provider auth must be bearer or api_key"}
                else
                  ($provs[$praw]) as $p
                  | {provider:$praw, base_url:$p.base_url, auth:$p.auth, timeout_ms:($p.timeout_ms // ""), effort_supported:(($p.effort_supported // false) == true), model:$model, env:(if (($p.env) | type) == "object" then $p.env else {} end)}
                end
            end
          '
          # devflow-provider-resolver END
          DECISION=$(printf '%s' "$CONFIG_JSON" | jq -c --arg section "$SECTION" "$RESOLVER")
          # jq on EMPTY stdin emits nothing with rc 0, so an empty CONFIG_JSON would
          # otherwise sail through as a zero-output "decision" and silently select the
          # default path (or a misdirected empty-model error downstream). Both producers
          # provably never emit empty today, so this is a fail-loud tripwire, not a live path.
          if [ -z "$DECISION" ]; then
            echo "::error::provider resolver produced no decision for section '$SECTION' (empty config input?). Refusing to run."
            exit 1
          fi
          if [ "$(printf '%s' "$DECISION" | jq -r '.error // ""')" != "" ]; then
            PNAME=$(printf '%s' "$DECISION" | jq -r '.provider // ""')
            DETAIL=$(printf '%s' "$DECISION" | jq -r '.detail // "provider configuration is invalid"')
            echo "::error::.devflow/config.json section '$SECTION' provider '$PNAME': $DETAIL. Fix the providers.$PNAME entry (base_url + auth: bearer|api_key) or remove the section provider key. Refusing to run."
            exit 1
          fi
          # One jq pass emits every scalar decision field to the step output, each as a
          # newline-safe heredoc block: a config-sourced value carrying an embedded newline
          # would otherwise split a plain KEY=VALUE line and forge further step outputs. The
          # timestamped+PID delimiter mirrors the decision<< output below.
          sdelim="OUT_EOF_$(date +%s%N)_$$"
          printf '%s' "$DECISION" | jq -r --arg d "$sdelim" '
            ["provider","model","auth","base_url","timeout_ms","effort_supported"][] as $k
            | "\($k)<<\($d)", "\(.[$k])", $d' >> "$GITHUB_OUTPUT"
          # Forward the full decision (it carries the provider env map) to the
          # inject step via a heredoc output so embedded values survive verbatim.
          delim="DEC_EOF_$(date +%s%N)_$$"
          {
            printf 'decision<<%s\n' "$delim"
            printf '%s\n' "$DECISION"
            printf '%s\n' "$delim"
          } >> "$GITHUB_OUTPUT"

      # Inject the provider endpoint into the JOB env — ONLY when a provider is
      # active. A `run:` step writing $GITHUB_ENV (never a static step `env:`
      # block of always-present expressions) is the only mechanism that can carry
      # config-driven dynamic keys, and gating on `provider != ''` keeps the
      # default path free of even empty-valued ANTHROPIC_* vars (AC 1/4). This
      # step also carries the fail-loud empty-secret guard (AC 6), before the
      # action step runs.
      - name: Inject provider endpoint (provider-routed sections only)
        if: ${{ steps.provider.outputs.provider != '' }}
        env:
          DECISION: ${{ steps.provider.outputs.decision }}
          AUTH: ${{ steps.provider.outputs.auth }}
          BASE_URL: ${{ steps.provider.outputs.base_url }}
          TIMEOUT_MS: ${{ steps.provider.outputs.timeout_ms }}
          PROVIDER: ${{ steps.provider.outputs.provider }}
          PROVIDER_API_KEY: ${{ secrets.DEVFLOW_PROVIDER_API_KEY }}
          SECTION: devflow_implement
        run: |
          set -euo pipefail
          if [ -z "$PROVIDER_API_KEY" ]; then
            echo "::error::.devflow/config.json section '$SECTION' selects provider '$PROVIDER' but the DEVFLOW_PROVIDER_API_KEY repository secret is empty. Set that secret (the provider API key) before running a provider-routed job. Refusing to run."
            exit 1
          fi
          # SECURITY: the env-map KEY is interpolated RAW into the `KEY<<DELIM` heredoc
          # header — the newline-safe heredoc protects VALUES, not keys, so a key
          # carrying a newline or `<<` could forge a further job env var name or break
          # the heredoc terminator (leaving an opaque "matching delimiter not found"
          # abort). Keys come from maintainer-controlled config, but validate them
          # POSITIVELY against a real env-var-name charset and fail loud on any stray
          # key rather than emit a malformed/forged $GITHUB_ENV block.
          if printf '%s' "$DECISION" | jq -e '.env | keys[] | select(test("^[A-Za-z_][A-Za-z0-9_]*$") | not)' >/dev/null 2>&1; then
            echo "::error::.devflow/config.json section '$SECTION' provider '$PROVIDER' has an env-map key that is not a valid environment variable name ([A-Za-z_][A-Za-z0-9_]*). Fix the providers.$PROVIDER.env keys. Refusing to run."
            exit 1
          fi
          # Every $GITHUB_ENV write below uses GitHub's newline-safe multiline (heredoc) form —
          # the scalar endpoint values via genv(), the provider env map via the inline jq heredoc
          # emit at the end — so a config-sourced value carrying an embedded newline cannot split
          # a plain KEY=VALUE line and inject/forge a further job env var. Mirrors the resolver's
          # decision<< output; the timestamped+PID delimiter makes value collision negligible.
          genv() { local d; d="ENV_EOF_$(date +%s%N)_$$"; { printf '%s<<%s\n' "$1" "$d"; printf '%s\n' "$2"; printf '%s\n' "$d"; } >> "$GITHUB_ENV"; }
          # base_url is guaranteed non-empty by the resolver (a provider-active decision
          # fails loud on an empty base_url), so write it unconditionally.
          genv ANTHROPIC_BASE_URL "$BASE_URL"
          if [ -n "$TIMEOUT_MS" ]; then genv API_TIMEOUT_MS "$TIMEOUT_MS"; fi
          # Bearer-token gateways read Authorization from ANTHROPIC_AUTH_TOKEN; the
          # same key also rides as the anthropic_api_key action input below (the
          # documented two-slot recipe). auth: api_key passes it via the input only.
          if [ "$AUTH" = "bearer" ]; then genv ANTHROPIC_AUTH_TOKEN "$PROVIDER_API_KEY"; fi
          # Every key of the provider env map (haiku/subagent model mappings, the
          # beta/attribution toggles, …) verbatim, each as a heredoc block. These are
          # non-secret model/config values (only the API key above is a masked secret).
          edelim="ENV_EOF_$(date +%s%N)_$$"
          printf '%s' "$DECISION" | jq -r --arg d "$edelim" '.env | to_entries[] | "\(.key)<<\($d)", "\(.value)", $d' >> "$GITHUB_ENV"

      # Compute the claude_args head so --model is always present and --effort is
      # dropped only for a provider whose effort_supported is false (AC 7). The
      # Anthropic default path resolves effort_supported=true, so effort is
      # preserved there (for a non-empty effort value — the run body's
      # flag-injection guard enum-validates effort and allowlist-validates the
      # model id, rejecting flag-shaped or out-of-charset values).
      - name: Build claude_args head (model + conditional effort)
        id: cargs
        env:
          MODEL: ${{ steps.provider.outputs.model }}
          EFFORT: ${{ needs.config.outputs.effort }}
          EFFORT_SUPPORTED: ${{ steps.provider.outputs.effort_supported }}
        run: |
          set -euo pipefail
          if [ -z "$MODEL" ]; then
            echo "::error::claude_model is missing from .devflow/config.json (set a top-level claude_model, or a per-section claude_model). Refusing to run."
            exit 1
          fi
          # SECURITY: MODEL and EFFORT are spliced UNQUOTED into claude_args (a folded
          # CLI string), and the runner can read either from PR-head config (EFFORT
          # always via steps.extract when the caller passes no effort input; MODEL in
          # the bootstrap fallback) — so refuse any value that could smuggle an extra
          # CLI flag. A blacklist is NOT enough here: the action tokenises claude_args
          # shell-style, so a flag-shaped single token (`--model --evil`) records
          # --model as valueless and passes --evil through as its own flag, and a
          # bytewise [[:space:]] check misses Unicode whitespace (NBSP/U+2028/U+3000)
          # under a non-UTF-8 runner locale while the JS tokeniser still splits on it.
          # So MODEL is validated POSITIVELY: reject a leading dash, then reject any
          # character outside the conservative model-id allowlist
          # A-Za-z0-9 . _ / : @ [ ] -  (covers claude-*, provider/model, Z.ai
          # bracket-suffix ids like glm-5.2[1m], and Bedrock-style colon ids) — a
          # multibyte character is rejected in every locale because none of its bytes
          # (C locale) nor its codepoint (UTF-8 locale) is in the allowlist. EFFORT is
          # pinned to its schema enum (or empty, which drops the flag below). In the
          # negated bracket expression, `]` sits first after `!` and `-` last, making
          # both literal members of the set.
          case "$MODEL" in
            -*)
              echo "::error::claude_model value is flag-shaped (leading dash) — refusing to compose claude_args (flag-injection guard; the model must be a single non-dash-leading token)."
              exit 1 ;;
            *[!]A-Za-z0-9._/:@[-]*)
              echo "::error::claude_model value contains a character outside the model-id allowlist (A-Za-z0-9 . _ / : @ [ ] -) — refusing to compose claude_args (flag-injection guard)."
              exit 1 ;;
          esac
          case "$EFFORT" in
            '' | low | medium | high | xhigh | max) : ;;
            *)
              echo "::error::effort value is not one of low/medium/high/xhigh/max — refusing to compose claude_args (flag-injection guard)."
              exit 1 ;;
          esac
          ARGS="--model $MODEL"
          # --effort only when the provider supports it AND a value actually resolved. The
          # config effort defaults to "high", so the default path always has one; the -n
          # co-guard just avoids ever handing the CLI a valueless --effort on a pathological
          # empty effort.
          if [ "$EFFORT_SUPPORTED" = "true" ] && [ -n "$EFFORT" ]; then
            ARGS="$ARGS --effort $EFFORT"
          fi
          # Newline-safe heredoc output (mirrors the resolver's decision<< / scalar-output form).
          adelim="OUT_EOF_$(date +%s%N)_$$"
          { printf 'args<<%s\n' "$adelim"; printf '%s\n' "$ARGS"; printf '%s\n' "$adelim"; } >> "$GITHUB_OUTPUT"

      # Compose the plugins/plugin_marketplaces inputs (issue #505): the baked
      # baseline (byte-identical across the three call sites — run.sh pins it)
      # PLUS the entries this repo's trusted default-branch .claude/settings.json
      # declares (enabledPlugins=true; github-kind extraKnownMarketplaces), so a
      # consumer repo's cloud plugin surface matches what its local team sees —
      # "commit the settings file once, every tier honors it." This write tier's
      # checkout IS the default branch (issue_comment checks out the default), so
      # .claude/settings.json is maintainer-committed, trusted. The single-line
      # `printf '%s\n' <args>` baseline form avoids the YAML-indent-corrupts-
      # multiline-literals gotcha and is grep-pinnable for the sync invariant.
      - name: Compose plugin inputs (baseline + settings-declared)
        id: plugins
        run: |
          set -euo pipefail
          BAKED_PLUGINS="$(printf '%s\n' code-review@claude-plugins-official claude-md-management@claude-plugins-official devflow@devflow-marketplace)"
          BAKED_MARKETPLACES="$(printf '%s\n' https://github.com/anthropics/claude-plugins-official.git ./)"
          SETTINGS=.claude/settings.json
          HELPER=.devflow/vendor/devflow/scripts/resolve-extra-plugins.sh
          COMPOSE=.devflow/vendor/devflow/scripts/describe-plugin-compose.sh
          EX_P="$(mktemp)"; EX_M="$(mktemp)"; ERR_P="$(mktemp)"; ERR_M="$(mktemp)"; ENTRIES="$(mktemp)"
          trap 'rm -f "$EX_P" "$EX_M" "$ERR_P" "$ERR_M" "$ENTRIES"' EXIT
          if [ ! -f "$HELPER" ]; then
            # Skew arm (issue #455 two-halves; inline + grep-pinned by run.sh): the
            # helper is absent at the vendored path — a consumer whose pinned
            # devflow_version predates issue #505 running an upgraded workflow.
            # Proceed with the baked baseline; one ::warning:: names devflow_version
            # as the remedy. This arm fires precisely when describe-plugin-compose.sh
            # (absent alongside it) cannot be invoked, so the warning stays inline
            # rather than routed through the helper.
            echo "::warning::devflow resolve-extra-plugins.sh not found at $HELPER — a pinned devflow_version predating issue #505 running an upgraded workflow; proceeding with the baked plugin baseline. Bump devflow_version in .devflow/config.json to compose settings-declared plugins."
            : > "$EX_P"; : > "$EX_M"; : > "$ERR_P"; : > "$ERR_M"
          else
            bash "$HELPER" plugins "$SETTINGS" > "$EX_P" 2>"$ERR_P" || true
            bash "$HELPER" marketplaces "$SETTINGS" > "$EX_M" 2>"$ERR_M" || true
          fi
          # Join breadcrumbs into one defect string (bash builtins; guard-class 2 —
          # the joined value that decides the degraded-arm message is not derived
          # through cat/tr/sed, non-preflight PATH tools).
          DEFECT=""
          for f in "$ERR_P" "$ERR_M"; do
            while IFS= read -r line || [ -n "$line" ]; do
              [ -z "$line" ] && continue
              if [ -z "$DEFECT" ]; then DEFECT="$line"; else DEFECT="$DEFECT; $line"; fi
            done < "$f"
          done
          # Spliced entries (extras beyond baseline) for the splice ::notice::.
          : > "$ENTRIES"
          for f in "$EX_P" "$EX_M"; do
            while IFS= read -r line || [ -n "$line" ]; do
              [ -z "$line" ] && continue
              printf '%s\n' "$line" >> "$ENTRIES"
            done < "$f"
          done
          # Dedupe baseline + extras, keeping the first occurrence (bash builtins;
          # guard-class 2 — no tr/sed/wc/cut/head for the emitted list). The `|`
          # separator never occurs in a plugin@marketplace entry or a marketplace URL.
          dedupe() {
            local baseline="$1" extras="$2" seen="" line out=""
            while IFS= read -r line || [ -n "$line" ]; do
              [ -z "$line" ] && continue
              case "$seen" in *"|$line|"*) ;; *) seen="$seen|$line|"; out="${out:+$out$'\n'}$line" ;; esac
            done <<< "$baseline"
            if [ -f "$extras" ]; then
              while IFS= read -r line || [ -n "$line" ]; do
                [ -z "$line" ] && continue
                case "$seen" in *"|$line|"*) ;; *) seen="$seen|$line|"; out="${out:+$out$'\n'}$line" ;; esac
              done < "$extras"
            fi
            printf '%s\n' "$out"
          }
          COMBINED_PLUGINS="$(dedupe "$BAKED_PLUGINS" "$EX_P")"
          COMBINED_MK="$(dedupe "$BAKED_MARKETPLACES" "$EX_M")"
          pdelim="PLG_EOF_$(date +%s%N)_$$"
          { printf 'plugins<<%s\n' "$pdelim"; printf '%s\n' "$COMBINED_PLUGINS"; printf '%s\n' "$pdelim"; } >> "$GITHUB_OUTPUT"
          mdelim="MKT_EOF_$(date +%s%N)_$$"
          { printf 'plugin_marketplaces<<%s\n' "$mdelim"; printf '%s\n' "$COMBINED_MK"; printf '%s\n' "$mdelim"; } >> "$GITHUB_OUTPUT"
          # Annotation — arm classification lives in describe-plugin-compose.sh (the
          # describe-denial-count.sh extraction convention; run.sh drives every arm).
          # Inline fallback for the partial-vendor skew (HELPER present, COMPOSE
          # absent): the helper ran and may have set DEFECT (a degraded settings
          # entry) AND/OR emitted valid extras into ENTRIES (which were already
          # spliced into the credentialed runner's plugin surface unconditionally
          # above). DEFECT and a splice can COEXIST (PR #513) — a degraded entry
          # must NOT suppress the splice ::notice:: for the valid extras. Without
          # COMPOSE to render the annotation, mirror the helper's arms inline and
          # emit each independently, so a spliced entry is never added without an
          # audit line (docs/cloud-setup.md: every spliced entry logged, never silent).
          if [ -f "$COMPOSE" ]; then
            # Capture the renderer's status rather than `|| true`-swallowing it: the
            # extras were already spliced above, so a non-zero renderer must still
            # leave an audit line (PR #513 "never silent"). The run is never
            # broken — the failure is caught, not propagated.
            if ! bash "$COMPOSE" ok "$ENTRIES" "$DEFECT"; then
              echo "::warning::describe-plugin-compose.sh failed (rc≠0); extras (if any) were composed but the audit annotation could not be rendered."
            fi
          else
            # Join the spliced entries via a bash-builtin loop (guard-class 2 — no
            # cat/tr/sed for the emitted list), mirroring describe-plugin-compose.sh's
            # splice ::notice::.
            _splice=""
            if [ -s "$ENTRIES" ]; then
              while IFS= read -r line || [ -n "$line" ]; do
                [ -z "$line" ] && continue
                if [ -z "$_splice" ]; then _splice="$line"; else _splice="$_splice, $line"; fi
              done < "$ENTRIES"
            fi
            if [ -n "$DEFECT" ] && [ -n "$_splice" ]; then
              echo "::warning::.claude/settings.json has degraded entries ($DEFECT); those are skipped, the valid extras below are composed."
              echo "::notice::Composed plugin/marketplace entries beyond the baked baseline (describe-plugin-compose.sh unavailable): $_splice"
            elif [ -n "$DEFECT" ]; then
              echo "::warning::.claude/settings.json is degraded ($DEFECT); proceeding with the baked plugin baseline."
            elif [ -n "$_splice" ]; then
              echo "::notice::Composed plugin/marketplace entries beyond the baked baseline (describe-plugin-compose.sh unavailable): $_splice"
            fi
          fi

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          # Surfaces the workflow-capable-token signal to the /devflow:implement
          # agent's Phase 1.6 execution-capability pass (Pass 5, issues #346/#350).
          # NON-EMPTY ⇒ the App token minted above (Contents + Workflows write) is
          # seeded into actions/checkout (#357), so the agent CAN push
          # .github/workflows/ and workflow-resident ACs are NOT deferred. EMPTY ⇒
          # the checkout credential is the built-in GITHUB_TOKEN (github-actions[bot]),
          # which cannot push .github/workflows/, so Pass 5 defers those ACs at plan
          # time. Always exported (empty-valued when the variable is unset) so the
          # pass reads a definite signal rather than an absent one. Coupled to Pass 5's
          # keying in skills/implement/phases/phase-1-setup.md and its lib/test/run.sh pins.
          DEVFLOW_APP_ID: ${{ vars.DEVFLOW_APP_ID }}
        with:
          # Anthropic-default path only: pass the OAuth token when no provider is
          # active. A provider-routed section passes '' here (the action treats
          # empty as absent) and authenticates via anthropic_api_key below.
          claude_code_oauth_token: ${{ steps.provider.outputs.provider == '' && secrets.CLAUDE_CODE_OAUTH_TOKEN || '' }}
          # Provider path only: the fixed DEVFLOW_PROVIDER_API_KEY secret satisfies
          # the action's launch check (and, for bearer auth, is ALSO exported as
          # ANTHROPIC_AUTH_TOKEN by the inject step). Empty on the default path.
          anthropic_api_key: ${{ steps.provider.outputs.provider != '' && secrets.DEVFLOW_PROVIDER_API_KEY || '' }}
          # Use the minted App token for git auth when the opt-in App is
          # configured; otherwise fall back to the built-in GITHUB_TOKEN (the
          # skipped-step path, identical to pre-change behavior).
          github_token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          allowed_bots: ${{ needs.config.outputs.allowed_bots }}

          # Always agent mode: the gate resolved a single issue number, so the
          # action never depends on `@claude` or on reading the raw body.
          # Anthropic's stock claude.yml (tag mode) therefore never double-fires
          # on a bare `/devflow:implement <n>` comment.
          prompt: ${{ format('/devflow:implement {0}', needs.gate.outputs.number) }}

          # Agent mode is silent by default; surface a progress comment so the
          # requester sees the run was picked up (applies to all paths now).
          track_progress: false

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Composed by the `Compose plugin inputs` step above (issue #505): the
          # baked baseline (byte-identical across the three call sites — run.sh
          # pins it) PLUS the entries .claude/settings.json declares. Kept in sync
          # with devflow.yml so both listeners expose the same skill surface.
          plugin_marketplaces: ${{ steps.plugins.outputs.plugin_marketplaces }}

          # code-review@ and claude-md-management@ are ambient-command conveniences (the
          # /code-review and /revise-claude-md slash commands), NOT engine dependencies —
          # DevFlow's engine dispatches neither. The "zero companion-plugin dependencies"
          # claim is scoped to the consumer install + what the engine dispatches; see
          # docs/DEVFLOW_SYSTEM_OVERVIEW.md §6. devflow@ is DevFlow itself. The baked
          # baseline three are composed by the step above; settings-declared extras are
          # appended beyond them.
          plugins: ${{ steps.plugins.outputs.plugins }}

          base_branch: ${{ needs.config.outputs.base_branch }}
          # claude_args head is a COMPUTED string (steps.cargs): --model always,
          # --effort conditional on effort_supported (issue #313). The --allowed-tools
          # tail below is preserved verbatim — keep this literal list in sync with
          # devflow.yml's literal list (devflow-runner.yml intentionally uses a computed
          # steps.tools.outputs.tools profile string, not a literal list).
          # allowed_tools_extra splices inside the closing quote.
          # Reachable bundled helpers from skills/review*/SKILL.md are granted here as
          # vendored literals because Phase 3 runs the review engine INLINE under this
          # allowlist (#484) — otherwise the engine silently refuses them (#363). The
          # lib/test/run.sh #484 guard deliberately audits all shared fenced source,
          # including standalone-only Phase 4.4, so every audited head is granted or
          # withheld with rationale even when normal inline control flow cannot reach it.
          claude_args: >-
            ${{ steps.cargs.outputs.args }}
            --allowed-tools
            "Read,
            Write,
            Edit,
            Glob,
            Grep,
            LS,
            Skill,
            Agent,
            TodoWrite,
            EnterPlanMode,
            ExitPlanMode,
            WebFetch,
            WebSearch,
            Bash(git add:*),
            Bash(git commit:*),
            Bash(git push:*),
            Bash(git pull:*),
            Bash(git fetch:*),
            Bash(git ls-remote:*),
            Bash(git status:*),
            Bash(git diff:*),
            Bash(git log:*),
            Bash(git show:*),
            Bash(git hash-object:*),
            Bash(git checkout:*),
            Bash(git branch:*),
            Bash(git stash:*),
            Bash(git rm:*),
            Bash(git mv:*),
            Bash(git restore:*),
            Bash(git revert:*),
            Bash(git blame:*),
            Bash(git ls-files:*),
            Bash(git rev-parse:*),
            Bash(git merge-base:*),
            Bash(git merge:*),
            Bash(gh pr create:*),
            Bash(gh pr edit:*),
            Bash(gh pr comment:*),
            Bash(gh pr diff:*),
            Bash(gh pr view:*),
            Bash(gh pr review:*),
            Bash(gh pr ready:*),
            Bash(gh pr list:*),
            Bash(gh pr checks:*),
            Bash(gh pr status:*),
            Bash(gh pr reopen:*),
            Bash(gh issue view:*),
            Bash(gh issue comment:*),
            Bash(gh issue list:*),
            Bash(gh issue edit:*),
            Bash(gh issue create:*),
            Bash(gh issue reopen:*),
            Bash(gh issue status:*),
            Bash(gh search:*),
            Bash(gh label list:*),
            Bash(gh repo view:*),
            Bash(gh run view:*),
            Bash(gh run list:*),
            Bash(gh workflow view:*),
            Bash(gh workflow list:*),
            Bash(gh api:*),
            Bash(jq:*),
            Bash(.devflow/vendor/devflow/scripts/run-jq.sh:*),
            Bash(.devflow/vendor/devflow/scripts/config-get.sh:*),
            Bash(.devflow/vendor/devflow/scripts/workpad.py:*),
            Bash(.devflow/vendor/devflow/scripts/parse-acs.py:*),
            Bash(.devflow/vendor/devflow/scripts/preflight.py:*),
            Bash(.devflow/vendor/devflow/scripts/branch-for-issue.py:*),
            Bash(.devflow/vendor/devflow/scripts/update-branch-checkpoint.sh:*),
            Bash(.devflow/vendor/devflow/scripts/file-deferrals.py:*),
            Bash(.devflow/vendor/devflow/scripts/match-deferrals.py:*),
            Bash(.devflow/vendor/devflow/scripts/resolve-review-overrides.py:*),
            Bash(.devflow/vendor/devflow/scripts/apply-labels.sh:*),
            Bash(.devflow/vendor/devflow/scripts/ensure-label.sh:*),
            Bash(.devflow/vendor/devflow/lib/efficiency-trace.sh:*),
            Bash(.devflow/vendor/devflow/scripts/stale-prose-lint.py:*),
            Bash(.devflow/vendor/devflow/scripts/dismiss-stale-rejections.sh:*),
            Bash(.devflow/vendor/devflow/scripts/match-lint-adjudications.py:*),
            Bash(.devflow/vendor/devflow/scripts/load-prompt-extension.sh:*),
            Bash(.devflow/vendor/devflow/scripts/react-to-trigger.sh:*),
            Bash(.devflow/vendor/devflow/scripts/extract-doc-needed-paths.sh:*),
            Bash(pip install:*),
            Bash(pip:*),
            Bash(python:*),
            Bash(python3:*),
            Bash(python -m:*),
            Bash(python3 -m:*),
            Bash(ruff:*),
            Bash(ruff check:*),
            Bash(ruff format:*),
            Bash(pytest:*),
            Bash(mypy:*),
            Bash(grep:*),
            Bash(rg:*),
            Bash(find:*),
            Bash(wc:*),
            Bash(sort:*),
            Bash(uniq:*),
            Bash(cut:*),
            Bash(tr:*),
            Bash(xargs:*),
            Bash(awk:*),
            Bash(sed:*),
            Bash(diff:*),
            Bash(cmp:*),
            Bash(comm:*),
            Bash(cat:*),
            Bash(head:*),
            Bash(tail:*),
            Bash(less:*),
            Bash(ls:*),
            Bash(tree:*),
            Bash(file:*),
            Bash(stat:*),
            Bash(date:*),
            Bash(pwd:*),
            Bash(realpath:*),
            Bash(dirname:*),
            Bash(basename:*),
            Bash(which:*),
            Bash(type:*),
            Bash(env:*),
            Bash(echo:*),
            Bash(printf:*),
            Bash(test:*),
            Bash(touch:*),
            Bash(mkdir:*),
            Bash(rmdir:*),
            Bash(rm:*),
            Bash(mv:*),
            Bash(cp:*),
            Bash(tee:*)${{ needs.config.outputs.allowed_tools_extra }}"

      # Retire the detached credential refresher (issue #487). Best-effort,
      # always() so it runs on every exit path. The kill-by-pidfile, log-tail, and
      # defeated-refresher ::warning:: logic lives in scripts/stop-refresher.sh so
      # the branch/message selection is suite-drivable (CLAUDE.md inline-shell-
      # extraction convention). Vendored copy, repo-path fallback for a self-repo run.
      - name: Stop credential refresher (optional)
        if: ${{ always() && vars.DEVFLOW_APP_ID != '' }}
        env:
          # The Start step's outcome. stop-refresher.sh treats the launcher as having
          # RAN when this is `success` OR `failure` (a ran-and-failed launcher is still
          # a genuine never-started defeat — arm18), and as NOT run when `skipped` OR
          # `cancelled` (an upstream early-abort), where a missing pidfile is expected
          # rather than a defeat. (In practice the Start step's run: ends on a bare echo
          # and never waits on its backgrounded nohup, so it realistically only yields
          # success or skipped/cancelled — but the contract handed to the helper is the
          # broader four-way one above.)
          DEVFLOW_REFRESH_STARTED: ${{ steps.refresher.outcome }}
        run: |
          H=.devflow/vendor/devflow/scripts/stop-refresher.sh
          [ -f "$H" ] || H=scripts/stop-refresher.sh
          bash "$H"

      # Surface the claude-code-action run's execution diagnostics (run summary +
      # permission-denial detail) to the job log and $GITHUB_STEP_SUMMARY so a
      # maintainer debugging a stalled / incomplete / unexpectedly-denied cloud
      # run sees the denial detail and run shape directly — the exact information
      # that was irrecoverable for PR #325 (issue #331; helper + config key
      # shipped in #329). Read-only: the helper always exits 0, this step adds no
      # permissions grant / minted-token scope and uploads no artifact, so it
      # never changes the job's pass/fail. always() so it runs even when the
      # claude step errored — which is exactly when the diagnostics matter. Gated
      # on .devflow.execution_diagnostics_enabled (default true) via the vendored
      # config-get.sh (repo-path fallback for a self-repo checkout); only the
      # exact string "false" disables it, and an empty read (config-get soft/hard
      # failure) falls safe to enabled.
      - name: Surface execution diagnostics
        if: always()
        env:
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          set -euo pipefail
          CG=.devflow/vendor/devflow/scripts/config-get.sh
          [ -f "$CG" ] || CG=scripts/config-get.sh
          # `|| true` so config-get's hard-fail exit (malformed config.json / missing
          # python3) can't abort this step under GitHub's default `-e` run shell — which
          # would fail the job and break the "never changes the job's pass/fail" contract
          # above. The empty read then falls safe to enabled on the next line. (Mirrors the
          # `|| echo false` assignment guard in devflow-runner.yml's engine-error step.)
          ENABLED="$("$CG" .devflow.execution_diagnostics_enabled true || true)"
          [ -n "$ENABLED" ] || ENABLED=true
          if [ "$ENABLED" = "false" ]; then
            echo "execution diagnostics: disabled via .devflow.execution_diagnostics_enabled=false; skipping."
            exit 0
          fi
          SED=.devflow/vendor/devflow/scripts/surface-execution-diagnostics.sh
          [ -f "$SED" ] || SED=scripts/surface-execution-diagnostics.sh
          if [ -f "$SED" ]; then
            # `|| echo ::notice::` for the same reason as the config-get guard above:
            # the helper's always-exit-0 contract holds for the committed file, but a
            # partial-copy / truncated vendored helper (a documented deployment hazard)
            # could exit non-zero, which under GitHub's default `-e` run shell would
            # abort this always() step and fail the job. Guard it so the read-only
            # "never changes the job's pass/fail" contract holds even then.
            bash "$SED" "${EXECUTION_FILE:-}" || echo "::notice::surface-execution-diagnostics.sh exited non-zero; execution diagnostics unavailable (best-effort)."
          else
            echo "::notice::surface-execution-diagnostics.sh absent; execution diagnostics not surfaced (best-effort)."
          fi

      - name: Persist review-and-fix observability artifacts (backstop)
        if: ${{ always() }}
        env:
          # Harness-side cost floor inputs (issue #475). On devflow-implement.yml the
          # command class is always `implement` and the candidate is the ISSUE number
          # (needs.gate.outputs.number); prepare-harness-floor.sh resolves the PR opened
          # for it (the skeleton slug) via the closes-issue predicate.
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
          DEVFLOW_COMMAND: implement
          DEVFLOW_CANDIDATE_NUMBER: ${{ needs.gate.outputs.number }}
          # Job-lifetime-valid token for the floor's gh PR resolution: the job-start App
          # token can already be past its ~60-minute lifetime by backstop time (#287).
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          HELPER=.devflow/vendor/devflow/lib/efficiency-trace.sh
          [ -f "$HELPER" ] || { echo "::warning::observability backstop: $HELPER missing; skipped"; exit 0; }
          # Harness-side cost floor (issue #475): the glue helper runs the execution-file
          # reader, resolves the PR, and emits the floor env values consumed by --persist.
          # Guard its existence exactly like $HELPER: a vendored tree pinned to an OLDER
          # devflow_version lacks it, and that must draw a NAMED ::warning:: (floor inert),
          # never a raw `No such file` under `set +e`.
          FLOOR=.devflow/vendor/devflow/scripts/prepare-harness-floor.sh
          DEVFLOW_EXECUTION_COST=""
          DEVFLOW_EXECUTION_PR=""
          DEVFLOW_COMMAND_CLASS=""
          if [ -f "$FLOOR" ]; then
            COST_FILE="${RUNNER_TEMP:-/tmp}/devflow-harness-cost-$$.json"
            # The glue prints two eval-able env assignments (PR + class) to stdout and
            # writes the cost JSON to $COST_FILE; its breadcrumbs go to the step log.
            eval "$(bash "$FLOOR" "${EXECUTION_FILE:-}" "${DEVFLOW_COMMAND:-}" "${DEVFLOW_CANDIDATE_NUMBER:-}" "$COST_FILE")"
            [ -s "$COST_FILE" ] && DEVFLOW_EXECUTION_COST="$(cat "$COST_FILE")"
            rm -f "$COST_FILE"
          else
            echo "::warning::harness cost floor inert: $FLOOR missing (a vendored tree pinned to an older devflow_version); the cost floor is skipped this run"
          fi
          # --persist derives each run's record + durable workpad copy and writes them to
          # the dedicated telemetry branch via git plumbing, then pushes with a fetch/
          # re-parent retry loop — all inside the helper. With the floor env set it ALSO
          # merge-fills harness_cost into this run's record (or writes a minimal cost
          # skeleton); unset, it is byte-identical to before (issue #441/#475). It never
          # touches HEAD or the TRACKED working tree. Best-effort/exit-0.
          DEVFLOW_EXECUTION_COST="$DEVFLOW_EXECUTION_COST" \
          DEVFLOW_EXECUTION_PR="$DEVFLOW_EXECUTION_PR" \
          DEVFLOW_COMMAND_CLASS="$DEVFLOW_COMMAND_CLASS" \
            bash "$HELPER" --persist
          exit 0

      # ── Fresh App token for the stall backstop (issue #287) ────────────────
      # The `app-token` step above is minted at the START of the `claude` job,
      # which can run well over an hour — longer than a GitHub App installation
      # token's ~60-minute lifetime. The stall backstop that fires AFTER that
      # long run would otherwise inherit an already-expired token, so its
      # workpad read 401s, a healthy workpad is misclassified, and auto-resume
      # can never fire on exactly the long runs that need it. Mint a fresh token
      # here, just-in-time (< 1 min old), mirroring the writer mint (same
      # client-id/private-key, full installation scope); the gate adds `always()`
      # so it still mints after a failed claude job (do NOT "reconcile" it back
      # to the writer's bare `if:` — that would break the backstop on failed
      # runs). When
      # DEVFLOW_APP_ID is unset this step is skipped and its output token is
      # empty, so the backstop's GH_TOKEN falls back to GITHUB_TOKEN exactly as
      # before — the non-adopter path is byte-for-byte unchanged.
      - name: Mint stall-backstop token (optional)
        id: backstop-token
        if: ${{ always() && vars.DEVFLOW_APP_ID != '' }}
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.DEVFLOW_APP_ID }}
          private-key: ${{ secrets.DEVFLOW_APP_PRIVATE_KEY }}

      # ── Stall backstop (issue #268; primitives from #266) ──────────────────
      # A headless single-shot claude-code-action run can end mid-lifecycle yet
      # report success (the SDK ends the session on a tool-call-free turn), so
      # this deterministic post-run step keys on the issue workpad Status —
      # never PR draft state — and acts on the pure decision helper's verdict:
      # terminal → no-op; interim → audit comment + re-dispatch (bounded by
      # stall_backstop.max_resume_attempts); cap exhausted or unreadable →
      # distinct comment + non-zero exit (the job goes honestly red). A gh-api/
      # transport/auth failure reading the workpad is a distinct auth-failure
      # class — it fails loud without consuming a resume attempt and is never
      # mislabeled unreadable. Auto-resume needs the optional DEVFLOW_APP_ID App
      # token AND that App's bot login in devflow.allowed_bots; fail-loud works
      # under either token — see docs/implement-skill.md for the full boundary
      # discussion.
      - name: Stall backstop
        if: ${{ always() }}
        env:
          # The freshly-minted backstop token (issue #287), NOT the stale
          # claude-job-scoped app-token — falls back to GITHUB_TOKEN when the
          # opt-in App is unconfigured, identical to the pre-change behavior.
          GH_TOKEN: ${{ steps.backstop-token.outputs.token || secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ needs.gate.outputs.number }}
          # Whether the workflow-capable App token was actually minted: a
          # GITHUB_TOKEN-authored resume comment never re-triggers the workflow
          # (GitHub suppresses recursive GITHUB_TOKEN events), so a resume
          # decision without the App token must fail loud, not read as green.
          # Keyed on the fresh backstop token (issue #287): when DEVFLOW_APP_ID
          # is set both mints yield a token so this stays true, and when unset
          # both are empty so it stays false — same value either way.
          APP_TOKEN_PRESENT: ${{ steps.backstop-token.outputs.token != '' }}
          # The claude step's outcome disambiguates the missing-vendored-dir
          # case: on a failed/skipped claude step the job is already red (or
          # deliberately not running), so skipping here is benign; on a
          # successful claude step a vanished vendored dir means the backstop
          # was silently disarmed — fail loud instead of masking it.
          CLAUDE_OUTCOME: ${{ steps.claude.outcome }}
          # The job's status (issue #498): success / failure / cancelled. The
          # decide helper's fifth argument; only the exact string `cancelled`
          # selects the cancellation-exclusion path (a cancel is a decided end,
          # not a stall). Deliberately the documented job-context string, not a
          # status-check function (the docs scope those to `if:` conditionals).
          JOB_STATUS: ${{ job.status }}
        run: |
          set +e
          V=.devflow/vendor/devflow/scripts
          if [ ! -d "$V" ]; then
            if [ "$CLAUDE_OUTCOME" = "success" ]; then
              echo "::error::stall backstop: vendored scripts dir '$V' missing on a successful run — the backstop is disarmed; failing loud"
              exit 1
            fi
            echo "::warning::stall backstop: vendored scripts dir '$V' missing (claude step outcome: ${CLAUDE_OUTCOME:-unknown}); skipped — the job is already non-green"
            exit 0
          fi
          # Dead-run Status flip (issue #356): when this backstop step takes a
          # fail-loud exit AND the workpad Status was successfully read as a
          # genuinely interim (🚀) value, flip it to the terminal 💥 Failed word
          # so the workpad stops lying that a dead run is still working. Best-
          # effort: a flip failure emits a ::warning:: and never changes which
          # exit statement is reached (kept inside the step's `set +e`
          # discipline). Guarded on CLASS=interim, so a terminal/unreadable/
          # auth-failure class is never clobbered (fail closed) — this makes the
          # fail-auth and fail-unreadable arms no-ops for the flip even though
          # they reach the shared final exit. The guard is POSITIONAL, not
          # temporal: the flip is called only at genuine fail-loud exits, never
          # on the green resume path (a terminal Failed written before a resume
          # would make the resumed run's backstop read terminal→noop and disarm
          # it). The dropped-resume and no-App-token aborts ARE fail-loud exits
          # despite living on the resume decision, so they flip: the resume did
          # not actually take, so no run is disarmed.
          # Maintenance obligation of the positional guard: a trap would cover
          # new exits automatically, but cannot (it would fire on the resume
          # path). So every fail-loud exit ADDED to this step must call
          # flip_to_failed itself — omitting the call silently regresses the
          # flip on that arm.
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          flip_to_failed() {
            [ "${CLASS:-}" = "interim" ] || return 0
            python3 "$V/workpad.py" update "$ISSUE_NUMBER" --status Failed \
              --note "run died: ${1:-dead-end exit} — ${RUN_URL}" \
              || echo "::warning::stall backstop: could not flip workpad Status to 💥 Failed (${1:-dead-end exit}); leaving it unchanged"
          }
          # Cancelled-run flip (issue #498): mirror of flip_to_failed — the same
          # POSITIONAL CLASS=interim guard, best-effort ::warning:: on failure,
          # never changes the exit arm. Flips an interim workpad to 🛑 Cancelled
          # so a deliberately-cancelled run stops lying it is still working.
          # Called only from the flip-cancelled arm (a green exit), never on the
          # resume path. The note names the signal (job.status=cancelled), never
          # operator intent — same reason-line idiom as flip_to_failed. 🛑 joins
          # 💥 as a workpad-only terminal glyph with no reaction equivalent.
          flip_to_cancelled() {
            [ "${CLASS:-}" = "interim" ] || return 0
            python3 "$V/workpad.py" update "$ISSUE_NUMBER" --status Cancelled \
              --note "run cancelled (job.status=cancelled) — ${RUN_URL}" \
              || echo "::warning::stall backstop: could not flip workpad Status to 🛑 Cancelled; leaving it unchanged"
          }
          # Master switch first: disabled → fully skipped (no status read, no
          # comment, no resume, no fail). Unrecognized/missing resolves to
          # enabled (only the exact string "false" disables — the decide
          # helper's rule; an empty read is rewritten to "true" here).
          # config-get prints a fully-resolved value or nothing, so one
          # emptiness fallback covers both its soft and hard failure paths.
          ENABLED="$("$V/config-get.sh" .devflow_implement.stall_backstop.enabled true)"
          [ -n "$ENABLED" ] || ENABLED=true
          if [ "$ENABLED" = "false" ]; then
            echo "stall backstop: disabled via stall_backstop.enabled=false; skipping (no status read)"
            exit 0
          fi
          MAX="$("$V/config-get.sh" .devflow_implement.stall_backstop.max_resume_attempts 2)"
          [ -n "$MAX" ] || MAX=2
          # Sanitize MAX here too (mirrors the decide helper): the helper
          # substitutes 2 for a non-integer cap internally, so without this the
          # comments would print a raw corrupt value ("attempt 1 of banana")
          # that the decision never used.
          [[ "$MAX" =~ ^[0-9]+$ ]] || MAX=2
          # Workpad Status read (issue #287): capture the rc into a variable —
          # `$?` is only valid for one test, and we branch on it twice.
          #   exit 3  → a gh-api/transport/auth failure (e.g. an EXPIRED App
          #             token): the workpad may be perfectly healthy, the READ
          #             failed. Classify as 'auth-failure' (its own decision
          #             class), NOT 'unreadable' — fail loud without burning a
          #             resume attempt on a workpad we never actually read.
          #   exit 1  → unparseable/absent/unrecognized Status (content-shape).
          #   exit 2  → no workpad. Both map to the 'unreadable' class.
          #   rc-0 empty output → defensively 'unreadable'.
          # stderr deliberately flows to the run log — the helper's exit-1/exit-3
          # causes emit distinct diagnostics there; the no-workpad exit-2 and
          # rc-0-empty causes are silent, distinguished only by the status= echo
          # below.
          STATUS_OUT="$(python3 "$V/workpad.py" status "$ISSUE_NUMBER")"
          STATUS_RC=$?
          if [ "$STATUS_RC" -eq 3 ]; then
            echo "::error::stall backstop: reading the workpad Status failed with a gh-api/transport/auth error (workpad.py status exit 3; the specific gh error is on workpad.py's stderr above) — this is an API/transport failure (most often an expired GitHub App installation token, but any gh-api/transport error or an unparseable API response lands here), NOT an unreadable workpad, which may be perfectly healthy. Failing loud WITHOUT consuming a resume attempt; check the specific error above (and DEVFLOW_APP_ID / the App token's freshness) and re-run"
            CLASS=auth-failure
            STATUS_OUT="(auth/API failure reading the workpad Status)"
          elif [ "$STATUS_RC" -eq 0 ] && [ -n "$STATUS_OUT" ]; then
            # Strip backticks/CR before the value is interpolated inside a
            # markdown code span in the posted comments — a hand-corrupted
            # Status line must not be able to break the comment markup.
            STATUS_OUT="${STATUS_OUT//\`/}"; STATUS_OUT="${STATUS_OUT//$'\r'/}"
            CLASS="${STATUS_OUT%% *}"
          else
            CLASS=unreadable
            STATUS_OUT="(unreadable: workpad missing or Status unparseable)"
          fi
          # Prior auto-resume attempts = audit comments carrying the marker
          # below. The marker is written into each resume comment AND counted
          # here through this single variable (coupled with the lib/test/run.sh
          # pin). Counted lazily — only an interim status can lead to a decision
          # that reads it — so the healthy terminal path skips the paginated
          # fetch. The count input is CR-stripped so a CRLF-bearing body cannot silently
          # zero the count. A failed comment read makes the attempt count
          # UNKNOWABLE: it maps to the unreadable (fail-loud) class rather
          # than assuming 0 — a persistent read failure must not defeat the
          # cap with an unbounded green resume loop. The count is
          # lifetime-per-issue by design: once a stall episode exhausted the
          # cap, later stalls on the same issue fail loud immediately (the
          # safe, visible direction) until a human intervenes.
          MARKER='<!-- devflow:stall-backstop-audit -->'
          ATTEMPTS=0
          if [ "$CLASS" = "interim" ]; then
            GH_ERRF="$(mktemp 2>/dev/null || echo /dev/null)"
            if COMMENT_BODIES="$(gh api --paginate "repos/{owner}/{repo}/issues/${ISSUE_NUMBER}/comments?per_page=100" --jq '.[].body' 2>"$GH_ERRF")"; then
              # -x: count only lines that ARE the marker (the resume comment
              # emits it alone on its first line), so a human QUOTING an audit
              # comment ("> <!-- ... -->") does not inflate the attempt count
              # into a spurious fail-exhausted.
              ATTEMPTS="$(printf '%s\n' "$COMMENT_BODIES" | tr -d '\r' | grep -cxF "$MARKER")"
            else
              echo "::error::stall backstop: could not read the issue comments (gh api failed: $(tail -c 300 "$GH_ERRF" 2>/dev/null | tr '\n' ' ')); the attempt count is unknowable, so the cap cannot be enforced. This is a gh-api/transport/auth failure (e.g. an expired App token), NOT an unreadable workpad — treating as auth-failure (fail loud, no resume attempt consumed) rather than resuming unbounded (issue #287)"
              CLASS=auth-failure
            fi
            [ "$GH_ERRF" = /dev/null ] || rm -f "$GH_ERRF"
            [[ "$ATTEMPTS" =~ ^[0-9]+$ ]] || ATTEMPTS=0
          fi
          DECISION="$(bash "$V/stall-backstop-decide.sh" "$ENABLED" "$CLASS" "$ATTEMPTS" "$MAX" "$JOB_STATUS")"
          echo "stall backstop: status='${STATUS_OUT}' class=${CLASS} attempts=${ATTEMPTS} max=${MAX} decision=${DECISION} job_status=${JOB_STATUS}"
          # (The helper's 'skip' arm is unreachable here — the early exit above
          # already returned on ENABLED=false — so 'noop' is the only decision
          # that exits at THIS point; 'resume' also ends green, but lower down
          # via the FAIL mapping.)
          # Cancelled-run exclusion (issue #498): a cancelled run is a decided
          # ending, not a stall. flip-cancelled flips an interim workpad to 🛑
          # Cancelled and exits green — no comment posted (no audit marker, no
          # diagnostic), no resume attempt consumed. skip-cancelled (unreadable/
          # auth-failure/unknown class on a cancel) logs one line and exits green
          # without posting the fail-loud diagnostic comment. Both arms post NO
          # comment: the run's own `cancelled` conclusion in the Actions UI is
          # the record. These green exits do NOT call flip_to_failed — only the
          # fail-loud arms below flip to 💥, and a cancel is not a failure.
          if [ "$DECISION" = "flip-cancelled" ]; then
            flip_to_cancelled
            exit 0
          fi
          if [ "$DECISION" = "skip-cancelled" ]; then
            echo "stall backstop: run cancelled (job.status=${JOB_STATUS}) — class=${CLASS}; no resume, no comment (cancelled runs are not stalls, issue #498)"
            exit 0
          fi
          if [ "$DECISION" = "noop" ]; then
            exit 0
          fi
          # resume keeps the job green (the new run takes over); every other
          # decision fails the job loud.
          FAIL=1
          [ "$DECISION" = "resume" ] && FAIL=0
          # An mktemp failure means NO comment can be posted — on the resume
          # arm that would silently drop the re-dispatch (a masked stall, the
          # exact green-but-stalled outcome this backstop exists to prevent),
          # so it always fails the job loud, whatever the decision was.
          BODY="$(mktemp)" || { flip_to_failed "mktemp failed; cannot post the ${DECISION} comment"; echo "::error::stall backstop: mktemp failed; cannot post the ${DECISION} comment — failing loud (a resume comment that was never posted must not read as green)"; exit 1; }
          case "$DECISION" in
            resume)
              K=$((ATTEMPTS + 1))
              # The ONLY comment that may carry the trigger phrase. It must not
              # embed the workpad marker (the gate's self-trigger guard declines
              # any comment containing it). This comment is posted while the
              # current run is still in_progress; the new run's gate dedupe no
              # longer classifies it as a duplicate, because the dedupe carve-out
              # (issue #280 / PR #354) is now implemented: dedupe-implement-run.sh
              # reads the triggering comment from GITHUB_EVENT_PATH and, seeing the
              # stall-backstop-audit marker ($MARKER, above) this resume comment
              # carries, skips deduping so the taking-over run proceeds instead of
              # being swallowed as a duplicate of the still-finishing original.
              {
                printf '%s\n\n' "$MARKER"
                printf '**DevFlow stall backstop** — this cloud run ended while the workpad Status was still in-progress (`%s`). Auto-resume attempt %s of %s:\n\n' "$STATUS_OUT" "$K" "$MAX"
                # Helper-invocation discipline travels inside the resume comment so a
                # resumed run receives it even if it never re-reads the skill prose:
                # bundled helpers resolve only as the repo-relative vendored literal with
                # that path as the LEADING token — an absolute or repo-root scripts/ form
                # is silently denied and is exactly why prior auto-resume runs died.
                printf 'Resume note: invoke bundled helpers as `.devflow/vendor/devflow/scripts/…` (and `.devflow/vendor/devflow/lib/…`) with that path as the leading token — never an absolute path, never repo-root `scripts/…`, never behind a `VAR=` prefix or `bash <path>` wrapper (those forms are silently denied).\n\n'
                # Headless-wait discipline travels inside the resume comment too, as a
                # one-line mirror of skills/implement/SKILL.md's always-resident
                # Cloud headless-wait rule (coupled sites — one commit, pinned in
                # lib/test/run.sh), so a resumed run receives it even if it never
                # re-reads the skill prose.
                printf 'Headless note: this is a headless run — ending the turn ends the process, with no re-invocation. Never end the turn while any dispatched agent has not returned; poll to keep the turn alive; treat ScheduleWakeup and any future task-notification as unavailable.\n\n'
                printf '/devflow:implement %s\n' "$ISSUE_NUMBER"
              } > "$BODY"
              ;;
            fail-exhausted)
              printf '**DevFlow stall backstop** — this cloud run ended while the workpad Status was still in-progress (`%s`), and the auto-resume cap (max_resume_attempts=%s, attempts already made: %s) is exhausted. The job has been failed so the stall is visible; to retry, post a fresh implement trigger comment naming this issue number.\n' "$STATUS_OUT" "$MAX" "$ATTEMPTS" > "$BODY"
              ;;
            fail-auth)
              # A gh-api/transport/auth failure (e.g. an expired App token)
              # reading the workpad Status or the comment list — distinct from an
              # unreadable/corrupt workpad, which may be perfectly healthy. Fail
              # loud so the problem is visible; NO resume attempt was consumed.
              printf '**DevFlow stall backstop** — could not read the outcome of this run because of a gh-api/transport/auth error while reading the workpad Status or the issue comment list (most often an expired GitHub App installation token, but any gh-api/transport failure or an unparseable API response lands here). This is distinct from an unreadable/corrupt workpad — the workpad itself may be perfectly healthy. The job has been failed so the problem is visible, and NO auto-resume attempt was consumed. **The run log names the specific gh error** — inspect it first (and verify DEVFLOW_APP_ID / the App token if it is an auth error), then post a fresh implement trigger comment to retry.\n' > "$BODY"
              ;;
            *)
              # fail-unreadable (or any unknown/empty decision token — fail closed).
              printf '**DevFlow stall backstop** — could not classify the outcome of this run: the issue workpad Status or the issue comment list was unreadable (workpad comment missing, Status line unparseable, or the comments could not be fetched to count prior attempts), or the backstop decision could not be computed (decision token: `%s`). The run log names the specific cause. The job has been failed so the stall is visible; inspect the run log and the workpad, then post a fresh implement trigger comment to retry.\n' "${DECISION:-none}" > "$BODY"
              ;;
          esac
          # The comment funnel below is always-exit-0 by contract, so read its
          # stderr breadcrumb to learn whether the POST actually landed. On the
          # resume arm the comment IS the action: a dropped POST means no
          # re-dispatch, so fail loud (manual retrigger) instead of reading a
          # never-posted resume as green. On the fail arms the job is already
          # exiting non-zero; a dropped comment there only loses the courtesy
          # notice, and the breadcrumb below still names it in the run log.
          POST_ERR="$(bash "$V/post-issue-comment.sh" "$ISSUE_NUMBER" "$BODY" 2>&1)"
          printf '%s\n' "$POST_ERR"
          if [ "$FAIL" -eq 0 ] && ! printf '%s' "$POST_ERR" | grep -qxF "devflow: posted comment on #${ISSUE_NUMBER}"; then
            flip_to_failed "resume re-dispatch comment did not land"
            echo "::error::stall backstop: the resume re-dispatch comment did not land (see the breadcrumb above) — failing loud so the stall stays visible for a manual retrigger"
            exit 1
          fi
          # A resume comment authored by the built-in GITHUB_TOKEN posts fine
          # but never re-triggers the workflow, so without the App token the
          # "resume" would be a green no-op — the masked stall this backstop
          # exists to prevent. The comment (with the trigger phrase a human
          # can re-post) is already up; fail loud so the stall shows red.
          if [ "$FAIL" -eq 0 ] && [ "$APP_TOKEN_PRESENT" != "true" ]; then
            flip_to_failed "resume comment posted but no App token to start a new run"
            echo "::error::stall backstop: resume comment posted, but no DEVFLOW_APP_ID App token is configured — a GITHUB_TOKEN-authored comment cannot start a new run, so auto-resume is inert; failing loud (configure DEVFLOW_APP_ID for auto-resume, or re-post the trigger comment manually)"
            exit 1
          fi
          # The shared final exit is reached by the green resume path (FAIL=0)
          # and every fail-loud decision (FAIL=1: fail-exhausted, fail-auth,
          # fail-unreadable). Flip ONLY on a fail-loud exit (FAIL=1) — never on
          # the resume green path — and flip_to_failed itself guards CLASS=interim
          # so fail-auth/fail-unreadable (non-interim) are no-ops here; only the
          # fail-exhausted arm (interim + cap reached) actually flips.
          [ "$FAIL" -eq 1 ] && flip_to_failed "${DECISION}"
          exit "$FAIL"
