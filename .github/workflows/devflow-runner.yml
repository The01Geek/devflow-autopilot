name: DevFlow Runner (reusable)

# Pure `workflow_call` runner: one job that runs a Claude skill from an explicit
# prompt under a named tool profile, with no comment mediation. Extracted from
# devflow.yml so its permissions are a clean SUBSET of any caller's grant.
#
# Why a separate file: devflow.yml co-locates high-privilege event-listener jobs
# (the `command` job needs contents:write to push and issues:write to react)
# with this low-privilege runner. GitHub validates a called reusable workflow's
# permission ceiling against the caller's grant at graph-build time — across the
# WHOLE called graph, before any `if:` is evaluated — so a least-privilege,
# read-only caller like devflow-review.yml could not call the consolidated
# devflow.yml without a `startup_failure` (the listener jobs' scopes exceeded
# the caller's grant). Keeping the runner here, alone, restores the invariant
# that the callee's scopes ⊆ the caller's. See docs/cloud-setup.md.
#
# Keep plugin_marketplaces / plugins / claude_args in sync with devflow.yml's
# `command` job and devflow-implement.yml so every path resolves identical
# skill/plugin versions.

on:
  workflow_call:
    inputs:
      prompt:
        description: 'Prompt passed through to anthropics/claude-code-action@v1. Callers (devflow-review.yml) always pass a real prompt.'
        type: string
        required: true
      effort:
        description: |
          Reasoning effort (low|medium|high|xhigh|max). Defaults to the
          `devflow_runner.effort` value from .devflow/config.json when
          empty (which itself falls back to "high"). On the Anthropic default
          path the resolved value is passed explicitly via `--effort` —
          including "high" — so the effort is pinned rather than relying on
          the model's default; a provider-routed section drops `--effort`
          unless its provider sets `effort_supported: true` (issue #313).
        type: string
        required: false
        default: ''
      fetch_depth:
        description: 'Passed to actions/checkout. 50 covers any realistic PR commit range.'
        type: number
        required: false
        default: 50
      allowed_tools_profile:
        description: |
          Internal mapping to the actual --allowed-tools string. Only the
          "review" profile is defined today; add more when a real caller
          requires one. Do not speculate.
        type: string
        required: false
        default: 'review'
      ref:
        description: |
          Git ref/SHA to check out. Empty (default) uses the event's default
          ref. PR-review callers MUST pass the PR head SHA so the run sees the
          PR's own content — including any plugin/config/scripts the PR adds —
          not the base branch. A repo bootstrapping the devflow plugin via PR
          has no .devflow/vendor/devflow on the base branch, so a base checkout
          fails the plugin install; checking out the PR head fixes that.
        type: string
        required: false
        default: ''
    outputs:
      engine_is_error:
        description: |
          "true" when the Claude execution ended with is_error (the review
          engine hit a fatal/permission cut-off before finishing), else
          "false". The review JOB result stays `success` even in that case
          (the action step wraps the errored execution), so callers that must
          distinguish "review reached a verdict" from "engine stopped short"
          read THIS output, not `needs.<job>.result`. Defaults "false" on any
          absent/unparseable execution log (fail-safe; the consumer's HEAD-SHA
          verdict scoping remains the primary staleness guard).
        value: ${{ jobs.run.outputs.engine_is_error }}
      permission_denials_count:
        description: |
          Number of Bash permission denials recorded in this run's execution log
          (issue #363), or the literal `unavailable` when the count could not be
          established — diagnostics disabled, the step skipped, or an absent or
          unparseable execution file. A consumer MUST treat `unavailable` as
          unknown and never render it as `0`: the whole point of the no-verdict
          ::error:: is to name the cause, and "refused 0 commands" on a run whose
          diagnostics never parsed is a false statement that steers the reader
          away from permission denials.
        value: ${{ jobs.run.outputs.permission_denials_count }}
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        description: |
          Anthropic Claude Code OAuth token. Pass via `secrets: inherit` from
          callers. No longer `required: true` (issue #313): a repo that routes the
          devflow_runner section through a third-party provider need not set it.
          The runner still fails loud when it is absent AND no provider is
          configured (the Anthropic default path), so the default path is never
          silently degraded.
        required: false
      DEVFLOW_PROVIDER_API_KEY:
        description: |
          API credential for the optional third-party model provider (issue #313).
          Consumed only when the devflow_runner section names a `provider`; unused
          on the Anthropic default path. Resolves via `secrets: inherit` from the
          caller (devflow-review.yml); declared here (optional) because a reusable
          workflow's `secrets` context is typed by this block (actionlint rejects an
          undeclared reference), even though an inherited secret need not be declared
          to be readable.
        required: false
      DEVFLOW_REVIEWER_PRIVATE_KEY:
        description: |
          PEM private key of the optional dedicated **DevFlow-Reviewer** GitHub
          App (see docs/cloud-setup.md). Consumed by the downscoped
          DevFlow-Reviewer review-token mint step, which is gated on
          `vars.DEVFLOW_REVIEWER_APP_ID != ''` — so this secret is only read
          when the reviewer App is configured. The review path deliberately
          runs under this SEPARATE identity (never the primary
          `devflow-autopilot` App that authors PRs) so Phase 4.4's
          `gh pr review --request-changes`/`--approve` is not a forbidden
          self-review (issue #300). Resolves via `secrets: inherit` from the
          caller (devflow-review.yml); declared here because a reusable
          workflow's `secrets` context is typed by this block (actionlint
          rejects an undeclared reference).
        required: false

# Job permissions are a clean subset of any caller's grant — this is the
# invariant whose violation caused the startup_failure. A caller's `review`
# job MUST grant a superset (contents:read, pull-requests:write, id-token:write,
# actions:read, issues:read); see devflow-review.yml.
permissions:
  contents: read
  pull-requests: write
  id-token: write
  actions: read # Required for Claude to read CI results (paired with additional_permissions below)
  issues: read # Required to read the linked issue when reviewing against its acceptance criteria
  # Required by scripts/summarize-ci-checks.sh's commits/{sha}/check-runs query.
  # COUPLED with the `review` caller job's grant in devflow-review.yml: a reusable
  # workflow requesting a permission its caller did not grant aborts the run at
  # graph-build time (startup_failure), so these two land together or not at all.
  checks: read

defaults:
  run:
    shell: bash

jobs:
  run:
    runs-on: ${{ vars.DEVFLOW_RUNNER && (startsWith(vars.DEVFLOW_RUNNER, '[') && fromJSON(vars.DEVFLOW_RUNNER) || vars.DEVFLOW_RUNNER) || 'ubuntu-latest' }}
    outputs:
      engine_is_error: ${{ steps.engine.outputs.is_error }}
      # `|| 'unavailable'` is the load-bearing default: it covers EVERY path on which
      # the diagnostics step publishes nothing (config-disabled, skipped, absent or
      # unparseable execution file). The sentinel is deliberately NOT `0` — a
      # consumer must be able to tell "the engine recorded no denials" from "the
      # count could not be established", and collapsing both onto `0` makes the
      # no-verdict ::error:: assert a denial count it never observed (issue #363).
      permission_denials_count: ${{ steps.diagnostics.outputs.permission_denials_count || 'unavailable' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: ${{ inputs.fetch_depth }}

      - id: cfg
        uses: ./.github/actions/read-project-config

      - id: extract
        env:
          CONFIG_JSON: ${{ steps.cfg.outputs.json }}
        run: |
          set -euo pipefail
          # `// empty` collapses missing/null to a real empty string so the
          # explicit checks below fail loudly with an actionable message,
          # instead of silently propagating literal `null` into
          # `--model null` / `allowed_bots: null` downstream.
          CLAUDE_MODEL=$(echo "$CONFIG_JSON" | jq -r '.claude_model // empty')
          ALLOWED_BOTS=$(echo "$CONFIG_JSON" | jq -r '.devflow.allowed_bots // empty')
          EFFORT=$(echo "$CONFIG_JSON" | jq -r '.devflow_runner.effort // "high"')
          if [ -z "$CLAUDE_MODEL" ]; then
            echo "::error::claude_model is missing from .devflow/config.json"
            exit 1
          fi
          if [ -z "$ALLOWED_BOTS" ]; then
            echo "::error::devflow.allowed_bots is missing from .devflow/config.json"
            exit 1
          fi
          {
            echo "claude_model=$CLAUDE_MODEL"
            echo "allowed_bots=$ALLOWED_BOTS"
            echo "effort=$EFFORT"
            # Pinned plugin ref for the vendor-plugin fetch branch (thin installs).
            echo "devflow_version=$(echo "$CONFIG_JSON" | jq -r '.devflow_version // empty')"
          } >> "$GITHUB_OUTPUT"

      # Materialize the plugin (committed → self → fetch) so claude-code-action
      # loads it from .devflow/vendor/devflow/ and the reviewer's helper scripts
      # resolve at the literal workspace path. Only `ref` is PR-influenced; the
      # source repo is fixed, so a PR can at most select an official-repo commit.
      - uses: ./.github/actions/vendor-plugin
        id: vendor
        with:
          ref: ${{ steps.extract.outputs.devflow_version }}

      - name: Read trusted base-ref provisioning config
        id: baseprovision
        env:
          # Source the base branch from the TRUSTED event payload — the PR's
          # target branch, or the repo default for non-PR triggers (a check_run
          # Re-run carries no pull_request) — never from a PR-controlled input.
          # Both the provision_env flag AND the setup block below are read from
          # this base ref's committed config, so a PR cannot enable provisioning
          # for its own review, nor inject `setup.install` commands into this
          # pull_request_target write-token job. (The build commands themselves
          # still run PR-author code once provisioning is on — that is the
          # maintainer's documented opt-in; see docs/cloud-setup.md.)
          #
          # Deliberate: on any trigger that carries no `pull_request` (the caller
          # devflow-review.yml currently wires only check_run Re-runs — see its
          # `on:` block), the fallback reads provision_env from the default
          # branch — so for a PR whose base is a NON-default branch, a
          # re-run reads the default branch's flag, not that PR's actual base. We
          # accept this: the default branch is the most-protected trust anchor
          # for a security-sensitive opt-in, and provision_env is normally a
          # uniform repo-wide policy. The common pull_request /
          # pull_request_target paths always read the PR's true base ref.
          BASE_REF: ${{ github.event.pull_request.base.ref || github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          # Default to read-only/no-provisioning: a missing base ref, an
          # un-fetchable branch, or a base with no committed config (the
          # devflow-bootstrap-via-PR case) all collapse to provision_env=false.
          PROVISION=false
          BASE_JSON='{}'
          # config_source distinguishes (issue #313 shadow S2): 'ok' a valid object
          # config was read; 'absent' no config on the base ref (the documented
          # bootstrap case); 'degraded' the read FAILED (fetch error / malformed).
          # The provider decision now also flows from this read, so a consumer must
          # tell "no provider configured" apart from "trusted config unreadable".
          CONFIG_SOURCE='absent'
          # Trusted deny-floor helper (PR-#404 REJECT fix): materialized from the
          # base ref below, ONLY inside the successful base-ref fetch branch —
          # FETCH_HEAD elsewhere (e.g. left by actions/checkout) can point at the
          # PR HEAD, and reading the floor from there would hand the security
          # filter to the PR author. Empty means "no trusted base-ref copy"; the
          # tools step then falls back to a runtime-FETCHED vendored copy or
          # fails closed — never to the PR-head checkout.
          FLOOR_HELPER=''
          FLOOR_SOURCE='absent'
          # Git-env pin helper (issue #645) trusted-materialization state. Empty is
          # the fail-closed default, so the fetch-failed / empty-base-ref branches
          # (which skip the materialization inside the fetch-success branch) leave
          # this SET rather than unset under `set -u`; the consuming step then emits
          # no assignment, which is also the working default.
          GITENV_HELPER_DIR=''
          # Plugin-parity compose (issue #505) trusted-materialization state.
          # Initialized to fail-closed defaults so the fetch-failed / empty-base-ref
          # branches below (which skip the materialization in the fetch-success
          # branch) leave these SET rather than unset under `set -u`. A fetch failure
          # or empty base ref means the trusted settings read FAILED →
          # COMPOSE_SETTINGS_SOURCE='degraded' (trusted-read-failed → ::warning::);
          # only a successful fetch whose tree genuinely lacks .claude/settings.json
          # is the 'absent' silent baseline (set in the fetch-success branch).
          COMPOSE_HELPER_DIR=''
          COMPOSE_HELPER_SOURCE='absent'
          COMPOSE_SETTINGS=''
          COMPOSE_SETTINGS_SOURCE='degraded'
          if [ -n "$BASE_REF" ]; then
            # origin is the upstream repo (fork-PR commits live under upstream
            # refs), so the base tip is the maintainer-controlled config, not the
            # PR head. --depth=1: only the tip is needed to read one file.
            if git fetch --depth=1 origin "$BASE_REF" >/dev/null 2>&1; then
              if RAW=$(git show "FETCH_HEAD:.devflow/config.json" 2>/dev/null); then
                # Parse in its own guard so a MALFORMED or non-object base config
                # collapses to read-only (the documented safe default), NOT
                # aborts the whole review job under set -e — otherwise every open
                # PR targeting that branch fails its review with an opaque jq
                # error. `if type=="object" then . else empty end` + `-e` is
                # load-bearing: jq -c '.' succeeds on ANY valid JSON including a
                # bare scalar/array/null, and the `.devflow_runner` index on the
                # next line would then error (jq exit 5) and abort under set -e.
                # Requiring an object routes scalars/arrays to the else branch
                # too. (2>/dev/null so we emit our own actionable warning, not the
                # raw parse error.)
                if BASE_JSON=$(printf '%s' "$RAW" | jq -ce 'if type=="object" then . else empty end' 2>/dev/null); then
                  CONFIG_SOURCE='ok'
                  # `try … catch false` + `== true` clamps to a literal
                  # true/false: only a real boolean `true` enables provisioning.
                  # The top-level guard above only proves BASE_JSON is an object;
                  # `.devflow_runner` could still be a non-object (e.g.
                  # {"devflow_runner":"medium"}), and `.provision_env` on a
                  # string/number/array errors (jq exit 5) — which would abort
                  # this step under set -e. `try … catch false` makes any such
                  # shape (and any non-boolean / absent value) yield a clean
                  # `false`, so the step output is always a valid token and a
                  # typo can never accidentally provision.
                  PROVISION=$(printf '%s' "$BASE_JSON" | jq -r 'try (.devflow_runner.provision_env == true) catch false')
                else
                  BASE_JSON='{}'
                  CONFIG_SOURCE='degraded'
                  echo "::warning::Base ref '$BASE_REF' has a malformed or non-object .devflow/config.json; defaulting to provision_env=false (read-only review) AND ignoring any devflow_runner.provider routing (review falls back to the Anthropic default this run). Fix the base-branch config to restore build-aware review and provider routing."
                fi
              else
                # No committed config on the base ref (e.g. a repo bootstrapping
                # devflow via this very PR) → read-only, as documented. Emit a
                # notice so a silently-downgraded opt-in is at least observable.
                CONFIG_SOURCE='absent'
                echo "::notice::No .devflow/config.json on base ref '$BASE_REF'; provision_env=false (read-only review). (No provider can be configured without a base config, so provider routing is simply the Anthropic default.)"
              fi
              # Materialize the deny-floor helper from the SAME trusted base-ref
              # tip (FETCH_HEAD is still the base ref here — this block must stay
              # inside this fetch-success branch). Candidate paths, in order: the
              # committed vendor copy (self-hosting consumers), then the repo's
              # own scripts/ copy — the latter ONLY when the base ref IS the
              # DevFlow plugin repo (same plugin.json-name discriminator as
              # vendor-slice.sh's self branch), so a consumer's unrelated
              # like-named script is never executed as the floor. Written to
              # RUNNER_TEMP: outside the PR-writable workspace, so PR content can
              # neither pre-place nor overwrite it. Best-effort: any failure
              # leaves FLOOR_HELPER empty and the tools step fails closed.
              _floor_raw=''
              if _floor_raw=$(git show "FETCH_HEAD:.devflow/vendor/devflow/scripts/filter-runner-tools.sh" 2>/dev/null); then
                FLOOR_SOURCE='base-ref-vendored'
              elif git show "FETCH_HEAD:.claude-plugin/plugin.json" 2>/dev/null | grep -Eq '"name"[[:space:]]*:[[:space:]]*"devflow"' \
                && _floor_raw=$(git show "FETCH_HEAD:scripts/filter-runner-tools.sh" 2>/dev/null); then
                FLOOR_SOURCE='base-ref-repo'
              fi
              if [ "$FLOOR_SOURCE" != 'absent' ]; then
                if mkdir -p "$RUNNER_TEMP/devflow-trusted-floor" 2>/dev/null \
                  && printf '%s\n' "$_floor_raw" > "$RUNNER_TEMP/devflow-trusted-floor/filter-runner-tools.sh" 2>/dev/null; then
                  FLOOR_HELPER="$RUNNER_TEMP/devflow-trusted-floor/filter-runner-tools.sh"
                else
                  echo "::warning::could not write the base-ref deny-floor helper into RUNNER_TEMP; the tools step will fall back to a runtime-fetched vendored copy or fail closed."
                  FLOOR_SOURCE='absent'
                fi
              fi
              # Git-env pin helper (issue #645): materialize emit-git-env.sh AND its
              # sibling resolver config-get.sh from the SAME trusted base-ref tip
              # (FETCH_HEAD is still the base ref inside this fetch-success branch).
              # This is a SECURITY BOUNDARY: the helper's stdout is appended to
              # `$GITHUB_ENV` in a token-bearing job, so it is executed only from a
              # trusted source — the same rank-1 base-ref / rank-2
              # `vendor_source == fetch` / else fail-closed ladder filter-runner-tools.sh
              # uses — NEVER the PR-head checkout, which this job checks out. Both
              # files must land: emit-git-env.sh locates its resolver as a sibling, so
              # a half-materialized pair would silently resolve every key to disabled.
              # Candidate paths mirror the floor helper's: the committed vendor copy,
              # then the repo's own scripts/ copy gated on the base ref actually being
              # the DevFlow plugin repo. Best-effort: any failure leaves
              # GITENV_HELPER_DIR empty and the consuming step fails closed (emits
              # nothing, warns) — which is also the working default, so failing closed
              # here and failing open there converge on the same safe state.
              if mkdir -p "$RUNNER_TEMP/devflow-trusted-gitenv" 2>/dev/null; then
                _gitenv_ok=1
                for _g in emit-git-env.sh config-get.sh; do
                  _g_raw=''
                  if _g_raw=$(git show "FETCH_HEAD:.devflow/vendor/devflow/scripts/$_g" 2>/dev/null); then
                    :
                  elif git show "FETCH_HEAD:.claude-plugin/plugin.json" 2>/dev/null | grep -Eq '"name"[[:space:]]*:[[:space:]]*"devflow"' \
                    && _g_raw=$(git show "FETCH_HEAD:scripts/$_g" 2>/dev/null); then
                    :
                  else
                    _g_raw=''
                  fi
                  if [ -n "$_g_raw" ]; then
                    if printf '%s\n' "$_g_raw" > "$RUNNER_TEMP/devflow-trusted-gitenv/$_g" 2>/dev/null; then
                      chmod +x "$RUNNER_TEMP/devflow-trusted-gitenv/$_g" 2>/dev/null || true
                    else
                      rm -f "$RUNNER_TEMP/devflow-trusted-gitenv/$_g" 2>/dev/null || true
                      _gitenv_ok=0
                    fi
                  else
                    _gitenv_ok=0
                  fi
                done
                if [ "$_gitenv_ok" -eq 1 ] \
                  && [ -f "$RUNNER_TEMP/devflow-trusted-gitenv/emit-git-env.sh" ] \
                  && [ -f "$RUNNER_TEMP/devflow-trusted-gitenv/config-get.sh" ]; then
                  GITENV_HELPER_DIR="$RUNNER_TEMP/devflow-trusted-gitenv"
                fi
              fi
              # Plugin-parity compose (issue #505): materialize the trusted base-ref
              # .claude/settings.json AND the compose helpers (resolve-extra-plugins.sh,
              # describe-plugin-compose.sh) from the SAME FETCH_HEAD tip (still the base
              # ref inside this fetch-success branch) into RUNNER_TEMP, outside the
              # PR-writable workspace. Same rank-1 candidate logic as the deny-floor
              # above: committed vendor copy first, then the repo's own scripts/ copy
              # ONLY when the base ref IS the DevFlow plugin repo (plugin.json name
              # discriminator), so a consumer's unrelated like-named script is never
              # executed as the compose helper. Best-effort: any failure leaves
              # COMPOSE_HELPER_DIR empty and the compose step falls to rank 2 (vendored
              # on vendor_source==fetch) or fails closed (baseline + trusted-source-rule
              # warning). The settings-read classification keys on git show's EXIT
              # STATUS, not on whether the read was empty: only when `git show` FAILS is
              # `git cat-file -e` consulted to tell a present-but-git-show-unreadable
              # object ('degraded') from a genuinely absent one ('absent') — the
              # harden-stop-hooks discipline, so an unreadable file is not silently
              # treated as "absent".
              if mkdir -p "$RUNNER_TEMP/devflow-trusted-compose" 2>/dev/null; then
                _compose_ok=1
                for _h in resolve-extra-plugins.sh describe-plugin-compose.sh; do
                  _h_raw=''
                  if _h_raw=$(git show "FETCH_HEAD:.devflow/vendor/devflow/scripts/$_h" 2>/dev/null); then
                    :
                  elif git show "FETCH_HEAD:.claude-plugin/plugin.json" 2>/dev/null | grep -Eq '"name"[[:space:]]*:[[:space:]]*"devflow"' \
                    && _h_raw=$(git show "FETCH_HEAD:scripts/$_h" 2>/dev/null); then
                    :
                  else
                    _h_raw=''
                  fi
                  if [ -n "$_h_raw" ]; then
                    if ! printf '%s\n' "$_h_raw" > "$RUNNER_TEMP/devflow-trusted-compose/$_h" 2>/dev/null; then
                      rm -f "$RUNNER_TEMP/devflow-trusted-compose/$_h" 2>/dev/null || true
                      _compose_ok=0
                    fi
                  else
                    _compose_ok=0
                  fi
                done
                if [ "$_compose_ok" -eq 1 ] \
                  && [ -f "$RUNNER_TEMP/devflow-trusted-compose/resolve-extra-plugins.sh" ] \
                  && [ -f "$RUNNER_TEMP/devflow-trusted-compose/describe-plugin-compose.sh" ]; then
                  COMPOSE_HELPER_DIR="$RUNNER_TEMP/devflow-trusted-compose"
                  COMPOSE_HELPER_SOURCE='base-ref'
                fi
                # Materialize the trusted base-ref .claude/settings.json. The compose
                # step consumes ONLY this path — never a workspace-relative
                # .claude/settings.json (run.sh negatively pins that). Classification
                # keys on git show's EXIT STATUS: git-show succeeds (any present blob,
                # INCLUDING a 0-byte one) → 'ok' (a 0-byte/whitespace-only file is then
                # caught downstream as invalid JSON by resolve-extra-plugins.sh's own
                # breadcrumb, which describe-plugin-compose.sh renders as arm 3
                # (degraded-only) — not reclassified here); git-show fails but the object exists
                # (git cat-file -e) → 'degraded' (trusted-read-failed); neither → 'absent'
                # (the silent baseline).
                if _s_raw=$(git show "FETCH_HEAD:.claude/settings.json" 2>/dev/null); then
                  if printf '%s\n' "$_s_raw" > "$RUNNER_TEMP/devflow-trusted-compose/settings.json" 2>/dev/null; then
                    COMPOSE_SETTINGS="$RUNNER_TEMP/devflow-trusted-compose/settings.json"
                    COMPOSE_SETTINGS_SOURCE='ok'
                  else
                    COMPOSE_SETTINGS_SOURCE='degraded'
                    echo "::warning::devflow plugin-parity: could not write the base-ref .claude/settings.json into RUNNER_TEMP; the compose step will proceed with the baked baseline (trusted-read-failed)."
                  fi
                else
                  if git cat-file -e "FETCH_HEAD:.claude/settings.json" 2>/dev/null; then
                    COMPOSE_SETTINGS_SOURCE='degraded'
                    echo "::warning::devflow plugin-parity: a base-ref .claude/settings.json exists but read back empty after a successful fetch; the compose step will proceed with the baked baseline (trusted-read-failed)."
                  else
                    COMPOSE_SETTINGS_SOURCE='absent'
                  fi
                fi
              fi
            else
              CONFIG_SOURCE='degraded'
              echo "::warning::Could not fetch base ref '$BASE_REF'; defaulting to provision_env=false (read-only review) AND ignoring any devflow_runner.provider routing (review falls back to the Anthropic default this run)."
            fi
          else
            # An empty base ref means the trusted base ref could not even be
            # determined, so a base-configured provider would be silently un-read —
            # the same effect as a fetch failure or a malformed config, NOT the "no
            # committed config on the base ref" bootstrap case. Classify it 'degraded'
            # (not the initial 'absent') so the OAuth-default guard below names the
            # unreadable-config cause rather than falsely reporting "no provider
            # configured" (the shadow-S2 misdirection contract this signal exists for).
            CONFIG_SOURCE='degraded'
            echo "::warning::Base ref could not be determined (empty base ref); defaulting to provision_env=false (read-only review) AND ignoring any devflow_runner.provider routing (review falls back to the Anthropic default this run)."
          fi
          {
            echo "provision_env=$PROVISION"
            echo "config_source=$CONFIG_SOURCE"
            echo "floor_helper=$FLOOR_HELPER"
            echo "floor_source=$FLOOR_SOURCE"
            # Plugin-parity compose (issue #505) — materialized by the fetch-success
            # branch above; empty/degraded on a fetch failure or empty base ref.
            echo "compose_settings=$COMPOSE_SETTINGS"
            echo "compose_settings_source=$COMPOSE_SETTINGS_SOURCE"
            echo "compose_helper_dir=$COMPOSE_HELPER_DIR"
            echo "compose_helper_source=$COMPOSE_HELPER_SOURCE"
            # Git-env pins (issue #645) — the TRUSTED helper directory materialized
            # by the fetch-success branch above; empty on a fetch failure or empty
            # base ref, which makes the consuming step fail closed.
            echo "gitenv_helper_dir=$GITENV_HELPER_DIR"
          } >> "$GITHUB_OUTPUT"
          # Freeform reviewer build allowlist, read from the SAME trusted base ref
          # as provision_env above (so a PR cannot grant itself tools). Emitted as
          # a comma-joined string. `map(strings)` keeps only string elements so a
          # single hand-edited non-string entry degrades to "drop that element",
          # not "join errors → catch "" → silently lose ALL tools"; `try … catch ""`
          # still guards a non-object/array `devflow_runner`/`allowed_tools`,
          # collapsing it to empty (no build tools). The deny-list floor is applied
          # at CONSUME time in the next step, so the authoritative filter sees
          # exactly the string forwarded here.
          RUNNER_TOOLS=$(printf '%s' "$BASE_JSON" | jq -r 'try (.devflow_runner.allowed_tools // [] | map(strings) | join(",")) catch ""')
          # Heredoc forms forward both values verbatim regardless of content — a
          # newline in either (a hand-edited allowed_tools entry, a multi-line base
          # config) must not corrupt step outputs the way a plain key=value echo
          # would (only its first line is parsed; the rest inject further outputs).
          delim="EOF_$(date +%s%N)_$$"
          {
            printf 'runner_tools<<%s\n' "$delim"
            printf '%s\n' "$RUNNER_TOOLS"
            printf '%s\n' "$delim"
          } >> "$GITHUB_OUTPUT"
          delim="EOF_$(date +%s%N)_$$"
          {
            printf 'config_json<<%s\n' "$delim"
            printf '%s\n' "$BASE_JSON"
            printf '%s\n' "$delim"
          } >> "$GITHUB_OUTPUT"
          # Optional pre-installed Claude Code executable path (issue #601), read
          # from setup.claude_code_executable in the SAME trusted base-ref config
          # ($BASE_JSON) as provision_env / runner_tools above — never the PR-head
          # checkout. This job runs under a write token and the action executes the
          # resolved path, so a PR-author-controllable value would be an
          # arbitrary-code-execution vector; the trusted-source read is the security
          # boundary. `// empty` emits an empty *stream* when the key is absent (the
          # substitution then yields the empty string and the action's auto-install path
          # is unchanged); `try … catch` guards a non-object
          # base-config `setup` so this read never aborts the review job; `| strings`
          # drops a non-string leaf value to empty; `select(test("[\n\r]") | not)` drops
          # even a valid string carrying an embedded newline/CR — so the value is always
          # single-line and the plain key=value echo below is safe;
          # `select(test("^[[:space:]]*$") | not)` drops a whitespace-only string, which
          # is never a usable executable path and whose intended meaning is "unset"
          # (any rejected shape falls back to empty → auto-install). Because "rejected"
          # and "unset" both resolve to empty, a *non-empty* raw value that resolves to
          # empty emits a `::warning::` — otherwise a mistyped path on the one platform
          # where this key is load-bearing silently reverts to the broken auto-install
          # path and the operator debugs the installer's misleading "Windows is not
          # supported" error instead of their own typo (the repo's breadcrumb-on-fallback
          # convention; an explicit `""` is a deliberate unset and warns nothing). The raw
          # probe emits the SENTINEL "set" rather than the value itself: command
          # substitution strips trailing newlines, so a value composed entirely of
          # newlines would collapse to the empty string and be misread as "unset",
          # silently skipping the warning for a rejected shape. The probe filters on
          # `!= null` rather than `// empty` because `//` is FALSY-triggered: `// empty`
          # would swallow a valid-falsy `false` leaf, rejecting it to auto-install with
          # no breadcrumb (the documented-off-switch class). JSON `null` stays an unset,
          # like an absent key. `catch "set"` (not `catch empty`) makes a NON-OBJECT
          # `setup` — which raises a jq index error in BOTH filters, so the guarded one
          # cannot resolve a value — warn rather than fail open silently. The
          # raw probe reads the SAME trusted $BASE_JSON — it never widens the trust
          # boundary, and it is used only for this emptiness test, never emitted.
          CLAUDE_CODE_EXECUTABLE_RAW=$(printf '%s' "$BASE_JSON" | jq -r 'try (.setup.claude_code_executable | select(. != null) | tostring | select(. != "") | "set") catch "set"')
          CLAUDE_CODE_EXECUTABLE=$(printf '%s' "$BASE_JSON" | jq -r 'try (.setup.claude_code_executable // empty | strings | select(test("[\n\r]") | not) | select(test("^[[:space:]]*$") | not)) catch empty')
          if [ -n "$CLAUDE_CODE_EXECUTABLE_RAW" ] && [ -z "$CLAUDE_CODE_EXECUTABLE" ]; then
            echo "::warning::setup.claude_code_executable is set in the trusted base-ref config but was rejected (non-string leaf, embedded newline/CR, or whitespace-only); falling back to the action's automatic Claude Code install."
          fi
          echo "claude_code_executable=$CLAUDE_CODE_EXECUTABLE" >> "$GITHUB_OUTPUT"

      - name: Resolve allowed-tools profile
        id: tools
        env:
          PROFILE: ${{ inputs.allowed_tools_profile }}
          # Trusted base-ref opt-in (see the baseprovision step). Only when this
          # is 'true' does the review profile gain build/verify commands.
          PROVISION_ENV: ${{ steps.baseprovision.outputs.provision_env }}
          # Freeform build/verify allowlist from the trusted base ref's
          # devflow_runner.allowed_tools (see the baseprovision step). Appended to
          # the review profile only when PROVISION_ENV is 'true', and only after
          # the deny-list floor below strips the catastrophic tier.
          RUNNER_TOOLS: ${{ steps.baseprovision.outputs.runner_tools }}
          # Trusted deny-floor helper, materialized by baseprovision from the base
          # ref into RUNNER_TEMP (empty when the base ref carries none). The floor
          # must never execute a PR-head copy — see the trust rule in the review
          # profile below.
          FLOOR_HELPER: ${{ steps.baseprovision.outputs.floor_helper }}
          FLOOR_SOURCE: ${{ steps.baseprovision.outputs.floor_source }}
          # Which vendor-slice branch materialized .devflow/vendor/devflow this
          # run: committed | self | fetch. Only 'fetch' (a fresh clone of the
          # official repo at the pinned devflow_version) is a trusted source for
          # the floor helper; committed/self copies come from the PR-head tree.
          VENDOR_SOURCE: ${{ steps.vendor.outputs.vendor_source }}
        run: |
          set -euo pipefail
          # Profiles intentionally kept inline (single-string per profile) to
          # avoid premature factoring into a composite action. Add new
          # profiles here as real callers require them; do not speculate.
          case "$PROFILE" in
            review)
              # Slim profile for /devflow:review — read-only tree, comment/post-review
              # only. No PHP/npm/composer (the review skill never shells out
              # to them). No Edit and no tree-writable Write: the ONLY Write rule is
              # the path-scoped Write(.devflow/tmp/**) at the tail — the reviewer may
              # author scratch files into the gitignored .devflow/tmp scratch dir
              # (its workpad/scratch recipe uses the Write tool there, never a shell
              # `>` redirect — matcher-probe run 29111394360 recorded `>` redirects
              # AND Write(/tmp/**) DENIED, while Write(.devflow/tmp/**) is PERMITTED,
              # issue #401), but the repo tree stays read-only. The reviewer's
              # `contents: read` token still makes a push impossible, so nothing the
              # reviewer writes to .devflow/tmp can ever reach the repo.
              # The workpad.py / config-get.sh / load-prompt-extension.sh /
              # efficiency-trace.sh entries below are read-only-safe: workpad.py
              # authors the live progress comment via `gh api` (a comment edit, not a
              # tree write), config-get.sh reads config, load-prompt-extension.sh only
              # `cat`s a consumer-owned .devflow/prompt-extensions/<skill>.md and
              # prints it (the standardized preflight every skill — review and
              # review-and-fix included — now runs; without this entry the read-only
              # profile would SILENTLY DENY it, so the convention would be a no-op in
              # the cloud review tier), and efficiency-trace.sh --mode trace only reads
              # the run's workpads and prints Markdown. The `--persist` step (run by the
              # base-branch .claude/settings.json Stop hook, which claude-code-action
              # restores in this job) STAGES the run's observability artifacts under the
              # gitignored .devflow/tmp/ and, on this read-only tier, runs in STAGING-ONLY
              # mode: it writes NO new telemetry-branch records and does NO push (the push
              # operand DEVFLOW_TELEMETRY_PUSH is deliberately unset here, so #469 AC5 fails
              # closed to staging). A best-effort fetch-before-exclusion step may fast-forward
              # the LOCAL devflow-telemetry ref to mirror already-published remote records (a
              # read — no record append, no push), leaving the tracked tree read-only and the
              # REMOTE devflow-telemetry ref untouched by this job. Landing the staged artifacts
              # on the branch is the job of the trusted telemetry-push relay (telemetry-push.yml,
              # issue #489): this job uploads them as a workflow artifact (the "Upload staged
              # telemetry artifacts" step below) and the workflow_run-triggered relay downloads,
              # validates, and pushes them — never this PR-head, secrets-bearing job. So the
              # grant stays read-only-safe.
              # Command heads the review skill actually invokes are pinned against this
              # string by lib/test/run.sh (issue #363): a head the skill runs but this
              # profile omits is silently DENIED at runtime, burning the run's budget and
              # stalling it without a verdict. `mkdir`/`tee` back Phase 0.2's cached diff;
              # `git cat-file` backs Phase 0.3.6's blocker-recheck precondition;
              # `git checkout`/`mktemp`/`cmp`/`rm -f` back Phase 3.1's dirty-tree backstop.
              # `git checkout` mutates the worktree, which is exactly what that backstop
              # restores; the reviewer's `contents: read` token still makes a push impossible.
              # The TOOLS='…' literal below is a GENERATED region (compiled from the
              # `review` profile in lib/capability-profiles.json by
              # lib/generate-capability-profiles.py) and is locked as the reviewer security
              # boundary by lib/review-profile.tokens — do NOT hand-edit it; change the
              # manifest and regenerate, and widening the reviewer requires a visible diff
              # to that lock. lib/test/run.sh's --check turns any drift RED.
              # devflow-capability-manifest: region=runner-review manifest_version=5 sha256=a2632da7e855d7dfef9e7982cec8132a5b2ee960d6826fac462373ef33372225
              TOOLS='Read,Glob,Grep,LS,Skill,Agent,TodoWrite,WebFetch,WebSearch,Bash(git status:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git ls-files:*),Bash(git rev-parse:*),Bash(git merge-base:*),Bash(git blame:*),Bash(git branch:*),Bash(git cat-file:*),Bash(git hash-object:*),Bash(git checkout:*),Bash(mkdir:*),Bash(tee:*),Bash(mktemp:*),Bash(cmp:*),Bash(rm -f:*),Bash(*/load-prompt-extension.sh:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*),Bash(gh pr comment:*),Bash(gh pr list:*),Bash(gh pr checks:*),Bash(gh issue view:*),Bash(gh issue comment:*),Bash(gh issue list:*),Bash(gh search:*),Bash(gh repo view:*),Bash(gh run view:*),Bash(gh run list:*),Bash(gh api:*),Bash(jq:*),Bash(.devflow/vendor/devflow/scripts/run-jq.sh:*),Bash(grep:*),Bash(rg:*),Bash(find:*),Bash(wc:*),Bash(sort:*),Bash(uniq:*),Bash(cut:*),Bash(tr:*),Bash(xargs:*),Bash(awk:*),Bash(sed:*),Bash(diff:*),Bash(comm:*),Bash(cat:*),Bash(head:*),Bash(tail:*),Bash(ls:*),Bash(tree:*),Bash(file:*),Bash(stat:*),Bash(date:*),Bash(pwd:*),Bash(realpath:*),Bash(dirname:*),Bash(basename:*),Bash(which:*),Bash(type:*),Bash(env:*),Bash(echo:*),Bash(printf:*),Bash(test:*),Bash(.devflow/vendor/devflow/scripts/match-deferrals.py:*),Bash(.devflow/vendor/devflow/scripts/match-lint-adjudications.py:*),Bash(.devflow/vendor/devflow/scripts/normalize-verdicts.py:*),Bash(.devflow/vendor/devflow/scripts/dismiss-stale-rejections.sh:*),Bash(.devflow/vendor/devflow/scripts/workpad.py:*),Bash(.devflow/vendor/devflow/scripts/config-get.sh:*),Bash(.devflow/vendor/devflow/scripts/load-prompt-extension.sh:*),Bash(.devflow/vendor/devflow/scripts/resolve-review-overrides.py:*),Bash(.devflow/vendor/devflow/scripts/stale-prose-lint.py:*),Bash(.devflow/vendor/devflow/lib/efficiency-trace.sh:*),Write(.devflow/tmp/**)'
              # When the trusted base config opted into provisioning, the runner
              # has a built env (setup-project-env ran below), so grant the
              # freeform build/verify commands the maintainer listed in
              # devflow_runner.allowed_tools (read from the trusted base ref —
              # RUNNER_TOOLS) so the reviewer can actually compile/test the PR in
              # ANY language instead of punting build-dependent claims. Appended
              # ONLY here: when provisioning is off, TOOLS above is byte-for-byte
              # the read-only profile, regardless of RUNNER_TOOLS content.
              #
              # SECURITY — deny-list floor. Before appending, strip the
              # categorically-unrecoverable tier no matter what /devflow:init's
              # LLM enrichment or a later hand-edit wrote into the base config:
              # tree-mutation tools (Edit/Write/MultiEdit/NotebookEdit — stripped by
              # tool NAME, so bare AND parameterized forms like Write(**) /
              # Edit(src/**) alike, issue #402) and any Bash entry that can reach a
              # raw shell / eval / privilege binary (bash/sh/zsh/eval/exec/source/
              # sudo). This is the AUTHORITATIVE boundary — it runs here, at
              # consume-time, on the trusted base-ref list, because a fast-feedback
              # guard in detect-project-tools.sh can be bypassed by a hand-edit but
              # this filter cannot. A denied entry is dropped + warned, never fatal
              # (a typo must not abort every review). The list is mirrored in
              # scripts/detect-project-tools.sh (fast feedback only); keep both in
              # sync — this path enforces.
              #
              # The filter logic itself lives in scripts/filter-runner-tools.sh
              # (extracted so lib/test/run.sh can drive the full adversarial input
              # matrix — inline YAML cannot be unit-tested; issue #402). The helper
              # inspects the Bash COMMAND-POSITION binary by basename and the
              # file-tool NAME before the first '(' case-insensitively; its header
              # documents every rule. This step only resolves + calls it, fails
              # closed when it is absent, and re-emits its strip warnings.
              if [ "$PROVISION_ENV" = "true" ]; then
                # The deny-list floor is applied by scripts/filter-runner-tools.sh
                # (issue #402) — the AUTHORITATIVE, suite-driven boundary. TRUST
                # RULE (the PR-#404 REJECT finding): this job checks out the PR
                # HEAD, so any copy of the helper in the checked-out tree — the
                # committed vendor dir or the repo's own scripts/ — is
                # PR-author-editable, and a floor whose code the PR controls is no
                # floor at all. The helper is therefore executed ONLY from a
                # trusted source, in rank order:
                #   1. FLOOR_HELPER — materialized by the baseprovision step from
                #      the TRUSTED base ref (git show FETCH_HEAD:…) into
                #      RUNNER_TEMP, outside the PR-writable workspace;
                #   2. the vendored copy, ONLY when the vendor-plugin step reports
                #      vendor_source=fetch — i.e. the copy was cloned THIS RUN from
                #      the official repo at the pinned devflow_version, never taken
                #      from the PR-head tree (a PR can at most select an
                #      official-repo commit — the same accepted posture as the
                #      vendor step itself).
                # A committed/self vendor copy is deliberately NEVER consulted
                # here, and FAIL CLOSED when no trusted source resolves: a security
                # filter that cannot run must append NOTHING, not the unfiltered
                # list. Version skew: the floor is as current as the BASE REF's
                # helper (or the pinned fetch) — a consumer must land a re-vendor
                # on the base branch for a later tightening (e.g. #402's
                # parameterized file-tool strip) to take effect; until then a
                # base ref with no helper fails closed (no build tools, warning,
                # read-only review still works). Both are stated in
                # docs/DEVFLOW_SYSTEM_OVERVIEW.md's deny-floor paragraph.
                # Anchor the relative vendored-copy candidate to the git repo ROOT
                # (issue #409 item 8, #295 convention: `git rev-parse --show-toplevel`,
                # falling back to `pwd`). A bare relative `.devflow/vendor/…` path
                # resolves against the step's cwd, so a future `working-directory:` (or a
                # step that `cd`s) would silently miss the vendored helper and flip every
                # review that RELIES ON the fetch-vendored fallback to the helper-absent
                # fail-closed arm. (Reviews that resolve the rank-1 trusted base-ref
                # FLOOR_HELPER, an absolute RUNNER_TEMP path, never reach this branch.)
                # Anchoring makes the candidate cwd-independent. FLOOR_HELPER is already
                # absolute, so only the fetch-gated vendored path needs it.
                _REPO_ROOT="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
                FILTER_HELPER=''
                if [ -n "${FLOOR_HELPER:-}" ] && [ -f "$FLOOR_HELPER" ]; then
                  FILTER_HELPER="$FLOOR_HELPER"
                  echo "deny-list floor source: trusted base ref (${FLOOR_SOURCE:-base-ref})"
                elif [ "${VENDOR_SOURCE:-}" = "fetch" ] && [ -f "$_REPO_ROOT/.devflow/vendor/devflow/scripts/filter-runner-tools.sh" ]; then
                  FILTER_HELPER="$_REPO_ROOT/.devflow/vendor/devflow/scripts/filter-runner-tools.sh"
                  echo "deny-list floor source: runtime-fetched vendored copy (pinned devflow_version)"
                fi
                if [ -z "$FILTER_HELPER" ]; then
                  echo "::warning::devflow deny-list floor helper (filter-runner-tools.sh) not found at any TRUSTED source — neither materialized from the base ref (baseprovision) nor runtime-fetched at the pinned devflow_version (vendor_source='${VENDOR_SOURCE:-unknown}'); the PR-head checkout's own copy is deliberately not consulted, because the floor must not be PR-editable. Failing closed: NO build/verify tools appended to the review profile (the reviewer keeps the read-only profile). Land the DevFlow re-vendor on the BASE branch (or use a thin install with a pinned devflow_version) so a trusted helper is available."
                else
                  # The helper reads the raw RUNNER_TOOLS from the environment,
                  # prints the KEPT entries as one comma-joined line on stdout, and
                  # one strip-warning line per stripped entry on stderr. Capture the
                  # helper's exit status in the SAME statement (`|| HELPER_RC=$?`):
                  # the helper's contract is `exit 0` always, so a non-zero rc is a
                  # genuine MALFUNCTION whose interpreter invocation itself failed to
                  # open/parse/run the helper — an unreadable, corrupt, or
                  # partially-vendored helper, or resource exhaustion — NOT an empty
                  # result. (A non-fatal in-script hiccup such as a too-old bash
                  # rejecting `shopt -s nocasematch` does NOT reach this arm: the
                  # helper has `set -u` but no `set -e` and ends with `exit 0`, so it
                  # still exits 0 — the file-tool tier merely degrades to
                  # case-sensitive, which only affects inert lowercase spellings.)
                  # Distinguishing malfunction from empty below keeps a helper crash
                  # from being misdiagnosed as "your config is empty" (the "unknown is
                  # not a real value" breadcrumb-honesty rule); either way it fails
                  # CLOSED (nothing appended).
                  # Guard mktemp (issue #409 item 7): a temp-dir that is unwritable or
                  # exhausted makes `mktemp` fail, leaving STRIP_LOG empty. The old
                  # unguarded `STRIP_LOG="$(mktemp)"` then let the `2>"$STRIP_LOG"`
                  # redirect target an empty path and, under GitHub's default `-e` run
                  # shell, abort the whole `tools` step — a security filter must never
                  # HARD-ABORT the step (that is a different failure than the intended
                  # fail-closed). So capture mktemp best-effort and, if it did not yield
                  # a real file, fail CLOSED (append nothing) with an actionable warning.
                  STRIP_LOG="$(mktemp 2>/dev/null || true)"
                  if [ -z "$STRIP_LOG" ] || [ ! -e "$STRIP_LOG" ]; then
                    echo "::warning::devflow deny-list floor: could not create a temp file (mktemp failed — the runner's temp dir is unwritable or exhausted) to capture the helper's per-entry strip warnings — failing closed: NO build/verify tools appended to the review profile (the reviewer keeps the read-only profile). This is a runner ENVIRONMENT issue, NOT an empty devflow_runner.allowed_tools."
                  else
                    HELPER_RC=0
                    FILTERED="$(RUNNER_TOOLS="$RUNNER_TOOLS" bash "$FILTER_HELPER" 2>"$STRIP_LOG")" || HELPER_RC=$?
                    # Re-emit each per-entry strip line as a workflow `::warning::`.
                    while IFS= read -r _line; do
                      if [ -n "$_line" ]; then echo "::warning::$_line"; fi
                    done < "$STRIP_LOG"
                    rm -f "$STRIP_LOG"
                    if [ "$HELPER_RC" -ne 0 ]; then
                      echo "::warning::devflow deny-list floor helper ($FILTER_HELPER) exited $HELPER_RC (it is contracted to always exit 0) — failing closed: NO build/verify tools appended to the review profile. This is a helper MALFUNCTION (the helper is unreadable, corrupt, or partially vendored so 'bash' could not run it), NOT an empty devflow_runner.allowed_tools — check the helper, do not re-check your config."
                    elif [ -n "$FILTERED" ]; then
                      TOOLS="$TOOLS,$FILTERED"
                    else
                      echo "::warning::devflow_runner.provision_env is true but devflow_runner.allowed_tools is empty (or empty after deny-list stripping): build-aware review is enabled with NO build tools, so the reviewer has only the read-only profile. Populate devflow_runner.allowed_tools with your build/test/lint tools (e.g. Bash(go:*), Bash(cargo:*)) to enable build-aware review."
                    fi
                  fi
                fi
              fi
              ;;
            *)
              echo "::error::Unknown allowed_tools_profile: $PROFILE"
              exit 1
              ;;
          esac
          # Heredoc form forwards the value verbatim regardless of length or
          # embedded special characters; safe to extend with more profiles
          # without revisiting quoting.
          delim="EOF_$(date +%s%N)_$$"
          {
            printf 'tools<<%s\n' "$delim"
            printf '%s\n' "$TOOLS"
            printf '%s\n' "$delim"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve effort
        id: effort
        env:
          # Resolve input-vs-config once so the claude_args expression below
          # mirrors the shape used by the other workflows (single output ref,
          # no double-evaluated ternary).
          RESOLVED: ${{ inputs.effort != '' && inputs.effort || steps.extract.outputs.effort }}
        run: |
          set -euo pipefail
          echo "value=$RESOLVED" >> "$GITHUB_OUTPUT"

      # ── Third-party model provider resolution (issue #313) ─────────────────
      # Resolve the devflow_runner section's provider decision from
      # .devflow/config.json via the single-sourced inline jq RESOLVER below. The
      # RESOLVER program is byte-identical across devflow.yml, devflow-implement.yml,
      # and devflow-runner.yml (lib/test/run.sh pins that identity); only the
      # `--arg section` value differs. An empty decision (no provider) reproduces
      # today's Anthropic-OAuth review wiring, so review stays on Claude unless
      # devflow_runner.provider is set. (One deliberate #313 change on this default
      # path: the runner's `--model` now resolves from the TRUSTED BASE-ref config,
      # head only as a bootstrap fallback — see the cargs step's MODEL-fallback
      # comment — so
      # for a given `claude_model` the rendered invocation is unchanged, while a PR
      # can no longer swap the privileged reviewer's model via head config.)
      # See docs/cloud-setup.md.
      - name: Resolve model provider
        id: provider
        env:
          # SECURITY (issue #313 review C1): resolve the runner's provider decision from
          # the TRUSTED BASE ref config (steps.baseprovision — the same source provision_env
          # / setup / allowed_tools already read), NEVER the PR-head steps.cfg. This review
          # runs on the PR head under a write token, so a PR-head-sourced provider could add
          # providers.evil + devflow_runner.provider and redirect the privileged review to an
          # attacker endpoint, exfiltrating DEVFLOW_PROVIDER_API_KEY as a bearer token. Base-ref
          # config is maintainer-controlled; a PR cannot grant itself a provider. ({} on a base
          # with no committed config → default Anthropic path, fail-safe.)
          CONFIG_JSON: ${{ steps.baseprovision.outputs.config_json }}
          SECTION: devflow_runner
        run: |
          set -euo pipefail
          # devflow-provider-resolver BEGIN (single-sourced; keep byte-identical across the three cloud workflows — lib/test/run.sh pins it)
          RESOLVER='
          (if (. | type) == "object" then . else {} end) as $cfg
          | (if (($cfg[$section]) | type) == "object" then $cfg[$section] else {} end) as $sec
          | ($sec.provider) as $praw
          | (if (($sec.claude_model) | type) == "string" and ($sec.claude_model != "") then $sec.claude_model else ($cfg.claude_model // "") end) as $model
          | if ($praw == null or $praw == "") then
              {provider:"", base_url:"", auth:"", timeout_ms:"", effort_supported:true, model:$model, env:{}}
            elif (($praw) | type) != "string" then
              {error:"invalid_provider", section:$section, provider:"", detail:"section provider must be a string"}
            else
              (if (($cfg.providers) | type) == "object" then $cfg.providers else {} end) as $provs
              | if (($provs[$praw]) | type) != "object" then
                  {error:"undefined_provider", section:$section, provider:$praw, detail:"provider is not defined in the providers map"}
                elif ((($provs[$praw].base_url) | type) != "string" or ($provs[$praw].base_url == "")) then
                  {error:"incomplete_provider", section:$section, provider:$praw, detail:"provider entry has no base_url"}
                elif (($provs[$praw].auth) as $a | ($a != "bearer" and $a != "api_key")) then
                  {error:"incomplete_provider", section:$section, provider:$praw, detail:"provider auth must be bearer or api_key"}
                else
                  ($provs[$praw]) as $p
                  | {provider:$praw, base_url:$p.base_url, auth:$p.auth, timeout_ms:($p.timeout_ms // ""), effort_supported:(($p.effort_supported // false) == true), model:$model, env:(if (($p.env) | type) == "object" then $p.env else {} end)}
                end
            end
          '
          # devflow-provider-resolver END
          DECISION=$(printf '%s' "$CONFIG_JSON" | jq -c --arg section "$SECTION" "$RESOLVER")
          # jq on EMPTY stdin emits nothing with rc 0, so an empty CONFIG_JSON would
          # otherwise sail through as a zero-output "decision" and silently select the
          # default path (or a misdirected empty-model error downstream). Both producers
          # provably never emit empty today, so this is a fail-loud tripwire, not a live path.
          if [ -z "$DECISION" ]; then
            echo "::error::provider resolver produced no decision for section '$SECTION' (empty config input?). Refusing to run."
            exit 1
          fi
          if [ "$(printf '%s' "$DECISION" | jq -r '.error // ""')" != "" ]; then
            PNAME=$(printf '%s' "$DECISION" | jq -r '.provider // ""')
            DETAIL=$(printf '%s' "$DECISION" | jq -r '.detail // "provider configuration is invalid"')
            echo "::error::.devflow/config.json section '$SECTION' provider '$PNAME': $DETAIL. Fix the providers.$PNAME entry (base_url + auth: bearer|api_key) or remove the section provider key. Refusing to run."
            exit 1
          fi
          # One jq pass emits every scalar decision field to the step output, each as a
          # newline-safe heredoc block: a config-sourced value carrying an embedded newline
          # would otherwise split a plain KEY=VALUE line and forge further step outputs. The
          # timestamped+PID delimiter mirrors the decision<< output below.
          sdelim="OUT_EOF_$(date +%s%N)_$$"
          printf '%s' "$DECISION" | jq -r --arg d "$sdelim" '
            ["provider","model","auth","base_url","timeout_ms","effort_supported"][] as $k
            | "\($k)<<\($d)", "\(.[$k])", $d' >> "$GITHUB_OUTPUT"
          # Forward the full decision (it carries the provider env map) to the
          # inject step via a heredoc output so embedded values survive verbatim.
          delim="DEC_EOF_$(date +%s%N)_$$"
          {
            printf 'decision<<%s\n' "$delim"
            printf '%s\n' "$DECISION"
            printf '%s\n' "$delim"
          } >> "$GITHUB_OUTPUT"

      # Anthropic default path (no provider): the review must fail loud if the
      # OAuth token is absent, so relaxing the workflow_call secret to optional
      # (issue #313) never silently degrades the default path (AC 8).
      - name: Require OAuth token on the Anthropic default path
        if: ${{ steps.provider.outputs.provider == '' }}
        env:
          OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # issue #313 shadow S2: the empty provider decision can mean either "no
          # provider configured" OR "the trusted base-ref config could not be read,
          # so a configured provider was ignored". config_source tells them apart so
          # this guard's remedy is not misdirecting.
          CONFIG_SOURCE: ${{ steps.baseprovision.outputs.config_source }}
        run: |
          set -euo pipefail
          if [ -z "$OAUTH" ]; then
            if [ "${CONFIG_SOURCE:-}" = "degraded" ]; then
              # The provider decision reverted to the Anthropic default only because the
              # trusted base config was unreadable this run — do NOT tell the operator
              # "no provider is configured" (it may well be); name the real cause.
              echo "::error::The trusted base-ref .devflow/config.json could not be read this run, so any devflow_runner.provider routing was ignored and the review fell back to the Anthropic default path — but the CLAUDE_CODE_OAUTH_TOKEN secret is empty. Fix the base-branch config (a configured provider would then be honored) or set CLAUDE_CODE_OAUTH_TOKEN. Refusing to run."
            else
              echo "::error::No model provider is configured for the devflow_runner section, so the review runs on the Anthropic default path — but the CLAUDE_CODE_OAUTH_TOKEN secret is empty. Set it (or configure devflow_runner.provider + DEVFLOW_PROVIDER_API_KEY). Refusing to run."
            fi
            exit 1
          fi

      # Compute the claude_args head so --model is always present and --effort is
      # dropped only for a provider whose effort_supported is false (AC 7). The
      # Anthropic default path resolves effort_supported=true, so effort is
      # preserved there (for a non-empty effort value — the run body's
      # flag-injection guard enum-validates effort and allowlist-validates the
      # model id, rejecting flag-shaped or out-of-charset values).
      - name: Build claude_args head (model + conditional effort)
        id: cargs
        env:
          # The runner's provider decision (incl. model) is resolved from the TRUSTED BASE
          # config (see the Resolve step's SECURITY note). The fallback below fires whenever
          # the base-resolved model is empty — from ANY cause, the motivating one being a repo
          # bootstrapping devflow via this very PR whose base ref carries no committed config —
          # by reading the head-config claude_model (steps.extract, whose own empty-claude_model
          # guard still fail-closes). A head-sourced model string cannot redirect the endpoint
          # or leak the secret (both come from the base decision), and the run body below
          # rejects flag-shaped (leading-dash) tokens and any character outside a
          # conservative model-id allowlist — and enum-validates EFFORT — so it cannot
          # smuggle extra CLI flags either;
          # --model is never empty while the trust boundary holds.
          MODEL: ${{ steps.provider.outputs.model != '' && steps.provider.outputs.model || steps.extract.outputs.claude_model }}
          EFFORT: ${{ steps.effort.outputs.value }}
          EFFORT_SUPPORTED: ${{ steps.provider.outputs.effort_supported }}
        run: |
          set -euo pipefail
          if [ -z "$MODEL" ]; then
            echo "::error::claude_model is missing from .devflow/config.json (set a top-level claude_model, or a per-section claude_model). Refusing to run."
            exit 1
          fi
          # SECURITY: MODEL and EFFORT are spliced UNQUOTED into claude_args (a folded
          # CLI string), and the runner can read either from PR-head config (EFFORT
          # always via steps.extract when the caller passes no effort input; MODEL in
          # the bootstrap fallback) — so refuse any value that could smuggle an extra
          # CLI flag. A blacklist is NOT enough here: the action tokenises claude_args
          # shell-style, so a flag-shaped single token (`--model --evil`) records
          # --model as valueless and passes --evil through as its own flag, and a
          # bytewise [[:space:]] check misses Unicode whitespace (NBSP/U+2028/U+3000)
          # under a non-UTF-8 runner locale while the JS tokeniser still splits on it.
          # So MODEL is validated POSITIVELY: reject a leading dash, then reject any
          # character outside the conservative model-id allowlist
          # A-Za-z0-9 . _ / : @ [ ] -  (covers claude-*, provider/model, Z.ai
          # bracket-suffix ids like glm-5.2[1m], and Bedrock-style colon ids) — a
          # multibyte character is rejected in every locale because none of its bytes
          # (C locale) nor its codepoint (UTF-8 locale) is in the allowlist. EFFORT is
          # pinned to its schema enum (or empty, which drops the flag below). In the
          # negated bracket expression, `]` sits first after `!` and `-` last, making
          # both literal members of the set.
          case "$MODEL" in
            -*)
              echo "::error::claude_model value is flag-shaped (leading dash) — refusing to compose claude_args (flag-injection guard; the model must be a single non-dash-leading token)."
              exit 1 ;;
            *[!]A-Za-z0-9._/:@[-]*)
              echo "::error::claude_model value contains a character outside the model-id allowlist (A-Za-z0-9 . _ / : @ [ ] -) — refusing to compose claude_args (flag-injection guard)."
              exit 1 ;;
          esac
          case "$EFFORT" in
            '' | low | medium | high | xhigh | max) : ;;
            *)
              echo "::error::effort value is not one of low/medium/high/xhigh/max — refusing to compose claude_args (flag-injection guard)."
              exit 1 ;;
          esac
          ARGS="--model $MODEL"
          # --effort only when the provider supports it AND a value actually resolved. The
          # config effort defaults to "high", so the default path always has one; the -n
          # co-guard just avoids ever handing the CLI a valueless --effort on a pathological
          # empty effort.
          if [ "$EFFORT_SUPPORTED" = "true" ] && [ -n "$EFFORT" ]; then
            ARGS="$ARGS --effort $EFFORT"
          fi
          # Newline-safe heredoc output (mirrors the resolver's decision<< / scalar-output form).
          adelim="OUT_EOF_$(date +%s%N)_$$"
          { printf 'args<<%s\n' "$adelim"; printf '%s\n' "$ARGS"; printf '%s\n' "$adelim"; } >> "$GITHUB_OUTPUT"

      # Provision the runtime BEFORE Claude runs, but ONLY when the trusted base
      # config opted in via devflow_runner.provision_env. config_json is the
      # BASE ref's config (steps.baseprovision), never the PR head, so PR edits
      # to `setup.install` cannot inject commands here — the same trust boundary
      # setup-project-env already documents for `services`. (The action body and
      # the install commands still execute from / against the PR checkout once
      # enabled; that residual vector is the documented opt-in — see
      # docs/cloud-setup.md.) When the flag is absent/false this step is skipped
      # and the runner behaves exactly as before: read-only, no build tools.
      - name: Provision project environment (opt-in)
        id: provision
        if: steps.baseprovision.outputs.provision_env == 'true'
        uses: ./.github/actions/setup-project-env
        with:
          config_json: ${{ steps.baseprovision.outputs.config_json }}

      # Provisioning is best-effort: a service container that never becomes
      # healthy emits a `::warning::` and the job continues (see
      # setup-project-env), so a build/verify command that then fails for lack of
      # that dependency would otherwise look like a PR defect to the reviewer.
      # When the action reports degraded services via its `health_summary` output,
      # prepend a fenced infra-status note to the reviewer prompt instructing it to
      # blame infrastructure, not the PR. This step is deliberately NOT gated on
      # provision_env: when the provision step is skipped (or every service is
      # healthy) the output resolves to empty and the prompt is forwarded
      # byte-for-byte unchanged, so the read-only happy path is unaffected.
      #
      # The engine is also given GROUND TRUTH about two things it otherwise burns
      # turns rediscovering (issue #363): the exact set of commands it may run, and
      # the CI results that already exist for the head it is reviewing. Without this
      # the engine probes its own boundary by attempting denied commands — on PR #340
      # seven of fourteen denials were it trying, seven ways, to run the test suite —
      # and can consume an entire run without producing a verdict. This block is
      # prepended on EVERY review run, independently of health_summary.
      - name: Compose CI summary (pre-displacement)
        id: ci_summary
        env:
          # The job's own GITHUB_TOKEN, whose `permissions:` block declares the
          # `checks: read` + `actions: read` the CI check-runs query needs. The
          # downscoped DevFlow-Reviewer token is minted LATER (it posts the
          # review), so it is deliberately not used here.
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          # summarize-ci-checks.sh excludes DevFlow's own workflow run from the CI
          # signal set by this name; without it the summarizer falls back to a
          # hard-coded literal and stops excluding the reviewer's own run.
          SELF_WORKFLOW_NAME: ${{ github.workflow }}
        run: |
          set -euo pipefail
          # AC5 (#504): this step computes HEAD_SHA + CI_SUMMARY BEFORE
          # harden_hooks, because summarize-ci-checks.sh sources lib/resolve-jq.sh
          # — a HOOK_TARGETS closure member — so on a stub arm post-displacement
          # the exit-0 stub would terminate the summarizer and the block would
          # read "CI status unavailable" on a head whose API conclusions are
          # green. The Compose review prompt step (after harden) consumes these
          # outputs and runs only the renderer (which sources nothing).
          # The reviewed head is the commit `actions/checkout` put in the worktree.
          HEAD_SHA=$(git rev-parse HEAD 2>/dev/null || echo "")
          # summarize-ci-checks.sh always exits 0, printing `CI status unavailable`
          # when it cannot determine the CI state — so the block is present even when
          # the query fails, and an absent result never renders as a passing one.
          SCC=.devflow/vendor/devflow/scripts/summarize-ci-checks.sh
          [ -f "$SCC" ] || SCC=scripts/summarize-ci-checks.sh
          if [ -f "$SCC" ]; then
            # HEAD_SHA is a run:-local variable (computed above), NOT a step env:
            # entry, so it is passed to the summarizer subprocess inline — the
            # summarizer reads HEAD_SHA from its environment and fail-closes to
            # `CI status unavailable` if it is empty, so without this the CI
            # ground-truth section (issue #363) would regress on every run.
            CI_SUMMARY=$(HEAD_SHA="$HEAD_SHA" bash "$SCC") || CI_SUMMARY="CI status unavailable"
          else
            echo "::warning::devflow: summarize-ci-checks.sh not found at either the vendored or repo path — the review prompt's CI section will report it unavailable" >&2
            CI_SUMMARY="CI status unavailable"
          fi
          [ -n "$CI_SUMMARY" ] || CI_SUMMARY="CI status unavailable"
          # Publish HEAD_SHA (single-line) and CI_SUMMARY (multi-line, heredoc
          # with a timestamped delimiter — the summary carries check names that can
          # hold backticks/markdown) as step outputs the compose step consumes.
          printf 'HEAD_SHA=%s\n' "$HEAD_SHA" >> "$GITHUB_OUTPUT"
          _cs_d="CI_SUMMARY_EOF_$(date +%s%N)_$$"
          {
            printf 'CI_SUMMARY<<%s\n' "$_cs_d"
            printf '%s\n' "$CI_SUMMARY"
            printf '%s\n' "$_cs_d"
          } >> "$GITHUB_OUTPUT"

      # Optional, opt-in: mint a DEDICATED DevFlow-Reviewer GitHub App
      # installation token DOWNSCOPED to what the review agent actually does —
      # read the repo/issue/CI and post comments, reviews, approvals, and
      # rejections. `contents: read` (never write) is what makes a branch push
      # impossible for the review path, and the permission-* inputs are the SOLE
      # enforcement of least privilege (an App installation token ignores the
      # job's `permissions:` block). Gated on the DEVFLOW_REVIEWER_APP_ID
      # repository VARIABLE (the dedicated reviewer app, NOT the primary app that
      # authors PRs — this review-only runner carries no reference to that app):
      # unset/empty → the step is skipped and github_token below falls back to
      # GITHUB_TOKEN (`github-actions[bot]`), NEVER the primary app token — so
      # the review identity is structurally distinct from the PR author on every
      # configured setup, and Phase 4.4's self-review is never forbidden (issue
      # #300). NO continue-on-error: a configured-but-broken reviewer App
      # (invalid/rotated key, or an installation not granted these permissions)
      # fails the job here rather than silently degrading to GITHUB_TOKEN.
      - name: Mint downscoped DevFlow-Reviewer token (optional)
        id: reviewer-token
        if: ${{ vars.DEVFLOW_REVIEWER_APP_ID != '' }}
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.DEVFLOW_REVIEWER_APP_ID }}
          private-key: ${{ secrets.DEVFLOW_REVIEWER_PRIVATE_KEY }}
          permission-contents: read
          permission-issues: read
          permission-pull-requests: write
          permission-actions: read

      # SECURITY — harden the base-branch `.claude/settings.json` Stop-hook script
      # sources (issue #458). claude-code-action restores `.claude/` (the hook
      # CONFIG) from the base branch, but the three Stop-hook COMMANDS exec script
      # files under lib/ and scripts/ — NOT under .claude/ — so this job's PR-HEAD
      # checkout (ref: inputs.ref) supplies them. A PR that edits any of
      # lib/efficiency-trace.sh, lib/implement-stop-guard.sh, or
      # scripts/stop-hook-probe.sh would otherwise obtain unmediated shell at
      # session end inside this secrets-bearing job, bypassing the #402 deny-floor
      # entirely (the #404 REJECT class: a floor the PR controls is no floor).
      #
      # Same trusted-source pattern as the deny-floor: BEFORE claude-code-action
      # runs, overwrite each hook target in the PR-head workspace with the TRUSTED
      # base-ref copy (materialized here via `git show FETCH_HEAD:…`), and where no
      # base copy exists overwrite it with a fail-closed no-op stub — NEVER left as
      # the PR-head copy. The installer logic is the suite-driven, unit-tested
      # helper scripts/harden-stop-hooks.sh, executed ONLY from a TRUSTED source
      # (rank 1: base-ref materialized copy; rank 2: the vendored copy gated on
      # vendor_source=fetch — never the PR-head checkout, which the PR can edit).
      # When no trusted helper resolves the step fails closed INLINE (trusted
      # workflow shell), stubbing every target. The implement job needs no such
      # step: it checks out the DEFAULT branch (never a PR head), so its hook
      # scripts are already trusted. See docs/DEVFLOW_SYSTEM_OVERVIEW.md.
      - name: Harden Stop-hook script sources (trusted base copy or fail-closed stub)
        id: harden_hooks
        env:
          # Same TRUSTED base ref the baseprovision step reads (the PR's target
          # branch, or the repo default) — never a PR-controlled input.
          BASE_REF: ${{ github.event.pull_request.base.ref || github.event.repository.default_branch }}
          # Only 'fetch' (a fresh official-repo clone at the pinned devflow_version)
          # is a trusted source for the helper; committed/self copies are PR-head.
          VENDOR_SOURCE: ${{ steps.vendor.outputs.vendor_source }}
        run: |
          # errexit OFF, EXPLICITLY (PR #461; live failure: Actions run 29285485078).
          # GitHub's default `run:` shell is `bash -e {0}`, so errexit arrives ON even
          # though this step declares only `set -uo pipefail`. The step is authored for
          # explicit rc handling — every failure path is an rc-checked arm ending in a
          # fail-closed stub, a warning, or `exit 1` — and expected-non-zero commands
          # run OUTSIDE condition position (e.g. the compound `git show` read below of a
          # .claude/settings.local.json that is absent at the base ref, git rc 128).
          # Under inherited errexit the first such command aborts the whole step BEFORE
          # any fail-closed arm can run. `set +e` makes the declared option set the real
          # one; the #460-errexit suite block executes this step under `bash -e` and
          # goes RED if this line is dropped.
          set +e
          set -uo pipefail
          # COUPLED mirror of scripts/harden-stop-hooks.sh's HOOK_TARGETS — the FULL
          # transitive source/exec closure of the three .claude/settings.json Stop-hook
          # scripts, not just the entry points (issue #458 REJECT). Byte-identical to the
          # helper's HOOK_TARGETS and pinned equal in lib/test/run.sh. Used both to
          # materialize the trusted base copies AND, on the fail-closed arm, to stub
          # every target inline. A file dropped here silently leaves that PR-head script
          # executable (or un-materialized, so the helper stubs it).
          TARGETS="lib/efficiency-trace.sh lib/implement-stop-guard.sh scripts/stop-hook-probe.sh lib/resolve-jq.sh lib/config-source.sh lib/resolve-bin.sh lib/telemetry-branch.sh scripts/config-get.sh scripts/config_fingerprint.py scripts/workpad.py"
          ROOT="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
          TRUSTED_DIR=""
          HELPER=""
          SKIP_HARDEN=0
          # The three ENTRY hooks whose presence in the TRUSTED base .claude/settings.json
          # is what makes this hardening relevant at all (issue #460 review, FP1).
          ENTRY_TARGETS="lib/efficiency-trace.sh lib/implement-stop-guard.sh scripts/stop-hook-probe.sh"
          # Rank 1: materialize the trusted hook copies AND the trusted helper from
          # the base ref. `origin` is the upstream repo, so the base tip is the
          # maintainer-controlled tree, not the PR head. Only inside this fetch-
          # success branch is FETCH_HEAD the base ref (checkout may leave it at the
          # PR head elsewhere) — mirrors baseprovision's FLOOR_HELPER discipline.
          if [ -n "${BASE_REF:-}" ] && git fetch --depth=1 origin "$BASE_REF" >/dev/null 2>&1; then
            # Read the TRUSTED base .claude/settings.json (for the relevance gate below),
            # then resolve the trusted helper: committed vendor copy first, then the
            # repo's own scripts/ copy ONLY when the base ref IS the DevFlow plugin repo
            # (same plugin.json-name discriminator baseprovision uses), so a consumer's
            # unrelated like-named script is never executed. Resolved BEFORE the gate so
            # the gate can decide via the helper's tested --wired-check mode.
            # Read BOTH .claude/settings.json AND .claude/settings.local.json (issue #460
            # SHADOW): claude-code-action restores ALL of .claude/ from base, so a Stop hook
            # wired via a base-tracked settings.local.json is just as live as one in
            # settings.json — reading only settings.json would be a fail-OPEN (gate reads
            # 'not wired' → skips while the action restores+fires the local-file hook). Both
            # blobs are concatenated so the wiring scan below sees either; a gitignored
            # (untracked) settings.local.json is not in the base tree, so `git show` yields
            # nothing for it and it is correctly ignored.
            SETTINGS_JSON="$(git show "FETCH_HEAD:.claude/settings.json" 2>/dev/null; git show "FETCH_HEAD:.claude/settings.local.json" 2>/dev/null)"
            if raw=$(git show "FETCH_HEAD:.devflow/vendor/devflow/scripts/harden-stop-hooks.sh" 2>/dev/null); then
              printf '%s\n' "$raw" > "$RUNNER_TEMP/harden-stop-hooks.sh" 2>/dev/null && HELPER="$RUNNER_TEMP/harden-stop-hooks.sh"
            elif git show "FETCH_HEAD:.claude-plugin/plugin.json" 2>/dev/null | grep -Eq '"name"[[:space:]]*:[[:space:]]*"devflow"' \
              && raw=$(git show "FETCH_HEAD:scripts/harden-stop-hooks.sh" 2>/dev/null); then
              printf '%s\n' "$raw" > "$RUNNER_TEMP/harden-stop-hooks.sh" 2>/dev/null && HELPER="$RUNNER_TEMP/harden-stop-hooks.sh"
            fi
            # RELEVANCE GATE (issue #460 review, FP1 + PT2): install.sh ships
            # devflow-runner.yml to consumer repos, but DevFlow's own .claude/settings.json
            # Stop hooks do NOT ship. In a consumer whose TRUSTED base settings.json does
            # not wire these hooks there is nothing to harden — and stubbing/creating the
            # ten DevFlow-layout paths would clobber a same-named consumer file (a wrong
            # verdict). So harden ONLY when the trusted base settings.json wires an entry
            # hook. DECIDE VIA THE TRUSTED HELPER'S --wired-check MODE — the single,
            # lib/test/run.sh-driven source of truth for this selection — falling back to
            # an inline substring scan only when no trusted helper resolved. Keyed on the
            # BASE ref, never the PR head: a PR cannot strip its own settings wiring to
            # dodge the floor while claude-code-action still restores the base hooks. The
            # read now covers BOTH settings.json and settings.local.json (above), the two
            # base-tracked .claude/ files that can wire a Stop hook, so a wiring split
            # across them cannot silently un-gate the floor.
            HOOKS_WIRED=0
            # FAIL-CLOSED READ (issue #460 SHADOW, SF-fail-open): an EMPTY SETTINGS_JSON is
            # ambiguous — it means EITHER the base ref has no .claude/settings.json (a
            # consumer without these hooks → correctly skip) OR the file EXISTS at base but
            # `git show` read back empty despite a successful fetch (a transient/corrupt
            # read). --wired-check / the inline scan would read BOTH as "not wired" and skip
            # — dropping DevFlow's OWN floor on the second case (a PR editing a closure
            # script would then run unmediated shell in this secrets-bearing job). So when
            # SETTINGS_JSON is empty, distinguish the two with `git cat-file -e`: EITHER blob
            # EXISTS → inconclusive read → harden anyway (fail closed); BOTH blobs ABSENT →
            # genuinely no hooks → skip. Only a READABLE, non-empty settings read is decided
            # by wiring.
            if [ -z "$SETTINGS_JSON" ]; then
              _settings_present=0
              git cat-file -e "FETCH_HEAD:.claude/settings.json" 2>/dev/null && _settings_present=1
              git cat-file -e "FETCH_HEAD:.claude/settings.local.json" 2>/dev/null && _settings_present=1
              if [ "$_settings_present" -eq 1 ]; then
                HOOKS_WIRED=1
                echo "::warning::harden-stop-hooks: a base .claude/settings*.json exists at the base ref but read back empty after a successful fetch — hardening anyway (fail-closed) rather than inferring 'not wired' and dropping the floor."
              fi
            elif [ -n "$HELPER" ]; then
              # Distinguish the helper's THREE outcomes (issue #460 SHADOW, Obs A): rc 0 =
              # wired (harden); rc 1 = a CLEAN "not wired" verdict (trust it); rc >= 2 = the
              # helper ERRORED (a corrupt/unparseable trusted-materialized copy, etc.) — NOT
              # a verdict. Treating an error as "not wired" would skip and drop DevFlow's own
              # floor (fail OPEN), so on any non-1 error request the inline substring scan
              # (below) rather than skipping. Read the rc in the `else` of the `if <pipeline>`
              # (the sanctioned else-RC idiom), never a later $?.
              if printf '%s' "$SETTINGS_JSON" | bash "$HELPER" --wired-check; then
                HOOKS_WIRED=1
              else
                _wc_rc=$?
                if [ "$_wc_rc" -ne 1 ]; then
                  echo "::warning::harden-stop-hooks: --wired-check helper errored (rc=$_wc_rc, not a clean 0/1 verdict) — falling back to the inline settings scan (fail-closed) rather than inferring 'not wired'."
                  _need_inline_scan=1
                fi
              fi
            else
              _need_inline_scan=1
            fi
            # SINGLE inline substring scan (issue #460 SHADOW), reached when no trusted
            # helper resolved OR the helper errored (rc>=2) — kept in ONE place so the
            # selection has exactly one pinned copy. It only reads a NON-EMPTY SETTINGS_JSON
            # (the empty-read arm set HOOKS_WIRED / SKIP directly above and never sets the
            # flag), so it cannot mis-fire on an empty blob.
            if [ "${_need_inline_scan:-0}" -eq 1 ]; then
              for e in $ENTRY_TARGETS; do
                case "$SETTINGS_JSON" in *"$e"*) HOOKS_WIRED=1 ;; esac
              done
            fi
            if [ "$HOOKS_WIRED" -eq 0 ]; then
              SKIP_HARDEN=1
              echo "::notice::harden-stop-hooks: the trusted base .claude/settings.json does not wire the DevFlow Stop hooks — nothing to harden; skipping (this repo does not use the base-hook channel this floor protects)."
            else
              TRUSTED_DIR="$RUNNER_TEMP/devflow-trusted-hooks"
              for t in $TARGETS; do
                if raw=$(git show "FETCH_HEAD:$t" 2>/dev/null); then
                  if mkdir -p "$TRUSTED_DIR/${t%/*}" 2>/dev/null; then
                    # Checked write (issue #460 review, SF4): a partial/empty file left by a
                    # failed write must NOT later be installed as a "trusted base copy" — remove
                    # the residue so the helper stubs (fail-closed) instead of copying a corrupt
                    # hook with a success breadcrumb.
                    if ! printf '%s\n' "$raw" > "$TRUSTED_DIR/$t" 2>/dev/null; then
                      rm -f "$TRUSTED_DIR/$t" 2>/dev/null || true
                      echo "::warning::harden-stop-hooks: failed to materialize the trusted base copy of '$t'; it will be stubbed (fail-closed) rather than installed corrupt."
                    fi
                  fi
                fi
              done
            fi
          else
            echo "::warning::harden-stop-hooks: could not fetch base ref '${BASE_REF:-}' to materialize trusted Stop-hook copies; failing closed (no-op stubs for every hook target). NOTE (issue #460 review, FP-S1): in a CONSUMER repo a base-ref fetch failure means the relevance gate cannot run, so the ten DevFlow-layout paths are stubbed/created over any same-named consumer files during this (read-only) review — a deliberate fail-closed-over-consumer-fidelity trade, disclosed in docs/DEVFLOW_SYSTEM_OVERVIEW.md."
          fi
          # RELEVANCE GATE early-out (issue #460 review, FP1): the trusted base ref
          # demonstrably does not wire these Stop hooks, so there is nothing to harden
          # and stubbing would clobber consumer files — exit cleanly before the helper
          # / inline-stub arms run. (A fetch FAILURE does NOT set this — it stays on the
          # fail-closed path so DevFlow's own protection is never dropped on a transient
          # base-ref fetch error.)
          if [ "$SKIP_HARDEN" -eq 1 ]; then
            # AC1 (#504): the relevance gate skipped hardening — publish empty
            # displaced_paths + "skipped" so the compose step forwards an empty
            # HARDENED_PATHS (the renderer renders no displaced-paths section).
            printf 'disposition=skipped\n' >> "$GITHUB_OUTPUT"
            printf 'displaced_paths=\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Rank 2: the vendored helper, ONLY on a fresh fetch this run (never the
          # PR-head committed/self copy — anchored to the repo ROOT like the floor).
          if [ -z "$HELPER" ] && [ "${VENDOR_SOURCE:-}" = "fetch" ] \
            && [ -f "$ROOT/.devflow/vendor/devflow/scripts/harden-stop-hooks.sh" ]; then
            HELPER="$ROOT/.devflow/vendor/devflow/scripts/harden-stop-hooks.sh"
          fi
          # Fail CLOSED to inline stubs whenever a trusted helper did NOT run to
          # completion — either it never resolved (HELPER empty), OR it resolved but
          # `bash "$HELPER"` returned non-zero. The helper's contract is exit 0 ONLY
          # when every target was displaced (trusted copy or stub); any non-zero rc —
          # a wholly-unwritable target, or a truncated/unreadable copy that failed
          # mid-run — means hardening may be partial or absent, so proceeding would risk
          # leaving a PR-head Stop-hook script executable in this secrets-bearing job,
          # the exact fail-OPEN this floor exists to prevent. So a non-zero rc takes the
          # SAME inline-stub fallback as an unresolved helper (mirroring the #402 deny-
          # floor, which fails closed on its helper's non-zero rc). Capture the rc in the
          # SAME statement (`if bash …`), never a later `$?` read.
          HARDENED=0
          if [ -n "$HELPER" ]; then
            if WORKSPACE_ROOT="$ROOT" TRUSTED_DIR="$TRUSTED_DIR" bash "$HELPER"; then
              HARDENED=1
            else
              echo "::warning::harden-stop-hooks helper exited non-zero / could not execute (it is contracted to exit 0) — hardening did not complete; failing closed by stubbing every Stop-hook target inline (never the PR-head copy)."
            fi
          else
            echo "::warning::harden-stop-hooks: no TRUSTED helper resolved (base-ref / vendored-fetch); failing closed by stubbing every Stop-hook target inline (never the PR-head copy)."
          fi
          if [ "$HARDENED" -eq 0 ]; then
            # FAIL CLOSED (no trusted helper ran): stub every target inline (this is
            # trusted workflow shell, read from the base/default branch under
            # pull_request_target), so a PR-head hook script is never executed even
            # when the helper cannot be resolved OR cannot execute.
            #
            # This is the LAST-RESORT arm of a security floor: if the stub WRITE itself
            # fails (a wholly-unwritable dest — the case the helper's non-zero exit
            # escalates here), the PR-head hook script REMAINS. Merely warning and
            # exiting 0 would let `Run Claude Code` proceed with that PR-controlled hook
            # INTACT in this secrets-bearing job — the exact fail-OPEN this floor exists
            # to prevent. So on ANY target we could not stub, FAIL THE STEP after the
            # loop: a failed job never reaches `Run Claude Code`, so no hook fires.
            stub_failed=0
            for t in $TARGETS; do
              d="$ROOT/$t"
              mkdir -p "${d%/*}" 2>/dev/null || true
              # Unlink a symlink dest first (issue #460 SHADOW), mirroring the helper's
              # write_stub: without this the `> "$d"` would write the stub THROUGH the link
              # into its resolved target, leaving the PR-controlled symlink at the hook path
              # (and, for an absolute link, writing bytes outside the workspace).
              [ -L "$d" ] && rm -f "$d" 2>/dev/null
              if printf '#!/usr/bin/env bash\nexit 0\n' > "$d" 2>/dev/null; then
                chmod +x "$d" 2>/dev/null || true
              else
                stub_failed=1
                echo "::warning::harden-stop-hooks: could not stub '$t' (wholly unwritable); the PR-head copy MAY REMAIN — the step will fail closed below."
              fi
            done
            if [ "$stub_failed" -eq 1 ]; then
              echo "::error::harden-stop-hooks: one or more Stop-hook targets could NOT be stubbed (wholly unwritable path); the PR-head copy MAY REMAIN. Failing the job BEFORE Run Claude Code so no PR-controlled Stop hook fires in this secrets-bearing review — inspect the runner."
              exit 1
            fi
          fi

          # AC1 (#504): publish the displaced-path set + disposition. Reached only
          # on a displacement arm (trusted base-copy success OR inline-stub success)
          # — the stub_failed arm exited 1 above, so the job never reaches here when
          # a target was wholly unwritable. The paths value is this step's own
          # TARGETS literal, newline-separated via printf word-splitting on the
          # space-separated literal (no tr/sed — guard-class 2: a value deciding an
          # emitted result must not be derived through a non-preflight PATH tool).
          # Exact because displacement is all-or-nothing: the helper displaces every
          # target on exit 0, else the inline arm stubs all ten, else the job failed
          # before this point. The compose step (after this one) forwards this as
          # HARDENED_PATHS to the renderer, which routes listed-path HEAD verification
          # through `git show`.
          printf 'disposition=displaced\n' >> "$GITHUB_OUTPUT"
          _df_d="DISPLACED_EOF_$(date +%s%N)_$$"
          {
            printf 'displaced_paths<<%s\n' "$_df_d"
            printf '%s\n' $TARGETS
            printf '%s\n' "$_df_d"
          } >> "$GITHUB_OUTPUT"

      - name: Compose review prompt
        id: compose
        env:
          BASE_PROMPT: ${{ inputs.prompt }}
          HEALTH_SUMMARY: ${{ steps.provision.outputs.health_summary }}
          ALLOWED_TOOLS: ${{ steps.tools.outputs.tools }}
          # AC5 (#504): CI_SUMMARY + HEAD_SHA are computed in the pre-displacement
          # ci_summary step (summarize-ci-checks.sh sources a HOOK_TARGETS closure
          # member, so it must run before harden_hooks stubs it). HARDENED_PATHS is
          # the displaced-path set harden_hooks published this run (empty when the
          # relevance gate skipped hardening); the renderer renders a displaced-paths
          # ground-truth section only when it is non-empty.
          CI_SUMMARY: ${{ steps.ci_summary.outputs.CI_SUMMARY }}
          HEAD_SHA: ${{ steps.ci_summary.outputs.HEAD_SHA }}
          HARDENED_PATHS: ${{ steps.harden_hooks.outputs.displaced_paths }}
          # The job's own GITHUB_TOKEN, whose `permissions:` block declares the
          # `checks: read` + `actions: read` the CI queries need. The downscoped
          # DevFlow-Reviewer token is minted LATER (it posts the review), so it is
          # deliberately not used here.
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SELF_WORKFLOW_NAME: ${{ github.workflow }}
        run: |
          set -euo pipefail
          # The renderer runs post-displacement (this step is after harden_hooks)
          # and sources nothing, so the stubbed closure members do not affect it.
          RGB=.devflow/vendor/devflow/scripts/render-grounding-block.sh
          [ -f "$RGB" ] || RGB=scripts/render-grounding-block.sh
          if [ -f "$RGB" ]; then
            GROUNDING=$(CI_SUMMARY="$CI_SUMMARY" ALLOWED_TOOLS="$ALLOWED_TOOLS" HARDENED_PATHS="$HARDENED_PATHS" bash "$RGB") || GROUNDING=""
          else
            echo "::warning::devflow: render-grounding-block.sh not found at either the vendored or repo path — the review prompt carries no engine-ground-truth block this run" >&2
            GROUNDING=""
          fi
          # Verify the OUTCOME, not the file's existence: a present-but-truncated
          # renderer that exits 0 printing nothing would silently strip the block's
          # prompt-injection defense from the prompt with no breadcrumb.
          [ -n "$GROUNDING" ] || echo "::warning::devflow: render-grounding-block.sh produced no output — the review prompt carries no engine-ground-truth block this run (the engine will rediscover its tool boundary by trial and denial)" >&2
          # The grounding block is ALWAYS present. When the infra-health block is also
          # present, both are prepended — grounding first, then health, then the base
          # prompt — so neither displaces the other.
          if [ -n "$HEALTH_SUMMARY" ]; then
            PROMPT="${GROUNDING}
          > [!IMPORTANT]
          > **Infrastructure status: one or more service containers did not come up.**
          > This reviewer environment was provisioned (\`provision_env\` is on), but
          > the following services are degraded:
          >
          ${HEALTH_SUMMARY}
          >
          > If any build, test, or verify command below fails because it could not
          > reach one of these services, attribute that failure to the degraded
          > infrastructure above — NOT to a defect in this pull request. Review the
          > rest of the change normally.

          ---

          ${BASE_PROMPT}"
          else
            PROMPT="${GROUNDING}
          ${BASE_PROMPT}"
          fi
          # Heredoc transport with a unique, timestamped delimiter: the prompt is
          # full of markdown/backticks, so a fixed sentinel could collide with its
          # content and prematurely terminate the output. The same pattern guards
          # the other multiline outputs in this workflow.
          delim="PROMPT_EOF_$(date +%s%N)_$$"
          {
            printf 'prompt<<%s\n' "$delim"
            printf '%s\n' "$PROMPT"
            printf '%s\n' "$delim"
          } >> "$GITHUB_OUTPUT"

      # SECURITY (issue #313 shadow S1): this step writes the provider endpoint —
      # including, for bearer auth, the DEVFLOW_PROVIDER_API_KEY secret as
      # ANTHROPIC_AUTH_TOKEN — into the JOB env, which is visible to every LATER
      # step. It is therefore placed AFTER the opt-in `Provision project environment`
      # step (which runs PR-author-controlled build code), so a provider+provision_env
      # combo never hands the bearer key to PR code. It must still precede `Run Claude
      # Code` (the next step), which consumes ANTHROPIC_BASE_URL / ANTHROPIC_AUTH_TOKEN.
      # Inject the provider endpoint into the JOB env — ONLY when a provider is
      # active. A `run:` step writing $GITHUB_ENV (never a static step `env:`
      # block of always-present expressions) is the only mechanism that can carry
      # config-driven dynamic keys, and gating on `provider != ''` keeps the
      # default path free of even empty-valued ANTHROPIC_* vars (AC 1/4). This
      # step also carries the fail-loud empty-secret guard (AC 6), before the
      # action step runs.
      - name: Inject provider endpoint (provider-routed sections only)
        if: ${{ steps.provider.outputs.provider != '' }}
        env:
          DECISION: ${{ steps.provider.outputs.decision }}
          AUTH: ${{ steps.provider.outputs.auth }}
          BASE_URL: ${{ steps.provider.outputs.base_url }}
          TIMEOUT_MS: ${{ steps.provider.outputs.timeout_ms }}
          PROVIDER: ${{ steps.provider.outputs.provider }}
          PROVIDER_API_KEY: ${{ secrets.DEVFLOW_PROVIDER_API_KEY }}
          SECTION: devflow_runner
        run: |
          set -euo pipefail
          if [ -z "$PROVIDER_API_KEY" ]; then
            echo "::error::.devflow/config.json section '$SECTION' selects provider '$PROVIDER' but the DEVFLOW_PROVIDER_API_KEY repository secret is empty. Set that secret (the provider API key) before running a provider-routed job. Refusing to run."
            exit 1
          fi
          # SECURITY: the env-map KEY is interpolated RAW into the `KEY<<DELIM` heredoc
          # header — the newline-safe heredoc protects VALUES, not keys, so a key
          # carrying a newline or `<<` could forge a further job env var name or break
          # the heredoc terminator (leaving an opaque "matching delimiter not found"
          # abort). Keys come from maintainer-controlled config, but validate them
          # POSITIVELY against a real env-var-name charset and fail loud on any stray
          # key rather than emit a malformed/forged $GITHUB_ENV block.
          if printf '%s' "$DECISION" | jq -e '.env | keys[] | select(test("^[A-Za-z_][A-Za-z0-9_]*$") | not)' >/dev/null 2>&1; then
            echo "::error::.devflow/config.json section '$SECTION' provider '$PROVIDER' has an env-map key that is not a valid environment variable name ([A-Za-z_][A-Za-z0-9_]*). Fix the providers.$PROVIDER.env keys. Refusing to run."
            exit 1
          fi
          # Every $GITHUB_ENV write below uses GitHub's newline-safe multiline (heredoc) form —
          # the scalar endpoint values via genv(), the provider env map via the inline jq heredoc
          # emit at the end — so a config-sourced value carrying an embedded newline cannot split
          # a plain KEY=VALUE line and inject/forge a further job env var. Mirrors the resolver's
          # decision<< output; the timestamped+PID delimiter makes value collision negligible.
          genv() { local d; d="ENV_EOF_$(date +%s%N)_$$"; { printf '%s<<%s\n' "$1" "$d"; printf '%s\n' "$2"; printf '%s\n' "$d"; } >> "$GITHUB_ENV"; }
          # base_url is guaranteed non-empty by the resolver (a provider-active decision
          # fails loud on an empty base_url), so write it unconditionally.
          genv ANTHROPIC_BASE_URL "$BASE_URL"
          if [ -n "$TIMEOUT_MS" ]; then genv API_TIMEOUT_MS "$TIMEOUT_MS"; fi
          # Bearer-token gateways read Authorization from ANTHROPIC_AUTH_TOKEN; the
          # same key also rides as the anthropic_api_key action input below (the
          # documented two-slot recipe). auth: api_key passes it via the input only.
          if [ "$AUTH" = "bearer" ]; then genv ANTHROPIC_AUTH_TOKEN "$PROVIDER_API_KEY"; fi
          # Every key of the provider env map (haiku/subagent model mappings, the
          # beta/attribution toggles, …) verbatim, each as a heredoc block. These are
          # non-secret model/config values (only the API key above is a masked secret).
          edelim="ENV_EOF_$(date +%s%N)_$$"
          printf '%s' "$DECISION" | jq -r --arg d "$edelim" '.env | to_entries[] | "\(.key)<<\($d)", "\(.value)", $d' >> "$GITHUB_ENV"

      # Compose the plugins/plugin_marketplaces inputs (issue #505): the baked
      # baseline (byte-identical across the three call sites — run.sh pins it)
      # PLUS the entries the TRUSTED base-ref .claude/settings.json declares. This
      # review tier checks out the PR HEAD, so the settings file is materialized
      # from the trusted base ref by the baseprovision step into RUNNER_TEMP
      # (compose_settings) — the helper NEVER reads a workspace-relative
      # .claude/settings.json (run.sh negatively pins that). The helper itself
      # runs only from a trusted source (rank 1: base-ref materialized by
      # baseprovision; rank 2: the vendored copy ONLY when vendor_source==fetch,
      # never a committed/self PR-head copy; else fail-closed — baseline +
      # ::warning:: naming the trusted-source rule), per the same rank rules
      # filter-runner-tools.sh follows today.
      - name: Compose plugin inputs (baseline + trusted-base-ref settings-declared)
        id: plugins
        env:
          COMPOSE_SETTINGS: ${{ steps.baseprovision.outputs.compose_settings }}
          COMPOSE_SETTINGS_SOURCE: ${{ steps.baseprovision.outputs.compose_settings_source }}
          COMPOSE_HELPER_DIR: ${{ steps.baseprovision.outputs.compose_helper_dir }}
          COMPOSE_HELPER_SOURCE: ${{ steps.baseprovision.outputs.compose_helper_source }}
          VENDOR_SOURCE: ${{ steps.vendor.outputs.vendor_source }}
        run: |
          set -euo pipefail
          BAKED_PLUGINS="$(printf '%s\n' code-review@claude-plugins-official claude-md-management@claude-plugins-official devflow@devflow-marketplace)"
          BAKED_MARKETPLACES="$(printf '%s\n' https://github.com/anthropics/claude-plugins-official.git ./)"
          _REPO_ROOT="$(git rev-parse --show-toplevel 2>/dev/null || pwd)"
          # Resolve the trusted compose-helper copy, in rank order (mirroring the
          # deny-floor's filter-runner-tools.sh ranks):
          #   1. COMPOSE_HELPER_DIR — base-ref materialized by baseprovision into
          #      RUNNER_TEMP (outside the PR-writable workspace);
          #   2. the vendored copy, ONLY when vendor_source==fetch (a fresh clone at
          #      the pinned devflow_version — never a committed/self PR-head copy);
          #   3. else fail-closed (no trusted helper → baseline + trusted-source-rule
          #      ::warning::, no compose). The PR-head checkout's own copy is
          #      deliberately never consulted.
          HELPER=''
          COMPOSE=''
          if [ -n "${COMPOSE_HELPER_DIR:-}" ] && [ -f "$COMPOSE_HELPER_DIR/resolve-extra-plugins.sh" ] && [ -f "$COMPOSE_HELPER_DIR/describe-plugin-compose.sh" ]; then
            HELPER="$COMPOSE_HELPER_DIR/resolve-extra-plugins.sh"
            COMPOSE="$COMPOSE_HELPER_DIR/describe-plugin-compose.sh"
            echo "plugin-parity compose helper source: trusted base ref (${COMPOSE_HELPER_SOURCE:-base-ref})"
          elif [ "${VENDOR_SOURCE:-}" = "fetch" ] && [ -f "$_REPO_ROOT/.devflow/vendor/devflow/scripts/resolve-extra-plugins.sh" ] && [ -f "$_REPO_ROOT/.devflow/vendor/devflow/scripts/describe-plugin-compose.sh" ]; then
            HELPER="$_REPO_ROOT/.devflow/vendor/devflow/scripts/resolve-extra-plugins.sh"
            COMPOSE="$_REPO_ROOT/.devflow/vendor/devflow/scripts/describe-plugin-compose.sh"
            echo "plugin-parity compose helper source: runtime-fetched vendored copy (pinned devflow_version)"
          fi
          EX_P="$(mktemp)"; EX_M="$(mktemp)"; ERR_P="$(mktemp)"; ERR_M="$(mktemp)"; ENTRIES="$(mktemp)"
          trap 'rm -f "$EX_P" "$EX_M" "$ERR_P" "$ERR_M" "$ENTRIES"' EXIT
          : > "$EX_P"; : > "$EX_M"; : > "$ERR_P"; : > "$ERR_M"
          READ_OUTCOME=ok
          DEFECT=""
          if [ -z "$HELPER" ]; then
            # Fail-closed (no TRUSTED compose helper): emit the baseline only + one
            # ::warning:: naming the trusted-source rule. describe-plugin-compose.sh
            # is absent with the helper, so the warning stays inline.
            echo "::warning::devflow resolve-extra-plugins.sh not found at any TRUSTED source — neither materialized from the base ref (baseprovision) nor runtime-fetched at the pinned devflow_version (vendor_source='${VENDOR_SOURCE:-unknown}'); the PR-head checkout's own copy is deliberately not consulted, because the compose helper must not be PR-editable. Proceeding with the baked plugin baseline. Land the DevFlow re-vendor on the BASE branch (or use a thin install with a pinned devflow_version) so a trusted helper is available (the trusted-source rule, mirroring filter-runner-tools.sh)."
          elif [ "${COMPOSE_SETTINGS_SOURCE:-degraded}" = "degraded" ]; then
            # The trusted base-ref settings read FAILED (fetch failure / git-show
            # error / unreadable file) — distinct from a DEGRADED FILE the helper
            # DID read (describe-plugin-compose.sh arm 3, degraded-only): here the
            # trusted read never produced a file to classify. Route to the
            # trusted-read-failed arm.
            READ_OUTCOME=failed
            DEFECT="trusted base-ref .claude/settings.json read failed (fetch or git-show error)"
          elif [ -n "${COMPOSE_SETTINGS:-}" ] && [ -f "$COMPOSE_SETTINGS" ]; then
            # Trusted settings read succeeded. Run the helper in BOTH modes against
            # the materialized path ONLY (never a workspace .claude/settings.json).
            bash "$HELPER" plugins "$COMPOSE_SETTINGS" > "$EX_P" 2>"$ERR_P" || true
            bash "$HELPER" marketplaces "$COMPOSE_SETTINGS" > "$EX_M" 2>"$ERR_M" || true
          elif [ "${COMPOSE_SETTINGS_SOURCE:-}" = "ok" ]; then
            # baseprovision classified the read 'ok' (the file WAS materialized) but
            # it is not present now (RUNNER_TEMP cleanup, an interleaving step, a
            # race). Do NOT collapse this onto the silent 'absent' baseline below —
            # that would discard the fail-closed intent baseprovision was careful to
            # draw via git cat-file -e (unknown is not zero). Fail closed to the
            # trusted-read-failed arm so the ::warning:: fires instead of silence.
            READ_OUTCOME=failed
            DEFECT="materialized base-ref .claude/settings.json vanished before compose (classified 'ok' but not present)"
          fi
          # 'absent' on base ref (COMPOSE_SETTINGS empty, source 'absent') falls
          # through every branch above: EX_* stay empty, READ_OUTCOME=ok, DEFECT=""
          # → the silent baseline (composed inputs equal the baked baseline, no
          # ::warning::) — the normal consumer case.
          # Join breadcrumbs (bash builtins; guard-class 2 — no cat/tr/sed).
          for f in "$ERR_P" "$ERR_M"; do
            while IFS= read -r line || [ -n "$line" ]; do
              [ -z "$line" ] && continue
              if [ -z "$DEFECT" ]; then DEFECT="$line"; else DEFECT="$DEFECT; $line"; fi
            done < "$f"
          done
          : > "$ENTRIES"
          for f in "$EX_P" "$EX_M"; do
            while IFS= read -r line || [ -n "$line" ]; do
              [ -z "$line" ] && continue
              printf '%s\n' "$line" >> "$ENTRIES"
            done < "$f"
          done
          dedupe() {
            local baseline="$1" extras="$2" seen="" line out=""
            while IFS= read -r line || [ -n "$line" ]; do
              [ -z "$line" ] && continue
              case "$seen" in *"|$line|"*) ;; *) seen="$seen|$line|"; out="${out:+$out$'\n'}$line" ;; esac
            done <<< "$baseline"
            if [ -f "$extras" ]; then
              while IFS= read -r line || [ -n "$line" ]; do
                [ -z "$line" ] && continue
                case "$seen" in *"|$line|"*) ;; *) seen="$seen|$line|"; out="${out:+$out$'\n'}$line" ;; esac
              done < "$extras"
            fi
            printf '%s\n' "$out"
          }
          COMBINED_PLUGINS="$(dedupe "$BAKED_PLUGINS" "$EX_P")"
          COMBINED_MK="$(dedupe "$BAKED_MARKETPLACES" "$EX_M")"
          pdelim="PLG_EOF_$(date +%s%N)_$$"
          { printf 'plugins<<%s\n' "$pdelim"; printf '%s\n' "$COMBINED_PLUGINS"; printf '%s\n' "$pdelim"; } >> "$GITHUB_OUTPUT"
          mdelim="MKT_EOF_$(date +%s%N)_$$"
          { printf 'plugin_marketplaces<<%s\n' "$mdelim"; printf '%s\n' "$COMBINED_MK"; printf '%s\n' "$mdelim"; } >> "$GITHUB_OUTPUT"
          # Annotation — arm classification lives in describe-plugin-compose.sh.
          # The extras were already spliced into $GITHUB_OUTPUT above, so if the
          # renderer exits non-zero (a corrupt/partial COMPOSE copy, a future
          # set -u regression inside it) do NOT swallow it with `|| true`: capture
          # the status and emit an inline fallback ::warning:: so a composed entry
          # is never shipped without SOME audit line (PR #513 "never silent";
          # the run is still never broken — the failure is caught, not propagated).
          if [ -n "$COMPOSE" ] && [ -f "$COMPOSE" ]; then
            if ! bash "$COMPOSE" "$READ_OUTCOME" "$ENTRIES" "$DEFECT"; then
              echo "::warning::describe-plugin-compose.sh failed (rc≠0); extras (if any) were composed into the runner's plugin surface but the audit annotation could not be rendered."
            fi
          elif [ "$READ_OUTCOME" = "failed" ]; then
            # describe-plugin-compose.sh unavailable (no trusted helper) AND the
            # trusted read failed — emit the trusted-read-failed warning inline so
            # the observable-output arm is not silently dropped.
            echo "::warning::Could not read the trusted base-ref .claude/settings.json; base-declared plugins were not composed this run — proceeding with the baked baseline."
          fi

      # Resolve the two DEFAULT-OFF git-env pin flags and export the enabled ones
      # (issue #645). Both keys default to false, so on a stock consumer this step
      # emits NOTHING and neither GIT_DIR nor GIT_WORK_TREE is present in the
      # action's environment — the pre-#643 behavior, which is the configuration
      # that works everywhere. #643 set both unconditionally so configureGitAuth
      # would resolve the repo on a self-hosted Windows runner (issue #602), but
      # GIT_WORK_TREE also reaches the Claude Code CLI subprocess that installs
      # plugins, where it makes `git clone` refuse an existing working tree — so
      # every run died at plugin install with `fatal: working tree '<path>'
      # already exists.`, before the agent did any work, producing no verdict at
      # all. The helper is now the SINGLE producer of both variables; the action
      # step below deliberately carries neither in its own `env:` block.
      #
      # TRUSTED SOURCE ONLY — this is a security boundary. This job checks out the
      # PR HEAD, and the helper's stdout is appended to `$GITHUB_ENV` in a
      # token-bearing job, so the helper is executed only from the copy
      # `baseprovision` materialized out of the base ref into RUNNER_TEMP (rank 1),
      # or from the vendored copy when the vendor step reports
      # `vendor_source == fetch` — a fresh clone of the official repo at the pinned
      # devflow_version (rank 2). Otherwise this step FAILS CLOSED: it emits
      # nothing and warns. The PR-head checkout's own copy is never consulted, and
      # the keys themselves are read from the trusted base-ref config, so a pull
      # request author can neither make the helper write assignments into the
      # reviewer's job environment nor enable a key that would suppress its own
      # review.
      #
      # JOB-SCOPED, not step-scoped: `$GITHUB_ENV` appends assignments and offers
      # no removal verb, and the empty-value form that would approximate one is
      # measured fatal (`GIT_DIR=` → `fatal: not a git repository: ''`), which is
      # precisely why the mechanism is an append rather than an `env:` expression
      # (GitHub's workflow syntax accepts no expression evaluating to a whole
      # `env:` mapping, so a variable's KEY cannot be made conditionally absent
      # there). So an enabled variable is in force for `Run Claude Code` AND every
      # step after it.
      - name: Resolve git-env pins
        env:
          # The TRUSTED base-ref config baseprovision materialized — never the
          # PR-head checkout. That is what makes these keys post-merge-only and
          # makes a key set only in a PR head inert on this tier.
          DEVFLOW_GITENV_CONFIG_JSON: ${{ steps.baseprovision.outputs.config_json }}
          DEVFLOW_GITENV_HELPER_DIR: ${{ steps.baseprovision.outputs.gitenv_helper_dir }}
          DEVFLOW_GITENV_VENDOR_SOURCE: ${{ steps.vendor.outputs.vendor_source }}
          DEVFLOW_GITENV_WORKSPACE: ${{ github.workspace }}
        run: |
          set -uo pipefail
          HELPER=''
          if [ -n "$DEVFLOW_GITENV_HELPER_DIR" ] && [ -f "$DEVFLOW_GITENV_HELPER_DIR/emit-git-env.sh" ]; then
            HELPER="$DEVFLOW_GITENV_HELPER_DIR/emit-git-env.sh"
          elif [ "$DEVFLOW_GITENV_VENDOR_SOURCE" = 'fetch' ] && [ -f '.devflow/vendor/devflow/scripts/emit-git-env.sh' ]; then
            HELPER='.devflow/vendor/devflow/scripts/emit-git-env.sh'
          fi
          if [ -z "$HELPER" ]; then
            echo "::warning::devflow git-env pins: no TRUSTED copy of emit-git-env.sh is available — neither materialized from the base ref (baseprovision) nor runtime-fetched at the pinned devflow_version (vendor_source='${DEVFLOW_GITENV_VENDOR_SOURCE:-unknown}'). The PR-head checkout's own copy is deliberately not consulted, because a PR author must not be able to write assignments into the reviewer's job environment. Failing closed: neither GIT_DIR nor GIT_WORK_TREE is exported (which is also the working default)."
            exit 0
          fi
          CFG="${RUNNER_TEMP}/devflow-gitenv-config.json"
          if ! printf '%s' "$DEVFLOW_GITENV_CONFIG_JSON" > "$CFG" 2>/dev/null; then
            echo "::warning::devflow git-env pins: could not materialize the trusted base-ref config into RUNNER_TEMP; failing open to the working default (neither variable exported)."
            exit 0
          fi
          bash "$HELPER" --workspace "$DEVFLOW_GITENV_WORKSPACE" --config-file "$CFG" --tier review >> "$GITHUB_ENV"

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          # Anthropic-default path only: pass the OAuth token when no provider is
          # active. A provider-routed devflow_runner section passes '' here (the
          # action treats empty as absent) and authenticates via anthropic_api_key
          # below (issue #313).
          claude_code_oauth_token: ${{ steps.provider.outputs.provider == '' && secrets.CLAUDE_CODE_OAUTH_TOKEN || '' }}
          # Provider path only: the fixed DEVFLOW_PROVIDER_API_KEY secret (inherited
          # from devflow-review.yml via `secrets: inherit`) satisfies the action's
          # launch check and, for bearer auth, is ALSO exported as ANTHROPIC_AUTH_TOKEN
          # by the inject step. Empty on the default path.
          anthropic_api_key: ${{ steps.provider.outputs.provider != '' && secrets.DEVFLOW_PROVIDER_API_KEY || '' }}
          # Pass an explicit token so the action skips its OIDC → app-token
          # exchange, which 401s for jobs running inside a reusable
          # workflow_call from pull_request_target (anthropics/
          # claude-code-action#443, #721). With the opt-in DevFlow-Reviewer App
          # configured the token is the minted, downscoped DevFlow-Reviewer token
          # above (review posts are attributed to `DevFlow-Reviewer[bot]`, a
          # non-author identity); otherwise it is the workflow's own GITHUB_TOKEN
          # and posts show `github-actions[bot]`. Never the primary
          # `devflow-autopilot` App token — the review path must not share the
          # PR-authoring identity (issue #300).
          github_token: ${{ steps.reviewer-token.outputs.token || secrets.GITHUB_TOKEN }}
          allowed_bots: ${{ steps.extract.outputs.allowed_bots }}

          additional_permissions: |
            actions: read

          prompt: ${{ steps.compose.outputs.prompt }}

          # Composed by the `Compose plugin inputs` step above (issue #505): the
          # baked baseline (byte-identical across the three call sites — run.sh
          # pins it; kept in sync with devflow.yml's `command` job and
          # devflow-implement.yml so the bare-command and automated-runner paths
          # resolve identical skill/plugin versions) PLUS the entries the trusted
          # base-ref .claude/settings.json declares.
          plugin_marketplaces: ${{ steps.plugins.outputs.plugin_marketplaces }}

          # code-review@ and claude-md-management@ are ambient-command conveniences (the
          # /code-review and /revise-claude-md slash commands), NOT engine dependencies —
          # DevFlow's engine dispatches neither. The "zero companion-plugin dependencies"
          # claim is scoped to the consumer install + what the engine dispatches; see
          # docs/DEVFLOW_SYSTEM_OVERVIEW.md §6. devflow@ is DevFlow itself. The baked
          # baseline three are composed by the step above; settings-declared extras are
          # appended beyond them.
          plugins: ${{ steps.plugins.outputs.plugins }}

          # --permission-mode acceptEdits does NOT widen an explicit --allowed-tools
          # list: the allowlist is a separate, stricter gate, and a command absent
          # from it is denied no matter what the permission mode auto-approves. So a
          # command the "review" profile needs must be granted in TOOLS above —
          # acceptEdits is never a substitute (issue #363; the observed `Write` denial
          # under this very flag is the proof). Kept for precedent-matching with
          # prompt-mode invocations and for future profiles.
          # claude_args head is a COMPUTED string (steps.cargs): --model always,
          # --effort conditional on effort_supported (issue #313). --model now comes
          # from the provider resolver (the dead `model` input was removed). The
          # --permission-mode / --allowed-tools tail is preserved verbatim.
          # Optional pre-installed Claude Code executable (issue #601): sourced ONLY
          # from the trusted base-ref config (steps.baseprovision), never a PR-head
          # config — this write-token job executes the resolved path (see the
          # extraction step for the full ACE-boundary rationale). Empty (the default)
          # is the empty-as-absent idiom of claude_code_oauth_token above: auto-install.
          path_to_claude_code_executable: ${{ steps.baseprovision.outputs.claude_code_executable }}
          claude_args: >-
            ${{ steps.cargs.outputs.args }}
            --permission-mode acceptEdits
            --allowed-tools "${{ steps.tools.outputs.tools }}"

      # Surface whether the Claude execution ended in error so a caller's
      # finalize step can distinguish "review completed to a verdict" from
      # "engine stopped short" — the review JOB result is `success` in BOTH
      # cases (claude-code-action wraps the errored execution), so the job
      # result alone hides an incomplete review (issue #249). always() so this
      # runs even when the review step reports failure; the value is only
      # consumed on the success path, where a `true` here means the job
      # succeeded yet the engine ended in error — which the consumer treats
      # as no verdict for HEAD.
      - name: Surface review-engine execution result
        id: engine
        if: always()
        env:
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          set -euo pipefail
          # Parse is_error from claude-code-action's execution log via the
          # extracted, unit-tested helper (lib/test/run.sh) rather than an inline
          # jq, so the array/object/fail-safe branches are actually verified.
          # Prefer the vendored copy (present in this job after vendor-plugin ran);
          # fall back to the repo path for a self-repo checkout. If neither
          # resolves, default false (fail-safe — finalize_check's HEAD-SHA scoping
          # is the primary staleness guard).
          PEE=.devflow/vendor/devflow/scripts/parse-engine-error.sh
          [ -f "$PEE" ] || PEE=scripts/parse-engine-error.sh
          if [ -f "$PEE" ]; then
            # Let the helper's stderr breadcrumbs (e.g. a resolve-jq.sh sourcing
            # failure) flow to the Actions job log — never 2>/dev/null them, or a
            # broken jq silently reports is_error=false forever with zero trace.
            # The helper always exits 0, so `|| echo false` is belt-and-suspenders.
            IS_ERROR=$(bash "$PEE" "${EXECUTION_FILE:-}" || echo false)
            # Normalize to a single validated token: the helper's contract is one
            # true/false line, but if it ever emitted partial stdout AND failed,
            # the `|| echo false` above would append a second line and write a
            # stray non-key=value line into GITHUB_OUTPUT. Anything not exactly
            # "true" reads as false (the fail-safe direction).
            [ "$IS_ERROR" = "true" ] || IS_ERROR=false
          else
            echo "::notice::parse-engine-error.sh absent; treating engine is_error as false (fail-safe)."
            IS_ERROR=false
          fi
          echo "is_error=$IS_ERROR" >> "$GITHUB_OUTPUT"

      # Surface the claude-code-action run's execution diagnostics (run summary +
      # permission-denial detail) to the job log and $GITHUB_STEP_SUMMARY so a
      # maintainer debugging a stalled / incomplete / unexpectedly-denied cloud
      # run sees the denial detail and run shape directly — the exact information
      # that was irrecoverable for PR #325 (issue #331; helper + config key
      # shipped in #329). Read-only: the helper always exits 0, this step adds no
      # permissions grant / minted-token scope and uploads no artifact, so it
      # never changes the job's pass/fail. always() (alongside the engine-error
      # step above, same steps.claude.outputs.execution_file) so it runs even
      # when the claude step errored — which is exactly when the diagnostics
      # matter. Gated on .devflow.execution_diagnostics_enabled (default true)
      # via the vendored config-get.sh (repo-path fallback for a self-repo
      # checkout); only the exact string "false" disables it, and an empty read
      # (config-get soft/hard failure) falls safe to enabled.
      - name: Surface execution diagnostics
        id: diagnostics
        if: always()
        env:
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          set -euo pipefail
          CG=.devflow/vendor/devflow/scripts/config-get.sh
          [ -f "$CG" ] || CG=scripts/config-get.sh
          # `|| true` so config-get's hard-fail exit (malformed config.json / missing
          # python3) can't abort this step under GitHub's default `-e` run shell — which
          # would fail the job and break the "never changes the job's pass/fail" contract
          # above. The empty read then falls safe to enabled on the next line. (Mirrors the
          # engine-error step's `|| echo false` assignment guard.)
          ENABLED="$("$CG" .devflow.execution_diagnostics_enabled true || true)"
          [ -n "$ENABLED" ] || ENABLED=true
          # Exported so the transcript steps below can gate without re-reading config
          # from a `uses:` step that cannot run shell. The transcript artifact has its
          # OWN key with the OPPOSITE polarity: default FALSE and fail-CLOSED on any
          # config-read failure — a transcript can carry an env dump (Bash(env:*) is
          # granted), and a consumer must opt in to publishing that as an artifact;
          # only the exact string "true" enables it.
          echo "enabled=$ENABLED" >> "$GITHUB_OUTPUT"
          TRANSCRIPT="$("$CG" .devflow.execution_transcript_artifact_enabled false || true)"
          [ "$TRANSCRIPT" = "true" ] || TRANSCRIPT=false
          echo "transcript=$TRANSCRIPT" >> "$GITHUB_OUTPUT"
          if [ "$ENABLED" = "false" ]; then
            echo "execution diagnostics: disabled via .devflow.execution_diagnostics_enabled=false; skipping."
            exit 0
          fi
          SED=.devflow/vendor/devflow/scripts/surface-execution-diagnostics.sh
          [ -f "$SED" ] || SED=scripts/surface-execution-diagnostics.sh
          if [ -f "$SED" ]; then
            # `|| echo ::notice::` for the same reason as the config-get guard above:
            # the helper's always-exit-0 contract holds for the committed file, but a
            # partial-copy / truncated vendored helper (a documented deployment hazard)
            # could exit non-zero, which under GitHub's default `-e` run shell would
            # abort this always() step and fail the job. Guard it so the read-only
            # "never changes the job's pass/fail" contract holds even then.
            bash "$SED" "${EXECUTION_FILE:-}" || echo "::notice::surface-execution-diagnostics.sh exited non-zero; execution diagnostics unavailable (best-effort)."
          else
            echo "::notice::surface-execution-diagnostics.sh absent; execution diagnostics not surfaced (best-effort)."
          fi

      # Preserve the engine's full execution transcript as a run artifact (issue #401
      # follow-up). Three no-verdict review runs ended on a VOLUNTARY final message
      # (subtype success, mid-phase) that nobody could ever read — the execution file
      # dies with the runner, so every stall diagnosis so far has been inference from
      # denial counts. Recording it turns the next stall from a guess into a read.
      # Gated by its OWN opt-in key `devflow.execution_transcript_artifact_enabled`
      # (default FALSE, fail-closed — resolved in the diagnostics step above), NOT the
      # default-on diagnostics gate: a consumer repo must never start publishing
      # transcripts merely by upgrading. The scrub pass redacts token-shaped strings
      # (the review profile grants Bash(env:*), so a transcript can contain a dumped
      # environment) before anything becomes an artifact; the scrub is a blocklist and
      # inherently incomplete for third-party credential shapes — another reason the
      # key is opt-in. Fail-closed — a scrub failure uploads nothing.
      - name: Scrub execution transcript for upload
        id: scrub_transcript
        if: always() && steps.diagnostics.outputs.transcript == 'true' && steps.claude.outputs.execution_file != ''
        env:
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          set -euo pipefail
          OUT="$RUNNER_TEMP/claude-execution-scrubbed.json"
          if [ ! -f "$EXECUTION_FILE" ]; then
            echo "::notice::execution file absent; no transcript to preserve."
            exit 0
          fi
          # Redact common credential shapes: GitHub App/installation/classic/fine-grained
          # tokens, Anthropic keys, and Authorization headers (both the Bearer form and
          # the base64 basic-auth form the checkout persists — `AUTHORIZATION: basic
          # <base64(x-access-token:<token>)>`, issue #409 item 4). The header NAME is
          # matched case-INSENSITIVELY via an explicit per-letter class — actions/checkout's
          # git-auth-helper persists the extraheader as UPPERCASE `AUTHORIZATION:`, so a
          # case-sensitive `Authorization` literal would miss the real persisted header and
          # leak its base64 token. sed -E only (no GNU flags — `I` is GNU-only), so the class
          # replaces the GNU case-insensitive flag portably. Scrub to $OUT first, then gate
          # on non-emptiness and prepend the caveat.
          if sed -E \
            -e 's/gh[pousr]_[A-Za-z0-9_]{20,}/[REDACTED-GH-TOKEN]/g' \
            -e 's/github_pat_[A-Za-z0-9_]{20,}/[REDACTED-GH-PAT]/g' \
            -e 's/sk-ant-[A-Za-z0-9_-]{20,}/[REDACTED-ANTHROPIC-KEY]/g' \
            -e 's/([Aa][Uu][Tt][Hh][Oo][Rr][Ii][Zz][Aa][Tt][Ii][Oo][Nn][":[:space:]]*)[Bb]earer [A-Za-z0-9._~+\/=-]+/\1Bearer [REDACTED]/g' \
            -e 's/([Aa][Uu][Tt][Hh][Oo][Rr][Ii][Zz][Aa][Tt][Ii][Oo][Nn][":[:space:]]*)[Bb]asic [A-Za-z0-9+\/=]+/\1basic [REDACTED]/g' \
            "$EXECUTION_FILE" > "$OUT"; then
            # Item 3: advertise a path only when the scrubbed output is non-empty — an
            # empty execution file scrubs to an empty $OUT, which is not worth uploading.
            if [ -s "$OUT" ]; then
              # Item 2: the scrub is a best-effort BLOCKLIST covering four credential
              # shapes and is inherently incomplete for third-party shapes. State that
              # on the log AND prepend it into the artifact itself. The caveat prepend
              # goes through the SAME guarded write path that fails closed: a header
              # write failure must NOT leave an unscrubbed/half-written file advertised
              # for upload (issue #409 item 2 gotcha).
              # One source of truth for the four redacted shapes, interpolated into both
              # the artifact caveat and the log warning so they cannot drift. "Four shapes"
              # counts the four comma-separated families below (GitHub tokens/PATs is one
              # family spanning the two `gh[pousr]_`/`github_pat_` sed rules), so the five
              # sed -E rules above map to these four named shapes.
              SHAPES="GitHub tokens/PATs, Anthropic keys, Bearer Authorization headers, and basic Authorization headers"
              # DEFERRED (#409 review, Suggestion, below the `important` fix threshold):
              # prepending this `#`-comment caveat as line 1 makes the `.json`-named
              # artifact non-parseable JSON. Deliberate for the CURRENT human
              # stall-diagnosis purpose (a person reads the transcript; the caveat must
              # be the first thing they see). Revisit ONLY if an automated `jq`/JSON
              # consumer of this artifact is introduced — then move the caveat into an
              # upload-step annotation or a sidecar `.txt` and keep the payload valid JSON.
              CAVEAT="# DEVFLOW SCRUB CAVEAT: best-effort blocklist redacted four credential shapes ($SHAPES). This blocklist is INCOMPLETE — other third-party credential shapes may remain. Treat this artifact as sensitive."
              echo "::warning::transcript scrub is a best-effort blocklist covering four credential shapes ($SHAPES); it is INCOMPLETE for third-party credential shapes — treat the uploaded artifact as sensitive."
              HDR="$OUT.hdr"
              if { printf '%s\n' "$CAVEAT" > "$HDR" && cat "$OUT" >> "$HDR" && mv "$HDR" "$OUT"; }; then
                echo "path=$OUT" >> "$GITHUB_OUTPUT"
              else
                rm -f "$HDR"
                echo "::warning::transcript caveat-header write failed; NOT uploading the transcript (fail-closed)."
              fi
            else
              echo "::notice::scrubbed transcript is empty; nothing to preserve (no upload)."
            fi
          else
            echo "::warning::transcript scrub failed; NOT uploading the unscrubbed execution file (fail-closed)."
          fi

      - name: Upload execution transcript artifact
        if: always() && steps.scrub_transcript.outputs.path != ''
        uses: actions/upload-artifact@v4
        with:
          name: claude-execution-transcript-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ steps.scrub_transcript.outputs.path }}
          retention-days: 7
          if-no-files-found: ignore

      # Issue #489 (AC2): hand the read-only review tier's STAGED telemetry to the trusted
      # pusher. On this `contents: read` PR-head job, `--persist` runs staging-only (it left
      # its records under gitignored `.devflow/tmp/telemetry-stage-*/.devflow/logs/…` and
      # pushed nothing — see the TOOLS comment above). This job cannot push them (no write
      # credential, and it must not gain one — it checks out the PR head). So it CONSOLIDATES
      # every staged `.devflow/logs` subtree into one deterministic dir and uploads it as a
      # workflow artifact; the trusted `telemetry-push.yml` job (triggered via `workflow_run`)
      # downloads it, validates it as untrusted input, and pushes it. The step is naturally
      # scoped to the staging-only tier: a writable tier's `--persist` returns clean (rc 0)
      # and DELETES its staging root, so there is nothing to collect there.
      - name: Collect staged telemetry artifacts
        id: collect_telemetry
        if: always()
        run: |
          set -uo pipefail
          dest="${RUNNER_TEMP:-/tmp}/devflow-telemetry-artifact"
          # The collection logic lives in a suite-tested helper (best-effort; the trusted pusher
          # re-validates every entry all-or-nothing, so a collection miss cannot reach the branch).
          # Capture the helper's stdout AND its exit status in the SAME statement (the `_collect_rc`
          # capture below): the helper is contracted to ALWAYS exit 0, so a non-zero rc is a genuine EXEC FAULT —
          # rc 126 (present but not executable) / 127 (not found), i.e. a partial or path-skewed
          # deployment where the helper itself could not run — NOT an empty result. That fault must
          # be named distinctly (mirroring the sibling telemetry-push-artifact.sh's rc-126/127
          # discipline), never laundered into the benign no-op notice: gating on stdout alone would
          # make a real telemetry drop indistinguishable from a clean no-op (the notice even claims
          # to cover "the helper reported a collection failure above," which an exec fault — the
          # helper never running — can never reach). This rc dispatch must stay INLINE here (not in
          # a further helper): it is precisely the collect helper's OWN non-existence it detects, so
          # it cannot itself be delegated to a script that could be equally absent.
          _collect_rc=0
          # Prefer the vendored collect helper (materialized by the vendor-plugin step
          # above at .devflow/vendor/devflow/); fall back to the repo-root path for a
          # self-repo checkout — mirrors parse-engine-error.sh's vendored-or-repo
          # resolution. A consumer repo has no repo-root scripts/, so the bare
          # repo-relative path was absent there and this step hit rc 127 on every
          # consumer auto-review — the spurious "deployment fault" ::warning:: below
          # (issue #502). Preferring the vendored path fixes that; the rc-126/127 guard
          # now fires only on a genuine double-absence (a real vendor fault). Direct
          # exec (not `bash`) keeps rc 126 reachable, matching the S1 rc-capture contract.
          _collect_helper=.devflow/vendor/devflow/scripts/collect-staged-telemetry.sh
          [ -f "$_collect_helper" ] || _collect_helper=scripts/collect-staged-telemetry.sh
          _collect_out="$("$_collect_helper" "$GITHUB_WORKSPACE" "$dest")" || _collect_rc=$?
          if [ "$_collect_rc" = 126 ] || [ "$_collect_rc" = 127 ]; then
            echo "::warning::collect staged telemetry: the collect helper ($_collect_helper) could not be executed (rc $_collect_rc — not found or not executable, a partial or path-skewed deployment); NO telemetry uploaded this run. This is a deployment fault, not an empty run — do NOT read it as 'nothing was staged'."
          elif [ -n "$_collect_out" ]; then
            echo "path=$dest" >> "$GITHUB_OUTPUT"
          else
            # No upload tree. The helper emits its OWN distinct ::warning:: when records
            # existed but every copy failed, so this generic notice must NOT assert
            # "nothing was staged" as fact — it covers only the true no-op cases.
            echo "::notice::no telemetry artifact to upload this run (writable tier pushed directly, nothing was staged, or the helper reported a collection failure above)."
          fi

      - name: Upload staged telemetry artifacts
        if: always() && steps.collect_telemetry.outputs.path != ''
        uses: actions/upload-artifact@v4
        with:
          # A stable, run-scoped name the trusted pusher downloads by run id via `workflow_run`.
          name: devflow-telemetry-stage-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ steps.collect_telemetry.outputs.path }}
          # LOAD-BEARING: the entire collected tree lives under the DOT-prefixed `.devflow/`,
          # and actions/upload-artifact@v4 EXCLUDES hidden files by default (include-hidden-files
          # defaults to 'false' since v4.4.0). Without this the upload would match nothing and the
          # whole relay would silently transfer zero telemetry (a no-op with no error). The store-
          # relative `.devflow/logs/…` paths are load-bearing for the validator allowlist and
          # telemetry-branch.sh, so keeping the hidden root + this flag is the correct fix.
          include-hidden-files: true
          retention-days: 3
          if-no-files-found: ignore
