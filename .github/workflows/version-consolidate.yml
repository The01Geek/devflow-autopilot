name: Version consolidate

# Merge-time versioning. DevFlow versions itself with changesets (see .changeset/README.md):
# each PR adds a uniquely-named .changeset/*.md instead of editing plugin.json / CHANGELOG.md,
# so concurrent PRs never conflict on those two hot spots. When a PR merges to main, this job
# consolidates every pending changeset into ONE version bump + CHANGELOG entry and commits it
# back to main with a `chore: bump version` subject.
#
# This job commits a version bump back to main, so branch protection on `main` (the required
# `lib + python tests` check) must permit its write-scoped bump commit. Editing any file under
# `.github/workflows/` needs a `workflows`-scoped push — the DevFlow bot's installation token
# lacks it, so workflow changes land via a human/PAT, not an agent run. Content-pinned by
# lib/test/run.sh.
on:
  push:
    branches: [main]

# Least privilege: the job only needs to push the bump commit to main.
permissions:
  contents: write

# Serialize runs so two near-simultaneous merges to main don't consolidate from stale
# tips in parallel (cancel-in-progress: false queues rather than drops — every merge is
# still processed). The reset-and-retry loop in the consolidate step is the real
# correctness guard; this just avoids redundant concurrent work.
concurrency:
  group: version-consolidate
  cancel-in-progress: false

jobs:
  consolidate:
    name: Consolidate changesets
    runs-on: ubuntu-latest
    # Self-trigger guard: the bump commit this job creates is itself a push to main. Skip
    # when the head commit is our own `chore: bump version` commit so the job never loops.
    # (A run with no pending changesets is already a clean no-op via the porcelain guard
    # below; this `if` just avoids even booting the runner for the bump commit's own push.)
    if: "${{ !startsWith(github.event.head_commit.message, 'chore: bump version') }}"
    steps:
      # Mint a DevFlow App installation token to push the bump commit. The default
      # GITHUB_TOKEN cannot bypass main's required-checks ruleset (GitHub rejects the
      # first-party github-actions app as a bypass actor — "must be part of the ruleset
      # source or owner organization"), so a direct `git push origin HEAD:main` with it is
      # declined (GH013). The DevFlow App IS a valid org integration and is added to the
      # ruleset's bypass list, so its token's push is exempt. Same client-id/private-key pair
      # the other DevFlow cloud workflows mint from. (#294 post-merge follow-up.)
      - name: Mint DevFlow App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.DEVFLOW_APP_ID }}
          private-key: ${{ secrets.DEVFLOW_APP_PRIVATE_KEY }}
          permission-contents: write

      - uses: actions/checkout@v6
        with:
          # Fetch enough history that the commit lands on a real main tip.
          fetch-depth: 0
          # Persist the App token as the git remote credential so the consolidate step's
          # `git push origin HEAD:main` authenticates as the DevFlow App (the bypass actor),
          # not the default GITHUB_TOKEN.
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: python3 -m pip install --quiet pyyaml

      - name: Consolidate changesets and commit the version bump
        # Reset to the freshest main and (re)consolidate on every attempt, so a run that was
        # queued/checked-out behind a concurrent merge always consolidates the CURRENT set of
        # pending changesets from the real main tip — no changeset is ever left behind and the
        # push is a fast-forward. If the push still loses a race, reset to the new tip and
        # retry (the consolidator is idempotent — it re-reads whatever is pending now).
        #
        # `consolidate-changesets.py` fails loud (non-zero, naming the file) on a malformed
        # changeset, so the step goes red rather than silently skipping it or defaulting the
        # version; with no pending changesets it is a clean no-op (no commit, exit 0). The
        # explicit strict-shell mode (`set -e -u -o pipefail`) plus the
        # `if python3 …; then :; else … exit 1; fi` exit-status check make that fail-loud
        # explicit rather than relying on the runner's
        # implicit default shell: the consolidator fails *closed* (no writes on a malformed
        # changeset → clean tree), so without the explicit check a fall-through would hit the
        # clean-tree guard below and exit 0 green, inverting the contract. The
        # subject prefix `chore: bump version` is a load-bearing contract with docs-release-notes
        # Step 4b (kept verbatim; pinned in lib/test/run.sh). Staging is explicit (never
        # `git add -A`) so only the consolidation's own outputs land on main.
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            if python3 scripts/consolidate-changesets.py; then :; else
              echo "::error::consolidator failed"
              exit 1
            fi
            if [ -z "$(git status --porcelain)" ]; then
              echo "No pending changesets consolidated — nothing to commit."
              exit 0
            fi
            # Coupled site of scripts/consolidate-changesets.py's write-set: every file the
            # consolidator writes must be staged here, or its edit is silently discarded by the
            # next attempt's `git reset --hard origin/main`. Deliberately explicit (never
            # `git add -A`). lib/test/run.sh pins this list against the consolidator's writes.
            git add .claude-plugin/plugin.json .claude-plugin/marketplace.json CHANGELOG.md CITATION.cff .changeset
            git commit -m "chore: bump version (consolidate changesets)"
            if git push origin HEAD:main; then
              echo "Pushed version bump on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (main advanced); resetting and retrying (attempt $attempt)."
          done
          echo "::error::could not push the version bump after 5 attempts (main kept advancing)"
          exit 1
