name: Version consolidate

# Merge-time versioning. DevFlow versions itself with changesets (see .changeset/README.md):
# each PR adds a uniquely-named .changeset/*.md instead of editing plugin.json / CHANGELOG.md,
# so concurrent PRs never conflict on those two hot spots. When a PR merges to main, this job
# consolidates every pending changeset into ONE version bump + CHANGELOG entry and commits it
# back to main with a `chore: bump version` subject.
#
# INSTALLED at .github/workflows/version-consolidate.yml by #294 — a maintainer with `workflows`
# permission ran the `git mv` from its former `ci/version-consolidate.yml` staging path. It was
# staged outside `.github/workflows/` because the DevFlow bot's installation token cannot push a
# file there without the `workflows` permission; the YAML is authored, reviewed, and content-
# pinned by lib/test/run.sh. Branch protection on `main` (the required `lib + python tests`
# check) must permit this job's write-scoped bump commit.
on:
  push:
    branches: [main]

# Least privilege: the job only needs to push the bump commit to main.
permissions:
  contents: write

# Serialize runs so two near-simultaneous merges to main don't consolidate from stale
# tips in parallel (cancel-in-progress: false queues rather than drops — every merge is
# still processed). The reset-and-retry loop in the consolidate step is the real
# correctness guard; this just avoids redundant concurrent work.
concurrency:
  group: version-consolidate
  cancel-in-progress: false

jobs:
  consolidate:
    name: Consolidate changesets
    runs-on: ubuntu-latest
    # Self-trigger guard: the bump commit this job creates is itself a push to main. Skip
    # when the head commit is our own `chore: bump version` commit so the job never loops.
    # (A run with no pending changesets is already a clean no-op via the porcelain guard
    # below; this `if` just avoids even booting the runner for the bump commit's own push.)
    if: "${{ !startsWith(github.event.head_commit.message, 'chore: bump version') }}"
    steps:
      - uses: actions/checkout@v6
        with:
          # Fetch enough history that the commit lands on a real main tip.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: python3 -m pip install --quiet pyyaml

      - name: Consolidate changesets and commit the version bump
        # Reset to the freshest main and (re)consolidate on every attempt, so a run that was
        # queued/checked-out behind a concurrent merge always consolidates the CURRENT set of
        # pending changesets from the real main tip — no changeset is ever left behind and the
        # push is a fast-forward. If the push still loses a race, reset to the new tip and
        # retry (the consolidator is idempotent — it re-reads whatever is pending now).
        #
        # `consolidate-changesets.py` fails loud (non-zero, naming the file) on a malformed
        # changeset, so the step goes red rather than silently skipping it or defaulting the
        # version; with no pending changesets it is a clean no-op (no commit, exit 0). The
        # `|| exit 1` on the invocation makes that fail-loud explicit rather than relying on
        # the runner's implicit `set -e`: the consolidator fails *closed* (no writes on a
        # malformed changeset → clean tree), so without the explicit exit a fall-through would
        # hit the clean-tree guard below and exit 0 green, inverting the contract. The
        # subject prefix `chore: bump version` is a load-bearing contract with docs-release-notes
        # Step 4b (kept verbatim; pinned in lib/test/run.sh). Staging is explicit (never
        # `git add -A`) so only the consolidation's own outputs land on main.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            python3 scripts/consolidate-changesets.py || exit 1
            if [ -z "$(git status --porcelain)" ]; then
              echo "No pending changesets consolidated — nothing to commit."
              exit 0
            fi
            git add .claude-plugin/plugin.json CHANGELOG.md .changeset
            git commit -m "chore: bump version (consolidate changesets)"
            if git push origin HEAD:main; then
              echo "Pushed version bump on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (main advanced); resetting and retrying (attempt $attempt)."
          done
          echo "::error::could not push the version bump after 5 attempts (main kept advancing)"
          exit 1
