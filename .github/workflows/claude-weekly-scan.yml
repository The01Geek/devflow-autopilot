name: Weekly Maintenance Scan
on:
  schedule:
    - cron: "0 0 * * 0" # Every Sunday at midnight
  workflow_dispatch: # Manual trigger option

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.config.outputs.enabled }}
      claude_model: ${{ steps.config.outputs.claude_model }}
    steps:
      - uses: actions/checkout@v4
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Read config
        id: config
        run: |
          CONFIG=".github/project-config.yml"
          echo "enabled=$(yq '.workflows["claude-weekly-scan"]' "$CONFIG")" >> "$GITHUB_OUTPUT"
          echo "claude_model=$(yq '.claude_model' "$CONFIG")" >> "$GITHUB_OUTPUT"

  maintenance:
    needs: config
    if: needs.config.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}

            Perform monthly repository maintenance:

            1. Check for outdated dependencies in package.json
            2. Scan for security vulnerabilities using `npm audit`
            3. Check for TODO comments in recent commits

            Create a single issue summarizing any findings and instructions on addressing the critical finding.

          claude_args: >-
            --allowed-tools
            "Read,Write,Glob,Grep,Bash(npm:*),Bash(gh issue:*),Bash(gh pr:*),Bash(git:*)"
