name: Agents seam probe

# Permanent, empirical probe of the CLOUD per-agent-effort *seam* (issue #610,
# carried from #554). #554/#606/#630 shipped the honest per-agent effort FALLBACK
# reporting and the observability telemetry, and deliberately deferred the
# spike-gated *applied arm* — composing a resolved per-agent effort into a
# process-start `--agents` agent-definition the platform reads at launch — because it
# rests on two `anthropics/claude-code-action@v1` integration facts that are NOT
# documentation-verified and have no in-repo precedent, so they must be proven by an
# empirical spike in the real cloud action before any applied-arm code ships.
#
# The two facts this probe establishes:
#   (i)  claude-code-action FORWARDS a startup `--agents` JSON supplied via
#        `claude_args` at process launch — so a custom `subagent_type` defined ONLY
#        in that block is dispatchable. Deterministically measurable: the probe's
#        agent-definition makes the subagent emit a distinctive seam marker
#        (`SEAM_PROBE_FORWARDED_OK`), which can appear only if the `--agents` block was
#        forwarded and the type recognized.
#   (ii) an `effort` set on that startup agent-definition GOVERNS the reasoning effort
#        of a runtime Agent-tool dispatch of that `subagent_type`. NOT deterministically
#        measurable — effort is not a harness-recorded field — so the only signal is the
#        subagent's own self-report (`SEAM_PROBE_EFFORT=<effort>`), which a HUMAN must
#        adjudicate (the same human-dispatch, human-adjudicated model matcher-probe.yml
#        uses). The session runs at `--effort high` while the agent-definition sets
#        `effort: low`, so a self-report of `low` is the fact-(ii) evidence.
#
# The verdict is computed DETERMINISTICALLY from the action's execution file by the
# unit-tested helper scripts/agents-seam-probe-verdict.py (extracted so every arm is
# driven by lib/test/run.sh, same rationale as scripts/schedulewakeup-probe-verdict.py,
# #415). The model's own text output is NEVER the measurement. Verdict → decision:
#   SEAM_PROVEN    (both facts; requires the human --adjudicated-governed flag) → SHIP
#                  the applied arm and flip the cloud per-agent row off honest fallback.
#   SEAM_FORWARDED (fact i proven, fact ii pending human adjudication) → DO NOT SHIP.
#   SEAM_UNPROVEN  (--agents not forwarded) → DO NOT SHIP; honest fallback stays.
#   INCONCLUSIVE   (nothing measured) → re-run.
# Until a dispatch records SEAM_PROVEN, the applied arm does NOT ship and every tier
# records the honest fallback documented in docs/review-agent-overrides.md. The current
# recorded result and the decision rule live in docs/agents-seam-probe.md — the evidence
# artifact of record (matcher-probe.yml's issue-recorded tables are the precedent).
#
# Trigger: workflow_dispatch only (available post-merge, from the default branch) —
# human-dispatch, like matcher-probe.yml's implement-probe job. It is deliberately NOT
# pull_request-triggered: this probe spends a paid Claude session and its verdict is
# human-adjudicated, so a per-PR auto-run would cost without adding signal, and keeping
# it off the PR-trigger set keeps it out of the review re-trigger coverage list (#579).
# Same-repo only — the job `if:` refuses anything but a same-repo dispatch. Concurrency-
# capped; a run costs cents. Repo-internal; NOT shipped to consumers by install.sh (like
# matcher-probe.yml).
#
# Re-run this whenever claude-code-action or the Claude Code CLI upgrades — the seam is
# version-dependent, and this probe is the evidence of record that keeps the applied-arm
# ship/no-ship decision honest.

on:
  workflow_dispatch:

# Cancel a superseded probe run on the same ref so a rapid dispatch sequence does not
# stack redundant paid runs.
concurrency:
  group: agents-seam-probe-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # The probe invokes no gh-api helper (its allowed-tools carry none), so the
  # endpoint↔permission lint (#312) requires nothing beyond the contents floor.
  # `pull-requests: read` documents the family claude-code-action reads for PR context
  # on a pull_request trigger and caps it at read so the probe can never mutate a PR.
  pull-requests: read

jobs:
  seam-probe:
    # workflow_dispatch is always same-repo (it only exists on the default branch), so
    # this guard is trivially satisfied for the real trigger; it is retained to document
    # the same-repo-only intent and to fail closed should the trigger set ever widen.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Claude Code (agents seam probe)
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Allow any bot to initiate the probe. This diagnostic runs same-repo only
          # (workflow_dispatch) and mutates nothing, but claude-code-action otherwise
          # refuses a bot-initiated run — which is exactly the case when a DevFlow bot
          # dispatches this probe, leaving the seam UNATTEMPTED.
          allowed_bots: "*"
          prompt: |
            You are a CLOUD SEAM PROBE. Your ONLY task is to test whether a startup
            `--agents` agent-definition (supplied to this session via claude_args) is
            reachable, and to record the probe subagent's self-reported reasoning
            effort. Do EXACTLY these steps, in order, and nothing else.

            Your text output is not measured. Only the harness record of your tool
            calls is measured — so the marker line MUST be produced through a Bash
            tool call, not just written in your reply.

            Step 1 — Dispatch the subagent named `seam-probe-agent` (its definition was
            supplied to this session at startup) via the Task/Agent tool, with the
            prompt: "Report your seam marker line." Dispatch it exactly once.

            Step 2 — Look at the single line the subagent returned.
              - If the subagent ran and returned a line beginning with
                `SEAM_PROBE_FORWARDED_OK`, run that exact returned line back through
                Bash so it is recorded, e.g.:
                    printf '%s\n' 'SEAM_PROBE_FORWARDED_OK SEAM_PROBE_EFFORT=<the effort the subagent reported>'
              - If the dispatch was REFUSED because `seam-probe-agent` is an unknown /
                unrecognized subagent type (meaning the startup `--agents` block was NOT
                forwarded), do NOT retry and do NOT try a different formulation — run:
                    printf '%s\n' 'seam-probe-agent dispatch refused: unknown subagent_type'
                and go to Step 3.

            Step 3 — STOP and reply with the single word DONE.

          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-official.git
            ./

          plugins: |
            devflow@devflow-marketplace

          # The session runs at `--effort high`; the startup agent-definition sets
          # `effort: low`. A `seam-probe-agent` self-report of `low` is the fact-(ii)
          # evidence (the agent-definition effort overrode the session effort); a report
          # of `high` (the session effort) is evidence AGAINST fact (ii). The
          # agent-definition's prompt makes its ENTIRE final response the marker line so
          # the top-level session can echo it verbatim through Bash.
          claude_args: >-
            --model claude-haiku-4-5-20251001
            --effort high
            --permission-mode acceptEdits
            --allowed-tools "Read,Glob,Grep,LS,Task,Agent,Bash(echo:*),Bash(printf:*),Bash(cat:*),Bash(ls:*),Write(.devflow/tmp/**)"
            --agents '{"seam-probe-agent":{"description":"Cloud seam probe subagent (issue #610). Reports a distinctive seam marker line and its own reasoning effort.","prompt":"You are the seam-probe subagent. Your ENTIRE final response MUST be exactly one line and nothing else: SEAM_PROBE_FORWARDED_OK SEAM_PROBE_EFFORT=<E> where <E> is the reasoning-effort level you are actually operating at (one of low, medium, high, xhigh, max). Report the effort you observe yourself running at, not a guess. Do not add any other text.","effort":"low"}}'

      # Deterministic verdict via the unit-tested helper (execution-file only; the
      # model's prose is never read). always() so the table is produced even if the
      # engine ended in error. The helper defaults to NOT shipping — SEAM_PROVEN
      # requires a human to pass --adjudicated-governed after adjudicating fact (ii).
      - name: Compute seam-probe verdict
        if: always()
        env:
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          set -euo pipefail
          python3 scripts/agents-seam-probe-verdict.py "${EXECUTION_FILE}"
