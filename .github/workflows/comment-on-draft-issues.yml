name: Comment on Draft Issues

# When a new issue is created, check if its status in the GitHub Project
# is "Draft". If so, post a comment "@claude run /implement $ISSUE_NUMBER".

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.config.outputs.enabled }}
      project_number: ${{ steps.config.outputs.project_number }}
      status_draft: ${{ steps.config.outputs.status_draft }}
      app_id: ${{ steps.config.outputs.app_id }}
    steps:
      - uses: actions/checkout@v6
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Read config
        id: config
        run: |
          CONFIG=".github/project-config.yml"
          echo "enabled=$(yq '.workflows["comment-on-draft-issues"]' "$CONFIG")" >> "$GITHUB_OUTPUT"
          echo "project_number=$(yq '.project_number' "$CONFIG")" >> "$GITHUB_OUTPUT"
          echo "status_draft=$(yq '.statuses.draft' "$CONFIG")" >> "$GITHUB_OUTPUT"
          echo "app_id=$(yq '.app_id' "$CONFIG")" >> "$GITHUB_OUTPUT"

  comment-on-draft:
    name: Comment on draft issues
    needs: config
    if: needs.config.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ needs.config.outputs.app_id }}
          private-key: ${{ secrets.RADMAN_AI_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Check project status and comment if Draft
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          ORG="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          PROJECT_NUMBER="${{ needs.config.outputs.project_number }}"
          STATUS_DRAFT="${{ needs.config.outputs.status_draft }}"
          ISSUE_NUMBER="${{ github.event.issue.number }}"

          echo "🔍 Checking if issue #${ISSUE_NUMBER} has Draft status in project..."

          # Detect if owner is an organization or user
          OWNER_TYPE=$(gh api graphql -f query='
            query {
              repositoryOwner(login: "'$ORG'") {
                __typename
              }
            }' --jq '.data.repositoryOwner.__typename')

          if [ "$OWNER_TYPE" = "Organization" ]; then
            OWNER_FIELD="organization"
          else
            OWNER_FIELD="user"
          fi

          # Get project ID
          if ! PROJECT_RESPONSE=$(gh api graphql -f query='
            query {
              '$OWNER_FIELD'(login: "'$ORG'") {
                projectV2(number: '$PROJECT_NUMBER') {
                  id
                }
              }
            }' 2>&1); then
            echo "❌ Failed to query project"
            echo "   Response: $PROJECT_RESPONSE"
            exit 1
          fi

          PROJECT_ID=$(echo "$PROJECT_RESPONSE" | jq -r '.data.'$OWNER_FIELD'.projectV2.id' 2>/dev/null)

          if [ -z "$PROJECT_ID" ] || [ "$PROJECT_ID" = "null" ]; then
            echo "❌ Project #$PROJECT_NUMBER not found for owner $ORG"
            exit 1
          fi

          # Find the issue in the project (with retry for auto-add timing)
          ISSUE_STATUS=""
          MAX_RETRIES=3
          RETRY_DELAY=30

          for ATTEMPT in $(seq 1 $MAX_RETRIES); do
            echo "🔍 Attempt $ATTEMPT/$MAX_RETRIES: Checking issue #${ISSUE_NUMBER} project status..."

            # Paginate through project items to find the issue
            CURSOR=""
            PAGE=1
            MAX_PAGES=20

            while [ $PAGE -le $MAX_PAGES ]; do
              if [ -n "$CURSOR" ]; then
                QUERY='
                  query {
                    node(id: "'$PROJECT_ID'") {
                      ... on ProjectV2 {
                        items(first: 100, after: "'$CURSOR'") {
                          pageInfo {
                            hasNextPage
                            endCursor
                          }
                          nodes {
                            content {
                              ... on Issue {
                                number
                              }
                            }
                            fieldValues(first: 20) {
                              nodes {
                                ... on ProjectV2ItemFieldSingleSelectValue {
                                  name
                                  field {
                                    ... on ProjectV2SingleSelectField {
                                      name
                                    }
                                  }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }'
              else
                QUERY='
                  query {
                    node(id: "'$PROJECT_ID'") {
                      ... on ProjectV2 {
                        items(first: 100) {
                          pageInfo {
                            hasNextPage
                            endCursor
                          }
                          nodes {
                            content {
                              ... on Issue {
                                number
                              }
                            }
                            fieldValues(first: 20) {
                              nodes {
                                ... on ProjectV2ItemFieldSingleSelectValue {
                                  name
                                  field {
                                    ... on ProjectV2SingleSelectField {
                                      name
                                    }
                                  }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }'
              fi

              if ! ITEMS_RESPONSE=$(gh api graphql -f query="$QUERY" 2>&1); then
                echo "❌ Failed to query project items"
                exit 1
              fi

              # Find the issue and extract its status
              ISSUE_STATUS=$(echo "$ITEMS_RESPONSE" | jq -r '
                .data.node.items.nodes[]
                | select(.content.number == '$ISSUE_NUMBER')
                | .fieldValues.nodes[]
                | select(.field.name == "Status")
                | .name' 2>/dev/null)

              if [ -n "$ISSUE_STATUS" ]; then
                break 2
              fi

              HAS_NEXT_PAGE=$(echo "$ITEMS_RESPONSE" | jq -r '.data.node.items.pageInfo.hasNextPage' 2>/dev/null)

              if [ "$HAS_NEXT_PAGE" != "true" ]; then
                break
              fi

              CURSOR=$(echo "$ITEMS_RESPONSE" | jq -r '.data.node.items.pageInfo.endCursor' 2>/dev/null)
              PAGE=$((PAGE + 1))
            done

            if [ $ATTEMPT -lt $MAX_RETRIES ]; then
              echo "⏳ Issue not found in project yet. Waiting ${RETRY_DELAY}s before retry..."
              sleep $RETRY_DELAY
            fi
          done

          if [ -z "$ISSUE_STATUS" ]; then
            echo "ℹ️ Issue #$ISSUE_NUMBER is not in project #$PROJECT_NUMBER after $MAX_RETRIES attempts. Exiting."
            exit 0
          fi

          echo "📋 Issue #$ISSUE_NUMBER status: \"$ISSUE_STATUS\""

          # Check if status is "Draft"
          if [ "$ISSUE_STATUS" = "$STATUS_DRAFT" ]; then
            echo "✅ Status is $STATUS_DRAFT — posting comment..."
            COMMENT_BODY="@claude /implement $ISSUE_NUMBER"
            GH_TOKEN="$APP_TOKEN" gh issue comment "$ISSUE_NUMBER" \
              --repo "$ORG/$REPO_NAME" \
              --body "$COMMENT_BODY"
            echo "✅ Comment posted on issue #$ISSUE_NUMBER"

            echo "## ✅ Draft Issue Comment Posted" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Issue:** [#${ISSUE_NUMBER}](https://github.com/${ORG}/${REPO_NAME}/issues/${ISSUE_NUMBER})" >> "$GITHUB_STEP_SUMMARY"
            echo "**Status:** $STATUS_DRAFT" >> "$GITHUB_STEP_SUMMARY"
            echo "**Action:** Posted comment \`@claude /implement $ISSUE_NUMBER\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ℹ️ Status is \"$ISSUE_STATUS\", not \"$STATUS_DRAFT\". No comment needed."

            echo "## ℹ️ Issue Not in Draft Status" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Issue:** [#${ISSUE_NUMBER}](https://github.com/${ORG}/${REPO_NAME}/issues/${ISSUE_NUMBER})" >> "$GITHUB_STEP_SUMMARY"
            echo "**Status:** $ISSUE_STATUS" >> "$GITHUB_STEP_SUMMARY"
            echo "**Action:** No comment posted (status is not $STATUS_DRAFT)" >> "$GITHUB_STEP_SUMMARY"
          fi
