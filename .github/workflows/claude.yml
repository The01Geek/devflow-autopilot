name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request_review:
    types: [submitted]

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.config.outputs.enabled }}
      base_branch: ${{ steps.config.outputs.base_branch }}
      claude_model: ${{ steps.config.outputs.claude_model }}
      allowed_bots: ${{ steps.config.outputs.allowed_bots }}
    steps:
      - uses: actions/checkout@v6
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Read config
        id: config
        run: |
          CONFIG=".github/project-config.yml"
          echo "enabled=$(yq '.workflows.claude' "$CONFIG")" >> "$GITHUB_OUTPUT"
          echo "base_branch=$(yq '.base_branch' "$CONFIG")" >> "$GITHUB_OUTPUT"
          echo "claude_model=$(yq '.claude_model' "$CONFIG")" >> "$GITHUB_OUTPUT"
          echo "allowed_bots=$(yq '.claude.allowed_bots' "$CONFIG")" >> "$GITHUB_OUTPUT"

  claude:
    needs: config
    if: |
      needs.config.outputs.enabled == 'true' &&
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: ${{ needs.config.outputs.allowed_bots }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Register the official plugin marketplace so plugins can be found
          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-official.git

          # Install plugins so skills like /pr-review-toolkit are available
          plugins: |
            pr-review-toolkit@claude-plugins-official
            code-review@claude-plugins-official
            feature-dev@claude-plugins-official
            superpowers@claude-plugins-official
            claude-md-management@claude-plugins-official

          base_branch: ${{ needs.config.outputs.base_branch }}
          claude_args: >-
            --model ${{ needs.config.outputs.claude_model }}
            --allowed-tools
            "Read,
            Write,
            Edit,
            Glob,
            Grep,
            LS,
            Skill,
            Agent,
            TodoWrite,
            EnterPlanMode,
            ExitPlanMode,
            Bash(git add:*),
            Bash(git commit:*),
            Bash(git push:*),
            Bash(git pull:*),
            Bash(git fetch:*),
            Bash(git status:*),
            Bash(git diff:*),
            Bash(git log:*),
            Bash(git checkout:*),
            Bash(git branch:*),
            Bash(git stash:*),
            Bash(git rm:*),
            Bash(gh pr create:*),
            Bash(gh pr edit:*),
            Bash(gh pr comment:*),
            Bash(gh pr diff:*),
            Bash(gh pr view:*),
            Bash(gh pr review:*),
            Bash(gh pr ready:*),
            Bash(gh issue view:*),
            Bash(gh issue comment:*),
            Bash(gh issue list:*),
            Bash(gh api:*),
            Bash(yq:*),
            Bash(npm install:*),
            Bash(npm run build:*),
            Bash(npm run lint:*),
            Bash(npm test:*),
            Bash(npx vitest:*),
            Bash(npx eslint:*),
            Bash(npx tsc:*)"
          # assignee_trigger: "claude"
          # label_trigger: "claude"

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://docs.claude.com/en/docs/claude-code/sdk#command-line for available options

      - name: Generate app token for PR creation
        id: pr-app-token
        if: |
          github.event_name == 'issue_comment' &&
          contains(github.event.comment.body, '/implement') &&
          github.event.issue.pull_request == null
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RADMAN_AI_APP_ID }}
          private-key: ${{ secrets.RADMAN_AI_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Auto-create PR for /implement commands
        if: |
          github.event_name == 'issue_comment' &&
          contains(github.event.comment.body, '/implement') &&
          github.event.issue.pull_request == null
        env:
          GH_TOKEN: ${{ steps.pr-app-token.outputs.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          CLAUDE_EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          set -euo pipefail

          # Find the branch Claude created for this issue (gh API avoids git credential issues)
          BRANCH=$(gh api "repos/${{ github.repository }}/git/matching-refs/heads/claude/issue-${ISSUE_NUMBER}-" \
            -q 'sort_by(.ref) | reverse | .[0].ref // empty' \
            | sed 's|^refs/heads/||' || true)

          if [ -z "$BRANCH" ]; then
            echo "No Claude branch found for issue #${ISSUE_NUMBER}, skipping PR creation"
            exit 0
          fi

          echo "Found branch: $BRANCH"

          # Skip if a PR already exists for this branch
          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING_PR" ]; then
            echo "PR #${EXISTING_PR} already exists for branch ${BRANCH}, skipping"
            exit 0
          fi

          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          PR_BODY=""

          # --- Strategy 1: Extract from Claude's issue comment ---
          # The claude-code-action posts a rich summary comment on the issue.
          # This is the best source for the PR description.
          echo "::group::Strategy 1 — Extract from Claude's issue comment"
          CLAUDE_COMMENT=$(gh api "repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/comments" \
            --jq '[.[] | select(.user.login == "claude[bot]")] | last | .body // empty' 2>/dev/null || true)

          if [ -n "$CLAUDE_COMMENT" ]; then
            echo "Found claude[bot] comment (${#CLAUDE_COMMENT} chars)"

            # Extract content after the first --- separator (skip the status header)
            COMMENT_BODY=$(echo "$CLAUDE_COMMENT" | sed -n '/^---$/,$ { /^---$/d; p; }')
            # Trim leading blank lines and trailing whitespace/pipe artifacts
            COMMENT_BODY=$(echo "$COMMENT_BODY" | sed -e '/./,$!d' -e 's/[[:space:]]*|[[:space:]]*$//')

            if [ -n "$COMMENT_BODY" ] && [ "${#COMMENT_BODY}" -gt 50 ]; then
              echo "Extracted comment body (${#COMMENT_BODY} chars)"
              PR_BODY="${COMMENT_BODY}

          ---
          Resolves #${ISSUE_NUMBER}

          Generated with [Claude Code](https://claude.ai/code) via \`/implement\`"
            else
              echo "Comment body too short or empty after extraction (${#COMMENT_BODY} chars)"
            fi
          else
            echo "No claude[bot] comment found on issue #${ISSUE_NUMBER}"
          fi
          echo "::endgroup::"

          # --- Strategy 2: Extract from Claude's execution log ---
          if [ -z "$PR_BODY" ] && [ -n "${CLAUDE_EXECUTION_FILE:-}" ] && [ -f "${CLAUDE_EXECUTION_FILE}" ]; then
            echo "::group::Strategy 2 — Parse Claude execution file"
            echo "File: ${CLAUDE_EXECUTION_FILE} ($(wc -c < "$CLAUDE_EXECUTION_FILE") bytes)"

            CLAUDE_RESPONSE=$(jq -r '
              [.[] | select(.type == "result" and .subtype == "success")]
              | last
              | (.result // .content // empty)
            ' "$CLAUDE_EXECUTION_FILE" 2>/dev/null || true)

            if [ -n "$CLAUDE_RESPONSE" ]; then
              echo "Extracted result text (${#CLAUDE_RESPONSE} chars)"

              # Check for PR_BODY markers first (from /pr-description skill)
              MARKED_BODY=$(echo "$CLAUDE_RESPONSE" | sed -n '/<!-- PR_BODY_START -->/,/<!-- PR_BODY_END -->/{ /<!-- PR_BODY_START -->/d; /<!-- PR_BODY_END -->/d; p; }')
              if [ -n "$MARKED_BODY" ]; then
                echo "Found PR_BODY markers in result"
                PR_BODY="$MARKED_BODY"
              else
                # Use the result text as-is (it's Claude's final summary)
                echo "Using result text as PR summary"
                PR_BODY="## Summary

          ${CLAUDE_RESPONSE}

          ---
          Resolves #${ISSUE_NUMBER}

          Generated with [Claude Code](https://claude.ai/code) via \`/implement\`"
              fi
            else
              echo "No result text in execution file"
              jq '[.[] | select(.type == "result")] | last | keys' "$CLAUDE_EXECUTION_FILE" 2>/dev/null || true
            fi
            echo "::endgroup::"
          fi

          # --- Strategy 3: Generate from issue context + git diff ---
          if [ -z "$PR_BODY" ]; then
            echo "::group::Strategy 3 — Generate from git context"

            COMMITS=$(gh api "repos/${{ github.repository }}/compare/${DEFAULT_BRANCH}...${BRANCH}" \
              --jq '[.commits[].commit.message] | map("- " + split("\n")[0]) | join("\n")' 2>/dev/null || echo "")
            echo "Commits: $(echo "$COMMITS" | grep -c '^-' || echo 0)"

            FILES_CHANGED=$(gh api "repos/${{ github.repository }}/compare/${DEFAULT_BRANCH}...${BRANCH}" \
              --jq '[.files[].filename] | map("- `" + . + "`") | join("\n")' 2>/dev/null || echo "")
            echo "Files changed: $(echo "$FILES_CHANGED" | grep -c '^-' || echo 0)"

            PR_BODY="## Summary
          Implementation of #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          ## Changes
          ${COMMITS:-_No commit details available_}

          ## Files Changed
          ${FILES_CHANGED:-_No file details available_}

          ---
          Resolves #${ISSUE_NUMBER}

          Generated with [Claude Code](https://claude.ai/code) via \`/implement\`"

            echo "::endgroup::"
          fi

          # Create the PR and mark it ready for review
          gh pr create \
            --head "$BRANCH" \
            --base "${DEFAULT_BRANCH}" \
            --title "feat: ${ISSUE_TITLE}" \
            --body "$PR_BODY"

          gh pr ready "$BRANCH" 2>/dev/null || true
          echo "PR created and marked ready for review"