name: WikiWizard

on:
  pull_request:
    types: [opened, ready_for_review, synchronize, labeled, unlabeled]

concurrency:
  group: claude-docs-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.config.outputs.enabled }}
      project_number: ${{ steps.config.outputs.project_number }}
      claude_model: ${{ steps.config.outputs.claude_model }}
      docs_internal: ${{ steps.config.outputs.docs_internal }}
      docs_external: ${{ steps.config.outputs.docs_external }}
      documented_label: ${{ steps.config.outputs.documented_label }}
      release_notes_file: ${{ steps.config.outputs.release_notes_file }}
      bot_login: ${{ steps.config.outputs.bot_login }}
      allowed_bots: ${{ steps.config.outputs.allowed_bots }}
    steps:
      - uses: actions/checkout@v6
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Read config
        id: config
        run: |
          CONFIG=".github/project-config.yml"
          echo "enabled=$(yq '.workflows.WikiWizard' "$CONFIG")" >> "$GITHUB_OUTPUT"
          echo "project_number=$(yq '.project_number' "$CONFIG")" >> "$GITHUB_OUTPUT"
          echo "claude_model=$(yq '.claude_model' "$CONFIG")" >> "$GITHUB_OUTPUT"
          echo "docs_internal=$(yq '.docs.internal' "$CONFIG")" >> "$GITHUB_OUTPUT"
          echo "docs_external=$(yq '.docs.external' "$CONFIG")" >> "$GITHUB_OUTPUT"
          echo "documented_label=$(yq '.wikiwizard.documented_label' "$CONFIG")" >> "$GITHUB_OUTPUT"
          echo "release_notes_file=$(yq '.wikiwizard.release_notes_file' "$CONFIG")" >> "$GITHUB_OUTPUT"
          echo "bot_login=$(yq '.bot_login' "$CONFIG")" >> "$GITHUB_OUTPUT"
          echo "allowed_bots=$(yq '.wikiwizard.allowed_bots' "$CONFIG")" >> "$GITHUB_OUTPUT"

  documentation:
    needs: config
    # Run when "Documented" label is not yet present and PR is not in draft mode
    if: >-
      needs.config.outputs.enabled == 'true' &&
      !contains(github.event.pull_request.labels.*.name, needs.config.outputs.documented_label) &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Internal Documentation Review
        id: claude-internal
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: ${{ needs.config.outputs.allowed_bots }}
          prompt: |
            Read and follow the skill instructions in .claude/skills/docs-sync-internal/SKILL.md exactly.
            The internal documentation path is ${{ needs.config.outputs.docs_internal }}.
            Do not commit — the workflow handles commits.
          claude_args: >-
            --model ${{ needs.config.outputs.claude_model }}
            --allowed-tools
            "Read,
            Edit,
            Write,
            Glob,
            Grep,
            Bash(git status:*),
            Bash(git diff:*),
            Bash(gh pr comment:*),
            Bash(gh pr diff:*),
            Bash(gh pr view:*),
            Bash(gh pr review:*)"

      - name: Run External Documentation Review
        id: claude-external
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: ${{ needs.config.outputs.allowed_bots }}
          prompt: |
            Read and follow the skill instructions in .claude/skills/docs-sync-external/SKILL.md exactly.
            The internal documentation path is ${{ needs.config.outputs.docs_internal }}.
            The external documentation path is ${{ needs.config.outputs.docs_external }}.
            Do not commit — the workflow handles commits.
          claude_args: >-
            --model ${{ needs.config.outputs.claude_model }}
            --allowed-tools
            "Read,
            Edit,
            Write,
            Glob,
            Grep,
            Bash(git status:*),
            Bash(git diff:*),
            Bash(gh pr comment:*),
            Bash(gh pr diff:*),
            Bash(gh pr view:*),
            Bash(gh pr review:*)"

      - name: Run Release Notes Review
        id: claude-release-notes
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: ${{ needs.config.outputs.allowed_bots }}
          prompt: |
            Read and follow the skill instructions in .claude/skills/docs-release-notes/SKILL.md exactly.
            The internal documentation path is ${{ needs.config.outputs.docs_internal }}.
            The external documentation path is ${{ needs.config.outputs.docs_external }}.
            The release notes file is ${{ needs.config.outputs.release_notes_file }}.
            The PR number is ${{ github.event.pull_request.number }}.
            Do not commit — the workflow handles commits.
          claude_args: >-
            --model ${{ needs.config.outputs.claude_model }}
            --allowed-tools
            "Read,
            Edit,
            Write,
            Glob,
            Grep,
            Bash(git status:*),
            Bash(git diff:*),
            Bash(gh pr view:*)"

      - name: Commit and push all documentation changes
        run: |
          DOCS_INTERNAL="${{ needs.config.outputs.docs_internal }}"
          DOCS_EXTERNAL="${{ needs.config.outputs.docs_external }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          # Remove any non-markdown files Claude may have created as scratch tools
          find "${DOCS_INTERNAL}" "${DOCS_EXTERNAL}" -type f ! -name '*.md' -delete 2>/dev/null || true
          git add "${DOCS_INTERNAL}*.md" "${DOCS_INTERNAL}**/*.md" || true
          git add "${DOCS_EXTERNAL}*.md" "${DOCS_EXTERNAL}**/*.md" || true
          if git diff --cached --quiet; then
            echo "No documentation changes to commit"
          else
            git commit -m "docs: update documentation [skip ci]"
            git push origin "HEAD:refs/heads/${{ github.event.pull_request.head.ref }}"
          fi

      - name: Add Documented Label
        if: success()
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['${{ needs.config.outputs.documented_label }}']
            });

  request-claude-review:
    needs: [config, documentation]
    # Only run if bot_login is configured
    if: >-
      needs.config.outputs.enabled == 'true' &&
      needs.config.outputs.bot_login != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RADMAN_AI_APP_ID }}
          private-key: ${{ secrets.RADMAN_AI_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Post review comment
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          ORG="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"

          echo "💬 Posting review request on PR #$PR_NUMBER..."
          gh pr comment "$PR_NUMBER" \
            --repo "$ORG/$REPO_NAME" \
            --body "@claude run /review"
          echo "✅ Review comment posted on PR #$PR_NUMBER"

          echo "## ✅ Claude Review Requested" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**PR:** [#${PR_NUMBER}](https://github.com/${ORG}/${REPO_NAME}/pull/${PR_NUMBER})" >> "$GITHUB_STEP_SUMMARY"
