name: DevFlow

# DevFlow-owned LIGHT COMMAND LISTENER. Fires on a BARE `/devflow:review`,
# `/devflow:review-and-fix`, or `/devflow:pr-description` comment/review and runs
# claude-code-action in AGENT mode with a synthesised prompt (jobs: `config` /
# `review_dedupe` / `gate` / `command`). This is the body that used to live in
# the standalone claude.yml.
#
# The reusable runner that devflow-review.yml calls lives in its OWN file,
# devflow-runner.yml — NOT here. It was split out because a called reusable
# workflow's permission ceiling is validated against the caller's grant across
# the whole graph: co-locating the high-privilege `command` job (contents:write
# to push, issues:write to react) with the low-privilege runner made a read-only
# caller like devflow-review.yml fail with `startup_failure`. This file therefore
# has NO `workflow_call` trigger — it is purely event-driven.
#
# Why bare commands (no `@claude`): Anthropic's Claude GitHub App owns the
# `claude.yml` it generates and the `@claude` mention surface (plus generic Q&A
# and /security-review). DevFlow never touches that file. EVERY DevFlow trigger
# below negates `@claude`, so an `@claude …` comment routes ONLY to Anthropic's
# listener and a bare `/devflow:*` comment routes ONLY here — the two can never
# double-fire. The heavy /devflow:implement path lives in devflow-implement.yml
# under the same partition. See docs/cloud-setup.md.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

defaults:
  run:
    shell: bash

jobs:
  config:
    runs-on: ${{ vars.DEVFLOW_RUNNER && (startsWith(vars.DEVFLOW_RUNNER, '[') && fromJSON(vars.DEVFLOW_RUNNER) || vars.DEVFLOW_RUNNER) || 'ubuntu-latest' }}
    outputs:
      enabled: ${{ steps.extract.outputs.enabled }}
      base_branch: ${{ steps.extract.outputs.base_branch }}
      claude_model: ${{ steps.extract.outputs.claude_model }}
      allowed_bots: ${{ steps.extract.outputs.allowed_bots }}
      effort: ${{ steps.extract.outputs.effort }}
      allowed_tools_extra: ${{ steps.extract.outputs.allowed_tools_extra }}
      allowed_users: ${{ steps.extract.outputs.allowed_users }}
      devflow_version: ${{ steps.extract.outputs.devflow_version }}
      # Optional path to a pre-installed Claude Code executable (issue #601),
      # sourced from setup.claude_code_executable. Passed to claude-code-action's
      # path_to_claude_code_executable input in the command job below. Empty (the
      # default) leaves the action's automatic-install path unchanged.
      claude_code_executable: ${{ steps.extract.outputs.claude_code_executable }}
      # The whole trigger-time config document, forwarded verbatim so the command
      # job's git-env pin step (issue #645) can resolve setup.git_dir_pin /
      # setup.git_work_tree_pin through the bundled helper rather than re-parsing
      # them inline here. This job checks out the DEFAULT BRANCH at trigger time,
      # so the forwarded document is the trusted tree's — never the PR head's —
      # which is what makes those keys post-merge-only.
      config_json: ${{ steps.cfg.outputs.json }}
    steps:
      - uses: actions/checkout@v6
      - id: cfg
        uses: ./.github/actions/read-project-config
      - id: extract
        env:
          CONFIG_JSON: ${{ steps.cfg.outputs.json }}
        run: |
          set -euo pipefail
          ENABLED=$(echo "$CONFIG_JSON" | jq -r '.workflows.devflow // false')
          # `// empty` collapses a missing/null allowlist to a real empty string.
          # Fail loud only when the workflow is ENABLED — a config left on the
          # pre-2.2.5 `claude.allowed_bots` key would otherwise propagate a
          # literal "null" allowlist that silently matches no bot. Disabled repos
          # skip the check (allowed_bots is read only downstream of the enabled
          # gate), so this never breaks an intentionally-off install. Mirrors the
          # guard in devflow-runner.yml.
          ALLOWED_BOTS=$(echo "$CONFIG_JSON" | jq -r '.devflow.allowed_bots // empty')
          if [ "$ENABLED" = "true" ] && [ -z "$ALLOWED_BOTS" ]; then
            echo "::error::devflow.allowed_bots is missing from .devflow/config.json (a pre-2.2.5 config may still use the old 'claude.allowed_bots' key — see CHANGELOG 2.2.5 migration)"
            exit 1
          fi
          {
            echo "enabled=$ENABLED"
            echo "base_branch=$(echo "$CONFIG_JSON" | jq -r '.base_branch')"
            echo "claude_model=$(echo "$CONFIG_JSON" | jq -r '.claude_model')"
            echo "allowed_bots=$ALLOWED_BOTS"
            # Human logins allowed to trigger the command path (AND-filter on top
            # of the collaborator-permission gate; '*' = any collaborator).
            echo "allowed_users=$(echo "$CONFIG_JSON" | jq -r '.devflow.allowed_users // "*"')"
            echo "effort=$(echo "$CONFIG_JSON" | jq -r '.devflow.effort // "high"')"
            # Repo-specific extra allowlist entries, appended on top of the
            # built-in devflow base list in the `claude` job's claude_args.
            # Emits a leading-comma string (",Bash(make:*),…") or "" so it can
            # be concatenated directly after the final base entry. Tool patterns
            # never contain commas/newlines, so a single-line output is safe.
            echo "allowed_tools_extra=$(echo "$CONFIG_JSON" | jq -r '.devflow.allowed_tools // [] | if length > 0 then "," + join(",") else "" end')"
            # Pinned plugin ref for the vendor-plugin fetch branch (thin installs).
            echo "devflow_version=$(echo "$CONFIG_JSON" | jq -r '.devflow_version // empty')"
          } >> "$GITHUB_OUTPUT"
          # Optional pre-installed Claude Code executable path (issue #601). For
          # self-hosted runners (typically Windows) whose OS the action's Unix-only
          # bundled installer cannot serve. `// empty` emits an empty *stream* when the key
          # is absent, so the substitution yields the empty string, which the action treats as "not provided" (auto-install unchanged).
          # `try … catch` guards a hand-corrupted non-object `setup` (so the config job
          # never aborts on a malformed setup block); `| strings` drops a non-string
          # leaf value (array/object/number) to empty; `select(test("[\n\r]") | not)`
          # drops even a *valid* string that carries an embedded newline/CR — those
          # would otherwise make jq -r emit a multi-line value that corrupts the
          # key=value GITHUB_OUTPUT line; `select(test("^[[:space:]]*$") | not)` drops a
          # whitespace-only string, which is never a usable executable path and whose
          # intended meaning is "unset" (auto-install). Any rejected shape falls back to
          # empty. Because "rejected" and "unset" both resolve to empty, a *non-empty*
          # raw value that resolves to empty emits a `::warning::` — otherwise a mistyped
          # path on the one platform where this key is load-bearing silently reverts to
          # the broken auto-install path and the operator debugs the installer's
          # misleading "Windows is not supported" error instead of their own typo
          # (the repo's breadcrumb-on-fallback convention; an explicit `""` is a
          # deliberate unset and warns nothing). The raw
          # probe emits the SENTINEL "set" rather than the value itself: command
          # substitution strips trailing newlines, so a value composed entirely of
          # newlines would collapse to the empty string and be misread as "unset",
          # silently skipping the warning for a rejected shape. The probe filters on
          # `!= null` rather than `// empty` because `//` is FALSY-triggered: `// empty`
          # would swallow a valid-falsy `false` leaf, rejecting it to auto-install with
          # no breadcrumb (the documented-off-switch class). JSON `null` stays an unset,
          # like an absent key. `catch "set"` (not `catch empty`) makes a NON-OBJECT
          # `setup` — which raises a jq index error in BOTH filters, so the guarded one
          # cannot resolve a value — warn rather than fail open silently.
          CLAUDE_CODE_EXECUTABLE_RAW=$(echo "$CONFIG_JSON" | jq -r 'try (.setup.claude_code_executable | select(. != null) | tostring | select(. != "") | "set") catch "set"')
          CLAUDE_CODE_EXECUTABLE=$(echo "$CONFIG_JSON" | jq -r 'try (.setup.claude_code_executable // empty | strings | select(test("[\n\r]") | not) | select(test("^[[:space:]]*$") | not)) catch empty')
          if [ -n "$CLAUDE_CODE_EXECUTABLE_RAW" ] && [ -z "$CLAUDE_CODE_EXECUTABLE" ]; then
            echo "::warning::setup.claude_code_executable is set but was rejected (non-string leaf, embedded newline/CR, or whitespace-only); falling back to the action's automatic Claude Code install."
          fi
          echo "claude_code_executable=$CLAUDE_CODE_EXECUTABLE" >> "$GITHUB_OUTPUT"

  # Dedupe a MANUAL bare `/devflow:review` comment against the AUTOMATED
  # devflow-review path. Both are independent triggers: a commit
  # push fires devflow-review's `synchronize` re-review, and the
  # human who pushed it typically also comments `/devflow:review`
  # within a second or two. Without this gate BOTH run a full (billable) LLM
  # review of the same HEAD and post their own status comment — the observed
  # "two comments" bug (PR #113, 15:06:55 synchronize + 15:06:56 comment).
  #
  # Policy ("auto suppresses manual"): if devflow-review is already
  # in-flight for this PR's CURRENT head — either an in_progress `Devflow
  # Review` check on that exact SHA, or a queued/in_progress
  # devflow-review run on the PR's branch (covers the sub-second
  # race before create_check POSTs the check) — skip the manual review and
  # leave a one-line pointer instead. Deliberately fail-OPEN (default
  # suppress=false): a missed suppression just reproduces today's recoverable
  # double-comment, whereas a wrong suppression would silently swallow a
  # review the user explicitly asked for. This is the opposite failure
  # direction from devflow-review's fail-closed gates, by design.
  #
  # Only `/devflow:review` is deduped — NOT `/devflow:review-and-fix` (that
  # auto-applies fixes and has no automated equivalent), and not the
  # pr-description flow, which falls through with suppress=false untouched.
  review_dedupe:
    needs: config
    if: ${{ needs.config.outputs.enabled == 'true' }}
    runs-on: ${{ vars.DEVFLOW_RUNNER && (startsWith(vars.DEVFLOW_RUNNER, '[') && fromJSON(vars.DEVFLOW_RUNNER) || vars.DEVFLOW_RUNNER) || 'ubuntu-latest' }}
    permissions:
      contents: read
      pull-requests: write
      checks: read
      actions: read
    outputs:
      suppress: ${{ steps.guard.outputs.suppress }}
    steps:
      - uses: actions/checkout@v6
      # Materialize the plugin so detect-standalone-command.sh exists at
      # .devflow/vendor/devflow/scripts/ (committed → self → fetch). Mirrors the
      # gate job so the dedupe body match routes through the SAME shared detector
      # the resolver uses — the two matchers cannot drift (issue #321).
      - uses: ./.github/actions/vendor-plugin
        with:
          ref: ${{ needs.config.outputs.devflow_version }}
      - id: guard
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          BODY: ${{ github.event.comment.body || github.event.review.body }}
          PR: ${{ github.event.issue.number || github.event.pull_request.number }}
        run: |
          set -euo pipefail
          emit() { echo "suppress=$1" >> "$GITHUB_OUTPUT"; }
          emit false  # fail-OPEN default: manual review proceeds unless we prove auto is in-flight

          # Route body detection through the SAME shared standalone-command
          # detector the resolver uses (vendored above), so a quoted/documented
          # /devflow:review mention neither dedupes nor posts a suppression
          # notice, and the trigger gate and this matcher cannot drift (#321).
          # The detector is markdown-aware and fires only on a command that is
          # the sole content of its own line; it emits `command=<token>` on
          # stdout. First-match-wins is preserved by the detector's
          # most-specific-first ordering (review-and-fix outranks review).
          DETECTOR=.devflow/vendor/devflow/scripts/detect-standalone-command.sh
          if [ ! -x "$DETECTOR" ]; then
            # Fail OPEN (the job's contract): a missing detector must never
            # suppress a manual review. Surface it so a vendoring miss is
            # distinguishable from "not a review request".
            echo "::warning::devflow detector not found at $DETECTOR — has install.sh vendored the plugin? Fail-open (manual review proceeds)."
            exit 0
          fi
          # Verify the OUTCOME, not just the -x precondition: a present-but-broken
          # detector (corrupt/partial vendored copy, awk error) or a missing sed
          # exits non-zero, and under `set -euo pipefail` that would abort this step
          # and FAIL the job — which then SKIPS the downstream `command` job (it
          # `needs: review_dedupe` with no always()), silently swallowing the manual
          # review. That is the fail-CLOSED direction this job's contract forbids, so
          # absorb any run failure into the same fail-OPEN exit the -x branch uses (#321).
          if ! CMD="$(printf '%s' "$BODY" | bash "$DETECTOR" | sed -n 's/^command=//p')"; then
            echo "::warning::devflow detector at $DETECTOR failed to run (broken vendored copy, or missing sed/bash); fail-open (manual review proceeds)."
            exit 0
          fi
          case "$CMD" in
            /devflow:review-and-fix)
              echo "::notice::/devflow:review-and-fix has no auto path; not deduping."
              exit 0 ;;
            /devflow:review) : ;;
            *)
              echo "::notice::Not a standalone /devflow:review request; nothing to dedupe."
              exit 0 ;;
          esac

          if [ -z "${PR:-}" ] || [ "$PR" = "null" ]; then
            echo "::notice::No PR number on this event; fail-open (manual review proceeds)."
            exit 0
          fi

          # HEAD/BRANCH resolution adopts Signals 1/2's fail-open-with-::warning::
          # pattern below, but additionally captures the `gh` failure's stderr
          # (to a separate file so a partial-stdout-plus-error response can't
          # pollute the resolved value) and surfaces it in the warning — Signals
          # 1/2 themselves discard stderr (`2>/dev/null`). A success-but-empty/
          # null result stays the existing ::notice:: fail-open path. Both arms
          # still fail open (exit 0 / IR=0).
          # mktemp itself is guarded (falls back to /dev/null, matching
          # devflow-implement.yml's stall-backstop precedent) so a mktemp failure
          # can never abort this step via set -e and defeat the fail-open contract;
          # captured stderr is newline-collapsed before embedding so a multi-line
          # gh error can't break the ::warning:: annotation's single-line parsing.
          HEAD_ERR="$(mktemp 2>/dev/null || echo /dev/null)"
          if ! HEAD=$(gh pr view "$PR" --repo "$REPO" --json headRefOid --jq .headRefOid 2>"$HEAD_ERR"); then
            echo "::warning::Could not resolve PR #$PR HEAD (gh pr view failed: $(tr '\n' ' ' < "$HEAD_ERR")); fail-open (manual review proceeds)."
            [ "$HEAD_ERR" = /dev/null ] || rm -f "$HEAD_ERR"
            exit 0
          fi
          [ "$HEAD_ERR" = /dev/null ] || rm -f "$HEAD_ERR"
          BRANCH_ERR="$(mktemp 2>/dev/null || echo /dev/null)"
          if ! BRANCH=$(gh pr view "$PR" --repo "$REPO" --json headRefName --jq .headRefName 2>"$BRANCH_ERR"); then
            echo "::warning::Could not resolve PR #$PR BRANCH (gh pr view failed: $(tr '\n' ' ' < "$BRANCH_ERR")); treating as unresolved (fail-open — Signal 2 treated as 0)."
            BRANCH=""
          fi
          [ "$BRANCH_ERR" = /dev/null ] || rm -f "$BRANCH_ERR"
          if [ -z "$HEAD" ] || [ "$HEAD" = "null" ]; then
            echo "::notice::Could not resolve PR #$PR HEAD; fail-open (manual review proceeds)."
            exit 0
          fi

          # Signal 1: an in-flight `Devflow Review` check on THIS exact HEAD.
          # A query failure stays fail-open (IC=0 → not suppressed) but is
          # surfaced as a ::warning:: so a permanently-failing signal is
          # distinguishable from "no auto run existed".
          if RAW_IC=$(gh api --paginate "repos/$REPO/commits/$HEAD/check-runs" \
                 --jq '.check_runs[] | select(.name=="Devflow Review" and (.status=="queued" or .status=="in_progress")) | .id' \
                 2>/dev/null); then
            IC=$(printf '%s' "$RAW_IC" | grep -c . || true)
          else
            echo "::warning::Signal 1 (check-runs) query failed for $HEAD; treating as 0 (fail-open — manual review may proceed)."
            IC=0
          fi
          [[ "$IC" =~ ^[0-9]+$ ]] || IC=0

          # Signal 2: a queued/in_progress devflow-review run on the
          # PR's branch. Covers the <1s synchronize-vs-comment race where the
          # auto run has started but create_check has not POSTed the check yet
          # (an in-flight auto run on the same branch is, by that workflow's
          # own first-ready/synchronize design, reviewing the latest HEAD).
          IR=0
          if [ -n "$BRANCH" ] && [ "$BRANCH" != "null" ]; then
            if ! IR=$(gh run list --repo "$REPO" \
                   --workflow devflow-review.yml \
                   --branch "$BRANCH" \
                   --json status \
                   --jq '[.[] | select(.status=="queued" or .status=="in_progress")] | length' \
                   2>/dev/null); then
              echo "::warning::Signal 2 (run-list) query failed for branch $BRANCH; treating as 0 (fail-open)."
              IR=0
            fi
          fi
          [[ "$IR" =~ ^[0-9]+$ ]] || IR=0

          if [ "$IC" != "0" ] || [ "$IR" != "0" ]; then
            emit true
            # The user-facing suppression notice is posted by the dedicated
            # step below (under the optional downscoped App token); this step
            # keeps only the queries + decision on github.token.
            echo "head=$HEAD" >> "$GITHUB_OUTPUT"
            echo "::notice::Suppressed manual /devflow:review for PR #$PR (in-flight check=$IC run=$IR)."
            exit 0
          fi
          echo "::notice::No in-flight auto review for PR #$PR HEAD $HEAD; manual review proceeds."

      # Optional, opt-in: mint an App token DOWNSCOPED to the notice's needs —
      # PR comment only (no contents/workflows/issues). Same opt-in/fail-loud/
      # downscope contract as the review mint in devflow-runner.yml — see
      # docs/cloud-setup.md. Minted only when the notice below will actually
      # post (suppress), so the common non-suppressed path stays mint-free.
      - name: Mint downscoped notice token (optional)
        id: dedupe_app_token
        if: ${{ vars.DEVFLOW_APP_ID != '' && steps.guard.outputs.suppress == 'true' }}
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.DEVFLOW_APP_ID }}
          private-key: ${{ secrets.DEVFLOW_APP_PRIVATE_KEY }}
          permission-pull-requests: write

      # Split out of the guard step so the notice posts under the App identity
      # when configured (the guard's queries stay on github.token — a scoped
      # token there could 403 the check-runs/run-list reads and flip the
      # fail-open default). Best-effort for the post itself: the gh call is
      # the only fallible command and is guarded (no continue-on-error on this
      # step), with the gh stderr surfaced as a ::warning:: (same diagnostic
      # discipline as devflow-implement.yml's duplicate-ignored notice)
      # instead of the old silent `2>/dev/null || true` swallow.
      - name: Notice — manual review suppressed
        if: ${{ steps.guard.outputs.suppress == 'true' }}
        env:
          GH_TOKEN: ${{ steps.dedupe_app_token.outputs.token || github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.issue.number || github.event.pull_request.number }}
          HEAD: ${{ steps.guard.outputs.head }}
        run: |
          set -euo pipefail
          # CRITICAL: the body must contain NO DevFlow trigger phrase (mirrors
          # the devflow-implement.yml duplicate-notice discipline). Under the
          # App token this comment fires a real issue_comment event (unlike
          # GITHUB_TOKEN comments, which GitHub suppresses), so a trigger
          # substring here could re-enter the gate and loop. Worded to avoid
          # `/devflow:` and `@claude`.
          NOTE="ℹ️ An automated **Devflow Review** is already running for this commit (\`${HEAD:0:7}\`). Skipping this manual review command to avoid a duplicate review and double comments. Use the **Re-run** button on the \`Devflow Review\` check if you need to re-review."
          # REST (not `gh pr comment` porcelain): this step can run under the
          # repo-scoped App installation token, and GraphQL-resolving porcelain
          # fails silently under repo-scoped tokens (CLAUDE.md gotcha, #228). A
          # PR is an issue for the comments endpoint.
          if ! err="$(gh api --method POST "repos/$REPO/issues/$PR/comments" -f body="$NOTE" 2>&1 >/dev/null)"; then
            echo "::warning::could not post review-suppressed notice on PR #$PR (continuing): ${err//$'\n'/ }" >&2
          fi

  # Authorization + command-detection gate for the LIGHT command path. The
  # `command` job below runs claude-code-action in AGENT mode (explicit prompt),
  # which executes for ANY actor, so this job is the cost control: it runs
  # resolve-command-trigger.sh, which authorizes the sender (allowed bot, or an
  # allowed_users login with write/admin/maintain access) and resolves which
  # /devflow:* command + target number to synthesise. Coarse event matching
  # stays in this job's `if:` so irrelevant events never spin a runner.
  #
  # PARTITION INVARIANT: every branch negates `@claude` and `/devflow:implement`.
  # `@claude …` is ceded to Anthropic's claude.yml; `/devflow:implement` is the
  # heavy path (devflow-implement.yml). `/devflow:review` substring-matches
  # `/devflow:review-and-fix`, so both are covered by the review clause and the
  # resolver disambiguates. Triggers fire ONLY on real comment/review bodies —
  # never on an issue/PR description, so a command merely *quoted* in a
  # description cannot start a run.
  gate:
    needs: config
    if: |
      needs.config.outputs.enabled == 'true' &&
      (
        (github.event_name == 'issue_comment' && (contains(github.event.comment.body, '/devflow:review') || contains(github.event.comment.body, '/devflow:pr-description')) && !contains(github.event.comment.body, '@claude') && !contains(github.event.comment.body, '/devflow:implement')) ||
        (github.event_name == 'pull_request_review_comment' && (contains(github.event.comment.body, '/devflow:review') || contains(github.event.comment.body, '/devflow:pr-description')) && !contains(github.event.comment.body, '@claude') && !contains(github.event.comment.body, '/devflow:implement')) ||
        (github.event_name == 'pull_request_review' && (contains(github.event.review.body, '/devflow:review') || contains(github.event.review.body, '/devflow:pr-description')) && !contains(github.event.review.body, '@claude') && !contains(github.event.review.body, '/devflow:implement'))
      )
    runs-on: ${{ vars.DEVFLOW_RUNNER && (startsWith(vars.DEVFLOW_RUNNER, '[') && fromJSON(vars.DEVFLOW_RUNNER) || vars.DEVFLOW_RUNNER) || 'ubuntu-latest' }}
    permissions:
      contents: read        # checkout the resolver; collaborator check uses GITHUB_TOKEN
      issues: write         # react step: ack reaction on issue comments
      pull-requests: write  # react step: ack reaction on PR review comments
    outputs:
      should_run: ${{ steps.resolve.outputs.should_run }}
      command: ${{ steps.resolve.outputs.command }}
    steps:
      - uses: actions/checkout@v6
      # Materialize the plugin so resolve-command-trigger.sh / react-to-trigger.sh
      # exist at .devflow/vendor/devflow/scripts/ (committed → self → fetch).
      - uses: ./.github/actions/vendor-plugin
        with:
          ref: ${{ needs.config.outputs.devflow_version }}
      - id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.event.sender.login }}
          ALLOWED_BOTS: ${{ needs.config.outputs.allowed_bots }}
          ALLOWED_USERS: ${{ needs.config.outputs.allowed_users }}
          CONTEXT_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          # Only a real comment/review body contributes — never an issue/PR
          # description. Passed as an env var (never interpolated into bash) so
          # arbitrary body text cannot inject.
          TRIGGER_TEXT: ${{ github.event.comment.body || github.event.review.body }}
        run: |
          set -euo pipefail
          # Vendored path: install.sh copies the plugin into .devflow/vendor/devflow/.
          RESOLVER=.devflow/vendor/devflow/scripts/resolve-command-trigger.sh
          if [ ! -x "$RESOLVER" ]; then
            echo "::error::devflow resolver not found at $RESOLVER — has install.sh vendored the plugin into this repo? Skipping." >&2
            { echo "should_run=false"; echo "command="; } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          "$RESOLVER" >> "$GITHUB_OUTPUT"

      # Optional, opt-in: mint an App token DOWNSCOPED for the trigger reaction
      # (issues:write + pull-requests:write — the narrowest grant GitHub offers
      # for comment reactions; no contents/workflows: this job neither reads
      # code with it nor pushes). Same opt-in/fail-loud/downscope contract as
      # the review mint in devflow-runner.yml — see docs/cloud-setup.md. NOTE:
      # fail-loud means a configured-but-broken App fails THIS gate job (and so
      # blocks the command path) — deliberate, so a broken App is never
      # silently degraded around. Minted only when the reaction below will
      # actually run (should_run), so the common unauthorized/non-command
      # rejection path stays mint-free.
      - name: Mint downscoped reaction token (optional)
        id: gate_app_token
        if: ${{ vars.DEVFLOW_APP_ID != '' && steps.resolve.outputs.should_run == 'true' }}
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.DEVFLOW_APP_ID }}
          private-key: ${{ secrets.DEVFLOW_APP_PRIVATE_KEY }}
          permission-issues: write
          permission-pull-requests: write

      # Early acknowledgement: react on the triggering comment/issue the moment
      # we know the command is authorized + resolvable, long before the heavy
      # `command` job runs. Best-effort and continue-on-error so a reaction
      # hiccup never blocks the run. (The dedupe job runs in parallel, so a
      # later-suppressed manual /devflow:review may still get a reaction here —
      # that acknowledges the trigger; review_dedupe's comment explains routing.)
      - name: Acknowledge trigger
        if: ${{ steps.resolve.outputs.should_run == 'true' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.gate_app_token.outputs.token || github.token }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_ID: ${{ github.event.comment.id }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        # Invoked via `bash` (not bare-exec) so it works regardless of whether
        # the vendored copy kept its executable bit — same robustness rationale
        # as the implement resolver's `bash "$RESOLVER"`. A missing file errors
        # visibly but is absorbed by continue-on-error (best-effort ack).
        run: bash .devflow/vendor/devflow/scripts/react-to-trigger.sh

  command:
    needs: [config, review_dedupe, gate]
    if: ${{ needs.gate.outputs.should_run == 'true' && needs.review_dedupe.outputs.suppress != 'true' }}
    runs-on: ${{ vars.DEVFLOW_RUNNER && (startsWith(vars.DEVFLOW_RUNNER, '[') && fromJSON(vars.DEVFLOW_RUNNER) || vars.DEVFLOW_RUNNER) || 'ubuntu-latest' }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: write # write scope so actions/cache can save the pip cache (read alone → "cache write denied: token has no writable scopes"); superset still lets Claude read CI results on PRs
      # Required by summarize-ci-checks.sh's commits/{sha}/check-runs query, run by
      # the `Compose review grounding block` step (issue #363). Without it that query
      # 403s and the block correctly degrades to `CI status unavailable` — but the
      # engine then loses the CI ground truth the block exists to give it. The
      # actions/runs + jobs queries ride the `actions: write` superset above.
      checks: read
    env:
      # Authorize the Stop-hook `--persist` telemetry PUSH on this WRITABLE tier
      # (issue #469 AC5). The manual `/devflow:review` comment path (and every other
      # command this job runs) holds contents:write, so the branch push succeeds
      # here — unlike the read-only auto-review `review` tier (devflow-runner.yml),
      # which deliberately leaves this UNSET so `--persist` fails closed to
      # staging-only. Job-level so it reaches the Stop-hook subprocess
      # claude-code-action spawns. Kept in sync with devflow-implement.yml's claude
      # job. (Platform premise — job env propagates into the Stop-hook subprocess.)
      DEVFLOW_TELEMETRY_PUSH: '1'
    steps:
      # Optional, opt-in: mint a primary-App installation token at full
      # installation scope (notably Contents: write + Workflows: write — no
      # permission-* downscope, unlike the per-site tokens elsewhere in this
      # workflow) so the /devflow:review-and-fix push can
      # edit .github/workflows/ files (which the built-in GITHUB_TOKEN is
      # hard-blocked from), and so /devflow:pr-description posts under the App.
      # Gated on the DEVFLOW_APP_ID repository VARIABLE and skipped on a
      # `/devflow:review` command (that path uses the DevFlow-Reviewer token
      # below so it never shares the PR-authoring identity — issue #300):
      # unset/empty → the step is skipped and both the checkout token and
      # github_token below fall back to GITHUB_TOKEN, leaving behavior
      # byte-for-byte unchanged for consumers who do not opt in. NO
      # continue-on-error: a configured-but-broken App (invalid/rotated key)
      # fails the job here rather than silently degrading.
      #
      # MUST precede the checkout below, whose `token:` it feeds — see the
      # checkout comment. Kept in sync with the same step in
      # devflow-implement.yml.
      - name: Mint workflow-capable token (optional)
        id: app-token
        if: ${{ vars.DEVFLOW_APP_ID != '' && !startsWith(needs.gate.outputs.command, '/devflow:review ') }}
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.DEVFLOW_APP_ID }}
          private-key: ${{ secrets.DEVFLOW_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # /devflow:review and /devflow:pr-description read the diff via
          # three-dot notation against `origin/main` (`git diff
          # origin/main...HEAD`), which internally computes a merge-base —
          # an ancestor walk on both sides. Depth 50 covers the realistic
          # case (PRs typically ≤ a few dozen commits behind main); long-
          # lived branches that drift past that will error out visibly on
          # the missing merge-base rather than silently produce wrong
          # output. Bump to `fetch-depth: 0` if that becomes a recurring
          # problem.
          fetch-depth: 50
          # LOAD-BEARING (issue #357): the credential actions/checkout persists
          # here is what /devflow:review-and-fix's `git push` actually
          # authenticates with — NOT the `github_token` handed to
          # claude-code-action below. checkout@v6 writes the auth header to an
          # external config file wired in via `includeIf.gitdir:`, NOT to
          # `.git/config`, so claude-code-action's `--unset-all
          # http.<server>/.extraheader` matches nothing and its
          # `git remote set-url origin https://x-access-token:<app-token>@…`
          # loses to that surviving preemptive `Authorization:` header — every
          # push then authenticates as github-actions[bot], which has no
          # `workflows` permission. Seed the App token here instead. On a
          # `/devflow:review` command the mint is skipped by design and this
          # falls back to GITHUB_TOKEN — that path is read-only and never
          # pushes, so it must NOT be given the reviewer token either.
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}

      # Materialize the plugin (committed → self → fetch) so claude-code-action
      # loads it from .devflow/vendor/devflow/ and the agent's helper scripts
      # resolve at the literal workspace path the allowlist grants.
      - uses: ./.github/actions/vendor-plugin
        with:
          ref: ${{ needs.config.outputs.devflow_version }}

      # Provision the runtime (Python / Node / pip cache / deps) from
      # `.devflow/config.json`'s `setup` block. The logic lives in the
      # setup-project-env composite action so devflow.yml and
      # devflow-implement.yml share ONE copy (checkout above gives the action
      # the repo + config to read). See docs/cloud-setup.md for the rationale.
      - id: cfg
        uses: ./.github/actions/read-project-config
      - uses: ./.github/actions/setup-project-env
        with:
          config_json: ${{ steps.cfg.outputs.json }}

      # Optional, opt-in: for the `/devflow:review` command ONLY, mint a
      # DEDICATED DevFlow-Reviewer installation token DOWNSCOPED to the review
      # agent's needs (contents/issues:read, pull-requests:write, actions:read —
      # same set as devflow-runner.yml's review mint). This is the manual
      # `/devflow:review` twin of the auto-review runner: the review identity is
      # DevFlow-Reviewer, structurally distinct from the primary
      # `devflow-autopilot` App that authors PRs, so Phase 4.4's
      # `gh pr review --request-changes`/`--approve` is not a forbidden
      # self-review (issue #300). Gated on the DEVFLOW_REVIEWER_APP_ID VARIABLE
      # AND on the command being exactly `/devflow:review` (the trailing space
      # in the startsWith excludes `/devflow:review-and-fix`, which pushes fixes
      # and stays on the primary app token below). Unset reviewer var → skipped,
      # github_token falls back to GITHUB_TOKEN — NEVER the primary app token.
      - name: Mint downscoped DevFlow-Reviewer token (optional)
        id: reviewer-token
        if: ${{ vars.DEVFLOW_REVIEWER_APP_ID != '' && startsWith(needs.gate.outputs.command, '/devflow:review ') }}
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.DEVFLOW_REVIEWER_APP_ID }}
          private-key: ${{ secrets.DEVFLOW_REVIEWER_PRIVATE_KEY }}
          permission-contents: read
          permission-issues: read
          permission-pull-requests: write
          permission-actions: read

      # Resolve the allowed-tools string ONCE, as a step output. It used to be an
      # inline literal inside `claude_args`, which the grounding block below could
      # not read — and a second, hand-copied list would drift from the real one the
      # moment either changed. Hoisting it makes the block quote the exact string
      # this run resolved, by construction (issue #363).
      #
      # The command heads that skills/review/SKILL.md invokes are pinned against
      # this list by lib/test/run.sh: a head the skill runs but this list omits is
      # silently denied at runtime.
      #
      # The TOOLS='…' literal below is a GENERATED region — do NOT hand-edit it. It is
      # compiled from the `command` profile in lib/capability-profiles.json by
      # lib/generate-capability-profiles.py; change a grant there and regenerate. The
      # banner comment above the assignment carries the manifest_version + the region's
      # sha256, and lib/test/run.sh's --check turns any manifest↔literal drift RED.
      - name: Resolve allowed-tools
        id: tools
        env:
          EXTRA: ${{ needs.config.outputs.allowed_tools_extra }}
        run: |
          set -euo pipefail
          # devflow-capability-manifest: region=command manifest_version=5 sha256=472dde4c9b826a4d46c484c93166d4ecc04f29ee162fa8fac209cd56899e2ae5
          TOOLS='Read, Write, Edit, Glob, Grep, LS, Skill, Agent, TodoWrite, EnterPlanMode, ExitPlanMode, WebFetch, WebSearch, Bash(git add:*), Bash(git commit:*), Bash(git push:*), Bash(git pull:*), Bash(git fetch:*), Bash(git ls-remote:*), Bash(git status:*), Bash(git diff:*), Bash(git log:*), Bash(git show:*), Bash(git checkout:*), Bash(git cat-file:*), Bash(git hash-object:*), Bash(git branch:*), Bash(git stash:*), Bash(git rm:*), Bash(git mv:*), Bash(git restore:*), Bash(git revert:*), Bash(git blame:*), Bash(git ls-files:*), Bash(git rev-parse:*), Bash(git merge-base:*), Bash(git merge:*), Bash(gh pr create:*), Bash(gh pr edit:*), Bash(gh pr comment:*), Bash(gh pr diff:*), Bash(gh pr view:*), Bash(gh pr review:*), Bash(gh pr ready:*), Bash(gh pr list:*), Bash(gh pr checks:*), Bash(gh pr status:*), Bash(gh pr reopen:*), Bash(gh pr checkout:*), Bash(gh issue view:*), Bash(gh issue comment:*), Bash(gh issue list:*), Bash(gh issue edit:*), Bash(gh issue create:*), Bash(gh issue reopen:*), Bash(gh issue status:*), Bash(gh search:*), Bash(gh label list:*), Bash(gh repo view:*), Bash(gh run view:*), Bash(gh run list:*), Bash(gh workflow view:*), Bash(gh workflow list:*), Bash(gh api:*), Bash(jq:*), Bash(.devflow/vendor/devflow/scripts/run-jq.sh:*), Bash(.devflow/vendor/devflow/scripts/config-get.sh:*), Bash(.devflow/vendor/devflow/scripts/workpad.py:*), Bash(.devflow/vendor/devflow/scripts/verification-flight.py:*), Bash(.devflow/vendor/devflow/scripts/parse-acs.py:*), Bash(.devflow/vendor/devflow/scripts/branch-for-issue.py:*), Bash(.devflow/vendor/devflow/scripts/update-branch-checkpoint.sh:*), Bash(.devflow/vendor/devflow/scripts/file-deferrals.py:*), Bash(.devflow/vendor/devflow/scripts/match-deferrals.py:*), Bash(.devflow/vendor/devflow/scripts/match-lint-adjudications.py:*), Bash(.devflow/vendor/devflow/scripts/normalize-verdicts.py:*), Bash(.devflow/vendor/devflow/scripts/resolve-review-overrides.py:*), Bash(.devflow/vendor/devflow/scripts/stale-prose-lint.py:*), Bash(.devflow/vendor/devflow/scripts/dismiss-stale-rejections.sh:*), Bash(.devflow/vendor/devflow/lib/efficiency-trace.sh:*), Bash(pip install:*), Bash(pip:*), Bash(python:*), Bash(python3:*), Bash(python -m:*), Bash(python3 -m:*), Bash(ruff:*), Bash(ruff check:*), Bash(ruff format:*), Bash(pytest:*), Bash(mypy:*), Bash(grep:*), Bash(rg:*), Bash(find:*), Bash(wc:*), Bash(sort:*), Bash(uniq:*), Bash(cut:*), Bash(tr:*), Bash(xargs:*), Bash(awk:*), Bash(sed:*), Bash(diff:*), Bash(comm:*), Bash(cat:*), Bash(head:*), Bash(tail:*), Bash(less:*), Bash(ls:*), Bash(tree:*), Bash(file:*), Bash(stat:*), Bash(date:*), Bash(pwd:*), Bash(realpath:*), Bash(dirname:*), Bash(basename:*), Bash(which:*), Bash(type:*), Bash(env:*), Bash(echo:*), Bash(printf:*), Bash(test:*), Bash(touch:*), Bash(mkdir:*), Bash(rmdir:*), Bash(rm:*), Bash(mv:*), Bash(cp:*), Bash(mktemp:*), Bash(cmp:*), Bash(.devflow/vendor/devflow/scripts/load-prompt-extension.sh:*), Bash(*/load-prompt-extension.sh:*), Bash(tee:*)'
          printf 'tools=%s\n' "${TOOLS}${EXTRA}" >> "$GITHUB_OUTPUT"

      # Ground the manual `/devflow:review` engine in the same two facts the
      # automated path gets from devflow-runner.yml's `Compose review prompt`:
      # the commands it may run, and the CI already observed for this head.
      #
      # Gated on the resolved command, reusing this file's existing idiom. The
      # trailing space in `/devflow:review ` excludes `/devflow:review-and-fix`,
      # which holds a different (write-enabled) tool set and gets no block — this
      # is what keeps the block's instructions conditional on its own presence.
      # Every other command falls through to the bare prompt, byte-for-byte.
      - name: Compose review grounding block
        id: reviewcompose
        if: ${{ startsWith(needs.gate.outputs.command, '/devflow:review ') }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SELF_WORKFLOW_NAME: ${{ github.workflow }}
          ALLOWED_TOOLS: ${{ steps.tools.outputs.tools }}
          CMD: ${{ needs.gate.outputs.command }}
        run: |
          set -euo pipefail
          # This job is comment-triggered, so `github.sha` is the default branch,
          # not the PR head. Resolve the head from the PR the command names.
          PR_NUM=$(printf '%s' "$CMD" | grep -oE '[0-9]+' | head -1 || true)
          HEAD_SHA=""
          if [ -n "$PR_NUM" ]; then
            HEAD_SHA=$(gh pr view "$PR_NUM" --repo "$REPO" --json headRefOid -q .headRefOid 2>/dev/null || true)
          fi
          export HEAD_SHA
          SCC=.devflow/vendor/devflow/scripts/summarize-ci-checks.sh
          [ -f "$SCC" ] || SCC=scripts/summarize-ci-checks.sh
          # Each no-op branch names the condition that fired. Two different causes
          # converging on one breadcrumb would leave a reader unable to tell a missing
          # helper from an unresolved head — both render the same `CI status
          # unavailable`, which is the point: an unknown CI state must never render
          # as a passing one.
          if [ ! -f "$SCC" ]; then
            echo "::warning::devflow: summarize-ci-checks.sh not found at either the vendored or repo path — the review prompt's CI section will report it unavailable" >&2
            CI_SUMMARY="CI status unavailable"
          elif [ -z "$HEAD_SHA" ]; then
            echo "::warning::devflow: could not resolve a head SHA for PR '${PR_NUM:-<none parsed from the command>}' (gh pr view failed, or the command carried no PR number) — the review prompt's CI section will report it unavailable" >&2
            CI_SUMMARY="CI status unavailable"
          else
            CI_SUMMARY=$(bash "$SCC") || CI_SUMMARY="CI status unavailable"
          fi
          [ -n "$CI_SUMMARY" ] || CI_SUMMARY="CI status unavailable"

          RGB=.devflow/vendor/devflow/scripts/render-grounding-block.sh
          [ -f "$RGB" ] || RGB=scripts/render-grounding-block.sh
          if [ ! -f "$RGB" ]; then
            echo "::warning::devflow: render-grounding-block.sh not found at either the vendored or repo path — falling back to the bare command prompt" >&2
            exit 0
          fi
          GROUNDING=$(CI_SUMMARY="$CI_SUMMARY" ALLOWED_TOOLS="$ALLOWED_TOOLS" bash "$RGB") || GROUNDING=""
          # Verify the OUTCOME, not the file's existence (see devflow-runner.yml).
          # An empty block means the engine gets the bare command prompt back, which
          # is the pre-#363 behavior — degraded, but never a silently-empty block.
          if [ -z "$GROUNDING" ]; then
            echo "::warning::devflow: render-grounding-block.sh produced no output — falling back to the bare command prompt for this review" >&2
            exit 0
          fi
          PROMPT="${GROUNDING}

          ${CMD}"
          delim="PROMPT_EOF_$(date +%s%N)_$$"
          { printf 'prompt<<%s\n' "$delim"; printf '%s\n' "$PROMPT"; printf '%s\n' "$delim"; } >> "$GITHUB_OUTPUT"

      # ── Long-run credential refresh (issue #487) ──────────────────────────
      # Keep this /devflow:implement- or /devflow:review-and-fix-driven command
      # run push- and gh-capable past the App installation token's 60-minute
      # lifetime. Gated on the SAME condition as this job's app-token mint —
      # vars.DEVFLOW_APP_ID != '' AND not a /devflow:review command (the
      # read-only review path uses the downscoped reviewer token and never
      # pushes). DELIBERATELY a DETACHED process, not a `background:` step:
      # actionlint rejects the unrecognized `background:` step key, so the refresher
      # is spawned with `nohup … &` and survives into the claude step. Key piped to
      # stdin (never argv, never disk); the detached refresher is launched with
      # `env -u` (dropping the key var) so its exec-time environment — hence
      # /proc/<pid>/environ, readable by the concurrent same-uid claude step —
      # never holds the PEM (the step-level env var exists only so this short-lived
      # launcher shell can pipe it; an in-process `unset` alone would NOT scrub the
      # long-lived refresher's /proc environ, which snapshots exec time — proc(5)).
      # The loop traps TERM/exits 0; the `if: always()` pidfile-kill step retires it.
      # Kept in sync with devflow-implement.yml. See docs/cloud-setup.md.
      - name: Start credential refresher (optional)
        id: refresher
        if: ${{ vars.DEVFLOW_APP_ID != '' && !startsWith(needs.gate.outputs.command, '/devflow:review ') }}
        env:
          DEVFLOW_APP_ID: ${{ vars.DEVFLOW_APP_ID }}
          DEVFLOW_APP_PRIVATE_KEY: ${{ secrets.DEVFLOW_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          # No scripts/… self-repo fallback here (unlike the always() Stop step): this
          # step runs right after `vendor-plugin` on the same sequential job, so the
          # vendored path is always present — a fallback would be dead code. Do NOT add
          # one in a wrong-direction "reconcile" with the Stop step.
          printf '%s' "$DEVFLOW_APP_PRIVATE_KEY" \
            | env -u DEVFLOW_APP_PRIVATE_KEY \
                nohup bash .devflow/vendor/devflow/scripts/refresh-app-credentials.sh loop \
                >"$RUNNER_TEMP/devflow-refresh.log" 2>&1 &
          disown || true
          echo "credential refresher started (detached); log: $RUNNER_TEMP/devflow-refresh.log"

      # Body delegated to the checked-in seven-output-validated installer (issue
      # #533) — see devflow-implement.yml's install-step comment for the full
      # rationale (PATH-scoped wrapper selection; no process-global DEVFLOW_GH;
      # vendored at the pinned devflow_version — a stale pin fails this step
      # loudly before the agent; refresh workflows and the pin together).
      - name: Install fresh-gh wrapper (optional)
        if: ${{ vars.DEVFLOW_APP_ID != '' && !startsWith(needs.gate.outputs.command, '/devflow:review ') }}
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          bash .devflow/vendor/devflow/scripts/install-gh-wrapper.sh
      # ── Third-party model provider resolution (issue #313) ─────────────────
      # Resolve this section's (devflow) provider decision from .devflow/config.json
      # via the single-sourced inline jq RESOLVER below. The RESOLVER program is
      # byte-identical across devflow.yml, devflow-implement.yml, and
      # devflow-runner.yml (lib/test/run.sh pins that identity); only the
      # `--arg section` value differs. An empty decision (no provider) reproduces
      # today's Anthropic-OAuth wiring for a given `claude_model` (one deliberate
      # change: an empty resolved model now fails loud instead of rendering
      # `--model null`). See docs/cloud-setup.md.
      - name: Resolve model provider
        id: provider
        env:
          CONFIG_JSON: ${{ steps.cfg.outputs.json }}
          SECTION: devflow
        run: |
          set -euo pipefail
          # devflow-provider-resolver BEGIN (single-sourced; keep byte-identical across the three cloud workflows — lib/test/run.sh pins it)
          RESOLVER='
          (if (. | type) == "object" then . else {} end) as $cfg
          | (if (($cfg[$section]) | type) == "object" then $cfg[$section] else {} end) as $sec
          | ($sec.provider) as $praw
          | (if (($sec.claude_model) | type) == "string" and ($sec.claude_model != "") then $sec.claude_model else ($cfg.claude_model // "") end) as $model
          | if ($praw == null or $praw == "") then
              {provider:"", base_url:"", auth:"", timeout_ms:"", effort_supported:true, model:$model, env:{}}
            elif (($praw) | type) != "string" then
              {error:"invalid_provider", section:$section, provider:"", detail:"section provider must be a string"}
            else
              (if (($cfg.providers) | type) == "object" then $cfg.providers else {} end) as $provs
              | if (($provs[$praw]) | type) != "object" then
                  {error:"undefined_provider", section:$section, provider:$praw, detail:"provider is not defined in the providers map"}
                elif ((($provs[$praw].base_url) | type) != "string" or ($provs[$praw].base_url == "")) then
                  {error:"incomplete_provider", section:$section, provider:$praw, detail:"provider entry has no base_url"}
                elif (($provs[$praw].auth) as $a | ($a != "bearer" and $a != "api_key")) then
                  {error:"incomplete_provider", section:$section, provider:$praw, detail:"provider auth must be bearer or api_key"}
                else
                  ($provs[$praw]) as $p
                  | {provider:$praw, base_url:$p.base_url, auth:$p.auth, timeout_ms:($p.timeout_ms // ""), effort_supported:(($p.effort_supported // false) == true), model:$model, env:(if (($p.env) | type) == "object" then $p.env else {} end)}
                end
            end
          '
          # devflow-provider-resolver END
          DECISION=$(printf '%s' "$CONFIG_JSON" | jq -c --arg section "$SECTION" "$RESOLVER")
          # jq on EMPTY stdin emits nothing with rc 0, so an empty CONFIG_JSON would
          # otherwise sail through as a zero-output "decision" and silently select the
          # default path (or a misdirected empty-model error downstream). Both producers
          # provably never emit empty today, so this is a fail-loud tripwire, not a live path.
          if [ -z "$DECISION" ]; then
            echo "::error::provider resolver produced no decision for section '$SECTION' (empty config input?). Refusing to run."
            exit 1
          fi
          if [ "$(printf '%s' "$DECISION" | jq -r '.error // ""')" != "" ]; then
            PNAME=$(printf '%s' "$DECISION" | jq -r '.provider // ""')
            DETAIL=$(printf '%s' "$DECISION" | jq -r '.detail // "provider configuration is invalid"')
            echo "::error::.devflow/config.json section '$SECTION' provider '$PNAME': $DETAIL. Fix the providers.$PNAME entry (base_url + auth: bearer|api_key) or remove the section provider key. Refusing to run."
            exit 1
          fi
          # One jq pass emits every scalar decision field to the step output, each as a
          # newline-safe heredoc block: a config-sourced value carrying an embedded newline
          # would otherwise split a plain KEY=VALUE line and forge further step outputs. The
          # timestamped+PID delimiter mirrors the decision<< output below.
          sdelim="OUT_EOF_$(date +%s%N)_$$"
          printf '%s' "$DECISION" | jq -r --arg d "$sdelim" '
            ["provider","model","auth","base_url","timeout_ms","effort_supported"][] as $k
            | "\($k)<<\($d)", "\(.[$k])", $d' >> "$GITHUB_OUTPUT"
          # Forward the full decision (it carries the provider env map) to the
          # inject step via a heredoc output so embedded values survive verbatim.
          delim="DEC_EOF_$(date +%s%N)_$$"
          {
            printf 'decision<<%s\n' "$delim"
            printf '%s\n' "$DECISION"
            printf '%s\n' "$delim"
          } >> "$GITHUB_OUTPUT"

      # Inject the provider endpoint into the JOB env — ONLY when a provider is
      # active. A `run:` step writing $GITHUB_ENV (never a static step `env:`
      # block of always-present expressions) is the only mechanism that can carry
      # config-driven dynamic keys, and gating on `provider != ''` keeps the
      # default path free of even empty-valued ANTHROPIC_* vars (AC 1/4). This
      # step also carries the fail-loud empty-secret guard (AC 6), before the
      # action step runs.
      - name: Inject provider endpoint (provider-routed sections only)
        if: ${{ steps.provider.outputs.provider != '' }}
        env:
          DECISION: ${{ steps.provider.outputs.decision }}
          AUTH: ${{ steps.provider.outputs.auth }}
          BASE_URL: ${{ steps.provider.outputs.base_url }}
          TIMEOUT_MS: ${{ steps.provider.outputs.timeout_ms }}
          PROVIDER: ${{ steps.provider.outputs.provider }}
          PROVIDER_API_KEY: ${{ secrets.DEVFLOW_PROVIDER_API_KEY }}
          SECTION: devflow
        run: |
          set -euo pipefail
          if [ -z "$PROVIDER_API_KEY" ]; then
            echo "::error::.devflow/config.json section '$SECTION' selects provider '$PROVIDER' but the DEVFLOW_PROVIDER_API_KEY repository secret is empty. Set that secret (the provider API key) before running a provider-routed job. Refusing to run."
            exit 1
          fi
          # SECURITY: the env-map KEY is interpolated RAW into the `KEY<<DELIM` heredoc
          # header — the newline-safe heredoc protects VALUES, not keys, so a key
          # carrying a newline or `<<` could forge a further job env var name or break
          # the heredoc terminator (leaving an opaque "matching delimiter not found"
          # abort). Keys come from maintainer-controlled config, but validate them
          # POSITIVELY against a real env-var-name charset and fail loud on any stray
          # key rather than emit a malformed/forged $GITHUB_ENV block.
          if printf '%s' "$DECISION" | jq -e '.env | keys[] | select(test("^[A-Za-z_][A-Za-z0-9_]*$") | not)' >/dev/null 2>&1; then
            echo "::error::.devflow/config.json section '$SECTION' provider '$PROVIDER' has an env-map key that is not a valid environment variable name ([A-Za-z_][A-Za-z0-9_]*). Fix the providers.$PROVIDER.env keys. Refusing to run."
            exit 1
          fi
          # Every $GITHUB_ENV write below uses GitHub's newline-safe multiline (heredoc) form —
          # the scalar endpoint values via genv(), the provider env map via the inline jq heredoc
          # emit at the end — so a config-sourced value carrying an embedded newline cannot split
          # a plain KEY=VALUE line and inject/forge a further job env var. Mirrors the resolver's
          # decision<< output; the timestamped+PID delimiter makes value collision negligible.
          genv() { local d; d="ENV_EOF_$(date +%s%N)_$$"; { printf '%s<<%s\n' "$1" "$d"; printf '%s\n' "$2"; printf '%s\n' "$d"; } >> "$GITHUB_ENV"; }
          # base_url is guaranteed non-empty by the resolver (a provider-active decision
          # fails loud on an empty base_url), so write it unconditionally.
          genv ANTHROPIC_BASE_URL "$BASE_URL"
          if [ -n "$TIMEOUT_MS" ]; then genv API_TIMEOUT_MS "$TIMEOUT_MS"; fi
          # Bearer-token gateways read Authorization from ANTHROPIC_AUTH_TOKEN; the
          # same key also rides as the anthropic_api_key action input below (the
          # documented two-slot recipe). auth: api_key passes it via the input only.
          if [ "$AUTH" = "bearer" ]; then genv ANTHROPIC_AUTH_TOKEN "$PROVIDER_API_KEY"; fi
          # Every key of the provider env map (haiku/subagent model mappings, the
          # beta/attribution toggles, …) verbatim, each as a heredoc block. These are
          # non-secret model/config values (only the API key above is a masked secret).
          edelim="ENV_EOF_$(date +%s%N)_$$"
          printf '%s' "$DECISION" | jq -r --arg d "$edelim" '.env | to_entries[] | "\(.key)<<\($d)", "\(.value)", $d' >> "$GITHUB_ENV"

      # Compute the claude_args head so --model is always present and --effort is
      # dropped only for a provider whose effort_supported is false (AC 7). The
      # Anthropic default path resolves effort_supported=true, so effort is
      # preserved there (for a non-empty effort value — the run body's
      # flag-injection guard enum-validates effort and allowlist-validates the
      # model id, rejecting flag-shaped or out-of-charset values).
      - name: Build claude_args head (model + conditional effort)
        id: cargs
        env:
          MODEL: ${{ steps.provider.outputs.model }}
          EFFORT: ${{ needs.config.outputs.effort }}
          EFFORT_SUPPORTED: ${{ steps.provider.outputs.effort_supported }}
        run: |
          set -euo pipefail
          if [ -z "$MODEL" ]; then
            echo "::error::claude_model is missing from .devflow/config.json (set a top-level claude_model, or a per-section claude_model). Refusing to run."
            exit 1
          fi
          # SECURITY: MODEL and EFFORT are spliced UNQUOTED into claude_args (a folded
          # CLI string), and the runner can read either from PR-head config (EFFORT
          # always via steps.extract when the caller passes no effort input; MODEL in
          # the bootstrap fallback) — so refuse any value that could smuggle an extra
          # CLI flag. A blacklist is NOT enough here: the action tokenises claude_args
          # shell-style, so a flag-shaped single token (`--model --evil`) records
          # --model as valueless and passes --evil through as its own flag, and a
          # bytewise [[:space:]] check misses Unicode whitespace (NBSP/U+2028/U+3000)
          # under a non-UTF-8 runner locale while the JS tokeniser still splits on it.
          # So MODEL is validated POSITIVELY: reject a leading dash, then reject any
          # character outside the conservative model-id allowlist
          # A-Za-z0-9 . _ / : @ [ ] -  (covers claude-*, provider/model, Z.ai
          # bracket-suffix ids like glm-5.2[1m], and Bedrock-style colon ids) — a
          # multibyte character is rejected in every locale because none of its bytes
          # (C locale) nor its codepoint (UTF-8 locale) is in the allowlist. EFFORT is
          # pinned to its schema enum (or empty, which drops the flag below). In the
          # negated bracket expression, `]` sits first after `!` and `-` last, making
          # both literal members of the set.
          case "$MODEL" in
            -*)
              echo "::error::claude_model value is flag-shaped (leading dash) — refusing to compose claude_args (flag-injection guard; the model must be a single non-dash-leading token)."
              exit 1 ;;
            *[!]A-Za-z0-9._/:@[-]*)
              echo "::error::claude_model value contains a character outside the model-id allowlist (A-Za-z0-9 . _ / : @ [ ] -) — refusing to compose claude_args (flag-injection guard)."
              exit 1 ;;
          esac
          case "$EFFORT" in
            '' | low | medium | high | xhigh | max) : ;;
            *)
              echo "::error::effort value is not one of low/medium/high/xhigh/max — refusing to compose claude_args (flag-injection guard)."
              exit 1 ;;
          esac
          ARGS="--model $MODEL"
          # --effort only when the provider supports it AND a value actually resolved. The
          # config effort defaults to "high", so the default path always has one; the -n
          # co-guard just avoids ever handing the CLI a valueless --effort on a pathological
          # empty effort.
          if [ "$EFFORT_SUPPORTED" = "true" ] && [ -n "$EFFORT" ]; then
            ARGS="$ARGS --effort $EFFORT"
          fi
          # Newline-safe heredoc output (mirrors the resolver's decision<< / scalar-output form).
          adelim="OUT_EOF_$(date +%s%N)_$$"
          { printf 'args<<%s\n' "$adelim"; printf '%s\n' "$ARGS"; printf '%s\n' "$adelim"; } >> "$GITHUB_OUTPUT"

      # Compose the plugins/plugin_marketplaces inputs (issue #505): the baked
      # baseline (byte-identical across the three call sites — run.sh pins it)
      # PLUS the entries this repo's trusted default-branch .claude/settings.json
      # declares (enabledPlugins=true; github-kind extraKnownMarketplaces), so a
      # consumer repo's cloud plugin surface matches what its local team sees —
      # "commit the settings file once, every tier honors it." This write tier's
      # checkout IS the default branch (issue_comment checks out the default), so
      # .claude/settings.json is maintainer-committed, trusted. The single-line
      # `printf '%s\n' <args>` baseline form avoids the YAML-indent-corrupts-
      # multiline-literals gotcha and is grep-pinnable for the sync invariant.
      - name: Compose plugin inputs (baseline + settings-declared)
        id: plugins
        run: |
          set -euo pipefail
          BAKED_PLUGINS="$(printf '%s\n' code-review@claude-plugins-official claude-md-management@claude-plugins-official devflow@devflow-marketplace)"
          BAKED_MARKETPLACES="$(printf '%s\n' https://github.com/anthropics/claude-plugins-official.git ./)"
          SETTINGS=.claude/settings.json
          HELPER=.devflow/vendor/devflow/scripts/resolve-extra-plugins.sh
          COMPOSE=.devflow/vendor/devflow/scripts/describe-plugin-compose.sh
          EX_P="$(mktemp)"; EX_M="$(mktemp)"; ERR_P="$(mktemp)"; ERR_M="$(mktemp)"; ENTRIES="$(mktemp)"
          trap 'rm -f "$EX_P" "$EX_M" "$ERR_P" "$ERR_M" "$ENTRIES"' EXIT
          if [ ! -f "$HELPER" ]; then
            # Skew arm (issue #455 two-halves; inline + grep-pinned by run.sh): the
            # helper is absent at the vendored path — a consumer whose pinned
            # devflow_version predates issue #505 running an upgraded workflow.
            # Proceed with the baked baseline; one ::warning:: names devflow_version
            # as the remedy. This arm fires precisely when describe-plugin-compose.sh
            # (absent alongside it) cannot be invoked, so the warning stays inline
            # rather than routed through the helper.
            echo "::warning::devflow resolve-extra-plugins.sh not found at $HELPER — a pinned devflow_version predating issue #505 running an upgraded workflow; proceeding with the baked plugin baseline. Bump devflow_version in .devflow/config.json to compose settings-declared plugins."
            : > "$EX_P"; : > "$EX_M"; : > "$ERR_P"; : > "$ERR_M"
          else
            bash "$HELPER" plugins "$SETTINGS" > "$EX_P" 2>"$ERR_P" || true
            bash "$HELPER" marketplaces "$SETTINGS" > "$EX_M" 2>"$ERR_M" || true
          fi
          # Join breadcrumbs into one defect string (bash builtins; guard-class 2 —
          # the joined value that decides the degraded-arm message is not derived
          # through cat/tr/sed, non-preflight PATH tools).
          DEFECT=""
          for f in "$ERR_P" "$ERR_M"; do
            while IFS= read -r line || [ -n "$line" ]; do
              [ -z "$line" ] && continue
              if [ -z "$DEFECT" ]; then DEFECT="$line"; else DEFECT="$DEFECT; $line"; fi
            done < "$f"
          done
          # Spliced entries (extras beyond baseline) for the splice ::notice::.
          : > "$ENTRIES"
          for f in "$EX_P" "$EX_M"; do
            while IFS= read -r line || [ -n "$line" ]; do
              [ -z "$line" ] && continue
              printf '%s\n' "$line" >> "$ENTRIES"
            done < "$f"
          done
          # Dedupe baseline + extras, keeping the first occurrence (bash builtins;
          # guard-class 2 — no tr/sed/wc/cut/head for the emitted list). The `|`
          # separator never occurs in a plugin@marketplace entry or a marketplace URL.
          dedupe() {
            local baseline="$1" extras="$2" seen="" line out=""
            while IFS= read -r line || [ -n "$line" ]; do
              [ -z "$line" ] && continue
              case "$seen" in *"|$line|"*) ;; *) seen="$seen|$line|"; out="${out:+$out$'\n'}$line" ;; esac
            done <<< "$baseline"
            if [ -f "$extras" ]; then
              while IFS= read -r line || [ -n "$line" ]; do
                [ -z "$line" ] && continue
                case "$seen" in *"|$line|"*) ;; *) seen="$seen|$line|"; out="${out:+$out$'\n'}$line" ;; esac
              done < "$extras"
            fi
            printf '%s\n' "$out"
          }
          COMBINED_PLUGINS="$(dedupe "$BAKED_PLUGINS" "$EX_P")"
          COMBINED_MK="$(dedupe "$BAKED_MARKETPLACES" "$EX_M")"
          pdelim="PLG_EOF_$(date +%s%N)_$$"
          { printf 'plugins<<%s\n' "$pdelim"; printf '%s\n' "$COMBINED_PLUGINS"; printf '%s\n' "$pdelim"; } >> "$GITHUB_OUTPUT"
          mdelim="MKT_EOF_$(date +%s%N)_$$"
          { printf 'plugin_marketplaces<<%s\n' "$mdelim"; printf '%s\n' "$COMBINED_MK"; printf '%s\n' "$mdelim"; } >> "$GITHUB_OUTPUT"
          # Annotation — arm classification lives in describe-plugin-compose.sh (the
          # describe-denial-count.sh extraction convention; run.sh drives every arm).
          # Inline fallback for the partial-vendor skew (HELPER present, COMPOSE
          # absent): the helper ran and may have set DEFECT (a degraded settings
          # entry) AND/OR emitted valid extras into ENTRIES (which were already
          # spliced into the credentialed runner's plugin surface unconditionally
          # above). DEFECT and a splice can COEXIST (PR #513) — a degraded entry
          # must NOT suppress the splice ::notice:: for the valid extras. Without
          # COMPOSE to render the annotation, mirror the helper's arms inline and
          # emit each independently, so a spliced entry is never added without an
          # audit line (docs/cloud-setup.md: every spliced entry logged, never silent).
          if [ -f "$COMPOSE" ]; then
            # Capture the renderer's status rather than `|| true`-swallowing it: the
            # extras were already spliced above, so a non-zero renderer must still
            # leave an audit line (PR #513 "never silent"). The run is never
            # broken — the failure is caught, not propagated.
            if ! bash "$COMPOSE" ok "$ENTRIES" "$DEFECT"; then
              echo "::warning::describe-plugin-compose.sh failed (rc≠0); extras (if any) were composed but the audit annotation could not be rendered."
            fi
          else
            # Join the spliced entries via a bash-builtin loop (guard-class 2 — no
            # cat/tr/sed for the emitted list), mirroring describe-plugin-compose.sh's
            # splice ::notice::.
            _splice=""
            if [ -s "$ENTRIES" ]; then
              while IFS= read -r line || [ -n "$line" ]; do
                [ -z "$line" ] && continue
                if [ -z "$_splice" ]; then _splice="$line"; else _splice="$_splice, $line"; fi
              done < "$ENTRIES"
            fi
            if [ -n "$DEFECT" ] && [ -n "$_splice" ]; then
              echo "::warning::.claude/settings.json has degraded entries ($DEFECT); those are skipped, the valid extras below are composed."
              echo "::notice::Composed plugin/marketplace entries beyond the baked baseline (describe-plugin-compose.sh unavailable): $_splice"
            elif [ -n "$DEFECT" ]; then
              echo "::warning::.claude/settings.json is degraded ($DEFECT); proceeding with the baked plugin baseline."
            elif [ -n "$_splice" ]; then
              echo "::notice::Composed plugin/marketplace entries beyond the baked baseline (describe-plugin-compose.sh unavailable): $_splice"
            fi
          fi

      # Resolve the two DEFAULT-OFF git-env pin flags and export the enabled ones
      # (issue #645). Both keys default to false, so on a stock consumer this step
      # emits NOTHING and neither GIT_DIR nor GIT_WORK_TREE is present in the
      # action's environment — the pre-#643 behavior, which is the configuration
      # that works everywhere. #643 set both unconditionally so configureGitAuth
      # would resolve the repo on a self-hosted Windows runner (issue #602), but
      # GIT_WORK_TREE also reaches the Claude Code CLI subprocess that installs
      # plugins, where it makes `git clone` refuse an existing working tree — so
      # every run died at plugin install with `fatal: working tree '<path>'
      # already exists.`, before the agent did any work, producing no verdict at
      # all. The helper is now the SINGLE producer of both variables; the action
      # step below deliberately carries neither in its own `env:` block.
      #
      # JOB-SCOPED, not step-scoped: `$GITHUB_ENV` appends assignments and offers
      # no removal verb, and the empty-value form that would approximate one is
      # measured fatal (`GIT_DIR=` → `fatal: not a git repository: ''`), which is
      # precisely why the mechanism is an append rather than an `env:` expression
      # (GitHub's workflow syntax accepts no expression evaluating to a whole
      # `env:` mapping, so a variable's KEY cannot be made conditionally absent
      # there). So an enabled variable is in force for `Run Claude Code` AND every
      # step after it, including the agent's own git operations.
      #
      # Fails OPEN to the working default. An absent helper emits nothing and
      # exits 0 rather than failing the job: this workflow reaches consumers via
      # install.sh's file-copy while the helper reaches them via the
      # devflow_version vendor fetch, so a consumer can carry this step before it
      # carries the helper, and that skew must not reproduce the outage above.
      - name: Resolve git-env pins
        env:
          # The trigger-time `config` job's default-branch checkout — a trusted
          # tree, never the PR head. That is what makes these keys post-merge-only.
          GITENV_CFGJSON: ${{ needs.config.outputs.config_json }}
          GITENV_WS: ${{ github.workspace }}
        run: |
          set -uo pipefail
          HELPER='.devflow/vendor/devflow/scripts/emit-git-env.sh'
          if [ ! -f "$HELPER" ]; then
            echo "::notice::devflow git-env pins: bundled helper '$HELPER' is absent (this workflow ships via install.sh's file-copy, the helper via the devflow_version vendor fetch, so a consumer can carry the step first). Failing open to the working default: neither GIT_DIR nor GIT_WORK_TREE is exported."
            exit 0
          fi
          CFG="${RUNNER_TEMP}/devflow-gitenv-config.json"
          if ! printf '%s' "$GITENV_CFGJSON" > "$CFG" 2>/dev/null; then
            echo "::warning::devflow git-env pins: could not materialize the trigger-time config into RUNNER_TEMP; failing open to the working default (neither variable exported)."
            exit 0
          fi
          bash "$HELPER" --workspace "$GITENV_WS" --config-file "$CFG" --tier command >> "$GITHUB_ENV"

      # Resolve the DEFAULT-OFF devflow.attribute_commits_to_triggerer flag and,
      # when enabled, export the four GIT_AUTHOR_*/GIT_COMMITTER_* variables so the
      # agent's commits are authored by the human who triggered the run (issue #682).
      # Off by default, so on a stock consumer this step emits NOTHING and commits are
      # authored exactly as before. Read at TRIGGER time from the trusted `config`
      # job's default-branch checkout (never the PR head), which makes the flag
      # post-merge-only. Unlike the git-env-pins step above, this step DOES make a
      # `gh api users/<login>` call, so it wires GH_TOKEN into its own env: — without
      # it the call runs unauthenticated against the 60/hr anonymous limit and degrades
      # every run to the login-only fallback. Fails OPEN: an absent helper (install.sh
      # ships the workflow, the devflow_version vendor fetch ships the helper, so a
      # consumer can carry this step first) or an unmaterializable config emits nothing
      # and exits 0. Attribution is advisory and NEVER gates the run. This scopes to the
      # writer commands (/devflow:review-and-fix, /devflow:pr-description); a
      # /devflow:review command performs no commits, so the export is simply inert there.
      - name: Resolve committer identity
        env:
          ATTR_CFGJSON: ${{ needs.config.outputs.config_json }}
          SENDER_LOGIN: ${{ github.event.sender.login }}
          # The step makes a gh api call, so it must carry a token of its own — the
          # minted App token when DEVFLOW_APP_ID is set, else the built-in github.token.
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
        run: |
          set -uo pipefail
          HELPER='.devflow/vendor/devflow/scripts/resolve-committer-identity.sh'
          if [ ! -f "$HELPER" ]; then
            echo "::notice::devflow commit attribution: bundled helper '$HELPER' is absent (this workflow ships via install.sh's file-copy, the helper via the devflow_version vendor fetch, so a consumer can carry the step first). Falling back to current authorship: no GIT_* identity exported."
            exit 0
          fi
          CFG="${RUNNER_TEMP}/devflow-committer-config.json"
          if ! printf '%s' "$ATTR_CFGJSON" > "$CFG" 2>/dev/null; then
            echo "::warning::devflow commit attribution: could not materialize the trigger-time config into RUNNER_TEMP; falling back to current authorship (no GIT_* identity exported)."
            exit 0
          fi
          bash "$HELPER" --login "$SENDER_LOGIN" --config-file "$CFG" >> "$GITHUB_ENV"

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          # Anthropic-default path only: pass the OAuth token when no provider is
          # active. A provider-routed section passes '' here (the action treats
          # empty as absent) and authenticates via anthropic_api_key below.
          claude_code_oauth_token: ${{ steps.provider.outputs.provider == '' && secrets.CLAUDE_CODE_OAUTH_TOKEN || '' }}
          # Provider path only: the fixed DEVFLOW_PROVIDER_API_KEY secret satisfies
          # the action's launch check (and, for bearer auth, is ALSO exported as
          # ANTHROPIC_AUTH_TOKEN by the inject step). Empty on the default path.
          anthropic_api_key: ${{ steps.provider.outputs.provider != '' && secrets.DEVFLOW_PROVIDER_API_KEY || '' }}
          # Identity by command: `/devflow:review` runs under the downscoped
          # DevFlow-Reviewer token (or GITHUB_TOKEN when the reviewer App is
          # unset) — NEVER the primary app token, so the review is not a
          # self-review of a PR the primary app authored (issue #300). Every
          # other command (`/devflow:pr-description`, `/devflow:review-and-fix`)
          # uses the full-scope primary App token when configured, else
          # GITHUB_TOKEN — identical to pre-change behavior.
          github_token: ${{ startsWith(needs.gate.outputs.command, '/devflow:review ') && (steps.reviewer-token.outputs.token || secrets.GITHUB_TOKEN) || (steps.app-token.outputs.token || secrets.GITHUB_TOKEN) }}
          allowed_bots: ${{ needs.config.outputs.allowed_bots }}

          # AGENT mode: the gate resolved which /devflow:* command + number to
          # run and synthesised a clean prompt (no @claude needed; extra
          # free-text in the comment is intentionally dropped, matching the
          # implement path). The skills read PR/issue context themselves.
          # Block-prepended for `/devflow:review`; the bare command for every other
          # command (reviewcompose is skipped, so its output is empty).
          prompt: ${{ steps.reviewcompose.outputs.prompt || needs.gate.outputs.command }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Composed by the `Compose plugin inputs` step above (issue #505): the
          # baked baseline (the official marketplace `./` checkout-root registration
          # plus the three baseline plugins — byte-identical across the three call
          # sites, run.sh-pinned) PLUS the entries .claude/settings.json declares.
          # `./` resolves to the workflow's checkout root (where
          # .claude-plugin/marketplace.json lives), so PR-branch changes to the
          # marketplace or .devflow/vendor/devflow/** are exercised by devflow.yml
          # on the PR that introduces them — a git-URL entry would always resolve
          # to main. Local-path marketplaces are supported by claude-code-action
          # since v1.0.28 (we pin @v1, the floating major).
          plugin_marketplaces: ${{ steps.plugins.outputs.plugin_marketplaces }}

          # Install plugins so the ambient /code-review and /revise-claude-md commands
          # (and /devflow:*) are available in the runner. NOTE: code-review@ and
          # claude-md-management@ are ambient-command conveniences, NOT engine dependencies
          # — DevFlow's review/implement engine dispatches neither (the "zero companion-plugin
          # dependencies" claim is scoped to the consumer install + what the engine dispatches;
          # see docs/DEVFLOW_SYSTEM_OVERVIEW.md §6). devflow@ is DevFlow itself. The baked
          # baseline three are composed by the step above; settings-declared extras are
          # appended beyond them.
          plugins: ${{ steps.plugins.outputs.plugins }}

          base_branch: ${{ needs.config.outputs.base_branch }}
          # Optional pre-installed Claude Code executable (issue #601). Empty (the
          # default) is the empty-as-absent idiom of claude_code_oauth_token above:
          # the action auto-installs, unchanged for Linux. Full rationale + the
          # self-hosted-Windows use case are on the config-job extraction above.
          path_to_claude_code_executable: ${{ needs.config.outputs.claude_code_executable }}
          # claude_args head is a COMPUTED string (steps.cargs): --model always,
          # --effort conditional on effort_supported (issue #313). The
          # --allowed-tools tail is the steps.tools computed string (issue #363).
          claude_args: >-
            ${{ steps.cargs.outputs.args }}
            --allowed-tools "${{ steps.tools.outputs.tools }}"

      # Retire the detached credential refresher (issue #487). Best-effort,
      # always() so it runs on every exit path. Gated with the SAME /devflow:review
      # exclusion as the start step: on the review path the refresher was never
      # started, so there is nothing to retire and the step would be a pointless
      # no-op. (A false defeat warning is prevented by the DEVFLOW_REFRESH_STARTED
      # guard below — steps.refresher.outcome is `skipped` there — not by this
      # exclusion.) The kill/log/::warning:: logic lives in scripts/stop-refresher.sh
      # so the branch/message selection is suite-drivable (CLAUDE.md
      # inline-shell-extraction convention).
      - name: Stop credential refresher (optional)
        if: ${{ always() && vars.DEVFLOW_APP_ID != '' && !startsWith(needs.gate.outputs.command, '/devflow:review ') }}
        env:
          # The Start step's outcome. stop-refresher.sh treats the launcher as having
          # RAN when this is `success` OR `failure` (a ran-and-failed launcher is still
          # a genuine never-started defeat — arm18), and as NOT run when `skipped` OR
          # `cancelled` (an upstream early-abort), where a missing pidfile is expected
          # rather than a defeat. (In practice the Start step's run: ends on a bare echo
          # and never waits on its backgrounded nohup, so it realistically only yields
          # success or skipped/cancelled — but the contract handed to the helper is the
          # broader four-way one above.)
          DEVFLOW_REFRESH_STARTED: ${{ steps.refresher.outcome }}
        run: |
          H=.devflow/vendor/devflow/scripts/stop-refresher.sh
          [ -f "$H" ] || H=scripts/stop-refresher.sh
          bash "$H"

      # Surface the claude-code-action run's execution diagnostics (run summary +
      # permission-denial detail) to the job log and $GITHUB_STEP_SUMMARY so a
      # maintainer debugging a stalled / incomplete / unexpectedly-denied cloud
      # run sees the denial detail and run shape directly — the exact information
      # that was irrecoverable for PR #325 (issue #331; helper + config key
      # shipped in #329). Read-only: the helper always exits 0, this step adds no
      # permissions grant / minted-token scope and uploads no artifact, so it
      # never changes the job's pass/fail. always() so it runs even when the
      # claude step errored — which is exactly when the diagnostics matter. Gated
      # on .devflow.execution_diagnostics_enabled (default true) via the vendored
      # config-get.sh (repo-path fallback for a self-repo checkout); only the
      # exact string "false" disables it, and an empty read (config-get soft/hard
      # failure) falls safe to enabled.
      - name: Surface execution diagnostics
        if: always()
        env:
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          set -euo pipefail
          CG=.devflow/vendor/devflow/scripts/config-get.sh
          [ -f "$CG" ] || CG=scripts/config-get.sh
          # `|| true` so config-get's hard-fail exit (malformed config.json / missing
          # python3) can't abort this step under GitHub's default `-e` run shell — which
          # would fail the job and break the "never changes the job's pass/fail" contract
          # above. The empty read then falls safe to enabled on the next line. (Mirrors the
          # `|| echo false` assignment guard in devflow-runner.yml's engine-error step.)
          ENABLED="$("$CG" .devflow.execution_diagnostics_enabled true || true)"
          [ -n "$ENABLED" ] || ENABLED=true
          if [ "$ENABLED" = "false" ]; then
            echo "execution diagnostics: disabled via .devflow.execution_diagnostics_enabled=false; skipping."
            exit 0
          fi
          SED=.devflow/vendor/devflow/scripts/surface-execution-diagnostics.sh
          [ -f "$SED" ] || SED=scripts/surface-execution-diagnostics.sh
          if [ -f "$SED" ]; then
            # `|| echo ::notice::` for the same reason as the config-get guard above:
            # the helper's always-exit-0 contract holds for the committed file, but a
            # partial-copy / truncated vendored helper (a documented deployment hazard)
            # could exit non-zero, which under GitHub's default `-e` run shell would
            # abort this always() step and fail the job. Guard it so the read-only
            # "never changes the job's pass/fail" contract holds even then.
            bash "$SED" "${EXECUTION_FILE:-}" || echo "::notice::surface-execution-diagnostics.sh exited non-zero; execution diagnostics unavailable (best-effort)."
          else
            echo "::notice::surface-execution-diagnostics.sh absent; execution diagnostics not surfaced (best-effort)."
          fi

      # Parse the engine's is_error out of claude-code-action's execution log,
      # mirroring devflow-runner.yml's "Surface review-engine execution result"
      # step and reusing the same unit-tested helper. This is what lets the flip
      # below cover the third non-success arm finalize_check already covers: the
      # claude STEP can exit success while the engine's final message carries
      # is_error (the parse runs after the step, so the two are independent).
      # Fail-safe: an absent/unparseable log yields false (no flip), matching the
      # helper's own contract.
      - name: Surface review-engine execution result
        id: engine
        if: ${{ always() }}
        env:
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          set -euo pipefail
          PEE=.devflow/vendor/devflow/scripts/parse-engine-error.sh
          [ -f "$PEE" ] || PEE=scripts/parse-engine-error.sh
          if [ -f "$PEE" ]; then
            # Never 2>/dev/null the helper — a broken jq would otherwise report
            # is_error=false forever with zero trace.
            IS_ERROR=$(bash "$PEE" "${EXECUTION_FILE:-}" || echo false)
            [ "$IS_ERROR" = "true" ] || IS_ERROR=false
          else
            echo "::notice::parse-engine-error.sh absent; treating engine is_error as false (fail-safe)."
            IS_ERROR=false
          fi
          echo "is_error=$IS_ERROR" >> "$GITHUB_OUTPUT"

      # Dead-run review-progress flip (issue #356). A comment-triggered
      # /devflow:review or /devflow:review-and-fix seeds a run-keyed
      # devflow:review-progress comment; if the run ends non-success the agent
      # never flips it out of the interim 🚀 Reviewing state. This always() step
      # does the workflow-level flip on the same three non-success arms
      # devflow-review.yml's finalize_check covers — job failure, cancellation,
      # and an engine that ended is_error while the step still reported success.
      # `steps.claude.outcome` is the RAW outcome (success/failure/cancelled/
      # skipped, before continue-on-error). Best-effort: the helper always exits
      # 0, so this never changes the job's pass/fail. A /devflow:implement or
      # /devflow:pr-description trigger seeds no such comment, so the helper's
      # comment-absent no-op arm handles it. The run-keyed marker matches ONLY
      # this run's comment, so an earlier run's comment is never touched.
      - name: Flip review-progress comment on dead run
        if: ${{ always() && (steps.claude.outcome == 'failure' || steps.claude.outcome == 'cancelled' || steps.engine.outputs.is_error == 'true') }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          CONTEXT_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          CLAUDE_OUTCOME: ${{ steps.claude.outcome }}
          ENGINE_ERROR: ${{ steps.engine.outputs.is_error }}
        run: |
          set -euo pipefail
          FLIP_MARKER="<!-- devflow:review-progress run=${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT} -->"
          FLIP_HELPER=.devflow/vendor/devflow/scripts/flip-review-progress-failed.sh
          [ -f "$FLIP_HELPER" ] || FLIP_HELPER=scripts/flip-review-progress-failed.sh
          if [ -z "${CONTEXT_NUMBER:-}" ]; then
            echo "::notice::flip review-progress: no issue/PR number on this event; nothing to flip"
            exit 0
          fi
          # Name the specific arm that fired, so the comment's cause line and the
          # job log agree on why the run was treated as dead.
          if [ "${ENGINE_ERROR:-false}" = "true" ] && [ "$CLAUDE_OUTCOME" = "success" ]; then
            CAUSE="review engine ended with an error (is_error)"
          else
            CAUSE="claude step ${CLAUDE_OUTCOME}"
          fi
          if [ -f "$FLIP_HELPER" ]; then
            bash "$FLIP_HELPER" "$CONTEXT_NUMBER" "$FLIP_MARKER" "$CAUSE" || true
          else
            echo "::warning::flip review-progress: flip-review-progress-failed.sh absent at $FLIP_HELPER; review-progress comment not flipped to '❌ Review failed'"
          fi

      # ── No-verdict auto-resume backstop for the manual /devflow:review path
      # (issue #408). The review-side sibling of the devflow-review.yml
      # finalize_check backstop: when a manual `/devflow:review` run died with no
      # verdict (engine is_error, or the claude step failed — a cancelled run is
      # superseded, not a benign stall, so it is excluded), fire a bounded
      # `/devflow:review` re-trigger authored by a freshly minted App token. The
      # app-token step above is SKIPPED on a /devflow:review command (that path
      # uses the downscoped reviewer token), so mint a fresh backstop token here.
      # Skipped when DEVFLOW_APP_ID is unset → the helper reports no-fire and the
      # run degrades to the pre-existing dead-end flip.
      - name: Mint review-backstop token (optional)
        id: backstop-token
        if: ${{ always() && startsWith(needs.gate.outputs.command, '/devflow:review ') && (steps.engine.outputs.is_error == 'true' || steps.claude.outcome == 'failure') && vars.DEVFLOW_APP_ID != '' }}
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.DEVFLOW_APP_ID }}
          private-key: ${{ secrets.DEVFLOW_APP_PRIVATE_KEY }}
      - name: Review stall backstop
        if: ${{ always() && startsWith(needs.gate.outputs.command, '/devflow:review ') && (steps.engine.outputs.is_error == 'true' || steps.claude.outcome == 'failure') }}
        env:
          GH_TOKEN: ${{ steps.backstop-token.outputs.token || github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          # A dead manual review posted no verdict for HEAD, so the derived
          # verdict is incomplete by construction.
          VERDICT: incomplete
          APP_TOKEN_PRESENT: ${{ steps.backstop-token.outputs.token != '' }}
        run: |
          set -euo pipefail
          if [ -z "${PR_NUMBER:-}" ]; then
            echo "::notice::review stall backstop: no PR number on this event; nothing to resume."
            exit 0
          fi
          # The comment marker is head-scoped; resolve the PR head SHA (this manual path
          # carries no precheck head_sha output). A failed lookup leaves HEAD_SHA empty and
          # the helper's decision takes its unscoped no-fire arm — never an unbounded resume.
          # The `|| true` is LOAD-BEARING under this step's errexit shell: without it, an
          # expected lookup failure (issue-comment event, transient API error) is an
          # assignment-position non-zero that kills the whole backstop before the helper
          # runs — the exact shape that took down the harden_hooks step (PR #461).
          HEAD_SHA=$(gh api "repos/$REPO/pulls/$PR_NUMBER" --jq .head.sha 2>/dev/null || true)
          # The post-and-annotate glue — resolve+call request-review-backstop.sh (its
          # decision contract UNCHANGED), parse the decision, compose the /devflow:review
          # re-trigger body, POST it via post-issue-comment.sh, and select the
          # ::notice::/::warning:: annotation on the POST success breadcrumb — is the shared
          # post-review-backstop-comment.sh helper (issue #414), unit-tested in lib/test/run.sh.
          # Pass the runtime-derived HEAD_SHA; the helper reads PR_NUMBER/REPO/VERDICT/
          # APP_TOKEN_PRESENT/GH_TOKEN from this step's env.
          HELPER=.devflow/vendor/devflow/scripts/post-review-backstop-comment.sh
          [ -f "$HELPER" ] || HELPER=scripts/post-review-backstop-comment.sh
          if [ ! -f "$HELPER" ]; then
            echo "::warning::review stall backstop: post-review-backstop-comment.sh absent at $HELPER; no auto-resume (degrades to the pre-existing dead-end flip)."
            exit 0
          fi
          HEAD_SHA="$HEAD_SHA" bash "$HELPER"

      - name: Persist review-and-fix observability artifacts (backstop)
        if: ${{ always() }}
        env:
          # Harness-side cost floor inputs (issue #475). DEVFLOW_COMMAND is the gate's
          # RESOLVED command (`/devflow:<class> <n>` — resolve-command-trigger.sh always
          # appends the number); prepare-harness-floor.sh parses the class and the explicit
          # trailing PR number from it and PREFERS that number. DEVFLOW_CANDIDATE_NUMBER is
          # only the fallback context number used when the command carries none — written
          # with the workflow-wide `issue.number || pull_request.number` idiom so it also
          # resolves on the issue_comment trigger (where github.event.pull_request is absent).
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
          DEVFLOW_COMMAND: ${{ needs.gate.outputs.command }}
          DEVFLOW_CANDIDATE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          # Job-lifetime-valid token for the floor's gh PR verification: the job-start
          # App token can already be past its ~60-minute lifetime by backstop time (#287).
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          HELPER=.devflow/vendor/devflow/lib/efficiency-trace.sh
          [ -f "$HELPER" ] || { echo "::warning::observability backstop: $HELPER missing; skipped"; exit 0; }
          # Harness-side cost floor (issue #475): the glue helper runs the execution-file
          # reader, verifies the PR, and emits the floor env values consumed by --persist.
          # Guard its existence exactly like $HELPER: a vendored tree pinned to an OLDER
          # devflow_version lacks it, and that must draw a NAMED ::warning:: (floor inert),
          # never a raw `No such file` under `set +e`.
          FLOOR=.devflow/vendor/devflow/scripts/prepare-harness-floor.sh
          DEVFLOW_EXECUTION_COST=""
          DEVFLOW_EXECUTION_PR=""
          DEVFLOW_COMMAND_CLASS=""
          if [ -f "$FLOOR" ]; then
            COST_FILE="${RUNNER_TEMP:-/tmp}/devflow-harness-cost-$$.json"
            # The glue prints two eval-able env assignments (PR + class) to stdout and
            # writes the cost JSON to $COST_FILE; its breadcrumbs go to the step log.
            eval "$(bash "$FLOOR" "${EXECUTION_FILE:-}" "${DEVFLOW_COMMAND:-}" "${DEVFLOW_CANDIDATE_NUMBER:-}" "$COST_FILE")"
            [ -s "$COST_FILE" ] && DEVFLOW_EXECUTION_COST="$(cat "$COST_FILE")"
            rm -f "$COST_FILE"
          else
            echo "::warning::harness cost floor inert: $FLOOR missing (a vendored tree pinned to an older devflow_version); the cost floor is skipped this run"
          fi
          # --persist derives each run's record + durable workpad copy and writes them to
          # the dedicated telemetry branch via git plumbing, then pushes with a fetch/
          # re-parent retry loop — all inside the helper. With the floor env set it ALSO
          # merge-fills harness_cost into this run's record (or writes a minimal cost
          # skeleton); unset, it is byte-identical to before (issue #441/#475). It never
          # touches HEAD or the TRACKED working tree. Best-effort/exit-0.
          DEVFLOW_EXECUTION_COST="$DEVFLOW_EXECUTION_COST" \
          DEVFLOW_EXECUTION_PR="$DEVFLOW_EXECUTION_PR" \
          DEVFLOW_COMMAND_CLASS="$DEVFLOW_COMMAND_CLASS" \
            bash "$HELPER" --persist
          exit 0
