name: Devflow Review (auto-trigger)

# When a PR first becomes reviewable — opened directly as non-draft,
# reopened non-draft, OR transitioned from draft to "ready for review"
# (human or bot) — run the /devflow:review skill against it directly via
# devflow.yml's reusable `runner` job — one workflow run, no comment
# mediation. Manual reviews via a bare `/devflow:review` comment work
# through devflow.yml's command path.
#
# Why `opened`/`reopened` and not just `ready_for_review`: GitHub emits
# `ready_for_review` ONLY on a draft→ready transition. A PR opened
# directly as non-draft (the documented `gh pr create --fill` contributor
# flow in CLAUDE.md, and most human PRs) never emits it — so the FIRST
# review never triggered, and because `Devflow Review` is a REQUIRED
# status check with no run, the PR was wedged "expected" forever with no
# API-accessible trigger (only a manual draft toggle / Re-run rescued it).
# Listening to `opened`/`reopened` closes that hole; draft-opened PRs are
# skipped here and still get their review on the later `ready_for_review`.
#
# The run also surfaces as a dedicated `Devflow Review` GitHub Check Run on
# the PR. Clicking that check's per-check **Re-run** button emits a
# `check_run` (action: rerequested) webhook delivered to the default branch;
# this workflow listens for it and re-executes the review against the PR's
# *current* HEAD (not the possibly-stale SHA the old check was attached to).
#
# Trigger policy (see docs/workflow-triggers.md):
# the FIRST review auto-triggers EXACTLY ONCE per PR — on whichever of
# {opened non-draft, reopened non-draft, ready_for_review} fires first.
# Exactly-once is enforced by the first-ready gate in precheck (it skips
# when a `Devflow Review` check already exists on the PR head or any
# commit), so a non-draft open followed by a draft→ready toggle still
# reviews only once. Because `Devflow Review` is a REQUIRED status check,
# a `synchronize` trigger also re-reviews a NEW HEAD — but ONLY when that
# HEAD has no already-passing `Devflow Review` check (the cost guard), the
# PR is not a draft, and the actor-dedupe canonical variant is running.
# This closes the deadlock where a commit pushed after the one-shot review
# left the new HEAD with no check and the required context blocked the PR
# forever. The remaining manual re-review paths are unchanged: the check's
# Re-run button or a bare `/devflow:review` comment.

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  # Both pull_request and pull_request_target fire for every event regardless
  # of actor; the precheck job's dedupe step routes each actor to exactly one
  # variant (bot actors → _target so secrets resolve, humans → pull_request)
  # so the review job runs once. Actor allowlisting happens later via
  # config.devflow.allowed_bots inside the runner. The precheck job's inline
  # event-dedupe is action-agnostic (routes purely by actor + event_name), so
  # it needs no change to cover `opened`/`reopened`. The first-review route below
  # skips draft-opened PRs (an `opened` event can carry draft=true; a
  # `ready_for_review` never does — the shared draft guard handles both).
  #
  # `synchronize` (a new commit pushed to an open PR) closes a deadlock:
  # `Devflow Review` is a REQUIRED status check, but the first-ready gate
  # auto-reviews EXACTLY ONCE, attaching the check to that commit only. Any
  # later commit (every implementation agent pushes "address review" /
  # "/simplify" / "docs" commits after the one-shot review) leaves the new
  # HEAD with NO `Devflow Review` check → the required context is missing
  # → the PR is blocked forever with no API-accessible re-trigger. The
  # `synchronize` route below re-reviews the new HEAD, but ONLY when that
  # HEAD has no already-passing `Devflow Review` check (cost guard: a push
  # that someone already reviewed-green is not re-run; drafts are skipped).
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize]
  # Per-check Re-run on the `Devflow Review` check. Delivered to the default
  # branch in a non-PR context (repo secrets resolve like `push`). The
  # precheck `name == 'Devflow Review'` guard is load-bearing: this event
  # fires for EVERY check including CI re-runs.
  check_run:
    types: [rerequested]
  # CI-completion re-trigger (#304): when a review was deferred because other
  # CI was still pending/red (require_ci_green) or the branch was behind base
  # (require_up_to_date), these events re-evaluate the preconditions and fire
  # the real review once the PR is reviewable — no manual Re-run needed.
  #
  # GitHub platform constraint (do not "simplify" this into one generic
  # listener): `check_suite: completed` NEVER fires for suites created by
  # GitHub Actions (recursion prevention), so it only covers EXTERNAL CI apps
  # — which is also why it cannot self-trigger off this workflow. Actions CI
  # is covered by `workflow_run`, which REQUIRES an explicit workflow-name
  # list (no wildcards). Consumer repos with differently-named CI workflows
  # must add their names to this list when installing the workflow; the
  # precondition EVALUATION itself stays fully generic (no job names).
  workflow_run:
    workflows: [CI]
    types: [completed]
  check_suite:
    types: [completed]
  # Legacy commit-status CI re-trigger (#310): repos whose CI reports ONLY via
  # the commit-status API (classic Jenkins, legacy CircleCI) emit a `status`
  # event — not workflow_run/check_suite — when their CI transitions. Without
  # this listener such a repo defers every PR at open (ci-not-green) and has no
  # completion event to auto-re-trigger on, making the check's Re-run button its
  # routine path rather than the stuck-signal exception. The precheck `if:`
  # filters to state == 'success' (a cheap green-state filter, at the same
  # precheck-if position as the workflow_run push filter — it mirrors that
  # filter's placement, not its predicate: workflow_run keys on the underlying
  # event, status keys on the commit-status state) BEFORE a runner spins; note
  # a `status` event fires for ANY commit status posted by ANY app (Codecov,
  # Vercel, external bots), on any commit — GitHub offers no context/branch
  # scoping for it — so an Actions-CI repo that also has a status-posting app
  # will spin a precheck runner per green status. Once a review already exists
  # for the head each redundant spin no-ops after a couple of read calls (PR
  # resolution + the exactly-once gate, which short-circuits before the
  # expensive precondition/review work); a status arriving BEFORE sibling CI
  # has completed instead re-enters the preconditions (several gh-api reads that
  # fail closed to *defer* under a rate-limited token — so a heavy status burst
  # in that pre-review window could spuriously defer an otherwise-reviewable
  # PR). This is the accepted cost of an unconditional trigger. The route resolves
  # the PR from the status head SHA (the payload carries no pull_requests[] ref)
  # and reuses the same open-state/draft/stale-head/exactly-once/precondition
  # machinery. Cannot self-trigger: this workflow posts check-runs, never commit
  # statuses.
  status:

permissions:
  contents: read
  pull-requests: write
  issues: read

concurrency:
  # Per-PR AND per-event-source lane. The event_name suffix is load-bearing:
  # `pull_request` and `pull_request_target` both fire for one ready_for_review
  # and both carry the same pull_request.number — without the suffix the
  # dedupe-loser variant (which no-ops in ~15s) would cancel the canonical
  # variant mid-review via cancel-in-progress, and the auto-review would never
  # run. Scoping by source keeps cancel-in-progress useful where it matters
  # (a second check_run Re-run collapses an in-flight earlier Re-run for the
  # same PR) while isolating the dedupe pair. github.run_id is the last-resort
  # key for events with no resolvable PR (the job no-ops anyway).
  # Note (#304): workflow_run/check_suite payloads carry an EMPTY
  # pull_requests[] for fork PRs, so those completions fall to the run_id
  # group and do not collapse each other — accepted looseness. (#310): a
  # status payload carries NO pull_requests[] at all, so status completions
  # likewise fall to the run_id group and are deliberately given no group arm
  # below — same accepted looseness. The route
  # step's exactly-once gate dedupes the common case, but it is a
  # check-existence READ, not a lock: two prechecks racing at the same
  # instant can both observe zero existing `Devflow Review` checks and both
  # proceed, so the true worst case is a same-instant double-review (not
  # "one skips"). Accepted looseness — a redundant review is cheap relative
  # to the locking a stricter guarantee would need.
  group: devflow-review-${{ github.event.pull_request.number || github.event.check_run.pull_requests[0].number || github.event.workflow_run.pull_requests[0].number || github.event.check_suite.pull_requests[0].number || github.run_id }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  precheck:
    # Cheap trigger filter: drop workflow_run completions whose underlying
    # event can never be PR CI (schedule, workflow_dispatch, …) before
    # spinning a runner. 'push' MUST pass: many consumer repos run their CI
    # on branch pushes, and filtering it out would silently disable the
    # CI-completion re-trigger for them (the route step's PR-resolution +
    # stale-head + exactly-once guards make a push completion safe — a
    # merge-to-default push completion resolves no open PR and no-ops in
    # one API call). (check_suite has no equivalent event field; its route
    # branch no-ops cheaply on a PR-less head instead.)
    # #310 adds the status arm: a `status` event only spins the runner when its
    # state is 'success' (the cheap green-state filter — status fires on EVERY
    # CI transition, so gating pending/failure/error here keeps them off the
    # runner entirely). Structure: pass any event that is neither workflow_run
    # nor status; ELSE apply each event's own filter (workflow_run → underlying
    # PR-CI event incl. push; status → state == success). For a status event
    # github.event.workflow_run.event is empty, so those clauses are false.
    if: (github.event_name != 'workflow_run' && github.event_name != 'status') || github.event.workflow_run.event == 'pull_request' || github.event.workflow_run.event == 'pull_request_target' || github.event.workflow_run.event == 'push' || (github.event_name == 'status' && github.event.state == 'success')
    runs-on: ubuntu-latest
    # Explicit (plan §4 matrix): the first-ready gate reads check-runs and PR
    # commits. On a public repo these are unauth-readable (verified: the gate
    # query succeeded in self-test), but pinning checks/pull-requests: read
    # removes any token-scope ambiguity at zero cost.
    permissions:
      contents: read
      pull-requests: read
      checks: read
      # actions: read — the #304 CI-green precondition reads the head's
      # Actions workflow runs (repos/*/actions/runs?head_sha=...).
      actions: read
      # statuses: read — the same precondition reads the legacy combined
      # commit status (repos/*/commits/*/status). Without it the query 403s
      # on a private repo, the script fails closed (reason 'unverifiable')
      # on every event, and the review is permanently deferred.
      statuses: read
    outputs:
      enabled: ${{ steps.extract.outputs.enabled }}
      should_run: ${{ steps.route.outputs.should_run }}
      pr_number: ${{ steps.route.outputs.pr_number }}
      head_sha: ${{ steps.route.outputs.head_sha }}
      # Non-empty ONLY when a #304 precondition deferred the review (values:
      # behind-base | ci-not-green | unverifiable). create_check widens its
      # gate on it so the required check is still posted — pre-completed
      # neutral with the "waiting" title, in one POST — and finalize_check is
      # deliberately skipped (see its if:). Every pre-existing
      # should_run=false path (dedupe loser, draft, unauthorized, exactly-once)
      # leaves it empty and still posts NO check — unchanged behavior.
      skip_reason: ${{ steps.route.outputs.skip_reason }}
    steps:
      - uses: actions/checkout@v6
      - id: cfg
        uses: ./.github/actions/read-project-config
      - id: extract
        env:
          CONFIG_JSON: ${{ steps.cfg.outputs.json }}
        run: |
          set -euo pipefail
          echo "enabled=$(echo "$CONFIG_JSON" | jq -r '.workflows["devflow-review"] // false')" >> "$GITHUB_OUTPUT"
          echo "allowed_bots=$(echo "$CONFIG_JSON" | jq -r '.devflow.allowed_bots // ""')" >> "$GITHUB_OUTPUT"
          # #304 precondition config. try/catch: a hand-corrupted config whose
          # devflow_review is a scalar must fall back to the defaults, not
          # abort the step under set -e (the adversarial-parser discipline).
          # The boolean keys use a TYPE-CHECKED default, never `// true`:
          # jq's `//` substitutes on null AND false, so `// true` would
          # silently coerce an explicit `false` (the documented off-switch)
          # back to `true` — the knob would never work. The type check keeps
          # a real boolean verbatim and defaults everything else (absent key,
          # scalar-corrupted section, wrong type) to enabled — fail toward
          # gating, matching the script's own anything-but-false contract.
          echo "base_branch=$(echo "$CONFIG_JSON" | jq -r '(try .base_branch catch null) // "main"')" >> "$GITHUB_OUTPUT"
          echo "require_up_to_date=$(echo "$CONFIG_JSON" | jq -r '(try .devflow_review.require_up_to_date catch null) | if type == "boolean" then . else true end')" >> "$GITHUB_OUTPUT"
          echo "require_ci_green=$(echo "$CONFIG_JSON" | jq -r '(try .devflow_review.require_ci_green catch null) | if type == "boolean" then . else true end')" >> "$GITHUB_OUTPUT"
      - id: route
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          ACTOR: ${{ github.actor }}
          ALLOWED_BOTS: ${{ steps.extract.outputs.allowed_bots }}
          # opened / reopened / ready_for_review / synchronize path inputs
          PR_READY: ${{ github.event.pull_request.number }}
          SHA_READY: ${{ github.event.pull_request.head.sha }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
          # check_run path inputs
          CR_NAME: ${{ github.event.check_run.name }}
          CR_ACTION: ${{ github.event.action }}
          CR_PR: ${{ github.event.check_run.pull_requests[0].number }}
          CR_HEAD: ${{ github.event.check_run.head_sha }}
          SENDER: ${{ github.event.sender.login }}
          # completion re-trigger path inputs (#304)
          WR_NAME: ${{ github.event.workflow_run.name }}
          WR_HEAD: ${{ github.event.workflow_run.head_sha }}
          WR_PR: ${{ github.event.workflow_run.pull_requests[0].number }}
          CS_HEAD: ${{ github.event.check_suite.head_sha }}
          CS_PR: ${{ github.event.check_suite.pull_requests[0].number }}
          CS_APP: ${{ github.event.check_suite.app.slug }}
          # status re-trigger path inputs (#310): legacy commit-status CI. The
          # payload carries a head sha + a state but NO pull_requests[] ref, so
          # the route resolves the PR from ST_SHA (resolve_pr_for_head).
          ST_SHA: ${{ github.event.sha }}
          ST_STATE: ${{ github.event.state }}
          # #304 precondition inputs (config-resolved in extract)
          BASE_BRANCH: ${{ steps.extract.outputs.base_branch }}
          REQUIRE_UP_TO_DATE: ${{ steps.extract.outputs.require_up_to_date }}
          REQUIRE_CI_GREEN: ${{ steps.extract.outputs.require_ci_green }}
          # Derived from the runner context, never a hand-mirrored literal:
          # a consumer that renames this workflow's name: would otherwise
          # break self-exclusion silently — the CI-green gate would count
          # this workflow's own in-progress run as "other CI pending" and
          # every PR would wedge in a permanent waiting state.
          SELF_WORKFLOW_NAME: ${{ github.workflow }}
        run: |
          set -euo pipefail
          emit() { echo "$1=$2" >> "$GITHUB_OUTPUT"; }
          # Safe defaults: deny unless a branch below explicitly enables.
          emit should_run false
          emit pr_number ""
          emit head_sha ""
          emit skip_reason ""

          # #304 preconditions gate. Returns 0 when the review may proceed.
          # On an unmet/unverifiable precondition it emits the deferral
          # outputs (should_run stays false; a non-empty skip_reason routes
          # create_check to post-and-conclude a neutral "waiting" check in
          # one POST — finalize_check is skipped — so the required context
          # is never absent) and
          # returns 1 — the caller must `|| exit 0`. A missing helper script
          # fails OPEN (proceed exactly as before #304): a consumer repo that
          # has not vendored the new script must not lose reviews entirely.
          preconditions_ok() {  # $1=PR number  $2=head SHA
            local script pre pre_run pre_reason
            script=.devflow/vendor/devflow/scripts/derive-review-preconditions.sh
            [ -f "$script" ] || script=scripts/derive-review-preconditions.sh
            if [ ! -f "$script" ]; then
              echo "::warning::derive-review-preconditions.sh not found (vendored or in-repo); skipping the review preconditions and proceeding (fail open — vendor the plugin to enable the gate)."
              return 0
            fi
            # The script's contract is always-exit-0; a non-zero exit means a
            # crash / unreadable-but-present file (the existence-vs-
            # sourceability class) — still fail-closed via the unverifiable
            # default below, but with its OWN breadcrumb so an operator can
            # tell "helper crashed" from "helper ran and reported
            # unverifiable".
            if ! pre=$(REPO="$REPO" HEAD_SHA="$2" BASE_BRANCH="$BASE_BRANCH" \
                  REQUIRE_UP_TO_DATE="$REQUIRE_UP_TO_DATE" REQUIRE_CI_GREEN="$REQUIRE_CI_GREEN" \
                  SELF_WORKFLOW_NAME="$SELF_WORKFLOW_NAME" bash "$script"); then
              echo "::warning::$script exited non-zero (contract violation — crash or unreadable/truncated copy); treating the preconditions as unverifiable."
              # A present-but-broken VENDORED copy must not permanently shadow
              # a working in-repo copy ([ -f ] proves existence, not
              # runnability — the existence-vs-sourceability class): retry
              # once with the in-repo fallback when it is a different file.
              if [ "$script" != scripts/derive-review-preconditions.sh ] && [ -f scripts/derive-review-preconditions.sh ]; then
                echo "::warning::retrying the preconditions with the in-repo scripts/derive-review-preconditions.sh"
                # Same crash-arm hazard as the no-retry else below: if the in-repo
                # retry ALSO exits non-zero it may have emitted partial stdout (a
                # truncated should_run=/reason= line) before dying, and a bare
                # `|| true` would keep that partial output for the parse to read
                # — failing OPEN on a crashed helper. Clear it so this crash path
                # fails closed to 'unverifiable' identically to the no-retry path
                # (peer-complete: both crash arms of preconditions_ok clear pre).
                if ! pre=$(REPO="$REPO" HEAD_SHA="$2" BASE_BRANCH="$BASE_BRANCH" \
                      REQUIRE_UP_TO_DATE="$REQUIRE_UP_TO_DATE" REQUIRE_CI_GREEN="$REQUIRE_CI_GREEN" \
                      SELF_WORKFLOW_NAME="$SELF_WORKFLOW_NAME" bash scripts/derive-review-preconditions.sh); then
                  echo "::warning::the in-repo retry also exited non-zero; clearing its partial output and treating the preconditions as unverifiable (fail closed)."
                  pre=""
                fi
              else
                # No in-repo copy to retry (the crashed script IS the in-repo
                # one, or no fallback exists). The command substitution above
                # still captured whatever partial stdout the helper emitted
                # before dying — a truncated `should_run=`/`reason=` line from a
                # corrupted copy. Clear it so the parse below never reads that
                # partial output: an emptied pre yields an empty pre_run, so the
                # unverifiable default fires (fail closed).
                # Never parse a crashed helper's half-written output.
                pre=""
              fi
            fi
            pre_run=$(printf '%s\n' "$pre" | sed -n 's/^should_run=//p')
            pre_reason=$(printf '%s\n' "$pre" | sed -n 's/^reason=//p')
            if [ "$pre_run" = "true" ]; then
              return 0
            fi
            emit pr_number "$1"
            emit head_sha "$2"
            emit skip_reason "${pre_reason:-unverifiable}"
            echo "::notice::Devflow Review deferred for PR #$1 at $2 (reason: ${pre_reason:-unverifiable}); a neutral 'waiting' check will be posted and the review auto-re-triggers on the next reviewable event (branch update or CI completion)."
            return 1
          }

          # Exactly-once counter: prints the number of `Devflow Review`
          # check-runs on $1 that actually ran or are running. The single
          # definition of the exclusion filter — skipped (dedupe losers /
          # deferral no-ops) AND neutral (a #304 "waiting" deferral, or a
          # cancelled/skipped review job, is not a run — counting it would
          # wedge e.g. a reopened PR forever). A null conclusion (in-progress
          # review) passes both exclusions, so a running review still counts.
          # Value-stream + line count, not per-page `| length`: --paginate
          # concatenates jq output per page, so `length` would yield a
          # multi-line count on a >100-check-run commit. Returns 1 with
          # nothing on stdout on a query error or non-numeric count, AND emits
          # its OWN ::warning:: distinguishing the two (the check-runs query
          # failed vs. the count came back non-numeric) — the caller still
          # fails closed with its path-specific breadcrumb, but an operator
          # reading the job log can now tell an API outage from a parse
          # anomaly instead of both collapsing into the caller's single
          # "(or non-numeric count)" message. Mirrors resolve_pr_for_head's
          # >&2 misattribution-distinguishing pattern. The synchronize
          # cost-guard deliberately does NOT use this (its narrower
          # `== "success"` filter is a pinned divergence).
          devflow_review_run_count() {  # $1=commit SHA
            local _runs _n
            if ! _runs=$(gh api --paginate \
                  "repos/$REPO/commits/$1/check-runs" \
                  --jq '.check_runs[] | select(.name=="Devflow Review" and .conclusion != "skipped" and .conclusion != "neutral") | .id' \
                  2>/dev/null); then
              echo "::warning::devflow_review_run_count: the check-runs query for $1 failed (rate limit, 5xx, or token scope); returning failure so the caller fails closed — this is a query outage, not a factual zero." >&2
              return 1
            fi
            _n=$(printf '%s' "$_runs" | grep -c . || true)
            if ! [[ "$_n" =~ ^[0-9]+$ ]]; then
              echo "::warning::devflow_review_run_count: the check-runs query for $1 succeeded but the count was non-numeric ('$_n'); returning failure so the caller fails closed — this is a count-parse anomaly, not a query failure." >&2
              return 1
            fi
            printf '%s' "$_n"
          }

          # Head-SHA → open-PR resolution, shared by the paths whose event
          # payload carries no (or a detached) PR reference. Uses the core
          # REST endpoint (repos/*/commits/*/pulls), not the search API —
          # cheaper, rate-safe, and not eventually-consistent. Prints the PR
          # number or nothing. A QUERY failure (rate limit, 5xx, token scope)
          # is distinguished from a genuine "no open PR" with its own
          # ::warning:: — otherwise the caller's "No open PR found" notice
          # would misattribute an API outage as a factual claim and misdirect
          # whoever debugs a re-trigger that never fired.
          resolve_pr_for_head() {  # $1=commit SHA
            local _resp _err
            # stderr goes to its own file, never merged into the captured
            # JSON — stray stderr on a SUCCESSFUL call would corrupt the jq
            # parse and silently read as "no PR" (the misattribution this
            # function exists to eliminate).
            _err=$(mktemp 2>/dev/null) || _err=/dev/null
            if ! _resp=$(gh api "repos/$REPO/commits/$1/pulls" 2>"$_err"); then
              echo "::warning::commits/$1/pulls query failed ($([ -s "$_err" ] && cat "$_err" || echo 'no error output captured')); failing closed — the caller reports no PR, but the real cause is the query, not an absent PR." >&2
              [ "$_err" = /dev/null ] || rm -f "$_err"
              return 0
            fi
            [ "$_err" = /dev/null ] || rm -f "$_err"
            # The PARSE arm gets the same failure-vs-empty distinction as the
            # query arm: a truncated/non-array success payload must not read
            # as a factual "no open PR".
            local _num
            if ! _num=$(printf '%s' "$_resp" | jq -r '[.[] | select(.state=="open")][0].number // empty' 2>/dev/null); then
              echo "::warning::commits/$1/pulls payload could not be parsed; failing closed — the caller reports no PR, but the real cause is the parse, not an absent PR." >&2
              _num=""
            fi
            printf '%s' "$_num"
          }

          # Event-variant dedupe (consulted only on the pull_request paths
          # below): when both pull_request and pull_request_target are wired
          # for the same types, each real event fires twice — once per
          # variant. Route bot actors to the _target variant and humans to the
          # plain variant so the review runs EXACTLY ONCE per event. The
          # check_run path is neither variant and routes by sender instead, so
          # DEDUPE_OK is simply unused there. (Sole consumer of this rule; it
          # was the dedupe-pr-events composite action until it was inlined
          # here. An actor whose login ends in [bot] — dependabot[bot],
          # github-actions[bot], … — is a bot; this is NOT an allowlist, the
          # allowed-bots gate is separate.)
          is_bot=false
          [[ "$ACTOR" == *"[bot]" ]] && is_bot=true
          DEDUPE_OK=false
          if { [ "$is_bot" = "true" ]  && [ "$EVENT_NAME" = "pull_request_target" ]; } \
          || { [ "$is_bot" = "false" ] && [ "$EVENT_NAME" = "pull_request" ]; }; then
            DEDUPE_OK=true
          fi

          if [ "$EVENT_NAME" = "check_run" ]; then
            # --- check_run (Re-run button) path ---
            if [ "$CR_NAME" != "Devflow Review" ]; then
              echo "::notice::check_run for '$CR_NAME' is not 'Devflow Review'; ignoring."
              exit 0
            fi
            if [ "$CR_ACTION" != "rerequested" ]; then
              echo "::notice::check_run action '$CR_ACTION' is not 'rerequested'; ignoring."
              exit 0
            fi

            # Authorization gate (cost control on a public repo): the clicker
            # must be an allowed bot OR a write/admin collaborator. check_run
            # carries no PR actor, so authorize github.event.sender.login.
            if [ -z "$SENDER" ]; then
              echo "::warning::check_run rerequest has an empty sender.login; cannot authorize — skipping (cost control)."
              exit 0
            fi
            # App actors arrive as `name[bot]`; allowed_bots stores bare
            # logins. Strip the suffix on the sender side before comparing
            # (same `*"[bot]"` suffix rule as the event-dedupe above) so the
            # documented allowed-bot Re-run path actually matches.
            SENDER_BARE="${SENDER%\[bot\]}"
            authorized=false
            IFS=',' read -ra BOTS <<< "$ALLOWED_BOTS"
            for b in "${BOTS[@]}"; do
              bt="$(echo "$b" | xargs)"
              [ -n "$bt" ] && { [ "$bt" = "$SENDER" ] || [ "$bt" = "$SENDER_BARE" ]; } \
                && authorized=true
            done
            if [ "$authorized" != "true" ]; then
              # Collaborator fallback only applies to human logins; an App
              # actor 404s here (expected) and stays unauthorized unless it
              # matched allowed_bots above.
              PERM=$(gh api "repos/$REPO/collaborators/$SENDER/permission" \
                       --jq '.permission' 2>/dev/null || echo "none")
              case "$PERM" in
                admin|write|maintain) authorized=true ;;
              esac
            fi
            if [ "$authorized" != "true" ]; then
              echo "::warning::Re-run requested by '$SENDER' who is not an allowed bot or write/admin collaborator; skipping (cost control)."
              exit 0
            fi

            # Resolve the PR. Prefer the check's associated PR; fall back to a
            # head-SHA search if force-push detached it.
            PR="$CR_PR"
            if [ -z "$PR" ] || [ "$PR" = "null" ]; then
              PR=$(gh pr list --repo "$REPO" --search "$CR_HEAD" --state open \
                     --json number --jq '.[0].number' 2>/dev/null || echo "")
            fi
            if [ -z "$PR" ] || [ "$PR" = "null" ]; then
              echo "::notice::Could not resolve a PR for the re-run check (head $CR_HEAD); no-op."
              exit 0
            fi

            # Re-resolve the PR's CURRENT head — the whole point of the
            # feature. check_run.head_sha is the (possibly stale) commit the
            # old check was attached to.
            # `|| echo ""` so a gh failure reaches the graceful no-op below
            # instead of aborting the step red under `set -e` (matching the
            # sibling gh calls on this path).
            HEAD=$(gh pr view "$PR" --repo "$REPO" --json headRefOid \
                     --jq '.headRefOid' 2>/dev/null || echo "")
            if [ -z "$HEAD" ] || [ "$HEAD" = "null" ]; then
              echo "::warning::Could not resolve current HEAD for PR #$PR; no-op."
              exit 0
            fi
            emit should_run true
            emit pr_number "$PR"
            emit head_sha "$HEAD"
            echo "::notice::Re-running Devflow Review for PR #$PR at current HEAD $HEAD (requested by $SENDER)."
            exit 0
          fi

          if [ "$EVENT_NAME" = "workflow_run" ] || [ "$EVENT_NAME" = "check_suite" ] || [ "$EVENT_NAME" = "status" ]; then
            # --- CI-completion re-trigger path (#304; +status #310) ---
            # A review deferred behind the preconditions must fire without a
            # manual Re-run once the PR becomes reviewable. workflow_run
            # covers Actions CI (named in the on: list — a GitHub platform
            # requirement); check_suite covers external CI apps (Actions
            # suites never deliver it — recursion prevention); status covers
            # legacy commit-status-only CI (classic Jenkins, legacy CircleCI).
            # No actor-dedupe here: these events have no pull_request/_target
            # twin.
            if [ "$EVENT_NAME" = "workflow_run" ]; then
              # Self-exclusion: never re-trigger off this workflow's own
              # completion (an infinite loop otherwise). Belt-and-braces —
              # the on: workflows list should not name it either.
              if [ "$WR_NAME" = "$SELF_WORKFLOW_NAME" ]; then
                echo "::notice::workflow_run completion is this workflow itself; ignoring (self-trigger guard)."
                exit 0
              fi
              HEAD="$WR_HEAD"
              PR="$WR_PR"
            elif [ "$EVENT_NAME" = "check_suite" ]; then
              # Defensive: Actions-created suites never deliver check_suite,
              # but if one ever did, ignoring it here prevents a self-loop.
              if [ "$CS_APP" = "github-actions" ]; then
                echo "::notice::check_suite completion from the github-actions app; ignoring (Actions CI is covered by workflow_run)."
                exit 0
              fi
              HEAD="$CS_HEAD"
              PR="$CS_PR"
            else
              # --- status (legacy commit-status CI) #310 ---
              # The precheck if: already filtered to state == 'success' before
              # this runner spun, so only a green transition reaches here.
              # Re-assert it as defense-in-depth so a future precheck-if edit
              # can't silently let a non-success status spin the route. The
              # status payload carries NO pull_requests[] ref, so PR is left
              # empty and resolved from the head SHA below (resolve_pr_for_head),
              # exactly like a fork-PR workflow_run completion. Cannot
              # self-trigger: this workflow posts check-runs, never statuses.
              if [ "$ST_STATE" != "success" ]; then
                # Reaching here means the precheck if: green-state filter let a
                # non-success status through — an operator-actionable regression,
                # not a routine no-op — so warn (distinct from the ::notice:: the
                # expected draft/stale-head/no-PR no-ops use) rather than blend
                # into normal traffic.
                echo "::warning::status event state '$ST_STATE' is not success; no-op (only a green commit status re-triggers a deferred review). Reaching this arm means the precheck if: green-state filter regressed."
                exit 0
              fi
              HEAD="$ST_SHA"
              PR=""
            fi
            if [ -z "$HEAD" ] || [ "$HEAD" = "null" ]; then
              echo "::notice::CI-completion event carries no head_sha; no-op."
              exit 0
            fi
            if [ -z "$PR" ] || [ "$PR" = "null" ]; then
              PR=$(resolve_pr_for_head "$HEAD")
            fi
            if [ -z "$PR" ] || [ "$PR" = "null" ]; then
              echo "::notice::No open PR found for CI-completion head $HEAD (or the PR-resolution query failed — see any warning above); no-op."
              exit 0
            fi
            # Draft + stale-head guards. Fail CLOSED on query error: a missed
            # re-trigger is recoverable via the next event or the Re-run
            # button; reviewing a draft or a superseded head is the cost to
            # avoid.
            # state is read alongside draft/head: the payload-carried PR
            # number (WR_PR/CS_PR) is not a guarantee of OPEN state at
            # processing time (a PR can close/merge between event delivery
            # and this step), and only the resolve_pr_for_head fallback arm
            # filters on open — both arms must enforce the same invariant.
            PR_INFO=$(gh pr view "$PR" --repo "$REPO" --json state,isDraft,headRefOid \
                        --jq '.state + " " + (.isDraft|tostring) + " " + .headRefOid' 2>/dev/null || echo "")
            if [ -z "$PR_INFO" ]; then
              echo "::warning::Could not resolve state/draft/head for PR #$PR; failing closed (no CI-completion re-trigger)."
              exit 0
            fi
            read -r PR_STATE IS_DRAFT CUR_HEAD <<<"$PR_INFO"
            if [ "$PR_STATE" != "OPEN" ]; then
              echo "::notice::PR #$PR is $PR_STATE (not open); no-op (never review a closed/merged PR)."
              exit 0
            fi
            if [ "$IS_DRAFT" != "false" ]; then
              echo "::notice::PR #$PR is a draft; deferring (the later ready_for_review event reviews it)."
              exit 0
            fi
            if [ "$CUR_HEAD" != "$HEAD" ]; then
              echo "::notice::CI completion is for stale head $HEAD (PR #$PR is now at $CUR_HEAD); no-op (the newer head's own events cover it)."
              exit 0
            fi
            # Exactly-once: skip when a Devflow Review check already ran or is
            # running for this head (devflow_review_run_count owns the
            # skipped+neutral exclusion filter — a neutral check is the #304
            # "waiting" deferral this path exists to supersede).
            if ! EXISTING=$(devflow_review_run_count "$HEAD"); then
              echo "::warning::Check-run query failed (or non-numeric count) for $HEAD; failing closed (no CI-completion re-trigger)."
              exit 0
            fi
            if [ "$EXISTING" != "0" ]; then
              echo "::notice::A Devflow Review check already ran or is running for $HEAD; skipping CI-completion re-trigger (exactly-once)."
              exit 0
            fi
            preconditions_ok "$PR" "$HEAD" || exit 0
            emit should_run true
            emit pr_number "$PR"
            emit head_sha "$HEAD"
            echo "::notice::Other CI completed for PR #$PR at $HEAD and the preconditions are satisfied; auto-triggering Devflow Review."
            exit 0
          fi

          # --- synchronize (new commit pushed to an open PR) path ---
          # Closes the required-check deadlock: the first-ready gate
          # auto-reviews EXACTLY ONCE, so any commit pushed after that
          # one-shot review leaves the new HEAD with no `Devflow Review`
          # check and the (required) context blocks the PR forever. Here we
          # re-review the new HEAD, but ONLY when it has no already-passing
          # `Devflow Review` check (cost guard) and the PR is not a draft.
          # Same actor dedupe as the ready path so the review runs exactly
          # once across the pull_request / pull_request_target pair.
          # NOTE: $CR_ACTION is `github.event.action` (the env var is shared
          # with the check_run path's `CR_`-prefixed naming, not check_run-
          # specific); for the pull_request variants it equals
          # "synchronize" / "ready_for_review". Do not "fix" it to a
          # check_run-only reading.
          if [ "$CR_ACTION" = "synchronize" ]; then
            if [ "$DEDUPE_OK" != "true" ]; then
              echo "::notice::Non-canonical synchronize variant for actor; deferring to the other variant."
              exit 0
            fi
            if [ "$PR_DRAFT" = "true" ]; then
              echo "::notice::synchronize on a draft PR; skipping (drafts cannot merge — no review needed yet)."
              exit 0
            fi
            PR="$PR_READY"
            HEAD="$SHA_READY"
            # Cost guard: skip if THIS head already has a *passing* Devflow
            # Review check (event re-delivery, or a push already reviewed
            # green). Fail CLOSED on query error, consistent with the
            # first-ready gate: a missed re-review is recoverable by the
            # next push or the manual Re-run button; a spurious LLM
            # re-review is precisely the cost this guard exists to prevent.
            # Emit ONE line per matching check-run and count lines, rather
            # than `| length` per page: --paginate concatenates the jq
            # output of every page, so a per-page `length` yields a
            # multi-line count ("2\n0") on a >100-check-run commit. A
            # value stream concatenates correctly across pages; line
            # count is then exact. (--slurp would also work but is not
            # reliable with --jq on older gh on the runner.)
            if ! _RUNS=$(gh api --paginate \
                  "repos/$REPO/commits/$HEAD/check-runs" \
                  --jq '.check_runs[] | select(.name=="Devflow Review" and .conclusion=="success") | .id' \
                  2>/dev/null); then
              echo "::warning::Check-run query failed for $HEAD; failing closed (no synchronize re-review). Push again or use the Re-run button."
              exit 0
            fi
            PASSING=$(printf '%s' "$_RUNS" | grep -c . || true)
            if ! [[ "$PASSING" =~ ^[0-9]+$ ]]; then
              echo "::warning::Non-numeric passing-check count ('$PASSING') for $HEAD; failing closed (no synchronize re-review)."
              exit 0
            fi
            if [ "$PASSING" != "0" ]; then
              echo "::notice::HEAD $HEAD already has a passing Devflow Review check; skipping synchronize re-review."
              exit 0
            fi
            # #304 preconditions: defer (neutral "waiting" check) instead of
            # reviewing a behind-base branch or racing ahead of pending CI.
            preconditions_ok "$PR" "$HEAD" || exit 0
            emit should_run true
            emit pr_number "$PR"
            emit head_sha "$HEAD"
            echo "::notice::synchronize on PR #$PR HEAD $HEAD has no passing Devflow Review check; triggering re-review."
            exit 0
          fi

          # --- first-review path: opened / reopened / ready_for_review ---
          # (pull_request / pull_request_target). $CR_ACTION is
          # github.event.action; for these it is "opened" | "reopened" |
          # "ready_for_review" — all the FIRST-review trigger, gated to
          # exactly-once by the first-ready check-existence query below.
          if [ "$DEDUPE_OK" != "true" ]; then
            echo "::notice::Non-canonical event variant for actor; deferring to the other variant."
            exit 0
          fi
          # Draft guard: a `ready_for_review` event is never draft, but an
          # `opened`/`reopened` event can carry draft=true (e.g. the devflow
          # implement flow opens a draft, works, then marks it ready). Defer
          # those — the later draft→ready `ready_for_review` reviews them,
          # so exactly-once still holds. Harmless no-op for ready_for_review.
          if [ "$PR_DRAFT" = "true" ]; then
            echo "::notice::PR is draft ($CR_ACTION); deferring first review until it is marked ready."
            exit 0
          fi
          PR="$PR_READY"
          HEAD="$SHA_READY"

          # First-ready gate (plan §0): auto-review EXACTLY ONCE per PR. If a
          # `Devflow Review` check that actually ran (or is running) already
          # exists for this PR's head OR any of its commits, this is a repeat
          # draft→ready toggle — skip (manual Re-run only). Fail CLOSED on query
          # error: a missed first review is recoverable via the Re-run button;
          # an unwanted re-review is what §0 forbids.
          # Exclude `conclusion == "skipped"`: a skipped job still emits a
          # `Devflow Review` check-run, and the dual pull_request /
          # pull_request_target wiring guarantees skipped checks (the dedupe
          # loser on HEAD, plus draft/synchronize deferrals on earlier commits).
          # Counting those would make the gate conclude the review "already ran"
          # and skip it forever. ALSO exclude `conclusion == "neutral"` (#304):
          # a precondition deferral posts a neutral "waiting" check (and a
          # cancelled/skipped review job concludes neutral) — counting either
          # would read a DEFERRED review as "already ran" and wedge e.g. a
          # closed-and-reopened PR whose head carries only the waiting check.
          # A null conclusion (in-progress review) passes both exclusions, so
          # a running review still counts — exactly-once holds. Uses the same
          # conclusion-scoped select shape as the synchronize cost-guard
          # above, but a deliberately WIDER filter (skipped/neutral-exclusion
          # here vs `== "success"` there): the two are not interchangeable —
          # do not align them. lib/test/run.sh pins this divergence.
          # A truncated/empty body that still exits 0 yields a non-numeric
          # count; treating that as 0 would fail OPEN (re-review on a repeat
          # toggle), which §0 forbids — devflow_review_run_count returns 1
          # on that shape and on a query error, so the caller fails closed.
          if ! EXISTING=$(devflow_review_run_count "$HEAD"); then
            echo "::warning::Check-run query failed (or non-numeric count) for $HEAD; failing closed (no auto-review). Use the Re-run button if a review is needed."
            exit 0
          fi
          if [ "$EXISTING" = "0" ]; then
            # head_sha alone can miss checks on earlier commits after a push;
            # scan the PR's commit list as a backstop.
            if ! COMMITS=$(gh pr view "$PR" --repo "$REPO" --json commits \
                  --jq '.commits[].oid' 2>/dev/null); then
              echo "::warning::Could not list PR commits for the first-ready gate; failing closed (no auto-review)."
              exit 0
            fi
            for sha in $COMMITS; do
              if ! n=$(devflow_review_run_count "$sha"); then
                echo "::warning::Check-run query failed (or non-numeric count) for commit $sha; failing closed (no auto-review). Use the Re-run button if a review is needed."
                exit 0
              fi
              if [ "$n" != "0" ]; then
                EXISTING="$n"
                break
              fi
            done
          fi
          if [ "$EXISTING" != "0" ]; then
            echo "::notice::Devflow Review already ran for PR #$PR; skipping auto-trigger (use the check's Re-run button to re-review)."
            exit 0
          fi

          # #304 preconditions: defer (neutral "waiting" check) instead of
          # reviewing a behind-base branch or racing ahead of pending CI.
          preconditions_ok "$PR" "$HEAD" || exit 0
          emit should_run true
          emit pr_number "$PR"
          emit head_sha "$HEAD"
          echo "::notice::First reviewable event ($CR_ACTION) for PR #$PR; auto-triggering Devflow Review at $HEAD."

  create_check:
    needs: precheck
    # Also runs on a #304 precondition deferral (skip_reason non-empty): the
    # required `Devflow Review` check must be POSTED even when the review
    # does not run, or the PR wedges on an absent required context. On a
    # deferral this job posts the check ALREADY COMPLETED as neutral with the
    # waiting title (see the step below) and finalize_check is skipped —
    # deliberately, so the finalize job's own workflow check-run (also named
    # `Devflow Review`) concludes `skipped`, which devflow_review_run_count
    # excludes. If finalize ran and exited 0, its job check-run would be
    # `success` and the exactly-once gates would read the deferral as an
    # already-run review, permanently wedging the CI-completion re-trigger.
    if: needs.precheck.outputs.enabled == 'true' && (needs.precheck.outputs.should_run == 'true' || needs.precheck.outputs.skip_reason != '')
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    outputs:
      check_run_id: ${{ steps.create.outputs.check_run_id }}
    steps:
      - id: create
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ needs.precheck.outputs.head_sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SKIP_REASON: ${{ needs.precheck.outputs.skip_reason }}
        run: |
          set -euo pipefail
          if [ -n "${SKIP_REASON:-}" ]; then
            # #304 precondition deferral: post the required check ALREADY
            # COMPLETED as neutral with the waiting reason — create and
            # conclude in ONE POST, so no finalize PATCH is needed and
            # finalize_check stays skipped (its `Devflow Review` job
            # check-run then concludes `skipped`, which the exactly-once
            # gates exclude — see the job-level comment above). neutral is
            # deliberate — "not reviewable yet" is not a REJECT, and a
            # neutral required check does not block merge (the
            # branch-freshness gate is a cost optimization; pair it with
            # branch protection's "require branches up to date" if staleness
            # must block).
            # behind-base / ci-not-green / ci-approval-required are
            # POSITIVELY-OBSERVED conditions; unverifiable means a precondition
            # query failed — the title must never assert a state the script did
            # not observe (a user who rebases in response to a false "behind
            # base" fixes nothing).
            case "$SKIP_REASON" in
              behind-base)  TITLE='Devflow review waiting: branch behind base' ;;
              ci-not-green) TITLE='Devflow review waiting: other CI not green' ;;
              ci-approval-required) TITLE='Devflow review waiting: CI approval required' ;;
              unverifiable) TITLE='Devflow review waiting: preconditions unverifiable (API query failed — see the precheck log)' ;;
              *)            TITLE='Devflow review waiting: precondition not met' ;;
            esac
            SUMMARY='This PR is not yet in a reviewable state, so the review was deferred (not run). It auto-re-triggers when the branch is updated, or when a CI workflow named in this workflow'"'"'s workflow_run trigger list (or an external check_suite CI, or a legacy commit status transitioning to success) completes. If your CI workflow is not in that list, or a signal is permanently stuck (a forever-pending status), click Re-run on this check once CI is green to force a review of the current HEAD. See docs/workflow-triggers.md for the deferral and re-trigger policy.'
            # De-duplicate repeated deferral re-evaluations. A branch that
            # stays behind base (or whose CI stays red) across several
            # CI-completion events re-enters this job each time; POSTing a
            # fresh completed-neutral 'Devflow Review' check-run per event
            # litters the checks tab with identical waiting checks. Instead
            # REUSE the existing neutral check for the SAME head + SAME reason
            # (title): look one up and PATCH it in place, refreshing its
            # details_url/summary; only POST when none exists. Same head +
            # same title = same deferral, so refreshing (not duplicating) is
            # correct. Match the title in bash (not in --jq, which gh api does
            # not let us parameterize with --arg) over the id+title pairs of
            # every neutral 'Devflow Review' check on this head. Best-effort:
            # a lookup failure leaves REUSE_ID empty and falls through to the
            # POST path, so the required check is never lost.
            REUSE_ID=""
            # Capture the lookup separately (not a `2>/dev/null || true` process
            # substitution) so a genuine query failure (rate limit, 5xx, 403
            # token-scope) is DISTINGUISHED from a legitimate "no existing
            # neutral check to reuse": both leave REUSE_ID empty and fall
            # through to the POST path (so the required check is never lost),
            # but only the failure emits a breadcrumb — consistent with the
            # sibling helpers this workflow hardens (devflow_review_run_count,
            # resolve_pr_for_head), which likewise distinguish query failure
            # from an empty result. gh's own stderr is left on the log too.
            _reuse_rc=0
            _reuse_pairs=$(gh api --paginate "repos/$REPO/commits/$HEAD_SHA/check-runs" \
                             --jq '.check_runs[] | select(.name=="Devflow Review" and .conclusion=="neutral") | [(.output.title // ""), (.id|tostring)] | @tsv') || _reuse_rc=$?
            if [ "$_reuse_rc" -eq 0 ]; then
              while IFS=$'\t' read -r _rt _rid; do
                if [ "$_rt" = "$TITLE" ]; then REUSE_ID="$_rid"; break; fi
              done <<< "$_reuse_pairs"
            else
              echo "::warning::Could not query existing 'Devflow Review' check-runs for $HEAD_SHA to de-duplicate the deferral (gh api rc=$_reuse_rc); falling back to posting a fresh neutral check."
            fi
            if [[ "$REUSE_ID" =~ ^[0-9]+$ ]]; then
              if gh api -X PATCH "repos/$REPO/check-runs/$REUSE_ID" \
                  -f status='completed' -f conclusion='neutral' \
                  -f details_url="$RUN_URL" \
                  -f "output[title]=$TITLE" \
                  -f "output[summary]=$SUMMARY" --jq '.id' >/dev/null; then
                echo "check_run_id=$REUSE_ID" >> "$GITHUB_OUTPUT"
                echo "::notice::Reused existing neutral 'Devflow Review' check $REUSE_ID for $HEAD_SHA (deferral: $TITLE) — PATCHed in place instead of posting a duplicate."
                exit 0
              fi
              echo "::warning::Could not PATCH existing neutral check $REUSE_ID for $HEAD_SHA; falling back to posting a fresh neutral check."
            fi
            STATUS_ARGS=(-f status='completed' -f conclusion='neutral')
          else
            TITLE='Devflow review running'
            SUMMARY='/devflow:review is executing. This is a required status check that encodes the verdict for the current HEAD: it PASSES only on a positively-observed APPROVE, and FAILS on a REJECT (blocks merge) or on an incomplete/unverifiable review (Re-run needed). The full verdict is also posted as a formal PR review.'
            STATUS_ARGS=(-f status='in_progress')
          fi
          ID=$(gh api -X POST "repos/$REPO/check-runs" \
            -f name='Devflow Review' \
            -f head_sha="$HEAD_SHA" \
            "${STATUS_ARGS[@]}" \
            -f details_url="$RUN_URL" \
            -f "output[title]=$TITLE" \
            -f "output[summary]=$SUMMARY" \
            --jq '.id')
          # An HTTP-success-but-no-.id response would leave finalize_check's
          # `!= ''` gate skipped and the check hung in_progress forever (the
          # exact hang plan §6.3 guards against). Fail loudly instead. (On the
          # deferral arm the check is posted pre-completed, so a lost id can
          # never hang it — but fail loudly there too rather than reporting a
          # created check the response can't substantiate.)
          if ! [[ "$ID" =~ ^[0-9]+$ ]]; then
            echo "::error::check-run POST returned no numeric id ('$ID'); cannot create 'Devflow Review' check."
            exit 1
          fi
          echo "check_run_id=$ID" >> "$GITHUB_OUTPUT"
          echo "::notice::Created 'Devflow Review' check run $ID at $HEAD_SHA${SKIP_REASON:+ (deferral: concluded neutral — $TITLE)}."

  review:
    # NOT needs: create_check — the formal verdict is the authoritative
    # artifact and must still post even if the Checks-API POST fails
    # (plan §6.3 "degraded but not silent"; the first-ready gate has already
    # consumed the one-shot, so a skipped review here would be silent loss).
    # create_check runs in parallel; finalize_check joins both.
    needs: precheck
    if: needs.precheck.outputs.enabled == 'true' && needs.precheck.outputs.should_run == 'true'
    # A called reusable workflow's job permissions must be a SUBSET of the
    # caller job's grant (validated at graph-build time). devflow-runner.yml's
    # job needs contents:read + pull-requests:write + id-token:write + actions:read
    # + issues:read, so this grant is an exact superset. `actions: read` is
    # required — without it the runner's `actions: read` would exceed this grant
    # and abort the run as `startup_failure` (the very bug this split fixes); keep
    # it here. Same for `issues: read` (runner reads the linked issue's ACs).
    permissions:
      contents: read
      pull-requests: write
      id-token: write
      actions: read
      issues: read
    # Calls the dedicated reusable runner (its own file, so its permission
    # ceiling is a clean subset of this read-only caller — see devflow-runner.yml).
    uses: ./.github/workflows/devflow-runner.yml
    with:
      # Check out the PR HEAD, not the base branch — the review must see the
      # PR's own content, and a repo bootstrapping the devflow plugin via PR
      # only has .devflow/vendor/devflow on the head (empty falls back to the
      # default ref).
      ref: ${{ needs.precheck.outputs.head_sha }}
      prompt: |
        You are running inside the `devflow-review` GitHub
        workflow. The PR number is ${{ needs.precheck.outputs.pr_number }}.

        **Run `/devflow:review` by reading and following
        `.devflow/vendor/devflow/skills/review/SKILL.md` exactly.** That
        skill now **owns the live progress comment end-to-end** (see its
        "Live Progress Comment" section): in PR mode it seeds **this run's
        own** `devflow:review-progress` comment (keyed by a run-keyed marker
        and carrying a link to this job) as its first GitHub write
        (Phase 0.3.5), updates it in place at every phase boundary —
        including each Phase-3 agent's findings as that agent returns —
        and finalizes it with the verdict, the full Phase 4.1 report, and
        the telemetry + effectiveness trace (Phase 4.5). Your only job is
        to run that skill against PR
        ${{ needs.precheck.outputs.pr_number }}.

        **Do NOT seed, template, or PATCH a separate progress comment from
        this workflow.** Earlier versions of this prompt carried their own
        status-card template and per-phase PATCH choreography; that now
        lives in the skill, and duplicating it here would post a second
        competing comment. Let the skill do it.

        **Constraints (do not violate):**
        - Exactly ONE `devflow:review-progress` comment **per run**, authored
          by the skill and edited in place. Never post a second for this run,
          and never overwrite a previous run's comment — each run keys its
          comment by a run-keyed marker, so earlier reviews stay as history.
        - The final state of that comment must reflect the actual verdict
          (the skill's Status glyph + embedded Phase 4.1 report handle
          this) — never a green check above a REJECT.
        - Do not alter Phase 4.4's `gh pr review` behavior — the verdict
          review is the authoritative merge signal; the progress comment
          only points at it.
        - On a fatal error before Phase 4.4 (empty diff, checklist-gen
          failure, any fatal error), ensure the progress comment ends in a
          clearly-failed state with a one-line reason.
      allowed_tools_profile: review
    secrets: inherit

  finalize_check:
    # `name: Devflow Review` is the load-bearing fix for required-check
    # recognition. GitHub's required-status-check matcher resolves ruleset
    # context names to workflow job names; without this `name:` key the
    # workflow has no job called `Devflow Review`, so the only check-run
    # carrying that name is the one `create_check` POSTs via `gh api
    # /check-runs`. On the FIRST push to a new PR that API check-run lands
    # in a freshly-created check suite that GitHub's matcher does not
    # immediately link to the ruleset context — `isRequired` stays `false`
    # even though the check-run exists, so `mergeStateStatus` is BLOCKED
    # and auto-merge never fires. Pushing an empty commit "fixes" it because
    # the SECOND encounter of the same context on a new SHA links correctly
    # — but that's a workaround, not a fix. Naming this job `Devflow Review`
    # makes the Actions runner emit a workflow-job check-run with that name,
    # which the matcher recognizes from the moment the job is queued, with
    # no first-encounter delay. The API check-run from `create_check` is
    # kept (the PATCH-by-id flow stays the source of truth for the verdict;
    # this job-name check-run is the recognition surface). Two check-runs
    # share the name and conclude together — `failure` if the API PATCH
    # concluded `failure` (the `exit 1` at the end of the run block keeps
    # this job's exit code in lockstep), `success` otherwise — so the
    # required-check evaluation is consistent regardless of which check-run
    # the matcher picks.
    name: Devflow Review
    needs: [precheck, create_check, review]
    # always() so a failed/cancelled review still closes the check —
    # otherwise it hangs `in_progress` forever and the Re-run button never
    # appears. Gated on a check actually having been created, AND on the run
    # not being a #304 precondition deferral: on a deferral create_check
    # already posted the check pre-completed (neutral, waiting title), so
    # there is nothing to finalize — and skipping this job is load-bearing,
    # because a run of this job that exits 0 emits a `success` workflow job
    # check-run named `Devflow Review`, which the exactly-once gates
    # (devflow_review_run_count) would count as an already-run review and
    # permanently wedge the CI-completion re-trigger. Skipped, the job
    # check-run concludes `skipped`, which the gates exclude.
    if: always() && needs.create_check.outputs.check_run_id != '' && needs.precheck.outputs.skip_reason == ''
    runs-on: ubuntu-latest
    permissions:
      # Job-level permissions REPLACE workflow-level (they do not merge), so
      # contents:read must be re-declared here or actions/checkout below
      # cannot clone (mirrors precheck/create_check/review, which all
      # re-declare it for the same reason).
      contents: read
      checks: write
      # write (not read): on an APPROVE verdict this job dismisses any stale
      # CHANGES_REQUESTED review left by an earlier REJECT — the dismissals
      # API requires pull-requests:write. Without this, a PR that was once
      # rejected stays wedged at reviewDecision=CHANGES_REQUESTED even after
      # a later APPROVE + green required check (the APPROVE-with-notes review
      # is COMMENTED and never supersedes; the REJECT may also be a different
      # bot identity). This is the auto-path safety net; the skill's Phase
      # 4.4 final step does the same and covers the manual /devflow:review path too.
      pull-requests: write
    steps:
      # Trusted checkout for dismiss-stale-rejections.sh. This workflow fires
      # on BOTH pull_request (human-authored PRs, routed here by the precheck
      # job's inline event-dedupe) and pull_request_target. On the pull_request
      # trigger actions/checkout WITHOUT an explicit ref defaults to the PR
      # MERGE ref — i.e. PR-author-controlled code — which would then run
      # with this job's pull-requests:write token (script-injection /
      # privilege-escalation). Pin to the repo default branch so the
      # write-token job always runs the trusted in-repo copy regardless of
      # trigger. fetch-depth:1 (only the script is needed) and
      # persist-credentials:false (gh uses GH_TOKEN; don't leave the
      # actions token in .git/config) are defense-in-depth.
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1
          persist-credentials: false
      # Read the pinned plugin ref tolerantly — a missing/bare config must not
      # fail this job (the dismiss call below is a best-effort safety net), so we
      # don't use the hard-failing read-project-config action here.
      - id: pin
        shell: bash
        run: |
          set -euo pipefail
          REF=""
          if [ -f .devflow/config.json ]; then
            REF=$(jq -r '.devflow_version // empty' .devflow/config.json 2>/dev/null || true)
          fi
          echo "devflow_version=$REF" >> "$GITHUB_OUTPUT"
      # Materialize the plugin so dismiss-stale-rejections.sh exists at the
      # workspace path (committed → self → fetch). continue-on-error so a vendor
      # hiccup never hangs this REQUIRED check — the dismiss call is already
      # guarded for a missing script.
      - id: vendor
        uses: ./.github/actions/vendor-plugin
        continue-on-error: true
        with:
          ref: ${{ steps.pin.outputs.devflow_version }}
      # Surface a swallowed vendor failure: without this, a continue-on-error
      # vendor step that failed leaves the dismiss call below silently skipping,
      # with no breadcrumb that vendoring (not the dismiss logic) was the cause.
      - name: Warn on vendor failure
        if: ${{ steps.vendor.outcome != 'success' }}
        run: echo "::warning::vendor-plugin did not succeed in finalize_check; dismiss-stale-rejections.sh may be absent — a stale REJECT will not be auto-dismissed. Dismiss it manually if the PR stays at CHANGES_REQUESTED."
      - id: finalize
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          CHECK_RUN_ID: ${{ needs.create_check.outputs.check_run_id }}
          REVIEW_RESULT: ${{ needs.review.result }}
          PR_NUMBER: ${{ needs.precheck.outputs.pr_number }}
          # HEAD SHA the check is being finalized for. Compare the review's
          # commit_id against THIS (needs.precheck.outputs.head_sha), never
          # github.event.check_run.head_sha which can be stale after a push.
          HEAD_SHA: ${{ needs.precheck.outputs.head_sha }}
          # "true" when the review engine execution ended in error (is_error)
          # even though the review JOB reported success — treated as no verdict
          # for HEAD. Empty reads as "false" via ${ENGINE_ERROR:-false}: that
          # covers cancelled/skipped reviews (which take the neutral arm below)
          # AND a runner that never emitted the output on this success path (a
          # version-skewed vendored devflow-runner.yml predating engine_is_error,
          # or a failed surface step) — a deliberate fail-safe degradation,
          # because the deriver's HEAD-SHA verdict scoping remains the primary
          # staleness guard.
          ENGINE_ERROR: ${{ needs.review.outputs.engine_is_error }}
        run: |
          set -euo pipefail
          # The `Devflow Review` check conclusion encodes the review
          # *verdict*, not merely whether the review *process* completed.
          # This check is a REQUIRED status check (ruleset main-protected;
          # see CLAUDE.md), so it must conclude `success` ONLY on a
          # positively-observed APPROVE for the current HEAD; everything else
          # fails closed so an un-reviewed HEAD never merges (issue #249).
          # Mapping:
          #   review job failed            -> failure  (process broke; Re-run)
          #   review job cancelled/skipped -> neutral  (superseded Re-run or
          #         intentionally-not-run; a *neutral* required check does
          #         NOT block, so a cancelled Re-run never looks like REJECT)
          #   review job success, verdict = approve      -> success
          #   review job success, verdict = reject       -> failure (blocks)
          #   review job success, verdict = incomplete   -> failure, distinct
          #         "re-run needed" title. This covers a HEAD with no verdict
          #         (empty reviews, or only older-commit reviews), an engine
          #         that ended is_error, an empty PR_NUMBER, and an
          #         unverifiable reviews-API query — all fail closed, never a
          #         defaulted APPROVE nor a resurrected stale REJECT.
          # The verdict itself is derived by derive-review-verdict.sh (the
          # small, unit-tested unit — HEAD-SHA scoping, the fail-closed arms,
          # and the run-keyed comment fallback all live there). Phase 4.4 of
          # the skill posts the artifact it reads: a `--request-changes`
          # review (CHANGES_REQUESTED) / `--approve` review (APPROVED) /
          # `--comment` approve-with-notes (COMMENTED + `## Verdict: APPROVE`
          # body), or the run-keyed progress comment carrying the `## Verdict:`
          # line on the same-identity self-review fallback.
          SUMMARY='See the formal review verdict on the PR. Click Re-run on this check to re-review the current HEAD.'
          # (#304 note: this job never runs on a precondition deferral — the
          # deferral's neutral "waiting" check is posted pre-completed by
          # create_check, and this job's if: skips on a non-empty
          # skip_reason — so REVIEW_RESULT here always reflects a review job
          # that was actually gated on should_run=true.)
          case "$REVIEW_RESULT" in
            cancelled|skipped)
              CONCLUSION=neutral
              TITLE="Devflow review not run ($REVIEW_RESULT)"
              ;;
            success)
              # Derive the verdict for the current HEAD via the unit-tested
              # helper (see lib/test/run.sh). It prints `verdict=` +
              # `verdict_determined=`, emits a specific breadcrumb on every
              # fail-closed path, and always exits 0 — the empty-PR,
              # engine-error, no-HEAD-verdict, and unverifiable-query arms all
              # resolve to `incomplete` inside it, so there is no default-to-
              # success arm here anymore.
              DERIVE=.devflow/vendor/devflow/scripts/derive-review-verdict.sh
              [ -f "$DERIVE" ] || DERIVE=scripts/derive-review-verdict.sh
              if [ ! -f "$DERIVE" ]; then
                # Vendoring never materialized the deriver (committed -> self ->
                # fetch all missed). Cannot derive a verdict -> fail closed;
                # never fabricate an APPROVE we cannot substantiate.
                echo "::warning::finalize_check: derive-review-verdict.sh absent at $DERIVE; failing closed as incomplete (Re-run once the plugin vendors)."
                VERDICT=incomplete
                VERDICT_DETERMINED=false
              else
                # Capture the helper's stdout (the machine-readable verdict);
                # its stderr breadcrumbs flow straight to the Actions job log.
                DERIVED=$(HEAD_SHA="$HEAD_SHA" ENGINE_ERROR="${ENGINE_ERROR:-false}" \
                          PR_NUMBER="$PR_NUMBER" REPO="$REPO" GITHUB_RUN_ID="$GITHUB_RUN_ID" \
                          bash "$DERIVE") || true
                VERDICT=$(printf '%s\n' "$DERIVED" | sed -n 's/^verdict=//p')
                VERDICT_DETERMINED=$(printf '%s\n' "$DERIVED" | sed -n 's/^verdict_determined=//p')
                VERDICT="${VERDICT:-incomplete}"
                VERDICT_DETERMINED="${VERDICT_DETERMINED:-false}"
              fi
              case "$VERDICT" in
                approve)
                  CONCLUSION=success
                  TITLE='Devflow review: APPROVE'
                  ;;
                reject)
                  CONCLUSION=failure
                  TITLE='Devflow review: REJECT — changes requested'
                  ;;
                *)  # incomplete, or any unexpected token -> fail closed
                  CONCLUSION=failure
                  TITLE='Devflow review incomplete — re-run needed'
                  SUMMARY='No positively-observed APPROVE for the current HEAD (the engine stopped short, produced no verdict for this commit, or the verdict could not be verified). Click Re-run on this check to re-review the current HEAD.'
                  ;;
              esac
              ;;
            *)
              CONCLUSION=failure
              TITLE='Devflow review process failed'
              ;;
          esac
          if ! gh api -X PATCH "repos/$REPO/check-runs/$CHECK_RUN_ID" \
            -f status='completed' \
            -f conclusion="$CONCLUSION" \
            -f "output[title]=$TITLE" \
            -f "output[summary]=$SUMMARY"; then
            echo "::error::Failed to finalize check $CHECK_RUN_ID; it may hang in_progress. Re-run the check or PATCH it manually."
            exit 1
          fi
          echo "::notice::Finalized check $CHECK_RUN_ID as $CONCLUSION ($TITLE; review job result: $REVIEW_RESULT)."

          # Auto-path safety net (same script the skill's Phase 4.4 final
          # step calls — single source of truth). Gated on a POSITIVELY
          # determined APPROVE: CONCLUSION=success (REJECT maps to failure),
          # a real PR_NUMBER (defense-in-depth — since issue #249 an empty
          # PR_NUMBER fails closed to `incomplete`/`failure` and can never
          # reach this success path), AND VERDICT_DETERMINED=true (the verdict
          # came from a successful lookup, not a default under a swallowed API error —
          # otherwise a correlated GitHub degradation could silently dismiss
          # a still-valid REJECT). Best-effort: a non-zero exit is logged
          # but never fails the job — the check is already finalized.
          if [ "$CONCLUSION" = "success" ] && [ -n "${PR_NUMBER:-}" ] && [ "${VERDICT_DETERMINED:-false}" = "true" ]; then
            DISMISS=.devflow/vendor/devflow/scripts/dismiss-stale-rejections.sh
            if [ ! -x "$DISMISS" ]; then
              # Distinct from the "ran and exited non-zero" branch below: an
              # absent/non-executable script means vendoring never materialized
              # it (committed → self → fetch all missed), NOT a dismiss-logic
              # failure. The "Warn on vendor failure" step above flags the vendor
              # layer; this names the consequence here at the dismiss layer so a
              # missing-file (exit 127) no longer reads the same as a real error.
              echo "::warning::dismiss-stale-rejections.sh absent — vendoring did not materialize it at $DISMISS; a stale REJECT was NOT auto-dismissed. Dismiss it manually if the PR stays at CHANGES_REQUESTED."
            elif "$DISMISS" "$PR_NUMBER" "$REPO"; then
              echo "::notice::Stale-REJECT dismissal completed for PR #$PR_NUMBER (no-op if none were outstanding)."
            else
              echo "::warning::dismiss-stale-rejections.sh exited non-zero for PR #$PR_NUMBER; the PR may stay blocked at reviewDecision=CHANGES_REQUESTED — dismiss it manually."
            fi
          fi

          # Propagate REJECT through this job's own exit code so the workflow
          # check-run named `Devflow Review` (created by GitHub from the job's
          # `name:` above) carries the same blocking conclusion as the API
          # check-run PATCHed above. The API PATCH stays the source of truth
          # for the verdict (it sets the `output[summary]` body the user sees
          # in the PR's checks tab); this exit code keeps the two check-runs
          # in lockstep so whichever one the required-check matcher picks,
          # the answer is the same. Only `failure` blocks: success exits 0,
          # neutral (cancelled/skipped review) exits 0 too — a neutral
          # required check does not block, matching the API PATCH's behaviour.
          if [ "$CONCLUSION" = "failure" ]; then
            exit 1
          fi
