name: Deploy site to GitHub Pages

# Publishes the contents of docs/site/ as the site root, e.g.
#   https://the01geek.github.io/devflow-autopilot/one-pager.html
# Internal docs elsewhere under docs/ are NOT published.

on:
  push:
    branches: [main]
    paths:
      - docs/site/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Turn Pages on (build type = GitHub Actions) if it isn't already.
          enablement: true
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
