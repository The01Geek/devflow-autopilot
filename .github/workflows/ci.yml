name: CI

on:
  push:
    branches: [main]
  pull_request:
    # The default types (opened, synchronize, reopened) are NOT enough for
    # our own bot PRs. The /devflow:implement flow opens a PR as a draft
    # (skills/implement: `gh pr create --draft`), pushes its commits, then
    # toggles ready-for-review (`gh pr ready`). devflow-implement.yml checks
    # out and pushes with the default GITHUB_TOKEN, so GitHub's recursion
    # guard suppresses the `synchronize` event for those commits — and
    # `ready_for_review` is not a default type. Listening only to the
    # defaults meant CI never ran on the bot's HEAD; because `lib + python
    # tests` is a REQUIRED status check, the PR wedged at "Expected —
    # waiting for status" forever. Adding `ready_for_review` makes CI fire
    # on the ready toggle against the current HEAD — the same event
    # devflow-review.yml already keys off (see its `on:` comment) to catch
    # these bot PRs. We do NOT switch to `pull_request_target`: this job
    # runs arbitrary PR code (preflight + the test suite), which under
    # pull_request_target would expose repo secrets to untrusted code.
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  test:
    name: lib + python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: python3 -m pip install --quiet pyyaml

      - name: Preflight (dependency check)
        run: bash lib/preflight.sh

      - name: Run test suite (jq filters, shell helpers, python scripts)
        run: bash lib/test/run.sh

  lint:
    name: lint (shellcheck + actionlint + ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # shellcheck ships on ubuntu-latest runners — no extra action needed.
      # --severity=warning keeps the gate on real issues and drops info/style
      # nags. SC1091 ("can't follow sourced file") is excluded: helpers source
      # each other via ${CLAUDE_SKILL_DIR}-relative paths that don't resolve at
      # lint time. The lib/test gh-stubs are deliberately minimal fixtures, not
      # shipped code, so they're out of scope. Piping into xargs (rather than
      # shellcheck $(...)) avoids the SC2046 word-split this very job would flag.
      - name: ShellCheck (lib + scripts)
        run: |
          git ls-files '*.sh' | grep -v '^lib/test/' \
            | xargs -r shellcheck --severity=warning -e SC1091

      # actionlint validates workflow syntax and runs shellcheck over run: blocks.
      # SHELLCHECK_OPTS mirrors the severity policy; SC2034 is excluded because
      # each step's run: block is analysed in isolation, so GitHub-context vars
      # assigned in one block but consumed in another read as "unused".
      - name: actionlint (workflows)
        uses: raven-actions/actionlint@v2
        env:
          SHELLCHECK_OPTS: --severity=warning --exclude=SC2034

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: ruff (python)
        run: |
          python3 -m pip install --quiet ruff
          git ls-files '*.py' | xargs -r ruff check
