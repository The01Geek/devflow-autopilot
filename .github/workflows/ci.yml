name: CI

on:
  push:
    branches: [main]
  pull_request:
    # The default types (opened, synchronize, reopened) are NOT enough for
    # our own bot PRs. The /devflow:implement flow opens a PR as a draft
    # (skills/implement: `gh pr create --draft`), pushes its commits, then
    # toggles ready-for-review (`gh pr ready`). devflow-implement.yml checks
    # out and pushes with the default GITHUB_TOKEN, so GitHub's recursion
    # guard suppresses the `synchronize` event for those commits — and
    # `ready_for_review` is not a default type. Listening only to the
    # defaults meant CI never ran on the bot's HEAD; because `lib + python
    # tests` is a REQUIRED status check, the PR wedged at "Expected —
    # waiting for status" forever. Adding `ready_for_review` makes CI fire
    # on the ready toggle against the current HEAD — the same event
    # devflow-review.yml already keys off (see its `on:` comment) to catch
    # these bot PRs. We do NOT switch to `pull_request_target`: this job
    # runs arbitrary PR code (preflight + the test suite), which under
    # pull_request_target would expose repo secrets to untrusted code.
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  test:
    name: lib + python tests
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 (all history for all branches) so refs/remotes/origin/main resolves
      # in the checkout — actions/checkout fetches a single commit by default, under which
      # origin/main does NOT exist, so the #434 stale-prose self-scan in lib/test/run.sh
      # silently self-skipped on every CI run (issue #456). With full history the gate runs
      # live here, which is the only place it grades a clean committed tree. Deliberate
      # trade-off: history is fetched unconditionally — negligible cost at this repo's size,
      # and a conditional fetch would reintroduce the silent self-skip on the runs it skips.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: python3 -m pip install --quiet pyyaml

      - name: Preflight (dependency check)
        run: bash lib/preflight.sh

      - name: Run test suite (jq filters, shell helpers, python scripts)
        run: bash lib/test/run.sh

  lint:
    name: lint (shellcheck + actionlint + ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Pin ShellCheck instead of using the runner image's (issue #745). Two
      # coupled requirements force this, and BOTH are load-bearing:
      #   1. lib/test/run.sh (>50k lines) cannot be analysed with ShellCheck's
      #      dataflow ("extended analysis") pass on: it allocates ~15 GB and the
      #      16 GB runner is evicted mid-analysis with "The runner has received a
      #      shutdown signal" (observed 6/6 runs across 5 head SHAs, PR #734).
      #      --extended-analysis=false brings it to 1.15 GB / ~10 s. Cost, as
      #      measured on 2026-07-23 against ShellCheck 0.11.0: none on this file
      #      — a chunked A/B of the whole file produced a byte-identical finding
      #      set both ways. (Issue #745 recorded SC2319 x4 dropping corpus-wide
      #      at authoring time; that no longer reproduces under 0.11.0. Both are
      #      past-time snapshots, not invariants — re-measure after an upgrade.)
      #   2. ubuntu-latest (Ubuntu 24.04) ships ShellCheck 0.9.0, which predates
      #      --extended-analysis (added in 0.10.0 — per its release notes; the
      #      runner's tool version is an external fact, observed in PR #734, not
      #      a repo-verified invariant). On 0.9.0 the flag ERRORS, and the
      #      equivalent `# shellcheck extended-analysis=false` directive has no
      #      effect — it is reported as an unknown directive (SC1107) and
      #      ignored — so the lint OOMs exactly as if the flag were absent. Pin
      #      >= 0.10.0 rather than depending on the image's tool version, which
      #      drifts with the runner image. lib/test/run.sh asserts the floor.
      # Installed onto PATH so every ShellCheck step below uses the pinned build.
      - name: Pin ShellCheck (>= 0.10.0, required by --extended-analysis)
        env:
          SHELLCHECK_VERSION: v0.11.0
        run: |
          # pipefail so a failed download (404, rate limit, network) is reported as the
          # curl failure it is, rather than as tar's downstream "not found in archive". The
          # step fails either way — tar exits nonzero on the missing member and `set -e`
          # stops the job — so this is attribution, not the only thing standing between the
          # job and the image's 0.9.0. The flag itself is self-verifying: 0.9.0 rejects
          # --extended-analysis outright, so a wrong binary reddens the run.sh step rather
          # than silently under-linting. `shellcheck --version` below prints for the log; it
          # asserts nothing — the version FLOOR is asserted in lib/test/run.sh.
          set -o pipefail
          curl -fsSL \
            "https://github.com/koalaman/shellcheck/releases/download/${SHELLCHECK_VERSION}/shellcheck-${SHELLCHECK_VERSION}.linux.x86_64.tar.xz" \
            | tar -xJf - "shellcheck-${SHELLCHECK_VERSION}/shellcheck"
          sudo install -m 0755 "shellcheck-${SHELLCHECK_VERSION}/shellcheck" /usr/local/bin/shellcheck
          rm -rf "shellcheck-${SHELLCHECK_VERSION}"
          shellcheck --version

      # --severity=warning keeps the gate on real issues and drops info/style
      # nags. SC1091 ("can't follow sourced file") is excluded: helpers source
      # each other via ${CLAUDE_SKILL_DIR}-relative paths that don't resolve at
      # lint time. The lib/test gh-stubs are deliberately minimal fixtures, not
      # shipped code, so they're out of scope. Piping into xargs (rather than
      # shellcheck $(...)) avoids the SC2046 word-split this very job would flag.
      - name: ShellCheck (lib + scripts)
        run: |
          git ls-files '*.sh' | grep -v '^lib/test/' \
            | xargs -r shellcheck --severity=warning -e SC1091
          # lib/test/ is excluded above (the gh-stub fixtures are not shipped code), but
          # these lib/test files are shipped code (the sourced harness/renderer/
          # module and the standalone focused runner) rather than fixtures, so
          # they are added explicitly rather than shipping unlinted.
          shellcheck --severity=warning -e SC1091 \
            lib/test/module-harness.sh lib/test/run-module.sh lib/test/summary.sh \
            lib/test/modules/workflow-flight-recorder.sh \
            lib/test/modules/review-and-fix-contract.sh \
            lib/test/modules/create-issue-contract.sh \
            lib/test/modules/capability-profiles.sh \
            lib/test/modules/regenerate-artifacts.sh \
            lib/test/modules/installer-wiring.sh \
            lib/test/modules/harness-python-guards.sh \
            lib/test/cloud-form-layout-test.sh \
            lib/test/path-portability-test.sh
          # lib/test/describe-budget-delta.sh is the #529 budget-delta reporter the suite
          # drives (a branch-selecting message composer, extracted per CLAUDE.md's
          # inline-shell rule). Same carve-out: real shell, so it is linted even
          # though lib/test/ is excluded above.
          shellcheck --severity=warning -e SC1091 lib/test/describe-budget-delta.sh

      # lib/test/run.sh is the suite driver — the largest and most-edited shell
      # file in the repo, and the last one brought under the lint (issue #745).
      # It gets its own step (rather than joining the list above) because it is
      # the sole file that needs --extended-analysis=false; see the pin step's
      # comment for why the flag and the >= 0.10.0 pin are both required. This
      # runs on the standard ubuntu-latest runner, and its failure is not tolerated.
      - name: ShellCheck (lib/test/run.sh)
        run: |
          shellcheck --severity=warning -e SC1091 --extended-analysis=false lib/test/run.sh

      # actionlint validates workflow syntax and runs shellcheck over run: blocks.
      # SHELLCHECK_OPTS mirrors the severity policy; SC2034 is excluded because
      # each step's run: block is analysed in isolation, so GitHub-context vars
      # assigned in one block but consumed in another read as "unused".
      - name: actionlint (workflows)
        uses: raven-actions/actionlint@v2
        env:
          SHELLCHECK_OPTS: --severity=warning --exclude=SC2034

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: ruff (python)
        run: |
          # Pin ruff: an unpinned `pip install ruff` picked up 0.16.0 the day it
          # released, whose expanded default ruleset (EXE001/PIE810/SIM102/TRY004/…)
          # flagged ~645 pre-existing findings repo-wide and turned this job red on
          # every branch at once. Pin to a known-green minor so a ruff release is an
          # explicit, reviewable bump rather than a silent tree-wide breakage.
          python3 -m pip install --quiet 'ruff==0.15.*'
          git ls-files '*.py' | xargs -r ruff check
