name: Matcher probe

# Permanent, empirical probe of which command SHAPES the deployed
# `anthropics/claude-code-action@v1` permission matcher accepts under the
# read-only `review` tool profile (issue #401). Cloud review runs stall with no
# verdict when the matcher silently DENIES a command *shape* whose *head* the
# profile grants (leading `cd`, leading `VAR=` assignments, heredoc writes, the
# unexpanded `"${CLAUDE_SKILL_DIR:-…}"` anchor form). The issue-#363 head
# extractor validates heads, not shapes, so it stays green on all of them.
#
# The `probe` job runs a Haiku claude-code-action session whose --allowed-tools is
# the review profile literal PLUS the candidate grants under test, instructs the
# model to attempt each corpus shape once, then computes a per-shape
# PERMITTED/DENIED/UNATTEMPTED verdict DETERMINISTICALLY from the action's
# execution file (`permission_denials` + recorded `tool_use` calls) and the
# on-disk side-effect files. The model's own text output is NEVER the measurement.
# A sibling `schedulewakeup-probe` job (issue #415) applies the same execution-file
# measurement to a single `--disallowedTools ScheduleWakeup` session, deriving a
# DENIED/AVAILABLE/REMOVED/INCONCLUSIVE verdict that gates a claude_args change in
# devflow-implement.yml; it runs in its own job so the flag never perturbs the
# matcher probe above. Two further #437 sibling jobs share the workflow: an
# `execfile-shape-probe` job that captures a real run's execution_file as a
# REDACTED shape artifact (docs/execution-file-shape.md), and a `hook-probe` job
# that records whether a base-branch .claude/settings.json Stop hook fires under
# claude-code-action. A pull_request edit to this file therefore launches a
# paid Claude session per probe job, not just the original two.
#
# Triggers: workflow_dispatch (available post-merge, from the default branch) plus
# pull_request scoped to this file's own path (so a change to the probe re-runs it
# pre-merge from its branch). Same-repo only — a fork PR gets no secrets and the
# job `if:` refuses to run for it. Concurrency-capped; a run costs cents.
#
# Re-run this whenever claude-code-action or the Claude Code CLI upgrades — matcher
# semantics are version-dependent, and this probe is the evidence of record that
# keeps the review profile's grants honest.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/matcher-probe.yml'

# Cancel a superseded probe run on the same ref so a rapid push sequence does not
# stack redundant paid runs.
concurrency:
  group: matcher-probe-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # The review profile literal this probe copies verbatim into --allowed-tools
  # grants helper tools that touch the pull-requests API (e.g.
  # dismiss-stale-rejections.sh → repos/*/pulls/{n}/reviews), so the
  # endpoint↔permission lint (issue #312) requires the family be declared even
  # though the probe never invokes them. `read` is the safe floor: it satisfies
  # the family-presence lint while making every mutating review call (gh pr
  # review, review dismissal) fail closed at the API — the probe must never be
  # able to mutate a PR.
  pull-requests: read

jobs:
  probe:
    # Same-repo only: a pull_request from a fork has no secrets (so
    # CLAUDE_CODE_OAUTH_TOKEN would be empty and the run useless), and we never
    # want to spend a paid run on untrusted input. workflow_dispatch is always
    # same-repo (it only exists on the default branch).
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Compose --allowed-tools = the review profile's exact TOOLS literal (kept
      # verbatim in sync with .github/workflows/devflow-runner.yml's `review`
      # profile — including the Write(.devflow/tmp/**) grant that landed from this
      # probe's first run, 29111394360). Shapes 12–14 (issue #405) need NO extra grant
      # — they probe whether the helper-invocation PATH FORM matters: the vendored
      # literal (control) is already granted, while the absolute-path and repo-root
      # `scripts/…` forms are the point (expected DENIED because their leading token is
      # not the granted vendored literal). PLUS the candidate grants still under test:
      # Bash(cd:*), Write(/tmp/**), and Bash(scripts/*.sh:*). cd and Write(/tmp/**)
      # were both DENIED on the first run — cd's row was confounded by an
      # independently-denied `>` redirect, and Write(/tmp/**) is a genuine
      # out-of-workspace denial — so they are kept here for a future redirect-free
      # re-probe rather than granted. Bash(scripts/*.sh:*) is the issue-#412
      # candidate: a trailing-extension glob (unlike the production-proven
      # `*/<fixed-basename>` form) whose permit/deny under the real matcher is
      # unknown — shape 15 invokes a repo-root `scripts/<name>.sh` helper as the
      # leading token under this grant to measure it. MEASURED DENIED on run
      # 29135163829 (PR #413): even with the glob granted, `scripts/config-get.sh …`
      # was refused — the same DENIED as shape 14's ungranted control — so the
      # trailing-extension glob does NOT match a repo-root leading token, the
      # implement profile keeps the enumerated `*/<basename>.sh` helper globs, and
      # NO migration to `scripts/*.sh` happens. Kept here (like cd / Write(/tmp/**))
      # as a genuine denial to re-probe after a claude-code-action upgrade — the
      # version-dependent verdict could change. If devflow-runner.yml's review
      # literal changes, update this copy too — a deliberate second copy so the
      # probe measures the real profile, not a paraphrase.
      - name: Resolve allowed-tools (review profile + candidate grants)
        id: tools
        run: |
          set -euo pipefail
          REVIEW='Read,Glob,Grep,LS,Skill,Agent,TodoWrite,WebFetch,WebSearch,Bash(git status:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git ls-files:*),Bash(git rev-parse:*),Bash(git merge-base:*),Bash(git blame:*),Bash(git branch:*),Bash(git cat-file:*),Bash(git checkout:*),Bash(mkdir:*),Bash(tee:*),Bash(mktemp:*),Bash(cmp:*),Bash(rm -f:*),Bash(*/load-prompt-extension.sh:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*),Bash(gh pr comment:*),Bash(gh pr list:*),Bash(gh pr checks:*),Bash(gh issue view:*),Bash(gh issue comment:*),Bash(gh issue list:*),Bash(gh search:*),Bash(gh repo view:*),Bash(gh run view:*),Bash(gh run list:*),Bash(gh api:*),Bash(jq:*),Bash(.devflow/vendor/devflow/scripts/run-jq.sh:*),Bash(grep:*),Bash(rg:*),Bash(find:*),Bash(wc:*),Bash(sort:*),Bash(uniq:*),Bash(cut:*),Bash(tr:*),Bash(xargs:*),Bash(awk:*),Bash(sed:*),Bash(diff:*),Bash(comm:*),Bash(cat:*),Bash(head:*),Bash(tail:*),Bash(ls:*),Bash(tree:*),Bash(file:*),Bash(stat:*),Bash(date:*),Bash(pwd:*),Bash(realpath:*),Bash(dirname:*),Bash(basename:*),Bash(which:*),Bash(type:*),Bash(env:*),Bash(echo:*),Bash(printf:*),Bash(test:*),Bash(.devflow/vendor/devflow/scripts/match-deferrals.py:*),Bash(.devflow/vendor/devflow/scripts/dismiss-stale-rejections.sh:*),Bash(.devflow/vendor/devflow/scripts/workpad.py:*),Bash(.devflow/vendor/devflow/scripts/config-get.sh:*),Bash(.devflow/vendor/devflow/scripts/load-prompt-extension.sh:*),Bash(.devflow/vendor/devflow/scripts/resolve-review-overrides.py:*),Bash(.devflow/vendor/devflow/lib/efficiency-trace.sh:*),Write(.devflow/tmp/**)'
          CANDIDATES='Bash(cd:*),Write(/tmp/**),Bash(scripts/*.sh:*)'
          TOOLS="$REVIEW,$CANDIDATES"
          delim="TOOLS_EOF_$(date +%s%N)_$$"
          {
            printf 'tools<<%s\n' "$delim"
            printf '%s\n' "$TOOLS"
            printf '%s\n' "$delim"
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code (matcher probe)
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Allow any bot to initiate the probe. This diagnostic runs same-repo only
          # (the job `if:` refuses fork PRs) and is read-only, but claude-code-action
          # otherwise refuses a bot-initiated run ("Workflow initiated by non-human
          # actor") — which is exactly the case when a DevFlow bot PR touches this file,
          # leaving every shape UNATTEMPTED. `*` lets the probe actually measure.
          allowed_bots: "*"
          prompt: |
            You are a PERMISSION-MATCHER PROBE. Your ONLY task is to attempt each
            of the 15 numbered command shapes below EXACTLY ONCE, each in its OWN
            single tool call, VERBATIM — do not modify, wrap, quote-escape, split,
            or combine them, and do not add any command that is not listed. Attempt
            them in order 1 through 15. If a shape is DENIED or errors, do NOT
            retry it and do NOT try a different formulation — move straight to the
            next number. After attempting all 15, STOP and reply with the single
            word DONE.

            Your text output is not measured. Only the harness record of which tool
            calls the permission matcher allowed versus denied, and which
            side-effect files exist afterward, is measured. Attempt every shape even
            if you expect it to fail — a denial is exactly the signal being
            collected.

            Shape 1 — heredoc write with a granted head (Bash):
            cat > /tmp/probe-01.txt <<'EOF'
            probe01
            EOF

            Shape 2 — assignment-led compound with a granted head (Bash, one call, both lines):
            M=probe02
            printf '%s\n' "$M" > /tmp/probe-02.txt

            Shape 3 — cd-led compound (Bash):
            cd /tmp && printf 'probe03\n' > /tmp/probe-03.txt

            Shape 4 — unexpanded CLAUDE_SKILL_DIR anchor form (Bash). It is expected
            to exit non-zero because the vendored plugin is not present in this
            checkout; attempt it anyway — permission granted vs denied is what
            matters, not the exit code:
            "${CLAUDE_SKILL_DIR:-.devflow/vendor/devflow/skills/review}"/../../scripts/load-prompt-extension.sh review

            Shape 5 — repo-relative vendored literal (Bash). Also expected to exit
            non-zero (file absent); attempt it anyway:
            .devflow/vendor/devflow/scripts/load-prompt-extension.sh review

            Shape 6 — tee heredoc write (Bash):
            tee /tmp/probe-06.txt <<'EOF'
            probe06
            EOF

            Shape 7 — multi-argument printf redirect, single statement (Bash):
            printf '%s\n' probe07a probe07b > /tmp/probe-07.txt

            Shape 8 — Write tool: use the Write tool to create the file
            /tmp/probe-08.txt with exactly this content:
            probe08

            Shape 9 — Write tool: use the Write tool to create the file
            .devflow/tmp/probe-09.txt with exactly this content:
            probe09

            Shape 10 — pipe into tee (Bash):
            printf 'probe10\n' | tee /tmp/probe-10.txt

            Shape 11 — plainly granted single command, positive control (Bash):
            grep -c . /etc/hosts

            Shape 12 — helper invocation, repo-relative vendored literal as the
            leading token (Bash, CONTROL — this is the form the allowlist grants):
            .devflow/vendor/devflow/scripts/config-get.sh .base_branch hprobe12ok

            Shape 13 — helper invocation, ABSOLUTE-path form (Bash). Same helper, but
            an absolute leading token the allowlist does not grant; attempt it anyway
            — permission granted vs denied is what matters:
            /home/runner/work/devflow-autopilot/devflow-autopilot/.devflow/vendor/devflow/scripts/config-get.sh .base_branch hprobe13abs

            Shape 14 — helper invocation, repo-root `scripts/…` form (Bash). Same
            helper, but the repo-root leading token the allowlist does not grant;
            attempt it anyway:
            scripts/config-get.sh .base_branch hprobe14root

            Shape 15 — helper invocation, repo-root `scripts/…` form under the
            issue-#412 candidate grant `Bash(scripts/*.sh:*)` (Bash). Identical
            leading-token form to shape 14, but this time a trailing-extension glob
            IS granted for it — so a PERMITTED verdict here (versus DENIED at 14)
            is the evidence that `scripts/*.sh` works and the enumerated
            `*/<basename>.sh` helper globs can migrate to it:
            scripts/config-get.sh .base_branch hprobe15glob

          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-official.git
            ./

          plugins: |
            devflow@devflow-marketplace

          claude_args: >-
            --model claude-haiku-4-5-20251001
            --effort low
            --permission-mode acceptEdits
            --allowed-tools "${{ steps.tools.outputs.tools }}"

      # Deterministic verdict. Parse the action's execution file for
      # `permission_denials` (the authoritative DENIED signal) and recorded
      # `tool_use` inputs (the PERMITTED signal — a call that reached the model's
      # tool stream), corroborated by the on-disk side-effect files. The model's
      # prose is never read: `permission_denials` and `tool_use` are harness
      # records, and matching is done against the recorded tool INPUTS (which carry
      # the verbatim command), not against the prompt echo. always() so the table
      # is produced even if the engine ended in error.
      - name: Compute per-shape verdict
        if: always()
        env:
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          set -uo pipefail
          python3 - <<'PY'
          import json, os

          exec_file = os.environ.get("EXECUTION_FILE", "") or ""
          denials = []      # json-encoded permission_denials entries
          tool_uses = []    # json-encoded tool_use inputs (+ tool name)
          parsed = None
          note_top = ""

          if exec_file and os.path.isfile(exec_file):
              raw = open(exec_file, encoding="utf-8", errors="replace").read()
              try:
                  parsed = json.loads(raw)
              except Exception:
                  parsed = []
                  for line in raw.splitlines():
                      s = line.strip()
                      if not s:
                          continue
                      try:
                          parsed.append(json.loads(s))
                      except Exception:
                          pass
                  if not parsed:
                      note_top = "execution file present but unparseable"
          else:
              note_top = "execution file absent or empty at '%s'" % exec_file

          def walk(o):
              if isinstance(o, dict):
                  if o.get("type") == "tool_use" and "input" in o:
                      tool_uses.append(json.dumps(o.get("input")) + " NAME=" + str(o.get("name", "")))
                  pd = o.get("permission_denials")
                  if isinstance(pd, list):
                      for d in pd:
                          denials.append(json.dumps(d))
                  for v in o.values():
                      walk(v)
              elif isinstance(o, list):
                  for it in o:
                      walk(it)

          if parsed is not None:
              walk(parsed)

          denial_text = "\n".join(denials)
          tooluse_text = "\n".join(tool_uses)

          # (num, description, marker, sidefile-or-None)
          rows = [
              (1,  "heredoc write, granted head (`cat > f <<'EOF'`)",        "probe-01", "/tmp/probe-01.txt"),
              (2,  "assignment-led compound, granted head (`M=…`; printf)",   "probe-02", "/tmp/probe-02.txt"),
              (3,  "cd-led compound (`cd … && printf > f`)",                  "probe-03", "/tmp/probe-03.txt"),
              (4,  "unexpanded `${CLAUDE_SKILL_DIR:-…}` anchor invocation",   "CLAUDE_SKILL_DIR", None),
              (5,  "repo-relative vendored-literal helper invocation",        "vendor/devflow/scripts/load-prompt-extension.sh", None),
              (6,  "tee heredoc write (`tee f <<'EOF'`)",                     "probe-06", "/tmp/probe-06.txt"),
              (7,  "multi-arg printf redirect (`printf '%s\\n' a b > f`)",     "probe-07", "/tmp/probe-07.txt"),
              (8,  "Write tool under `Write(/tmp/**)`",                       "probe-08", "/tmp/probe-08.txt"),
              (9,  "Write tool under `Write(.devflow/tmp/**)`",               "probe-09", ".devflow/tmp/probe-09.txt"),
              (10, "pipe into tee (`printf … | tee f`)",                      "probe-10", "/tmp/probe-10.txt"),
              (11, "plainly granted single command (positive control)",       "/etc/hosts", None),
              (12, "helper: repo-relative vendored literal (leading token, CONTROL)", "hprobe12ok", None),
              (13, "helper: absolute-path form (leading token)",               "hprobe13abs", None),
              (14, "helper: repo-root `scripts/…` form (leading token)",       "hprobe14root", None),
              (15, "helper: repo-root `scripts/…` under `Bash(scripts/*.sh:*)` glob", "hprobe15glob", None),
          ]

          out = []
          out.append("## Matcher-probe results")
          out.append("")
          out.append("Deterministic verdict computed from the execution file's "
                     "`permission_denials` (DENIED) and recorded `tool_use` inputs "
                     "(PERMITTED), corroborated by on-disk side-effect files. The "
                     "model's text output is never the measurement.")
          out.append("")
          if note_top:
              out.append("> [!WARNING]")
              out.append("> %s — every row will read UNATTEMPTED; re-run the probe." % note_top)
              out.append("")
          out.append("| # | Shape | Verdict | Evidence |")
          out.append("|---|-------|---------|----------|")

          for num, desc, marker, sidefile in rows:
              denied = marker in denial_text
              attempted = marker in tooluse_text
              file_ok = bool(sidefile) and os.path.exists(sidefile)
              if denied:
                  verdict = "DENIED"
              elif file_ok or attempted:
                  verdict = "PERMITTED"
              else:
                  verdict = "UNATTEMPTED"
              ev = []
              ev.append("denial=%s" % ("yes" if denied else "no"))
              ev.append("tool_use=%s" % ("yes" if attempted else "no"))
              if sidefile:
                  ev.append("side-effect(%s)=%s" % (sidefile, "present" if file_ok else "absent"))
              else:
                  ev.append("side-effect=n/a (judge by denial vs execution)")
              out.append("| %d | %s | **%s** | %s |" % (num, desc, verdict, "; ".join(ev)))

          out.append("")
          out.append("### Raw denial entries (%d)" % len(denials))
          out.append("")
          if denials:
              out.append("```")
              for d in denials:
                  out.append(d[:400])
              out.append("```")
          else:
              out.append("_No permission_denials entries found in the execution file._")

          table = "\n".join(out)
          print(table)
          summary = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if summary:
              with open(summary, "a", encoding="utf-8") as fh:
                  fh.write(table + "\n")
          PY

  # issue #415 — probe whether claude-code-action's headless runner honors
  # `--disallowedTools ScheduleWakeup` (removes or denies the ScheduleWakeup tool).
  # The implement-tier early-quit (#408/#415) is the ScheduleWakeup tool result
  # promising a re-invocation that never happens under `claude -p`. This is ONE
  # extra claude-code-action invocation with the flag under test, isolated in its
  # own job so the flag never perturbs the 15-shape matcher probe above. The verdict
  # is derived DETERMINISTICALLY from the execution file (permission_denials /
  # recorded tool_use NAME= / tool absence), never the model's text, by the
  # unit-tested helper scripts/schedulewakeup-probe-verdict.py (extracted so every
  # arm and the fail-open name-match are driven in lib/test/run.sh — #415 review). TWO positive-
  # control grep calls bracket the ScheduleWakeup attempt (before AND after Action 2):
  # the AFTER control proves the model reached and passed Action 2, so an absence of
  # any ScheduleWakeup tool_use reads as REMOVED-from-context only when both controls
  # ran — otherwise the run is INCONCLUSIVE (an unmeasured run never collapses onto the
  # shippable REMOVED). ScheduleWakeup is granted in --allowed-tools so the allowlist
  # can never be the thing that removes it — a DENIED/REMOVED is attributable to
  # --disallowedTools alone.
  # Verdict → claude_args mapping (issue #415 AC4, executed by the implementer):
  #   DENIED or REMOVED → ship `--disallowedTools ScheduleWakeup` in
  #                       devflow-implement.yml's claude step + its run.sh pin.
  #   AVAILABLE         → ship no claude_args change; record the probe run link
  #                       and this omission rationale on the PR.
  #   INCONCLUSIVE      → measured nothing conclusive; re-run before deciding.
  #
  # MEASURED AVAILABLE across real cloud runs 29140791165 and 29138117625 (issue
  # #418): both recorded a ScheduleWakeup `tool_use` that was NOT denied — i.e.
  # `--disallowedTools ScheduleWakeup` did NOT remove or deny the tool in
  # claude-code-action@v1's headless runner (the flag was IGNORED, the tool stayed
  # available). A third run, 29139012320, read a *presumptive* REMOVED (no tool_use,
  # both controls ran) — the documented false-positive where a compliant model
  # silently skips Action 2 while still running both bracketing controls; the two
  # positive AVAILABLE observations are dispositive over it. Per the AVAILABLE arm
  # above, NO `--disallowedTools ScheduleWakeup` was added to devflow-implement.yml's
  # claude step and NO `--disallowedTools`-flag lib/test/run.sh pin was added (the
  # unrelated #408/#415 ScheduleWakeup prose/verdict-helper pins in run.sh are
  # untouched) — the implement-tier
  # ScheduleWakeup false-promise early-quit is prevented by the always-resident
  # headless-wait prose (issue #415) ALONE, since the flag does not remove the tool
  # here. This verdict is version-dependent: RE-PROBE (workflow_dispatch, or any PR
  # touching this file) after a claude-code-action / Claude Code CLI upgrade before
  # trusting it — a future version that honors the flag flips this to REMOVED/DENIED
  # and would then ship the flag + its run.sh pin per the mapping above.
  schedulewakeup-probe:
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Claude Code (ScheduleWakeup disallowed-tools probe)
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Allow any bot to initiate the probe (same rationale as the matcher
          # probe above): this diagnostic is same-repo only and read-only, but
          # claude-code-action otherwise refuses a bot-initiated run.
          allowed_bots: "*"
          prompt: |
            You are a DISALLOWED-TOOL PROBE. Attempt the three numbered actions below,
            each EXACTLY ONCE in its OWN single tool call, in order. Do not retry a
            denied or unavailable action and do not work around it — move straight to
            the next number. After all three, STOP and reply with the single word DONE.

            Your text output is not measured. Only the harness record of which tool
            calls the permission matcher allowed, denied, or did not expose is
            measured. Attempt Action 2 even if the tool appears unavailable — its
            absence or denial is exactly the signal being collected — and ALWAYS
            proceed to Action 3 afterward, whatever happened at Action 2.

            Action 1 (positive control, BEFORE) — run this Bash command once:
            grep -c . /etc/hosts

            Action 2 — attempt to call the ScheduleWakeup tool once: schedule a
            wakeup roughly 300 seconds from now with any short reason and prompt.

            Action 3 (positive control, AFTER — proves you reached and passed
            Action 2) — run this Bash command once:
            grep -c . /etc/os-release

          # No plugin_marketplaces/plugins here (unlike the matcher probe above):
          # this probe exercises only `grep` (Bash) and the ScheduleWakeup harness
          # built-in, neither of which needs the devflow plugin — loading it would
          # add a marketplace clone + install for zero measurement value.
          #
          # ScheduleWakeup is GRANTED in --allowed-tools *and* removed by
          # --disallowedTools deliberately (issue #415 review): granting it means the
          # allowlist can never be the thing that removes/denies it, so a DENIED or
          # REMOVED verdict is attributable to --disallowedTools alone — the flag under
          # test — rather than confounded by an allowlist omission. If --disallowedTools
          # wins it is removed/denied (ship); if it is ignored the tool stays AVAILABLE
          # (do not ship). --permission-mode acceptEdits so a granted call does not
          # prompt-deny and masquerade as a denial.
          claude_args: >-
            --model claude-haiku-4-5-20251001
            --effort low
            --permission-mode acceptEdits
            --allowed-tools "Bash(grep:*),ScheduleWakeup"
            --disallowedTools ScheduleWakeup

      # Deterministic verdict from the execution file only — same measurement core
      # as the matcher probe's verdict step. always() so the verdict is produced
      # even if the engine ended in error.
      - name: Compute ScheduleWakeup verdict
        if: always()
        env:
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          set -uo pipefail
          # Verdict derivation is extracted into a unit-tested helper (issue #415
          # review, finding #1) so lib/test/run.sh can drive every arm + the
          # fail-open matrix; see scripts/schedulewakeup-probe-verdict.py.
          python3 scripts/schedulewakeup-probe-verdict.py "${EXECUTION_FILE}"

  # issue #437 — capture the SHAPE of claude-code-action's execution_file and settle
  # the unproven "the token/wall-clock cost half is unreconstructable" claim in
  # docs/efficiency-trace.md with real evidence. The prompt deliberately exercises the
  # events the shape record cares about: a positive-control grep, ONE Task/subagent
  # dispatch (so a `subagent_type` field has something to carry), and one deliberately
  # ungranted command (so `permission_denials` has something to carry). The resulting
  # `steps.claude.outputs.execution_file` is fed through scripts/extract-execution-shape.sh,
  # which emits a REDACTED shape record (per-field present/absent/unavailable + the
  # top-level encoding + a key→type structural set; every string VALUE leaf is dropped —
  # object KEYS are fail-closed filtered (`safekey`: emitted verbatim only when bounded-length
  # and identifier-shaped, else `<redacted-key>`), so an unrecognized key loses its name rather
  # than leaking its content. The observed schema keys are fixed schema
  # field names; untrusted content lives in value positions). ONLY
  # that redacted record is uploaded — the raw execution file, which can carry prompt
  # text, repo content, and attacker-controlled check-run names, NEVER leaves the run
  # (issue #437 AC2). Re-run on demand after a claude-code-action upgrade to refresh
  # docs/execution-file-shape.md.
  execfile-shape-probe:
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Claude Code (execution-file shape probe)
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Same rationale as the probes above: same-repo only, read-only, but a
          # DevFlow bot PR touching this file is a non-human actor claude-code-action
          # would otherwise refuse.
          allowed_bots: "*"
          prompt: |
            You are an EXECUTION-FILE SHAPE PROBE. Perform the three numbered actions
            below, each EXACTLY ONCE in its own single tool call, in order. Do not
            retry a denied action and do not work around it. After all three, STOP and
            reply with the single word DONE.

            Your text output is not measured. Only the harness execution record — which
            token-usage, timing, tool_use, subagent_type, and permission_denials fields
            it carries — is measured, by a deterministic helper reading the execution
            file afterward.

            Action 1 (positive control) — run this Bash command once:
            grep -c . /etc/hosts

            Action 2 — dispatch ONE subagent using the Task tool: subagent_type
            "general-purpose", with the prompt "Reply with exactly the single word ok
            and nothing else." This makes the execution file carry a tool_use with a
            subagent_type field.

            Action 3 — attempt this Bash command once. It is deliberately NOT granted,
            so it WILL be denied — that denial is exactly the signal being collected, to
            populate permission_denials:
            rm -rf /tmp/devflow-execfile-probe-denied

          # No plugin_marketplaces/plugins: Action 2 dispatches the BUILT-IN
          # general-purpose subagent, which needs no plugin — loading devflow would add
          # a marketplace clone + install for zero measurement value.
          #
          # Task is granted so the subagent dispatch is permitted; Bash(grep:*) grants
          # the control; `rm` is deliberately UNGRANTED so Action 3 is denied.
          # acceptEdits so a granted call never prompt-denies and masquerades as a denial.
          claude_args: >-
            --model claude-haiku-4-5-20251001
            --effort low
            --permission-mode acceptEdits
            --allowed-tools "Task,Bash(grep:*)"

      # Redact + extract the shape, then upload ONLY the redacted record. always() so
      # the record is produced even if the engine ended in error (it degrades to an
      # all-unavailable record, never a crash). The helper always exits 0.
      - name: Extract redacted execution-file shape
        if: always()
        env:
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          set -uo pipefail
          mkdir -p artifact
          # scripts/extract-execution-shape.sh is a repo-root helper; this is a plain
          # workflow run step (NOT a claude-code-action allowlisted context), so a
          # direct `bash scripts/…` invocation is fine here.
          bash scripts/extract-execution-shape.sh "${EXECUTION_FILE}" > artifact/execution-file-shape.txt
          echo "## Execution-file shape (redacted)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat artifact/execution-file-shape.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload redacted shape record
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-file-shape
          path: artifact/execution-file-shape.txt
          if-no-files-found: warn

  # issue #437 (AC6) — establish whether a Stop hook committed to the BASE branch's
  # .claude/settings.json executes when claude-code-action runs. This is INHERENTLY A
  # TWO-STEP LANDING: claude-code-action removes .claude/ and restores it from the BASE
  # branch before running, so a Stop hook added *in the probe PR* is restored away and
  # proves nothing — the hook must already be on base for a run to be meaningful. A
  # first-run "did not fire" therefore must NOT be read as "hooks do not fire under the
  # action" (the reverse launder the issue warns against). The Stop hook itself SHIPS in this
  # PR — scripts/stop-hook-probe.sh, registered in .claude/settings.json — so no operator
  # hand-edit is needed; what remains is only the ordering: it must be on the BASE branch
  # (i.e. this PR merged) before a dispatch can observe it fire. It writes the gitignored
  # breadcrumb .devflow/tmp/stop-hook-probe-fired (a COUPLED contract: renaming it on either
  # side alone would silently read as "did not fire" forever — lib/test/run.sh pins both).
  # This job checks for that breadcrumb after the action. See docs/execution-file-shape.md.
  hook-probe:
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Claude Code (Stop-hook execution probe)
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_bots: "*"
          prompt: |
            You are a STOP-HOOK PROBE. Run this single Bash command once, then STOP and
            reply with the single word DONE. Your only purpose is to reach a normal Stop
            so that any base-branch Stop hook has a chance to fire; the hook's side
            effect — not your output — is the measurement.

            grep -c . /etc/hosts
          claude_args: >-
            --model claude-haiku-4-5-20251001
            --effort low
            --permission-mode acceptEdits
            --allowed-tools "Bash(grep:*)"

      # Record fired / did-not-fire. always() so a verdict is produced even on engine
      # error. A missing breadcrumb on a probe PR is EXPECTED (the hook is not yet on
      # base) — the meaningful run is post-merge, from the default branch via
      # workflow_dispatch. Never collapse "did not fire" to "hooks do not fire".
      - name: Record Stop-hook firing observation
        if: always()
        run: |
          set -uo pipefail
          MARKER=".devflow/tmp/stop-hook-probe-fired"
          {
            echo "## Stop-hook execution probe (issue #437 AC6)"
            if [ -f "$MARKER" ]; then
              echo "- observed: **FIRED** — the base-branch \`.claude/settings.json\` Stop hook executed under claude-code-action (breadcrumb \`$MARKER\` present)."
            else
              echo "- observed: **did not fire this run** — breadcrumb \`$MARKER\` absent."
              echo "- NOTE: this is EXPECTED on a probe PR — claude-code-action restores \`.claude/\` from the BASE branch, so the hook is only effective once merged. Re-run via workflow_dispatch from the default branch for the meaningful observation. Do NOT read this as 'hooks do not fire'."
            fi
            echo "- run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          } | tee -a "$GITHUB_STEP_SUMMARY"
