name: Matcher probe

# Permanent, empirical probe of which command SHAPES the deployed
# `anthropics/claude-code-action@v1` permission matcher accepts under the
# read-only `review` tool profile (issue #401). Cloud review runs stall with no
# verdict when the matcher silently DENIES a command *shape* whose *head* the
# profile grants (leading `cd`, leading `VAR=` assignments, heredoc writes, the
# unexpanded `"${CLAUDE_SKILL_DIR:-…}"` anchor form). The issue-#363 head
# extractor validates heads, not shapes, so it stays green on all of them.
#
# The `probe` job runs a Haiku claude-code-action session whose --allowed-tools is
# the review profile literal PLUS the candidate grants under test, instructs the
# model to attempt each corpus shape once, then computes a per-shape
# PERMITTED/DENIED/UNATTEMPTED verdict DETERMINISTICALLY from the action's
# execution file (`permission_denials` + recorded `tool_use` calls) and the
# on-disk side-effect files. The model's own text output is NEVER the measurement.
# A sibling `schedulewakeup-probe` job (issue #415) applies the same execution-file
# measurement to a single `--disallowedTools ScheduleWakeup` session, deriving a
# DENIED/AVAILABLE/REMOVED/INCONCLUSIVE verdict that gates a claude_args change in
# devflow-implement.yml; it runs in its own job so the flag never perturbs the
# matcher probe above. Two further #437 sibling jobs share the workflow: an
# `execfile-shape-probe` job that captures a real run's execution_file as a
# REDACTED shape artifact (docs/execution-file-shape.md), and a `hook-probe` job
# that records whether a base-branch .claude/settings.json Stop hook fires under
# claude-code-action. A pull_request edit to this file therefore launches a
# paid Claude session per probe job, not just the original two.
#
# An additional `implement-probe` job (issue #450) applies the same
# execution-file measurement to the SEPARATE read-write `devflow-implement` tool
# profile — a distinct allowlist from the review profile, so shapes/forms proven on
# one tier are unproven on the other. It establishes which grant FORM (explicit
# vendored literal vs. `*/basename` glob) and which command SHAPES (`for` / piped
# `while read` / `VAR="$(…)"` wrappers, the unexpanded-anchor leading token,
# redirects, heredocs, simple expansions, and leading environment assignments) the
# matcher accepts for granted heads. Its original grant sets were
# attribution-split (explicit-for-apply-labels, glob-for-ensure-label) so
# every label verdict attributed to exactly one form. Human-dispatch only: its
# observed table is the implement-tier evidence of record that Stage B's grant +
# call-site rework was gated on. That table is now RECORDED (issues #450/#455) and
# Stage B SHIPPED the explicit vendored-literal grants into the baked profile, so the
# split is retired and this job now measures the real shipped implement profile
# end-to-end (see the compose step's HISTORY note).
#
# Triggers: workflow_dispatch (available post-merge, from the default branch) plus
# pull_request scoped to this file's own path (so a change to the probe re-runs it
# pre-merge from its branch). Same-repo only — a fork PR gets no secrets and the
# job `if:` refuses to run for it. Concurrency-capped; a run costs cents.
#
# Re-run this whenever claude-code-action or the Claude Code CLI upgrades — matcher
# semantics are version-dependent, and this probe is the evidence of record that
# keeps the review profile's grants honest.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/matcher-probe.yml'

# Cancel a superseded probe run on the same ref so a rapid push sequence does not
# stack redundant paid runs.
concurrency:
  group: matcher-probe-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # The review profile literal this probe copies verbatim into --allowed-tools
  # grants helper tools that touch the pull-requests API (e.g.
  # dismiss-stale-rejections.sh → repos/*/pulls/{n}/reviews), so the
  # endpoint↔permission lint (issue #312) requires the family be declared even
  # though the probe never invokes them. `read` is the safe floor: it satisfies
  # the family-presence lint while making every mutating review call (gh pr
  # review, review dismissal) fail closed at the API — the probe must never be
  # able to mutate a PR.
  pull-requests: read
  # The `implement-probe` job (issue #450) composes --allowed-tools from the
  # devflow-implement profile, whose granted label helpers
  # (apply-labels.sh -> POST issues/{n}/labels, ensure-label.sh -> POST
  # repos/{owner}/{repo}/labels) touch the issues API family. UNLIKE the
  # pull-requests case above, the label endpoints are NOT among the #312 lint's
  # six recognized families (the only issues-API endpoint it recognizes is
  # issues/*/comments, mapped to its `comments` requirement, which the
  # pull-requests grant already satisfies), so the lint does NOT require this
  # grant - it stays clean whether or not `issues:` is declared. `read` is
  # therefore not a lint-satisfying grant but a deliberate, conservative
  # declaration of the family the implement profile exercises: it caps issues at
  # read so every mutating label call fails closed at the API and the probe stays
  # matcher-only, never creating or applying a label. (Omitting `issues:` would
  # default it to `none` under this block - tighter still for reads; `read` is
  # chosen to document the touched family, not because reads are needed. The
  # probe targets dummy issue numbers/label names regardless.)
  issues: read

jobs:
  probe:
    # Same-repo only: a pull_request from a fork has no secrets (so
    # CLAUDE_CODE_OAUTH_TOKEN would be empty and the run useless), and we never
    # want to spend a paid run on untrusted input. workflow_dispatch is always
    # same-repo (it only exists on the default branch).
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Compose --allowed-tools = the review profile's exact TOOLS literal (kept
      # verbatim in sync with .github/workflows/devflow-runner.yml's `review`
      # profile — including the Write(.devflow/tmp/**) grant that landed from this
      # probe's first run, 29111394360). Shapes 12–14 (issue #405) need NO extra grant
      # — they probe whether the helper-invocation PATH FORM matters: the vendored
      # literal (control) is already granted, while the absolute-path and repo-root
      # `scripts/…` forms are the point (expected DENIED because their leading token is
      # not the granted vendored literal). PLUS the candidate grants still under test:
      # Bash(cd:*), Write(/tmp/**), and Bash(scripts/*.sh:*). cd and Write(/tmp/**)
      # were both DENIED on the first run — cd's row was confounded by an
      # independently-denied `>` redirect, and Write(/tmp/**) is a genuine
      # out-of-workspace denial — so they are kept here for a future redirect-free
      # re-probe rather than granted. Bash(scripts/*.sh:*) is the issue-#412
      # candidate: a trailing-extension glob (unlike the production-proven
      # `*/<fixed-basename>` form) whose permit/deny under the real matcher is
      # unknown — shape 15 invokes a repo-root `scripts/<name>.sh` helper as the
      # leading token under this grant to measure it. MEASURED DENIED on run
      # 29135163829 (PR #413): even with the glob granted, `scripts/config-get.sh …`
      # was refused — the same DENIED as shape 14's ungranted control — so the
      # trailing-extension glob does NOT match a repo-root leading token, the
      # implement profile keeps the enumerated `*/<basename>.sh` helper globs, and
      # NO migration to `scripts/*.sh` happens. Kept here (like cd / Write(/tmp/**))
      # as a genuine denial to re-probe after a claude-code-action upgrade — the
      # version-dependent verdict could change. If devflow-runner.yml's review
      # literal changes, update this copy too — a deliberate second copy so the
      # probe measures the real profile, not a paraphrase.
      - name: Resolve allowed-tools (review profile + candidate grants)
        id: tools
        run: |
          set -euo pipefail
          REVIEW='Read,Glob,Grep,LS,Skill,Agent,TodoWrite,WebFetch,WebSearch,Bash(git status:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git ls-files:*),Bash(git rev-parse:*),Bash(git merge-base:*),Bash(git blame:*),Bash(git branch:*),Bash(git cat-file:*),Bash(git hash-object:*),Bash(git checkout:*),Bash(mkdir:*),Bash(tee:*),Bash(mktemp:*),Bash(cmp:*),Bash(rm -f:*),Bash(*/load-prompt-extension.sh:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*),Bash(gh pr comment:*),Bash(gh pr list:*),Bash(gh pr checks:*),Bash(gh issue view:*),Bash(gh issue comment:*),Bash(gh issue list:*),Bash(gh search:*),Bash(gh repo view:*),Bash(gh run view:*),Bash(gh run list:*),Bash(gh api:*),Bash(jq:*),Bash(.devflow/vendor/devflow/scripts/run-jq.sh:*),Bash(grep:*),Bash(rg:*),Bash(find:*),Bash(wc:*),Bash(sort:*),Bash(uniq:*),Bash(cut:*),Bash(tr:*),Bash(xargs:*),Bash(awk:*),Bash(sed:*),Bash(diff:*),Bash(comm:*),Bash(cat:*),Bash(head:*),Bash(tail:*),Bash(ls:*),Bash(tree:*),Bash(file:*),Bash(stat:*),Bash(date:*),Bash(pwd:*),Bash(realpath:*),Bash(dirname:*),Bash(basename:*),Bash(which:*),Bash(type:*),Bash(env:*),Bash(echo:*),Bash(printf:*),Bash(test:*),Bash(.devflow/vendor/devflow/scripts/match-deferrals.py:*),Bash(.devflow/vendor/devflow/scripts/dismiss-stale-rejections.sh:*),Bash(.devflow/vendor/devflow/scripts/workpad.py:*),Bash(.devflow/vendor/devflow/scripts/config-get.sh:*),Bash(.devflow/vendor/devflow/scripts/load-prompt-extension.sh:*),Bash(.devflow/vendor/devflow/scripts/resolve-review-overrides.py:*),Bash(.devflow/vendor/devflow/lib/efficiency-trace.sh:*),Write(.devflow/tmp/**)'
          CANDIDATES='Bash(cd:*),Write(/tmp/**),Bash(scripts/*.sh:*)'
          TOOLS="$REVIEW,$CANDIDATES"
          delim="TOOLS_EOF_$(date +%s%N)_$$"
          {
            printf 'tools<<%s\n' "$delim"
            printf '%s\n' "$TOOLS"
            printf '%s\n' "$delim"
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code (matcher probe)
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Allow any bot to initiate the probe. This diagnostic runs same-repo only
          # (the job `if:` refuses fork PRs) and is read-only, but claude-code-action
          # otherwise refuses a bot-initiated run ("Workflow initiated by non-human
          # actor") — which is exactly the case when a DevFlow bot PR touches this file,
          # leaving every shape UNATTEMPTED. `*` lets the probe actually measure.
          allowed_bots: "*"
          prompt: |
            You are a PERMISSION-MATCHER PROBE. Your ONLY task is to attempt each
            of the 15 numbered command shapes below EXACTLY ONCE, each in its OWN
            single tool call, VERBATIM — do not modify, wrap, quote-escape, split,
            or combine them, and do not add any command that is not listed. Attempt
            them in order 1 through 15. If a shape is DENIED or errors, do NOT
            retry it and do NOT try a different formulation — move straight to the
            next number. After attempting all 15, STOP and reply with the single
            word DONE.

            Your text output is not measured. Only the harness record of which tool
            calls the permission matcher allowed versus denied, and which
            side-effect files exist afterward, is measured. Attempt every shape even
            if you expect it to fail — a denial is exactly the signal being
            collected.

            Shape 1 — heredoc write with a granted head (Bash):
            cat > /tmp/probe-01.txt <<'EOF'
            probe01
            EOF

            Shape 2 — assignment-led compound with a granted head (Bash, one call, both lines):
            M=probe02
            printf '%s\n' "$M" > /tmp/probe-02.txt

            Shape 3 — cd-led compound (Bash):
            cd /tmp && printf 'probe03\n' > /tmp/probe-03.txt

            Shape 4 — unexpanded CLAUDE_SKILL_DIR anchor form (Bash). It is expected
            to exit non-zero because the vendored plugin is not present in this
            checkout; attempt it anyway — permission granted vs denied is what
            matters, not the exit code:
            "${CLAUDE_SKILL_DIR:-.devflow/vendor/devflow/skills/review}"/../../scripts/load-prompt-extension.sh review

            Shape 5 — repo-relative vendored literal (Bash). Also expected to exit
            non-zero (file absent); attempt it anyway:
            .devflow/vendor/devflow/scripts/load-prompt-extension.sh review

            Shape 6 — tee heredoc write (Bash):
            tee /tmp/probe-06.txt <<'EOF'
            probe06
            EOF

            Shape 7 — multi-argument printf redirect, single statement (Bash):
            printf '%s\n' probe07a probe07b > /tmp/probe-07.txt

            Shape 8 — Write tool: use the Write tool to create the file
            /tmp/probe-08.txt with exactly this content:
            probe08

            Shape 9 — Write tool: use the Write tool to create the file
            .devflow/tmp/probe-09.txt with exactly this content:
            probe09

            Shape 10 — pipe into tee (Bash):
            printf 'probe10\n' | tee /tmp/probe-10.txt

            Shape 11 — plainly granted single command, positive control (Bash),
            reading an in-workspace file present in the checkout:
            grep -c . README.md

            Shape 12 — helper invocation, repo-relative vendored literal as the
            leading token (Bash, CONTROL — this is the form the allowlist grants):
            .devflow/vendor/devflow/scripts/config-get.sh .base_branch hprobe12ok

            Shape 13 — helper invocation, ABSOLUTE-path form (Bash). Same helper, but
            an absolute leading token the allowlist does not grant; attempt it anyway
            — permission granted vs denied is what matters:
            /home/runner/work/devflow-autopilot/devflow-autopilot/.devflow/vendor/devflow/scripts/config-get.sh .base_branch hprobe13abs

            Shape 14 — helper invocation, repo-root `scripts/…` form (Bash). Same
            helper, but the repo-root leading token the allowlist does not grant;
            attempt it anyway:
            scripts/config-get.sh .base_branch hprobe14root

            Shape 15 — helper invocation, repo-root `scripts/…` form under the
            issue-#412 candidate grant `Bash(scripts/*.sh:*)` (Bash). Identical
            leading-token form to shape 14, but this time a trailing-extension glob
            IS granted for it — so a PERMITTED verdict here (versus DENIED at 14)
            is the evidence that `scripts/*.sh` works and the enumerated
            `*/<basename>.sh` helper globs can migrate to it:
            scripts/config-get.sh .base_branch hprobe15glob

          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-official.git
            ./

          plugins: |
            devflow@devflow-marketplace

          claude_args: >-
            --model claude-haiku-4-5-20251001
            --effort low
            --permission-mode acceptEdits
            --allowed-tools "${{ steps.tools.outputs.tools }}"

      # Deterministic verdict. Parse the action's execution file for
      # `permission_denials` (the authoritative DENIED signal) and recorded
      # `tool_use` inputs (the PERMITTED signal — a call that reached the model's
      # tool stream), corroborated by the on-disk side-effect files. The model's
      # prose is never read: `permission_denials` and `tool_use` are harness
      # records, and matching is done against the recorded tool INPUTS (which carry
      # the verbatim command), not against the prompt echo. always() so the table
      # is produced even if the engine ended in error.
      - name: Compute per-shape verdict
        if: always()
        env:
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os

          exec_file = os.environ.get("EXECUTION_FILE", "") or ""
          denials = []      # json-encoded permission_denials entries
          tool_uses = []    # json-encoded tool_use inputs (+ tool name)
          parsed = None
          note_top = ""

          if exec_file and os.path.isfile(exec_file):
              raw = open(exec_file, encoding="utf-8", errors="replace").read()
              try:
                  parsed = json.loads(raw)
              except Exception:
                  parsed = []
                  for line in raw.splitlines():
                      s = line.strip()
                      if not s:
                          continue
                      try:
                          parsed.append(json.loads(s))
                      except Exception:
                          pass
                  if not parsed:
                      note_top = "execution file present but unparseable"
          else:
              note_top = "execution file absent or empty at '%s'" % exec_file

          def walk(o):
              if isinstance(o, dict):
                  if o.get("type") == "tool_use" and "input" in o:
                      tool_uses.append(json.dumps(o.get("input")) + " NAME=" + str(o.get("name", "")))
                  pd = o.get("permission_denials")
                  if isinstance(pd, list):
                      for d in pd:
                          denials.append(json.dumps(d))
                  for v in o.values():
                      walk(v)
              elif isinstance(o, list):
                  for it in o:
                      walk(it)

          if parsed is not None:
              walk(parsed)

          denial_text = "\n".join(denials)
          tooluse_text = "\n".join(tool_uses)

          # (num, description, marker, sidefile-or-None)
          # The positive-control marker (row 11) MUST match the file its Shape 11
          # prompt command greps — an in-workspace file (README.md), NOT a system
          # file like /etc/hosts: the sandbox blocks an out-of-workspace read even
          # with the Bash(grep:*) grant, and this verdict counts a permission_denials
          # match ("denied", checked ahead of tool_use below) as DENIED — so a
          # /etc/hosts read makes THIS control read DENIED (issue #477). Change the
          # command literal and this marker in lockstep.
          # (Scope note — #477 touches ONLY this row and the implement-probe row 7.
          # The file's other /etc/hosts positive controls — schedulewakeup-probe,
          # execfile-shape-probe, hook-probe — are intentionally left unchanged and
          # are unaffected: none scores its control DENIED off permission_denials the
          # way this denied-first verdict does. schedulewakeup keys on tool_use
          # PRESENCE (a denied read still records a tool_use, so its control still
          # reads "ran"); execfile/hook don't verdict-score their control at all.)
          rows = [
              (1,  "heredoc write, granted head (`cat > f <<'EOF'`)",        "probe-01", "/tmp/probe-01.txt"),
              (2,  "assignment-led compound, granted head (`M=…`; printf)",   "probe-02", "/tmp/probe-02.txt"),
              (3,  "cd-led compound (`cd … && printf > f`)",                  "probe-03", "/tmp/probe-03.txt"),
              (4,  "unexpanded `${CLAUDE_SKILL_DIR:-…}` anchor invocation",   "CLAUDE_SKILL_DIR", None),
              (5,  "repo-relative vendored-literal helper invocation",        "vendor/devflow/scripts/load-prompt-extension.sh", None),
              (6,  "tee heredoc write (`tee f <<'EOF'`)",                     "probe-06", "/tmp/probe-06.txt"),
              (7,  "multi-arg printf redirect (`printf '%s\\n' a b > f`)",     "probe-07", "/tmp/probe-07.txt"),
              (8,  "Write tool under `Write(/tmp/**)`",                       "probe-08", "/tmp/probe-08.txt"),
              (9,  "Write tool under `Write(.devflow/tmp/**)`",               "probe-09", ".devflow/tmp/probe-09.txt"),
              (10, "pipe into tee (`printf … | tee f`)",                      "probe-10", "/tmp/probe-10.txt"),
              (11, "plainly granted single command (positive control)",       "README.md", None),
              (12, "helper: repo-relative vendored literal (leading token, CONTROL)", "hprobe12ok", None),
              (13, "helper: absolute-path form (leading token)",               "hprobe13abs", None),
              (14, "helper: repo-root `scripts/…` form (leading token)",       "hprobe14root", None),
              (15, "helper: repo-root `scripts/…` under `Bash(scripts/*.sh:*)` glob", "hprobe15glob", None),
          ]

          out = []
          out.append("## Matcher-probe results")
          out.append("")
          out.append("Deterministic verdict computed from the execution file's "
                     "`permission_denials` (DENIED) and recorded `tool_use` inputs "
                     "(PERMITTED), corroborated by on-disk side-effect files. The "
                     "model's text output is never the measurement.")
          out.append("")
          if note_top:
              out.append("> [!WARNING]")
              out.append("> %s — every row will read UNATTEMPTED; re-run the probe." % note_top)
              out.append("")
          out.append("| # | Shape | Verdict | Evidence |")
          out.append("|---|-------|---------|----------|")

          for num, desc, marker, sidefile in rows:
              denied = marker in denial_text
              attempted = marker in tooluse_text
              file_ok = bool(sidefile) and os.path.exists(sidefile)
              if denied:
                  verdict = "DENIED"
              elif file_ok or attempted:
                  verdict = "PERMITTED"
              else:
                  verdict = "UNATTEMPTED"
              ev = []
              ev.append("denial=%s" % ("yes" if denied else "no"))
              ev.append("tool_use=%s" % ("yes" if attempted else "no"))
              if sidefile:
                  ev.append("side-effect(%s)=%s" % (sidefile, "present" if file_ok else "absent"))
              else:
                  ev.append("side-effect=n/a (judge by denial vs execution)")
              out.append("| %d | %s | **%s** | %s |" % (num, desc, verdict, "; ".join(ev)))

          out.append("")
          out.append("### Raw denial entries (%d)" % len(denials))
          out.append("")
          if denials:
              out.append("```")
              for d in denials:
                  out.append(d[:400])
              out.append("```")
          else:
              out.append("_No permission_denials entries found in the execution file._")

          table = "\n".join(out)
          print(table)
          summary = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if summary:
              with open(summary, "a", encoding="utf-8") as fh:
                  fh.write(table + "\n")
          PY

  # issue #450 — probe which command SHAPES and grant FORMS the deployed matcher
  # accepts under the read-write `devflow-implement` tool profile. The review-tier
  # `probe` job above measures the read-only review profile; this job measures the
  # SEPARATE implement profile, because the two are distinct allowlists with
  # distinct evidence (a shape/form proven on one tier is unproven on the other).
  # The motivating defect (now MEASURED and FIXED — issues #450/#455): cloud implement
  # runs silently lost their best-effort label applies (`ensure-label.sh` /
  # `apply-labels.sh`). The recorded table attributes that to the config `*/basename`
  # glob-grant form (row I3, DENIED against a vendored-literal leading token) and to the
  # `for` / piped-`while read` / `VAR="$(…)"` wrappers the phase-4 fences used to emit
  # (rows I4/I5/I6, DENIED); the unexpanded anchor as a leading token is denied here too
  # (row I1), and the explicit vendored-literal grant form is PERMITTED (row I2). Stage B
  # shipped both halves: the explicit grants in `devflow-implement.yml` and the call-site
  # rework. This job's job is now to KEEP that true — it re-measures the real shipped
  # profile end-to-end after a `claude-code-action` / CLI upgrade, and rows 8/9 are the
  # open disambiguators for the non-label-capture carve-out. The issue #571 rows extend
  # the evidence surface to everyday ad-hoc redirects, heredocs, expansions, and leading
  # assignments (issue #571). Multi-operation statements (`A; B`, `A && B`) are
  # deliberately excluded: shipped implement phase fences already exercise them
  # successfully, so another row would be redundant and misleading rather than new
  # evidence. The exact capture-heredoc and computed-assignment rows necessarily combine
  # properties; their simpler neighboring rows are the attribution disambiguators.
  #
  # OBSERVED 2026-07-18 UTC (issue #571): user-directed workflow_dispatch run
  # 29623046995, implement-probe job 88021801138 (completed success before the
  # workflow's intentional cancel-probe cancellation), at
  # f2162d7683bc7a352fce4efce3f092e864aab8b9. An autonomous implement run cannot
  # discharge this evidence gate without explicit human direction. The execution-file
  # verdict table was:
  #   1 DENIED      2 PERMITTED   3 PERMITTED   4 DENIED
  #   5 DENIED      6 DENIED      7 PERMITTED   8 PERMITTED
  #   9 DENIED     10 DENIED     11 PERMITTED  12 PERMITTED
  #  13 PERMITTED  14 DENIED     15 DENIED     16 DENIED
  # Every row recorded tool_use=yes; rows with a shape discriminator recorded shape=ok.
  # Thus none of the issue #571 rows was REFORMULATED or UNATTEMPTED.
  #
  # RE-DERIVING THE I2/I3 ATTRIBUTION (what the retired split used to give you). The
  # shipped profile now carries BOTH the explicit grant and the `*/basename` glob for each
  # label helper, so a PERMITTED here proves the call RUNS but attributes to neither form.
  # If an upgrade ever needs the per-form verdicts re-measured, re-split TEMPORARILY in a
  # scratch branch — grant `apply-labels.sh` only explicitly and `ensure-label.sh` only via
  # the glob, as the original run did — dispatch, record, and revert. Do not leave the split
  # in: it makes this job measure a profile the repo does not ship.
  #
  # Human-dispatch only (issue #450 AC): in-band dispatch-and-await is infeasible
  # for an autonomous run (the constraint recorded at commit 5ac0237), so a human
  # runs this via workflow_dispatch (or a PR touching this file) on the REAL cloud
  # action and records the observed table as the implement-tier evidence of record.
  # Verdicts are matcher-only (permission_denials + recorded tool_use), never the
  # observed API effect — every label helper targets a DUMMY issue number / label
  # name and runs under the `issues: read` floor above, so a mutating label call
  # fails closed at the API regardless.
  implement-probe:
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Compose --allowed-tools = the devflow-implement profile. IMPLEMENT is the
      # baked TOOLS literal from .github/workflows/devflow-implement.yml's `claude`
      # step kept verbatim-in-sync here (a deliberate second copy, exactly like the
      # `probe` job's REVIEW literal above — so the probe measures the REAL profile,
      # not a paraphrase; if devflow-implement.yml's literal changes, update this
      # copy in the same change).
      #
      # EXTRAS reproduces the consumer config extras
      # (.devflow_implement.allowed_tools in .devflow/config.json, appended at
      # runtime by devflow-implement.yml as `allowed_tools_extra`) VERBATIM.
      #
      # HISTORY (issue #450 -> #455): this compose step once carried a per-form
      # ATTRIBUTION SPLIT for the two label helpers — the apply-labels glob was
      # DROPPED from EXTRAS and an explicit vendored-literal CANDIDATE added, while
      # ensure-label.sh was left glob-only — so a PERMITTED verdict on each attributed
      # to exactly ONE grant form. That measurement is DONE: the implement-tier table
      # recorded on #450/#455 found the explicit vendored-literal form PERMITTED (row
      # 2 / shape I2 via a real recorded tool_use) and the `*/basename` config glob
      # DENIED against a vendored-literal leading token (row 3 / shape I3), plus the
      # unexpanded-anchor leading token (I1) and the `for` / piped-`while read` /
      # `VAR="$(…)"` wrappers (I4/I5/I6) all DENIED. Stage B (#455) then SHIPPED the
      # explicit grants into the baked IMPLEMENT literal above (and into
      # devflow-implement.yml), so the split is retired: EXTRAS is config-verbatim
      # again and there is no separate CANDIDATE. The profile composed here is now the
      # real shipped implement profile end-to-end.
      - name: Resolve allowed-tools (implement profile, incl. shipped explicit label grants)
        id: tools
        run: |
          set -euo pipefail
          IMPLEMENT='Read,Write,Edit,Glob,Grep,LS,Skill,Agent,TodoWrite,EnterPlanMode,ExitPlanMode,WebFetch,WebSearch,Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(git pull:*),Bash(git fetch:*),Bash(git ls-remote:*),Bash(git status:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git hash-object:*),Bash(git checkout:*),Bash(git branch:*),Bash(git stash:*),Bash(git rm:*),Bash(git mv:*),Bash(git restore:*),Bash(git revert:*),Bash(git blame:*),Bash(git ls-files:*),Bash(git rev-parse:*),Bash(git merge-base:*),Bash(git merge:*),Bash(gh pr create:*),Bash(gh pr edit:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*),Bash(gh pr ready:*),Bash(gh pr list:*),Bash(gh pr checks:*),Bash(gh pr status:*),Bash(gh pr reopen:*),Bash(gh issue view:*),Bash(gh issue comment:*),Bash(gh issue list:*),Bash(gh issue edit:*),Bash(gh issue create:*),Bash(gh issue reopen:*),Bash(gh issue status:*),Bash(gh search:*),Bash(gh label list:*),Bash(gh repo view:*),Bash(gh run view:*),Bash(gh run list:*),Bash(gh workflow view:*),Bash(gh workflow list:*),Bash(gh api:*),Bash(jq:*),Bash(.devflow/vendor/devflow/scripts/run-jq.sh:*),Bash(.devflow/vendor/devflow/scripts/config-get.sh:*),Bash(.devflow/vendor/devflow/scripts/workpad.py:*),Bash(.devflow/vendor/devflow/scripts/parse-acs.py:*),Bash(.devflow/vendor/devflow/scripts/preflight.py:*),Bash(.devflow/vendor/devflow/scripts/branch-for-issue.py:*),Bash(.devflow/vendor/devflow/scripts/update-branch-checkpoint.sh:*),Bash(.devflow/vendor/devflow/scripts/file-deferrals.py:*),Bash(.devflow/vendor/devflow/scripts/match-deferrals.py:*),Bash(.devflow/vendor/devflow/scripts/resolve-review-overrides.py:*),Bash(.devflow/vendor/devflow/scripts/apply-labels.sh:*),Bash(.devflow/vendor/devflow/scripts/ensure-label.sh:*),Bash(.devflow/vendor/devflow/lib/efficiency-trace.sh:*),Bash(.devflow/vendor/devflow/scripts/stale-prose-lint.py:*),Bash(.devflow/vendor/devflow/scripts/dismiss-stale-rejections.sh:*),Bash(.devflow/vendor/devflow/scripts/match-lint-adjudications.py:*),Bash(.devflow/vendor/devflow/scripts/load-prompt-extension.sh:*),Bash(.devflow/vendor/devflow/scripts/react-to-trigger.sh:*),Bash(.devflow/vendor/devflow/scripts/extract-doc-needed-paths.sh:*),Bash(pip install:*),Bash(pip:*),Bash(python:*),Bash(python3:*),Bash(python -m:*),Bash(python3 -m:*),Bash(ruff:*),Bash(ruff check:*),Bash(ruff format:*),Bash(pytest:*),Bash(mypy:*),Bash(grep:*),Bash(rg:*),Bash(find:*),Bash(wc:*),Bash(sort:*),Bash(uniq:*),Bash(cut:*),Bash(tr:*),Bash(xargs:*),Bash(awk:*),Bash(sed:*),Bash(diff:*),Bash(cmp:*),Bash(comm:*),Bash(cat:*),Bash(head:*),Bash(tail:*),Bash(less:*),Bash(ls:*),Bash(tree:*),Bash(file:*),Bash(stat:*),Bash(date:*),Bash(pwd:*),Bash(realpath:*),Bash(dirname:*),Bash(basename:*),Bash(which:*),Bash(type:*),Bash(env:*),Bash(echo:*),Bash(printf:*),Bash(test:*),Bash(touch:*),Bash(mkdir:*),Bash(rmdir:*),Bash(rm:*),Bash(mv:*),Bash(cp:*),Bash(tee:*)'
          # Config extras, now mirrored VERBATIM from .devflow/config.json's
          # devflow_implement.allowed_tools (the inert */ globs were removed in #484 —
          # they never matched the vendored leading token; invoked helpers are granted as
          # vendored literals in the IMPLEMENT literal above). Stage B
          # (issue #455) shipped the explicit vendored-literal label grants into
          # devflow-implement.yml's baked IMPLEMENT literal above (and this copy),
          # so the former per-form ATTRIBUTION SPLIT — dropping the apply-labels
          # glob here and adding a separate explicit CANDIDATE var — is now
          # HISTORICAL; its recorded evidence (shape I2 PERMITTED via the explicit
          # form; shape I3 DENIED — that row measured the `*/basename` config GLOB
          # against a vendored-literal leading token, and the glob did not match;
          # shapes I1/I4/I5/I6 DENIED) is the implement-tier table on issues
          # #450/#455. That I3 denial is the whole reason the explicit grants had to
          # ship: read it as "the glob form was refused", NOT as "ensure-label.sh is
          # unreachable" — row 3 now runs against a profile carrying BOTH the
          # explicit grant and the glob, so a PERMITTED there confirms the leading-token
          # call RUNS but attributes to neither form (I3's recorded glob denial remains the
          # standing evidence that the glob does not match a vendored-literal leading token). With the split
          # retired, the probe once
          # again measures the REAL shipped profile end-to-end: IMPLEMENT (now
          # carrying the explicit label grants) + the config extras verbatim.
          EXTRAS='Bash(lib/test/run.sh:*),Bash(lib/preflight.sh:*),Bash(shellcheck:*),Bash(chmod:*),Bash(git ls-remote:*),Bash(git check-ignore:*)'
          TOOLS="$IMPLEMENT,$EXTRAS"
          delim="TOOLS_EOF_$(date +%s%N)_$$"
          {
            printf 'tools<<%s\n' "$delim"
            printf '%s\n' "$TOOLS"
            printf '%s\n' "$delim"
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code (implement matcher probe)
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Same bot-initiation allowance as the probe job above: same-repo only
          # (the job `if:` refuses fork PRs), read-only, but claude-code-action
          # otherwise refuses a bot-initiated run.
          allowed_bots: "*"
          prompt: |
            You are a PERMISSION-MATCHER PROBE. Your ONLY task is to attempt each of
            the 16 numbered command shapes below EXACTLY ONCE, each in its OWN single
            tool call, VERBATIM — do not modify, wrap, quote-escape, split, or combine
            them, and do not add any command that is not listed. Attempt them in order
            1 through 16. If a shape is DENIED or errors, do NOT retry it and do NOT try
            a different formulation — move straight to the next number. After
            attempting all 16, STOP and reply with the single word DONE.

            Your text output is not measured. Only the harness record of which tool
            calls the permission matcher allowed versus denied is measured. Attempt
            every shape even if you expect it to fail — a denial is exactly the signal
            being collected. Every command targets a DUMMY issue number and DUMMY
            label name; a real API effect is neither expected nor measured.

            Shape 1 — UNEXPANDED CLAUDE_SKILL_DIR anchor as the leading token (Bash).
            This is the phase-4 emission form issue #450 suspects the matcher DENIES;
            it is expected to exit non-zero (the anchor's `:-` default resolves to a
            path that does not exist in this checkout), but permission granted vs
            denied is what matters, not the exit code — run it VERBATIM, do not
            expand the anchor yourself:
            "${CLAUDE_SKILL_DIR:-.devflow/vendor/devflow/skills/implement}"/../../scripts/ensure-label.sh iprobe01anchor

            Shape 2 — vendored-literal leading token, apply-labels.sh (Bash). Now
            granted by the explicit vendored-literal form in the shipped profile
            (Stage B, #455); a PERMITTED here confirms that leading-token form runs.
            Dummy issue 9999, dummy label:
            .devflow/vendor/devflow/scripts/apply-labels.sh 9999 iprobe02explicit

            Shape 3 — vendored-literal leading token, ensure-label.sh (Bash). Now
            granted by the explicit vendored-literal form (Stage B, #455) alongside
            the config `*/basename` glob; a PERMITTED here confirms the leading-token
            form runs. Dummy label:
            .devflow/vendor/devflow/scripts/ensure-label.sh iprobe03explicit

            Shape 4 — `for …; do …; done` compound wrapping a granted helper (Bash,
            one call, all lines). Head is the granted ensure-label.sh:
            for L in iprobe04for-a iprobe04for-b; do .devflow/vendor/devflow/scripts/ensure-label.sh "$L"; done

            Shape 5 — piped `while read` loop wrapping a granted helper (Bash, one
            call). Head is the granted ensure-label.sh:
            printf 'iprobe05while-a\niprobe05while-b\n' | while read -r L; do .devflow/vendor/devflow/scripts/ensure-label.sh "$L"; done

            Shape 6 — `VAR="$(…)"` capture of a granted helper (Bash). This is the
            exact capture form the phase-4 label loops use (LBL_ERR="$(…)"), with the
            explicit-granted apply-labels.sh. Dummy issue 9999, dummy label:
            LBL_ERR="$(.devflow/vendor/devflow/scripts/apply-labels.sh 9999 iprobe06capture 2>&1)"

            Shape 7 — plainly granted single command, positive control (Bash),
            reading an in-workspace file present in the checkout:
            grep -c . README.md

            Shape 8 — `VAR=$(…)` capture of a NON-LABEL granted helper (Bash). This is
            the DISAMBIGUATOR for shape 6: shape 6 confounds three things at once (a
            label helper, a `VAR="$(…)"` capture, and an inner `2>&1` redirect), so its
            denial cannot be attributed to any one of them. The reworked phase-4 fences depend on the
            matcher DESCENDING into a non-label `$(…)`; this row measures that property
            in its BARE spelling. Note the fences actually emit the capture inside an
            `if !` compound, which remains unmeasured — so a PERMITTED here settles the
            descent question, not the fences' exact statement shape. A PERMITTED here means the
            matcher descends into a non-label substitution and the denial in shape 6 is
            label- or redirect-attributable; a DENIED here means the CAPTURE SHAPE
            itself is refused, in which case the reworked fences' own first statement (an
            `if !` capture — a shape this row does not emit) is almost certainly denied too. The second argument is `config-get.sh`'s DEFAULT value, used
            here as this row's unique marker (it is only echoed if the key is absent,
            so it has no side effect either way):
            DEFERRED_LABELS=$(.devflow/vendor/devflow/scripts/config-get.sh .deferred.labels iprobe08nonlabel)

            Shape 9 — redirect-free `VAR="$(…)"` capture of a LABEL helper (Bash). The
            second disambiguator for shape 6: identical to shape 6 but WITHOUT the inner
            `2>&1`. Read together with shapes 6 and 8, this separates "the capture shape
            is denied" from "the inner redirect is denied" from "a label helper inside a
            substitution is denied". Dummy issue 9999, dummy label:
            LBL_OUT="$(.devflow/vendor/devflow/scripts/apply-labels.sh 9999 iprobe09nofd)"

            Shape 10 — bare redirect to `/tmp` after a granted head (Bash). This row
            isolates the redirect target class; no compound or trailing diagnostic:
            echo iprobe10tmp > /tmp/iprobe10tmp

            Shape 11 — bare redirect to `.devflow/tmp` after a granted head (Bash).
            This is the workspace-local sibling of shape 10, again with no compound:
            echo iprobe11workspace > .devflow/tmp/iprobe11workspace

            Shape 12 — heredoc write through a granted leading head (Bash). This row
            isolates the plain heredoc form from the captured form in shape 13:
            tee .devflow/tmp/iprobe12heredoc <<'EOF'
            iprobe12heredoc
            EOF

            Shape 13 — exact captured heredoc form used by phase-4 authoring fences
            (Bash). This necessarily combines capture and heredoc; shapes 8/9 and 12
            are its simpler attribution controls:
            IPROBE13="$(cat <<'EOF'
            iprobe13captureheredoc
            EOF
            )"

            Shape 14 — `echo "$VAR"` simple expansion after a granted leading head
            (Bash). The literal marker keeps the row identifiable regardless of the
            environment value:
            echo iprobe14expansion "$GITHUB_ACTIONS"

            Shape 15 — literal leading `VAR=value` assignment before a granted head
            (Bash), with no substitution or compound:
            IPROBE15=iprobe15literal echo iprobe15literal

            Shape 16 — computed leading `VAR="$(<granted-head>)"` assignment before a
            granted head (Bash). This exact production-style form necessarily includes
            a substitution; shapes 8 and 15 disambiguate its component properties:
            IPROBE16="$(echo iprobe16capture)" echo iprobe16capture

          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-official.git
            ./

          plugins: |
            devflow@devflow-marketplace

          claude_args: >-
            --model claude-haiku-4-5-20251001
            --effort low
            --permission-mode acceptEdits
            --allowed-tools "${{ steps.tools.outputs.tools }}"

      # Deterministic verdict — same execution-file measurement core as the `probe`
      # job above (permission_denials = DENIED, recorded tool_use inputs =
      # PERMITTED). The model's prose is never read; matching is against the recorded
      # tool INPUTS (which carry the verbatim command + its unique dummy marker).
      # always() so the table is produced even if the engine ended in error.
      - name: Compute per-shape verdict (implement profile)
        if: always()
        env:
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          set -uo pipefail
          python3 - <<'PY'
          import json, os

          exec_file = os.environ.get("EXECUTION_FILE", "") or ""
          denials = []      # json-encoded permission_denials entries
          tool_uses = []    # json-encoded tool_use inputs (+ tool name)
          parsed = None
          note_top = ""

          if exec_file and os.path.isfile(exec_file):
              raw = open(exec_file, encoding="utf-8", errors="replace").read()
              try:
                  parsed = json.loads(raw)
              except Exception:
                  parsed = []
                  for line in raw.splitlines():
                      s = line.strip()
                      if not s:
                          continue
                      try:
                          parsed.append(json.loads(s))
                      except Exception:
                          pass
                  if not parsed:
                      note_top = "execution file present but unparseable"
          else:
              note_top = "execution file absent or empty at '%s'" % exec_file

          def walk(o):
              if isinstance(o, dict):
                  # Only the recorded tool INPUT is needed here — the implement
                  # verdict is pure marker-substring matching, with no tool-name
                  # column (unlike a hypothetical NAME= consumer), so the tool name
                  # is deliberately not captured.
                  if o.get("type") == "tool_use" and "input" in o:
                      tool_uses.append(json.dumps(o.get("input")))
                  pd = o.get("permission_denials")
                  if isinstance(pd, list):
                      for d in pd:
                          denials.append(json.dumps(d))
                  for v in o.values():
                      walk(v)
              elif isinstance(o, list):
                  for it in o:
                      walk(it)

          if parsed is not None:
              walk(parsed)

          # (num, description, marker, shape_discriminator) — the marker (a unique
          # dummy arg) identifies WHICH row a recorded call belongs to; the
          # shape_discriminator is a substring the intended VERBATIM command carries
          # that a model REFORMULATION would drop, so a PERMITTED verdict attests the
          # intended *shape/form* actually ran — not merely that some command carrying
          # the marker ran. Without it, a model that (despite the "verbatim" prompt)
          # expands shape 1's unexpanded anchor to the glob-granted expanded path, or
          # unrolls shapes 4/5/6's wrappers into plain per-label calls, would carry the
          # same marker and read as a false PERMITTED for a form/shape never exercised —
          # corrupting the very evidence table Stage B is gated on (issue #450 review).
          # Discriminators avoid a literal `"` because the recorded tool_use input is
          # JSON-encoded (a `"` in the command becomes `\"`); `$(`, `${`, `for L in`,
          # `while read`, and the vendored paths are unescaped and match verbatim. The
          # control row (7) needs no shape check. No on-disk side-effect check: label
          # helpers are best-effort exit-0 and the run is matcher-only by design.
          # The positive-control marker (row 7) MUST match the file its Shape 7 prompt
          # command greps — an in-workspace file (README.md), NOT a system file like
          # /etc/hosts: the sandbox blocks an out-of-workspace read even with the
          # Bash(grep:*) grant, and this verdict counts a permission_denials match
          # ("denied", checked ahead of tool_use below) as DENIED — so a /etc/hosts
          # read makes THIS control read DENIED (issue #477). Change the command
          # literal and this marker in lockstep.
          # (Scope note — #477 touches ONLY this row and the review-profile row 11.
          # The file's other /etc/hosts positive controls — schedulewakeup-probe,
          # execfile-shape-probe, hook-probe — are intentionally left unchanged and
          # are unaffected: none scores its control DENIED off permission_denials the
          # way this denied-first verdict does. schedulewakeup keys on tool_use
          # PRESENCE (a denied read still records a tool_use, so its control still
          # reads "ran"); execfile/hook don't verdict-score their control at all.)
          rows = [
              (1, "unexpanded `${CLAUDE_SKILL_DIR:-…}` anchor leading token (ensure-label.sh)", "iprobe01anchor",  "${CLAUDE_SKILL_DIR"),
              (2, "vendored-literal leading token, apply-labels.sh (explicit form, shipped)",    "iprobe02explicit", ".devflow/vendor/devflow/scripts/apply-labels.sh"),
              (3, "vendored-literal leading token, ensure-label.sh (explicit form, shipped)",    "iprobe03explicit",     ".devflow/vendor/devflow/scripts/ensure-label.sh"),
              (4, "`for …; do helper; done` compound wrapping a granted helper",                 "iprobe04for",      "for L in"),
              (5, "piped `while read` loop wrapping a granted helper",                           "iprobe05while",    "while read"),
              (6, "`VAR=\"$(helper …)\"` capture of a granted helper (apply-labels.sh, with `2>&1`)", "iprobe06capture", "$("),
              (7, "plainly granted single command (positive control)",                           "README.md",       None),
              (8, "`VAR=$(helper …)` capture of a NON-LABEL helper (config-get.sh) — shape-6 disambiguator", "iprobe08nonlabel", "$("),
              (9, "redirect-free `VAR=\"$(helper …)\"` capture of a label helper — shape-6 disambiguator", "iprobe09nofd", "$("),
              (10, "bare `> /tmp/f` redirect after a granted head",                    "iprobe10tmp",             "> /tmp/"),
              (11, "bare `> .devflow/tmp/f` redirect after a granted head",           "iprobe11workspace",       "> .devflow/tmp/"),
              (12, "plain heredoc write through a granted leading head",              "iprobe12heredoc",         "<<'EOF'"),
              (13, "captured `VAR=\"$(cat <<'EOF' …)\"` heredoc form",                "iprobe13captureheredoc",  "$(cat <<'EOF'"),
              (14, "`echo \"$VAR\"` simple expansion after a granted leading head",     "iprobe14expansion",       "$GITHUB_ACTIONS"),
              (15, "literal leading `VAR=value` assignment before a granted head",    "iprobe15literal",         "IPROBE15=iprobe15literal"),
              (16, "computed leading `VAR=\"$(head)\"` assignment before a granted head", "iprobe16capture",      "$(echo iprobe16capture)"),
          ]

          # Rows 10–16 cover everyday ad-hoc command forms. Their evidence must
          # establish the whole requested command, not just a characteristic
          # fragment: a fragment-only match could silently bless a reformulation
          # that moved an assignment, removed quoting, or changed heredoc shape.
          exact_commands = {
              10: "echo iprobe10tmp > /tmp/iprobe10tmp",
              11: "echo iprobe11workspace > .devflow/tmp/iprobe11workspace",
              12: "tee .devflow/tmp/iprobe12heredoc <<'EOF'\niprobe12heredoc\nEOF",
              13: "IPROBE13=\"$(cat <<'EOF'\niprobe13captureheredoc\nEOF\n)\"",
              14: 'echo iprobe14expansion "$GITHUB_ACTIONS"',
              15: "IPROBE15=iprobe15literal echo iprobe15literal",
              16: 'IPROBE16="$(echo iprobe16capture)" echo iprobe16capture',
          }

          def recorded_command(entry):
              try:
                  value = json.loads(entry)
              except (TypeError, ValueError):
                  return None
              if not isinstance(value, dict):
                  return None
              tool_input = value.get("tool_input")
              if isinstance(tool_input, dict):
                  value = tool_input
              command = value.get("command")
              return command.strip() if isinstance(command, str) else None

          def entry_matches_shape(entry, num, discrim):
              if num in exact_commands:
                  return recorded_command(entry) == exact_commands[num]
              return discrim is None or discrim in entry

          out = []
          out.append("## Implement-profile matcher-probe results")
          out.append("")
          out.append("Deterministic verdict computed from the execution file's "
                     "`permission_denials` (DENIED) and recorded `tool_use` inputs "
                     "(PERMITTED). The model's text output is never the measurement. "
                     "Stage B (#455) shipped the explicit vendored-literal label grants "
                     "into the profile, so shapes 2 and 3 now confirm the shipped "
                     "leading-token form runs (the former per-form attribution split is "
                     "retired — see the compose step). **REFORMULATED** means a call carrying the "
                     "row's marker ran but NOT in the intended shape/form (the model "
                     "did not emit it verbatim) — treat it like UNATTEMPTED and re-run, "
                     "never as evidence the intended form is PERMITTED.")
          out.append("")
          if note_top:
              out.append("> [!WARNING]")
              out.append("> %s — every row will read UNATTEMPTED; re-run the probe." % note_top)
              out.append("")
          out.append("| # | Shape | Verdict | Evidence |")
          out.append("|---|-------|---------|----------|")

          for num, desc, marker, discrim in rows:
              # Entries in the tool_use stream that carry THIS row's marker; the shape
              # discriminator must appear in the SAME entry (not merely somewhere in
              # the joined stream) for the intended shape to count as confirmed.
              marker_entries = [t for t in tool_uses if marker in t]
              denial_entries = [d for d in denials if marker in d]
              attempted = bool(marker_entries)
              tool_shape_ok = any(
                  entry_matches_shape(t, num, discrim) for t in marker_entries
              )
              denial_shape_ok = any(
                  entry_matches_shape(d, num, discrim) for d in denial_entries
              )
              shape_ok = tool_shape_ok or denial_shape_ok
              if denial_shape_ok:
                  verdict = "DENIED"
              elif attempted and tool_shape_ok:
                  verdict = "PERMITTED"
              elif attempted or denial_entries:
                  verdict = "REFORMULATED"
              else:
                  verdict = "UNATTEMPTED"
              ev = "denial=%s; tool_use=%s; shape=%s" % (
                  "yes" if denial_entries else "no",
                  "yes" if attempted else "no",
                  "n/a" if discrim is None else ("ok" if shape_ok else "MISMATCH"),
              )
              out.append("| %d | %s | **%s** | %s |" % (num, desc, verdict, ev))

          out.append("")
          out.append("### Raw denial entries (%d)" % len(denials))
          out.append("")
          if denials:
              out.append("```")
              for d in denials:
                  out.append(d[:400])
              out.append("```")
          else:
              out.append("_No permission_denials entries found in the execution file._")

          table = "\n".join(out)
          print(table)
          summary = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if summary:
              with open(summary, "a", encoding="utf-8") as fh:
                  fh.write(table + "\n")
          PY

  # issue #415 — probe whether claude-code-action's headless runner honors
  # `--disallowedTools ScheduleWakeup` (removes or denies the ScheduleWakeup tool).
  # The implement-tier early-quit (#408/#415) is the ScheduleWakeup tool result
  # promising a re-invocation that never happens under `claude -p`. This is ONE
  # extra claude-code-action invocation with the flag under test, isolated in its
  # own job so the flag never perturbs the 15-shape matcher probe above. The verdict
  # is derived DETERMINISTICALLY from the execution file (permission_denials /
  # recorded tool_use NAME= / tool absence), never the model's text, by the
  # unit-tested helper scripts/schedulewakeup-probe-verdict.py (extracted so every
  # arm and the fail-open name-match are driven in lib/test/run.sh — #415 review). TWO positive-
  # control grep calls bracket the ScheduleWakeup attempt (before AND after Action 2):
  # the AFTER control proves the model reached and passed Action 2, so an absence of
  # any ScheduleWakeup tool_use reads as REMOVED-from-context only when both controls
  # ran — otherwise the run is INCONCLUSIVE (an unmeasured run never collapses onto the
  # shippable REMOVED). ScheduleWakeup is granted in --allowed-tools so the allowlist
  # can never be the thing that removes it — a DENIED/REMOVED is attributable to
  # --disallowedTools alone.
  # Verdict → claude_args mapping (issue #415 AC4, executed by the implementer):
  #   DENIED or REMOVED → ship `--disallowedTools ScheduleWakeup` in
  #                       devflow-implement.yml's claude step + its run.sh pin.
  #   AVAILABLE         → ship no claude_args change; record the probe run link
  #                       and this omission rationale on the PR.
  #   INCONCLUSIVE      → measured nothing conclusive; re-run before deciding.
  #
  # MEASURED AVAILABLE across real cloud runs 29140791165 and 29138117625 (issue
  # #418): both recorded a ScheduleWakeup `tool_use` that was NOT denied — i.e.
  # `--disallowedTools ScheduleWakeup` did NOT remove or deny the tool in
  # claude-code-action@v1's headless runner (the flag was IGNORED, the tool stayed
  # available). A third run, 29139012320, read a *presumptive* REMOVED (no tool_use,
  # both controls ran) — the documented false-positive where a compliant model
  # silently skips Action 2 while still running both bracketing controls; the two
  # positive AVAILABLE observations are dispositive over it. Per the AVAILABLE arm
  # above, NO `--disallowedTools ScheduleWakeup` was added to devflow-implement.yml's
  # claude step and NO `--disallowedTools`-flag lib/test/run.sh pin was added (the
  # unrelated #408/#415 ScheduleWakeup prose/verdict-helper pins in run.sh are
  # untouched) — the implement-tier
  # ScheduleWakeup false-promise early-quit is prevented by the always-resident
  # headless-wait prose (issue #415) ALONE, since the flag does not remove the tool
  # here. This verdict is version-dependent: RE-PROBE (workflow_dispatch, or any PR
  # touching this file) after a claude-code-action / Claude Code CLI upgrade before
  # trusting it — a future version that honors the flag flips this to REMOVED/DENIED
  # and would then ship the flag + its run.sh pin per the mapping above.
  schedulewakeup-probe:
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Claude Code (ScheduleWakeup disallowed-tools probe)
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Allow any bot to initiate the probe (same rationale as the matcher
          # probe above): this diagnostic is same-repo only and read-only, but
          # claude-code-action otherwise refuses a bot-initiated run.
          allowed_bots: "*"
          prompt: |
            You are a DISALLOWED-TOOL PROBE. Attempt the three numbered actions below,
            each EXACTLY ONCE in its OWN single tool call, in order. Do not retry a
            denied or unavailable action and do not work around it — move straight to
            the next number. After all three, STOP and reply with the single word DONE.

            Your text output is not measured. Only the harness record of which tool
            calls the permission matcher allowed, denied, or did not expose is
            measured. Attempt Action 2 even if the tool appears unavailable — its
            absence or denial is exactly the signal being collected — and ALWAYS
            proceed to Action 3 afterward, whatever happened at Action 2.

            Action 1 (positive control, BEFORE) — run this Bash command once:
            grep -c . /etc/hosts

            Action 2 — attempt to call the ScheduleWakeup tool once: schedule a
            wakeup roughly 300 seconds from now with any short reason and prompt.

            Action 3 (positive control, AFTER — proves you reached and passed
            Action 2) — run this Bash command once:
            grep -c . /etc/os-release

          # No plugin_marketplaces/plugins here (unlike the matcher probe above):
          # this probe exercises only `grep` (Bash) and the ScheduleWakeup harness
          # built-in, neither of which needs the devflow plugin — loading it would
          # add a marketplace clone + install for zero measurement value.
          #
          # ScheduleWakeup is GRANTED in --allowed-tools *and* removed by
          # --disallowedTools deliberately (issue #415 review): granting it means the
          # allowlist can never be the thing that removes/denies it, so a DENIED or
          # REMOVED verdict is attributable to --disallowedTools alone — the flag under
          # test — rather than confounded by an allowlist omission. If --disallowedTools
          # wins it is removed/denied (ship); if it is ignored the tool stays AVAILABLE
          # (do not ship). --permission-mode acceptEdits so a granted call does not
          # prompt-deny and masquerade as a denial.
          claude_args: >-
            --model claude-haiku-4-5-20251001
            --effort low
            --permission-mode acceptEdits
            --allowed-tools "Bash(grep:*),ScheduleWakeup"
            --disallowedTools ScheduleWakeup

      # Deterministic verdict from the execution file only — same measurement core
      # as the matcher probe's verdict step. always() so the verdict is produced
      # even if the engine ended in error.
      - name: Compute ScheduleWakeup verdict
        if: always()
        env:
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          set -euo pipefail
          # Verdict derivation is extracted into a unit-tested helper (issue #415
          # review, finding #1) so lib/test/run.sh can drive every arm + the
          # fail-open matrix; see scripts/schedulewakeup-probe-verdict.py.
          python3 scripts/schedulewakeup-probe-verdict.py "${EXECUTION_FILE}"

  # issue #437 — capture the SHAPE of claude-code-action's execution_file and settle
  # the unproven "the token/wall-clock cost half is unreconstructable" claim in
  # docs/efficiency-trace.md with real evidence. The prompt deliberately exercises the
  # events the shape record cares about: a positive-control grep, ONE Task/subagent
  # dispatch (so a `subagent_type` field has something to carry), and one deliberately
  # ungranted command (so `permission_denials` has something to carry). The resulting
  # `steps.claude.outputs.execution_file` is fed through scripts/extract-execution-shape.sh,
  # which emits a REDACTED shape record (per-field present/absent/unavailable + the
  # top-level encoding + a key→type structural set; every string VALUE leaf is dropped —
  # object KEYS are fail-closed filtered (`safekey`: emitted verbatim only when bounded-length
  # and identifier-shaped, else `<redacted-key>`), so an unrecognized key loses its name rather
  # than leaking its content. The observed schema keys are fixed schema
  # field names; untrusted content lives in value positions). ONLY
  # that redacted record is uploaded — the raw execution file, which can carry prompt
  # text, repo content, and attacker-controlled check-run names, NEVER leaves the run
  # (issue #437 AC2). Re-run on demand after a claude-code-action upgrade to refresh
  # docs/execution-file-shape.md.
  execfile-shape-probe:
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Claude Code (execution-file shape probe)
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Same rationale as the probes above: same-repo only, read-only, but a
          # DevFlow bot PR touching this file is a non-human actor claude-code-action
          # would otherwise refuse.
          allowed_bots: "*"
          prompt: |
            You are an EXECUTION-FILE SHAPE PROBE. Perform the three numbered actions
            below, each EXACTLY ONCE in its own single tool call, in order. Do not
            retry a denied action and do not work around it. After all three, STOP and
            reply with the single word DONE.

            Your text output is not measured. Only the harness execution record — which
            token-usage, timing, tool_use, subagent_type, and permission_denials fields
            it carries — is measured, by a deterministic helper reading the execution
            file afterward.

            Action 1 (positive control) — run this Bash command once:
            grep -c . /etc/hosts

            Action 2 — dispatch ONE subagent using the Task tool: subagent_type
            "general-purpose", with the prompt "Reply with exactly the single word ok
            and nothing else." This makes the execution file carry a tool_use with a
            subagent_type field.

            Action 3 — attempt this Bash command once. It is deliberately NOT granted,
            so it WILL be denied — that denial is exactly the signal being collected, to
            populate permission_denials:
            rm -rf /tmp/devflow-execfile-probe-denied

          # No plugin_marketplaces/plugins: Action 2 dispatches the BUILT-IN
          # general-purpose subagent, which needs no plugin — loading devflow would add
          # a marketplace clone + install for zero measurement value.
          #
          # Task is granted so the subagent dispatch is permitted; Bash(grep:*) grants
          # the control; `rm` is deliberately UNGRANTED so Action 3 is denied.
          # acceptEdits so a granted call never prompt-denies and masquerades as a denial.
          claude_args: >-
            --model claude-haiku-4-5-20251001
            --effort low
            --permission-mode acceptEdits
            --allowed-tools "Task,Bash(grep:*)"

      # Redact + extract the shape, then upload ONLY the redacted record. always() so
      # the record is produced even if the engine ended in error (it degrades to an
      # all-unavailable record, never a crash). The helper always exits 0.
      - name: Extract redacted execution-file shape
        if: always()
        env:
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          set -euo pipefail
          mkdir -p artifact
          # scripts/extract-execution-shape.sh is a repo-root helper; this is a plain
          # workflow run step (NOT a claude-code-action allowlisted context), so a
          # direct `bash scripts/…` invocation is fine here.
          bash scripts/extract-execution-shape.sh "${EXECUTION_FILE}" > artifact/execution-file-shape.txt
          echo "## Execution-file shape (redacted)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat artifact/execution-file-shape.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload redacted shape record
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-file-shape
          path: artifact/execution-file-shape.txt
          if-no-files-found: warn

  # issue #437 (AC6) — records whether a Stop hook committed to the BASE branch's
  # .claude/settings.json executes when claude-code-action runs. This is now OBSERVED:
  # the hook (scripts/stop-hook-probe.sh, registered in .claude/settings.json) is on the
  # BASE branch (landed in PR #438), and claude-code-action removes .claude/ and restores
  # it from that BASE branch before running — so run 29224205805 observed it FIRE. Because
  # the hook is on base, an absent marker is now an ANOMALY (it could not write / the
  # session never reached Stop), not the expected state — but a "did not fire" still must
  # NOT be read as "hooks do not fire under the action" (the reverse launder the issue
  # warns against). It writes the gitignored breadcrumb .devflow/tmp/stop-hook-probe-fired
  # (a COUPLED contract: renaming it on either side alone would silently read as "did not
  # fire" forever — lib/test/run.sh pins both). This job checks for that breadcrumb after
  # the action. See docs/execution-file-shape.md.
  hook-probe:
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Claude Code (Stop-hook execution probe)
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_bots: "*"
          prompt: |
            You are a STOP-HOOK PROBE. Run this single Bash command once, then STOP and
            reply with the single word DONE. Your only purpose is to reach a normal Stop
            so that any base-branch Stop hook has a chance to fire; the hook's side
            effect — not your output — is the measurement.

            grep -c . /etc/hosts
          claude_args: >-
            --model claude-haiku-4-5-20251001
            --effort low
            --permission-mode acceptEdits
            --allowed-tools "Bash(grep:*)"

      # Record fired / did-not-fire. always() so a verdict is produced even on engine
      # error. A missing breadcrumb on a probe PR is EXPECTED (the hook is not yet on
      # base) — the meaningful run is post-merge, from the default branch via
      # workflow_dispatch. Never collapse "did not fire" to "hooks do not fire".
      - name: Record Stop-hook firing observation
        if: always()
        run: |
          set -euo pipefail
          # cwd assumption, explicit (PR #438 review): this reads the marker at the
          # WORKSPACE ROOT. The hook resolves the git toplevel from the Stop payload cwd,
          # and this job runs Claude from the checkout root, so the two coincide; a future
          # action variant running Claude from a different tree must revisit this read.
          MARKER=".devflow/tmp/stop-hook-probe-fired"
          # Branch selection + user-facing wording live in the suite-drivable helper
          # (scripts/describe-hook-probe.sh) per the repo's extract-branch-selecting-
          # inline-shell convention (PR #367 precedent); the workflow only supplies the
          # coupled marker literal and the run link.
          {
            bash scripts/describe-hook-probe.sh "$MARKER"
            echo "- run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          } | tee -a "$GITHUB_STEP_SUMMARY"

  # issue #498 — cancel-probe: records what value a cancelled-but-still-finishing
  # job presents to an always() step's `env:` at evaluation time. The GitHub docs
  # state `always()` runs even when canceled and that `job.status` is one of
  # success/failure/cancelled, but do NOT state which value a cancelled job
  # delivers to an always() step's `env:` (the transition-timing fact issue #498
  # keys its cancel exclusion on). This job settles it empirically: an operator
  # dispatches it from the PR branch (`gh workflow run matcher-probe.yml --ref
  # <branch>` — matcher-probe.yml already exists on main with workflow_dispatch,
  # so that executes the PR branch's file), cancels the run mid-sleep, and the
  # captured `job_status=cancelled` log line from the always() step is the
  # recorded pre-merge evidence for issue #498's AC2 — an operator-performed
  # probe, exactly how matcher-probe evidence rows are produced today (the
  # executing implement run cannot dispatch-and-cancel itself: `gh run cancel` is
  # granted in no allowlist). Repo-internal; NOT shipped by install.sh. No
  # claude-code-action step and no secrets — just runner minutes — so a normal
  # (uncancelled) run costs only a 10-min sleep and prints `job_status=success`.
  cancel-probe:
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Long sleep (cancel this run mid-sleep)
        run: |
          echo "cancel-probe: sleeping 10 minutes — cancel this run now to capture the always() step's job.status"
          sleep 600

      - name: Record job.status (always)
        if: always()
        env:
          # The documented job-context string (issue #498), deliberately not a
          # status-check function (the docs scope those to `if:` conditionals).
          JOB_STATUS: ${{ job.status }}
        run: |
          echo "cancel-probe: job_status=${JOB_STATUS}"
