name: Claude Code (implement)

# Heavy @claude-mention listener — fires only when the triggering event
# contains both `@claude` and `/devflow:implement`. Today the runtime
# provisioning is identical to claude.yml (Python + pip install of the
# project with dev + all DB drivers), so the split is structural rather
# than environmental: this workflow reads `claude_implement.effort`
# (e.g. "high") so /devflow:implement's
# planning + write-the-tests phases get more reasoning budget than the
# light flows, without inflating every @claude mention's cost. If future
# implement work needs heavy provisioning the light path doesn't (e.g.
# Postgres + MySQL service containers for connector-level /devflow:implement
# runs), add it here, not in claude.yml.
#
# Mutually-exclusive `if:` conditions on this workflow and claude.yml
# guarantee exactly one fires per event: claude.yml requires `@claude`
# AND NOT `/devflow:implement`; this workflow requires `@claude` AND
# `/devflow:implement`. If you add a new heavy slash command, extend
# BOTH `if:` blocks symmetrically — never make them overlap.
#
# This workflow also fires when the `claude_implement.trigger_label`
# (default `devflow:implement`) is added to an issue. That path is unique
# to this workflow — claude.yml does NOT subscribe to `labeled` events, so
# there is no symmetry to maintain there. A human adding the label is a
# real user event that triggers Actions natively, so this needs no
# bot-authored comment and no GitHub App (it replaces the old
# comment-on-draft-issues.yml + get-app-token machinery).
#
# Most of this file is structurally identical to claude.yml so the
# plugin/marketplace surface area is the same. Keep the
# plugin_marketplaces, plugins, and claude_args sections in sync between
# the two files (and with claude-runner.yml's review profile where
# applicable); the existing claude-runner.yml comment establishes that
# convention.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, labeled]
  pull_request_review:
    types: [submitted]

jobs:
  # Duplicates the config job in claude.yml verbatim except for the
  # `effort` source (`claude_implement.effort` vs `claude.effort`). A
  # workflow_call indirection would buy nothing here — the config is
  # ~15 lines and the call would be more.
  config:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.extract.outputs.enabled }}
      base_branch: ${{ steps.extract.outputs.base_branch }}
      claude_model: ${{ steps.extract.outputs.claude_model }}
      allowed_bots: ${{ steps.extract.outputs.allowed_bots }}
      effort: ${{ steps.extract.outputs.effort }}
      allowed_tools_extra: ${{ steps.extract.outputs.allowed_tools_extra }}
      trigger_label: ${{ steps.extract.outputs.trigger_label }}
    steps:
      - uses: actions/checkout@v6
      - id: cfg
        uses: ./.github/actions/read-project-config
      - id: extract
        env:
          CONFIG_JSON: ${{ steps.cfg.outputs.json }}
        run: |
          set -euo pipefail
          {
            echo "enabled=$(echo "$CONFIG_JSON" | jq -r '.workflows.claude // false')"
            echo "base_branch=$(echo "$CONFIG_JSON" | jq -r '.base_branch')"
            echo "claude_model=$(echo "$CONFIG_JSON" | jq -r '.claude_model')"
            echo "allowed_bots=$(echo "$CONFIG_JSON" | jq -r '.claude.allowed_bots')"
            echo "effort=$(echo "$CONFIG_JSON" | jq -r '.claude_implement.effort // "medium"')"
            # Repo-specific extra allowlist for the implement path. Independent
            # from claude.yml's `claude.allowed_tools` — the heavy path does NOT
            # inherit the light path's extras, so adopters list every extra tool
            # they want during /devflow:implement under `claude_implement.allowed_tools`.
            # Emits a leading-comma string (",Bash(make:*),…") or "".
            echo "allowed_tools_extra=$(echo "$CONFIG_JSON" | jq -r '.claude_implement.allowed_tools // [] | if length > 0 then "," + join(",") else "" end')"
            # Issue label that triggers /devflow:implement. A human adding this
            # label is a real user event, so it triggers the workflow natively —
            # no bot-authored comment (and therefore no GitHub App) required.
            echo "trigger_label=$(echo "$CONFIG_JSON" | jq -r 'if (.claude_implement.trigger_label // "") == "" then "devflow:implement" else .claude_implement.trigger_label end')"
          } >> "$GITHUB_OUTPUT"

  claude:
    needs: config
    # Inverse of claude.yml's `if:` — every clause that excludes
    # `/devflow:implement` there REQUIRES it here. The two sets of
    # clauses partition the event space exactly: for any single event,
    # `contains(..., '/devflow:implement')` is either true or false, so
    # exactly one workflow's `if:` evaluates true.
    if: |
      needs.config.outputs.enabled == 'true' &&
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && contains(github.event.comment.body, '/devflow:implement')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') && contains(github.event.comment.body, '/devflow:implement')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') && contains(github.event.review.body, '/devflow:implement')) ||
        (github.event_name == 'issues' && github.event.action == 'opened' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) && (contains(github.event.issue.body, '/devflow:implement') || contains(github.event.issue.title, '/devflow:implement'))) ||
        (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == needs.config.outputs.trigger_label)
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Matches claude.yml. /devflow:implement reads the diff via
          # three-dot notation against `origin/main` (`git diff
          # origin/main...HEAD`), which internally computes a merge-base.
          # Depth 50 covers the realistic case (PRs typically ≤ a few
          # dozen commits behind main); long-lived branches that drift
          # past that will error out visibly on the missing merge-base.
          fetch-depth: 50

      # Provision the runtime (Python / Node / pip cache / deps) from
      # `.devflow/config.json`'s `setup` block. The logic lives in the
      # setup-project-env composite action so claude.yml and
      # claude-implement.yml share ONE copy (checkout above gives the action
      # the repo + config to read). See docs/cloud-setup.md for the rationale.
      - id: cfg
        uses: ./.github/actions/read-project-config
      - uses: ./.github/actions/setup-project-env
        with:
          config_json: ${{ steps.cfg.outputs.json }}

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: ${{ needs.config.outputs.allowed_bots }}

          # The label path has no `@claude /devflow:implement` text for the
          # action to read, so synthesise the command explicitly. Every other
          # path leaves this empty and the action uses the triggering
          # comment/issue body as the prompt, exactly as before.
          prompt: ${{ (github.event_name == 'issues' && github.event.action == 'labeled') && format('/devflow:implement {0}', github.event.issue.number) || '' }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Keep plugin_marketplaces, plugins, and claude_args in sync
          # with claude.yml — both listeners must expose the same skill
          # surface so that whether a flow hits the light or heavy path
          # is invisible to users invoking /devflow:* commands.
          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-official.git
            ./

          plugins: |
            pr-review-toolkit@claude-plugins-official
            code-review@claude-plugins-official
            feature-dev@claude-plugins-official
            superpowers@claude-plugins-official
            claude-md-management@claude-plugins-official
            devflow@devflow-marketplace

          base_branch: ${{ needs.config.outputs.base_branch }}
          claude_args: >-
            --model ${{ needs.config.outputs.claude_model }}
            ${{ needs.config.outputs.effort != 'medium' && format('--effort {0}', needs.config.outputs.effort) || '' }}
            --allowed-tools
            "Read,
            Write,
            Edit,
            Glob,
            Grep,
            LS,
            Skill,
            Agent,
            TodoWrite,
            EnterPlanMode,
            ExitPlanMode,
            WebFetch,
            WebSearch,
            Bash(git add:*),
            Bash(git commit:*),
            Bash(git push:*),
            Bash(git pull:*),
            Bash(git fetch:*),
            Bash(git status:*),
            Bash(git diff:*),
            Bash(git log:*),
            Bash(git show:*),
            Bash(git checkout:*),
            Bash(git branch:*),
            Bash(git stash:*),
            Bash(git rm:*),
            Bash(git mv:*),
            Bash(git restore:*),
            Bash(git revert:*),
            Bash(git blame:*),
            Bash(git ls-files:*),
            Bash(git rev-parse:*),
            Bash(git merge-base:*),
            Bash(gh pr create:*),
            Bash(gh pr edit:*),
            Bash(gh pr comment:*),
            Bash(gh pr diff:*),
            Bash(gh pr view:*),
            Bash(gh pr review:*),
            Bash(gh pr ready:*),
            Bash(gh pr list:*),
            Bash(gh pr checks:*),
            Bash(gh pr status:*),
            Bash(gh pr reopen:*),
            Bash(gh issue view:*),
            Bash(gh issue comment:*),
            Bash(gh issue list:*),
            Bash(gh issue edit:*),
            Bash(gh issue create:*),
            Bash(gh issue reopen:*),
            Bash(gh issue status:*),
            Bash(gh search:*),
            Bash(gh label list:*),
            Bash(gh repo view:*),
            Bash(gh run view:*),
            Bash(gh run list:*),
            Bash(gh workflow view:*),
            Bash(gh workflow list:*),
            Bash(gh api:*),
            Bash(jq:*),
            Bash(.claude/plugins/devflow/scripts/config-get.sh:*),
            Bash(.claude/plugins/devflow/scripts/workpad.py:*),
            Bash(.claude/plugins/devflow/scripts/parse-acs.py:*),
            Bash(.claude/plugins/devflow/scripts/branch-for-issue.py:*),
            Bash(.claude/plugins/devflow/scripts/file-deferrals.py:*),
            Bash(.claude/plugins/devflow/scripts/match-deferrals.py:*),
            Bash(pip install:*),
            Bash(pip:*),
            Bash(python:*),
            Bash(python3:*),
            Bash(python -m:*),
            Bash(python3 -m:*),
            Bash(ruff:*),
            Bash(ruff check:*),
            Bash(ruff format:*),
            Bash(pytest:*),
            Bash(mypy:*),
            Bash(grep:*),
            Bash(rg:*),
            Bash(find:*),
            Bash(wc:*),
            Bash(sort:*),
            Bash(uniq:*),
            Bash(cut:*),
            Bash(tr:*),
            Bash(xargs:*),
            Bash(awk:*),
            Bash(sed:*),
            Bash(diff:*),
            Bash(comm:*),
            Bash(cat:*),
            Bash(head:*),
            Bash(tail:*),
            Bash(less:*),
            Bash(ls:*),
            Bash(tree:*),
            Bash(file:*),
            Bash(stat:*),
            Bash(date:*),
            Bash(pwd:*),
            Bash(realpath:*),
            Bash(dirname:*),
            Bash(basename:*),
            Bash(which:*),
            Bash(type:*),
            Bash(env:*),
            Bash(echo:*),
            Bash(printf:*),
            Bash(test:*),
            Bash(touch:*),
            Bash(mkdir:*),
            Bash(rmdir:*),
            Bash(rm:*),
            Bash(mv:*),
            Bash(cp:*),
            Bash(tee:*)${{ needs.config.outputs.allowed_tools_extra }}"
