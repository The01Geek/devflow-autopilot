name: Claude Code (implement)

# Heavy listener for /devflow:implement. Fires on a BARE `/devflow:implement
# <#>` comment, review, or issue body/title — and on the
# `claude_implement.trigger_label` being added to an issue. It does NOT require
# `@claude`.
#
# Why no `@claude`: this workflow runs claude-code-action in AGENT mode with an
# explicit, synthesised `/devflow:implement <n>` prompt (the `gate` job resolves
# the number). Agent mode needs no trigger phrase. A stock claude.yml only
# fires in TAG mode on its `@claude` phrase, so it never reacts to a bare
# `/devflow:implement <n>` comment — the two workflows cannot double-fire on the
# canonical path, and claude.yml needs NO edit when this plugin is installed.
#
# Cost control: agent mode runs for ANY actor, so the `gate` job authorizes the
# sender (an allowed bot OR a write/admin/maintain collaborator) before the
# heavy `claude` job runs. See scripts/resolve-implement-trigger.sh.
#
# This workflow reads `claude_implement.effort` (e.g. "high") so the planning +
# write-the-tests phases get more reasoning budget than the light @claude flows
# in claude.yml, without inflating every mention's cost.
#
# Keep the plugin_marketplaces, plugins, and claude_args sections in sync with
# claude.yml and claude-runner.yml so the skill surface is identical across
# listeners.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, labeled]
  pull_request_review:
    types: [submitted]

jobs:
  # Duplicates the config job in claude.yml verbatim except for the
  # `effort` source (`claude_implement.effort` vs `claude.effort`). A
  # workflow_call indirection would buy nothing here — the config is
  # ~15 lines and the call would be more.
  config:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.extract.outputs.enabled }}
      base_branch: ${{ steps.extract.outputs.base_branch }}
      claude_model: ${{ steps.extract.outputs.claude_model }}
      allowed_bots: ${{ steps.extract.outputs.allowed_bots }}
      effort: ${{ steps.extract.outputs.effort }}
      allowed_tools_extra: ${{ steps.extract.outputs.allowed_tools_extra }}
      trigger_label: ${{ steps.extract.outputs.trigger_label }}
    steps:
      - uses: actions/checkout@v6
      - id: cfg
        uses: ./.github/actions/read-project-config
      - id: extract
        env:
          CONFIG_JSON: ${{ steps.cfg.outputs.json }}
        run: |
          set -euo pipefail
          {
            echo "enabled=$(echo "$CONFIG_JSON" | jq -r '.workflows.claude // false')"
            echo "base_branch=$(echo "$CONFIG_JSON" | jq -r '.base_branch')"
            echo "claude_model=$(echo "$CONFIG_JSON" | jq -r '.claude_model')"
            echo "allowed_bots=$(echo "$CONFIG_JSON" | jq -r '.claude.allowed_bots')"
            echo "effort=$(echo "$CONFIG_JSON" | jq -r '.claude_implement.effort // "medium"')"
            # Repo-specific extra allowlist for the implement path. Independent
            # from claude.yml's `claude.allowed_tools` — the heavy path does NOT
            # inherit the light path's extras, so adopters list every extra tool
            # they want during /devflow:implement under `claude_implement.allowed_tools`.
            # Emits a leading-comma string (",Bash(make:*),…") or "".
            echo "allowed_tools_extra=$(echo "$CONFIG_JSON" | jq -r '.claude_implement.allowed_tools // [] | if length > 0 then "," + join(",") else "" end')"
            # Issue label that triggers /devflow:implement. A human adding this
            # label is a real user event, so it triggers the workflow natively —
            # no bot-authored comment (and therefore no GitHub App) required.
            echo "trigger_label=$(echo "$CONFIG_JSON" | jq -r 'if (.claude_implement.trigger_label // "") == "" then "devflow:implement" else .claude_implement.trigger_label end')"
          } >> "$GITHUB_OUTPUT"

  # Authorization + target-number gate. The action runs in AGENT mode below
  # (explicit prompt), which executes for ANY actor, so this job is the cost
  # control: it runs the resolver, which authorizes the sender (allowed bot OR
  # write/admin/maintain collaborator) and resolves the issue number. The
  # `claude` job runs ONLY when should_run=true. Coarse event matching stays in
  # this job's `if:` so irrelevant events never spin a runner.
  gate:
    needs: config
    if: |
      needs.config.outputs.enabled == 'true' &&
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/devflow:implement')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '/devflow:implement')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '/devflow:implement')) ||
        (github.event_name == 'issues' && github.event.action == 'opened' && (contains(github.event.issue.body, '/devflow:implement') || contains(github.event.issue.title, '/devflow:implement'))) ||
        (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == needs.config.outputs.trigger_label)
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read   # checkout the resolver script; collaborator check uses GITHUB_TOKEN
    outputs:
      should_run: ${{ steps.resolve.outputs.should_run }}
      number: ${{ steps.resolve.outputs.number }}
    steps:
      - uses: actions/checkout@v6
      - id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          # `sender` is present on every event here and equals the actor:
          # commenter / reviewer / issue opener / labeller respectively.
          ACTOR: ${{ github.event.sender.login }}
          ALLOWED_BOTS: ${{ needs.config.outputs.allowed_bots }}
          IS_LABEL_EVENT: ${{ github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == needs.config.outputs.trigger_label }}
          # issue.number for issues + issue_comment (PRs are issues); falls back
          # to pull_request.number for the review events.
          CONTEXT_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          # Only the populated field contributes; passed as an env var (not
          # interpolated into bash), so arbitrary body text cannot inject.
          TRIGGER_TEXT: ${{ github.event.comment.body || github.event.review.body || format('{0} {1}', github.event.issue.title, github.event.issue.body) }}
        run: |
          set -euo pipefail
          bash scripts/resolve-implement-trigger.sh >> "$GITHUB_OUTPUT"

  claude:
    needs: [config, gate]
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      # Educational nudge for the redundant `@claude /devflow:implement <#>`
      # form. This workflow fires on a BARE `/devflow:implement <#>` (the gate
      # matches the command regardless of `@claude`), so prefixing `@claude` is
      # pure overhead: it additionally wakes the tag-mode claude.yml listener for
      # nothing. When the trigger text carried `@claude`, post a one-line
      # reminder pointing at the simpler bare command. Runs only on an
      # authorized run (the job's should_run gate) and is skipped on the label
      # path (no command text). Best-effort: a failed comment never blocks the
      # implementation run.
      - name: Nudge off redundant @claude prefix
        if: github.event.action != 'labeled'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          NUMBER: ${{ needs.gate.outputs.number }}
          # Same field selection as the gate's TRIGGER_TEXT; passed as an env
          # var (never interpolated into bash) so body text cannot inject.
          TRIGGER_TEXT: ${{ github.event.comment.body || github.event.review.body || format('{0} {1}', github.event.issue.title, github.event.issue.body) }}
          BODY: "Heads up: you don't need `@claude` to start an implementation run — a bare `/devflow:implement <#>` comment triggers it directly and avoids waking the light `@claude` listener for nothing. Your run was still kicked off; you can drop the `@claude` next time."
        run: |
          set -euo pipefail
          case "$TRIGGER_TEXT" in
            *"@claude"*)
              if [ -n "${NUMBER:-}" ] && [ "$NUMBER" != "null" ]; then
                gh api "repos/$REPO/issues/$NUMBER/comments" -f "body=$BODY" >/dev/null \
                  || echo "::warning::Could not post the @claude-redundant reminder comment."
              fi
              ;;
            *) : ;;
          esac

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Matches claude.yml. /devflow:implement reads the diff via
          # three-dot notation against `origin/main` (`git diff
          # origin/main...HEAD`), which internally computes a merge-base.
          # Depth 50 covers the realistic case (PRs typically ≤ a few
          # dozen commits behind main); long-lived branches that drift
          # past that will error out visibly on the missing merge-base.
          fetch-depth: 50

      # Provision the runtime from `.devflow/config.json`'s `setup`
      # block rather than hardcoding the toolchain (see that file / cloud-setup.md
      # for the rationale). Read the config locally (checkout is done above) so
      # the multi-line install command stays a jq-extracted string we exec
      # directly, never interpolated into a `run:` (injection-safe). Python/Node
      # setup are `uses:` actions — they must be static YAML, so we gate them on
      # a configured version rather than data-looping over them. Mirrors
      # claude.yml — change both together.
      - id: cfg
        uses: ./.github/actions/read-project-config
      - id: setupcfg
        env:
          CONFIG_JSON: ${{ steps.cfg.outputs.json }}
        run: |
          set -euo pipefail
          {
            echo "python_version=$(echo "$CONFIG_JSON" | jq -r '.setup.python_version // ""')"
            echo "node_version=$(echo "$CONFIG_JSON" | jq -r '.setup.node_version // ""')"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.setupcfg.outputs.python_version != ''
        uses: actions/setup-python@v6
        with:
          python-version: ${{ steps.setupcfg.outputs.python_version }}

      - name: Set up Node
        if: steps.setupcfg.outputs.node_version != ''
        uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.setupcfg.outputs.node_version }}

      # Restore pip's wheel cache when Python is provisioned. setup-python's
      # built-in `cache: pip` is deliberately NOT used: it ERRORS when no
      # requirements/pyproject file exists (the common case for non-package
      # repos). This generic cache degrades to a stable key when no dep file is
      # present, so it never errors and still saves heavy adopters
      # (`pip install -e .[…]`) the repeated PyPI download on every run.
      - name: Cache pip downloads
        if: steps.setupcfg.outputs.python_version != ''
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml', '**/setup.cfg', '**/setup.py') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Provision project dependencies
        env:
          CONFIG_JSON: ${{ steps.cfg.outputs.json }}
        run: |
          set -euo pipefail
          INSTALL=$(echo "$CONFIG_JSON" | jq -r '.setup.install | if type=="array" then join("\n") elif type=="string" then . else "" end')
          if [ -n "$INSTALL" ]; then
            echo "::group::Installing project dependencies"
            # bash -euo pipefail (not a bare `bash -c`): the outer shell's
            # set -e does NOT propagate into the child, so a multi-line install
            # whose early line fails would otherwise continue and exit green.
            bash -euo pipefail -c "$INSTALL"
            echo "::endgroup::"
          else
            echo "No setup.install configured; skipping dependency install."
          fi

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: ${{ needs.config.outputs.allowed_bots }}

          # Always agent mode: the gate resolved a single issue number, so the
          # action never depends on `@claude` or on reading the raw body. A
          # stock claude.yml (tag mode) therefore never double-fires on a bare
          # `/devflow:implement <n>` comment.
          prompt: ${{ format('/devflow:implement {0}', needs.gate.outputs.number) }}

          # Agent mode is silent by default; surface a progress comment so the
          # requester sees the run was picked up (applies to all paths now).
          track_progress: true

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Keep plugin_marketplaces, plugins, and claude_args in sync
          # with claude.yml — both listeners must expose the same skill
          # surface so that whether a flow hits the light or heavy path
          # is invisible to users invoking /devflow:* commands.
          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-official.git
            ./

          plugins: |
            pr-review-toolkit@claude-plugins-official
            code-review@claude-plugins-official
            feature-dev@claude-plugins-official
            superpowers@claude-plugins-official
            claude-md-management@claude-plugins-official
            devflow@devflow-marketplace

          base_branch: ${{ needs.config.outputs.base_branch }}
          claude_args: >-
            --model ${{ needs.config.outputs.claude_model }}
            ${{ needs.config.outputs.effort != 'medium' && format('--effort {0}', needs.config.outputs.effort) || '' }}
            --allowed-tools
            "Read,
            Write,
            Edit,
            Glob,
            Grep,
            LS,
            Skill,
            Agent,
            TodoWrite,
            EnterPlanMode,
            ExitPlanMode,
            WebFetch,
            WebSearch,
            Bash(git add:*),
            Bash(git commit:*),
            Bash(git push:*),
            Bash(git pull:*),
            Bash(git fetch:*),
            Bash(git status:*),
            Bash(git diff:*),
            Bash(git log:*),
            Bash(git show:*),
            Bash(git checkout:*),
            Bash(git branch:*),
            Bash(git stash:*),
            Bash(git rm:*),
            Bash(git mv:*),
            Bash(git restore:*),
            Bash(git revert:*),
            Bash(git blame:*),
            Bash(git ls-files:*),
            Bash(git rev-parse:*),
            Bash(git merge-base:*),
            Bash(gh pr create:*),
            Bash(gh pr edit:*),
            Bash(gh pr comment:*),
            Bash(gh pr diff:*),
            Bash(gh pr view:*),
            Bash(gh pr review:*),
            Bash(gh pr ready:*),
            Bash(gh pr list:*),
            Bash(gh pr checks:*),
            Bash(gh pr status:*),
            Bash(gh pr reopen:*),
            Bash(gh issue view:*),
            Bash(gh issue comment:*),
            Bash(gh issue list:*),
            Bash(gh issue edit:*),
            Bash(gh issue create:*),
            Bash(gh issue reopen:*),
            Bash(gh issue status:*),
            Bash(gh search:*),
            Bash(gh label list:*),
            Bash(gh repo view:*),
            Bash(gh run view:*),
            Bash(gh run list:*),
            Bash(gh workflow view:*),
            Bash(gh workflow list:*),
            Bash(gh api:*),
            Bash(jq:*),
            Bash(.claude/plugins/devflow/scripts/config-get.sh:*),
            Bash(.claude/plugins/devflow/scripts/workpad.py:*),
            Bash(.claude/plugins/devflow/scripts/parse-acs.py:*),
            Bash(.claude/plugins/devflow/scripts/branch-for-issue.py:*),
            Bash(.claude/plugins/devflow/scripts/file-deferrals.py:*),
            Bash(.claude/plugins/devflow/scripts/match-deferrals.py:*),
            Bash(pip install:*),
            Bash(pip:*),
            Bash(python:*),
            Bash(python3:*),
            Bash(python -m:*),
            Bash(python3 -m:*),
            Bash(ruff:*),
            Bash(ruff check:*),
            Bash(ruff format:*),
            Bash(pytest:*),
            Bash(mypy:*),
            Bash(grep:*),
            Bash(rg:*),
            Bash(find:*),
            Bash(wc:*),
            Bash(sort:*),
            Bash(uniq:*),
            Bash(cut:*),
            Bash(tr:*),
            Bash(xargs:*),
            Bash(awk:*),
            Bash(sed:*),
            Bash(diff:*),
            Bash(comm:*),
            Bash(cat:*),
            Bash(head:*),
            Bash(tail:*),
            Bash(less:*),
            Bash(ls:*),
            Bash(tree:*),
            Bash(file:*),
            Bash(stat:*),
            Bash(date:*),
            Bash(pwd:*),
            Bash(realpath:*),
            Bash(dirname:*),
            Bash(basename:*),
            Bash(which:*),
            Bash(type:*),
            Bash(env:*),
            Bash(echo:*),
            Bash(printf:*),
            Bash(test:*),
            Bash(touch:*),
            Bash(mkdir:*),
            Bash(rmdir:*),
            Bash(rm:*),
            Bash(mv:*),
            Bash(cp:*),
            Bash(tee:*)${{ needs.config.outputs.allowed_tools_extra }}"
