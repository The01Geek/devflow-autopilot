name: 'Read project config'
description: |
  Emit the contents of `.devflow/config.json` as a single JSON string output.
  The config is already JSON, so this validates it with jq (preinstalled on
  runners) and passes it through — no Node, yq, or PyYAML. Consumers read fields with
  `fromJSON(steps.<id>.outputs.json).path.to.field`. Repository must already be
  checked out (typically via `actions/checkout@v6`).

outputs:
  json:
    description: 'The entire .devflow/config.json as a compact JSON string.'
    value: ${{ steps.read.outputs.json }}

runs:
  using: composite
  steps:
    - name: Read config
      id: read
      shell: bash
      run: |
        set -euo pipefail
        CONFIG=".devflow/config.json"
        if [ ! -f "$CONFIG" ]; then
          echo "::error file=${CONFIG}::config.json not found in working tree"
          exit 1
        fi
        # Validate + re-emit compactly so the output is guaranteed-valid JSON.
        err=$(mktemp)
        if ! JSON=$(jq -c . "$CONFIG" 2>"$err"); then
          echo "::error file=${CONFIG}::invalid JSON in ${CONFIG}: $(cat "$err")"
          rm -f "$err"; exit 1
        fi
        rm -f "$err"
        # Multiline GITHUB_OUTPUT heredoc — robust to any future config content.
        delim="EOF_$(date +%s%N)_$$"
        {
          printf 'json<<%s\n' "$delim"
          printf '%s\n' "$JSON"
          printf '%s\n' "$delim"
        } >> "$GITHUB_OUTPUT"
