name: 'Read project config'
description: |
  Emit the contents of `.devflow/config.json` as a single JSON string output.
  The config is already JSON, so this validates it with python3 (a hard DevFlow
  prerequisite) and passes it through — no yq, no PyYAML, no Node. Consumers read
  fields with `fromJSON(steps.<id>.outputs.json).path.to.field`. Repository must
  already be checked out (typically via `actions/checkout@v6`).

outputs:
  json:
    description: 'The entire .devflow/config.json as a compact JSON string.'
    value: ${{ steps.read.outputs.json }}

runs:
  using: composite
  steps:
    - name: Read config
      id: read
      shell: bash
      run: |
        set -euo pipefail
        CONFIG=".devflow/config.json"
        if [ ! -f "$CONFIG" ]; then
          echo "::error file=${CONFIG}::config.json not found in working tree"
          exit 1
        fi
        # Validate + re-emit compactly so the output is guaranteed-valid JSON.
        # The python lines below are indented to the `run: |` block indent (8
        # spaces); YAML strips that, so python receives column-0 source.
        JSON=$(DEVFLOW_CONFIG="$CONFIG" python3 -c '
        import json, os, sys
        cfg = os.environ["DEVFLOW_CONFIG"]
        try:
            with open(cfg, encoding="utf-8") as f:
                data = json.load(f)
        except Exception as e:
            sys.stderr.write("::error::invalid JSON in " + cfg + ": " + str(e) + "\n")
            sys.exit(1)
        sys.stdout.write(json.dumps(data, separators=(",", ":"), ensure_ascii=False))')
        # Multiline GITHUB_OUTPUT heredoc — robust to any future config content.
        delim="EOF_$(date +%s%N)_$$"
        {
          printf 'json<<%s\n' "$delim"
          printf '%s\n' "$JSON"
          printf '%s\n' "$delim"
        } >> "$GITHUB_OUTPUT"
