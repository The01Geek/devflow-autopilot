# Copy to .github/workflows/ and customize if needed.
name: Post Review Comment

on:
  issue_comment:
    types: [edited]

jobs:
  on-review-complete:
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, 'PR Review Complete') &&
      !contains(github.event.comment.body, 'View branch') &&
      1 == 2 
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post follow-up comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '@claude run /receiving-code-review for the PR review feedback comment above.'
            });
