  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

8: #691105;\n  --df-coral-9: #510901;\n\n  /* ---------- SEMANTIC COLOR TOKENS ---------- */\n  /* Foreground (text + icons) */\n  --df-fg-default:  var(--df-neutral-13);\n  --df-fg-muted:    var(--df-neutral-9);\n  --df-fg-subtle:   var(--df-neutral-8);\n  --df-fg-on-emphasis: var(--df-white);\n  --df-fg-link:     var(--df-blue-5);\n  --df-fg-accent:   var(--df-purple-5);  /* DevFlow brand accent */\n  --df-fg-success:  var(--df-green-5);\n  --df-fg-attention:var(--df-yellow-5);\n  --df-fg-danger:   var(--df-red-5);\n  --df-fg-open:     var(--df-green-5);\n  --df-fg-closed:   var(--df-red-5);\n  --df-fg-merged:   var(--df-purple-5);\n  --df-fg-draft:    var(--df-neutral-8);\n\n  /* Background */\n  --df-bg-default:  var(--df-white);\n  --df-bg-canvas:   var(--df-white);\n  --df-bg-overlay:  var(--df-white);\n  --df-bg-inset:    var(--df-neutral-1);\n  --df-bg-subtle:   var(--df-neutral-1);\n  --df-bg-muted:    var(--df-neutral-2);\n  --df-bg-emphasis: var(--df-neutral-13);\n  --df-bg-accent:   var(--df-purple-5);\n  --df-bg-accent-subtle: var(--df-purple-0);\n  --df-bg-success:  var(--df-green-5);\n  --df-bg-success-subtle: var(--df-green-0);\n  --df-bg-attention: var(--df-yellow-3);\n  --df-bg-attention-subtle: var(--df-yellow-0);\n  --df-bg-danger:   var(--df-red-5);\n  --df-bg-danger-subtle: var(--df-red-0);\n  --df-bg-merged:   var(--df-purple-5);\n  --df-bg-merged-subtle: var(--df-purple-0);\n\n  /* Borders */\n  --df-border-default: var(--df-neutral-6);\n  --df-border-muted:   var(--df-neutral-3);\n  --df-border-subtle:  rgba(31, 35, 40, 0.08);\n  --df-border-accent:  var(--df-purple-5);\n  --df-border-success: var(--df-green-5);\n  --df-border-attention: var(--df-yellow-3);\n  --df-border-danger:  var(--df-red-5);\n\n  /* DevFlow workflow phase colors — used in /implement progress UI */\n  --df-phase-setup:     var(--df-blue-5);     /* Phase 1: setup */\n  --df-phase-implement: var(--df-purple-5);   /* Phase 2: implement */\n  --df-phase-review:    var(--df-yellow-4);   /* Phase 3: review-and-fix */\n  --df-phase-document:  var(--df-green-5);    /* Phase 4: docs + ready */\n\n  /* ---------- TYPE STACKS ---------- */\n  --df-font-sans: \"Mona Sans\", -apple-system, BlinkMacSystemFont, \"Segoe UI\",\n                  \"Noto Sans\", Helvetica, Arial, sans-serif;\n  --df-font-mono: \"JetBrains Mono\", ui-monospace, SFMono-Regular,\n                  \"SF Mono\", Menlo, Consolas, \"Liberation Mono\", monospace;\n\n  /* ---------- FONT SIZES (Primer scale) ---------- */\n  --df-text-xs:  12px;\n  --df-text-sm:  14px;\n  --df-text-md:  16px;\n  --df-text-lg:  20px;\n  --df-text-xl:  32px;\n  --df-text-2xl: 40px;\n\n  /* ---------- WEIGHTS ---------- */\n  --df-weight-light:    300;\n  --df-weight-normal:   400;\n  --df-weight-medium:   500;\n  --df-weight-semibold: 600;\n  --df-weight-bold:     700;\n\n  /* ---------- LINE HEIGHTS ---------- */\n  --df-lh-tight:   1.25;\n  --df-lh-snug:    1.375;\n  --df-lh-normal:  1.5;\n  --df-lh-relaxed: 1.625;\n\n  /* ---------- SPACING (Primer base) ---------- */\n  --df-space-1:  4px;\n  --df-space-2:  8px;\n  --df-space-3:  12px;\n  --df-space-4:  16px;\n  --df-space-5:  20px;\n  --df-space-6:  24px;\n  --df-space-8:  32px;\n  --df-space-10: 40px;\n  --df-space-12: 48px;\n  --df-space-16: 64px;\n\n  /* ---------- RADII ---------- */\n  --df-radius-1: 4px;\n  --df-radius-2: 6px;   /* Primer's default for buttons + inputs */\n  --df-radius-3: 8px;\n  --df-radius-4: 12px;\n  --df-radius-full: 9999px;\n\n  /* ---------- SHADOWS (Primer shadow scale) ---------- */\n  --df-shadow-resting:  0 1px 0 rgba(31, 35, 40, 0.04);\n  --df-shadow-floating: 0 8px 24px rgba(31, 35, 40, 0.12);\n  --df-shadow-popover:  0 1px 0 rgba(31, 35, 40, 0.04),\n                        0 8px 24px rgba(31, 35, 40, 0.12);\n  --df-shadow-inset:    inset 0 1px 0 rgba(208, 215, 222, 0.2);\n  --df-shadow-accent-focus: 0 0 0 3px rgba(130, 80, 223, 0.3);\n  --df-shadow-button-primary: 0 1px 0 rgba(31, 35, 40, 0.1),\n                              inset 0 1px 0 rgba(255, 255, 255, 0.03);\n}\n\n/* =============================================================\n   Semantic element styles\n   ============================================================= */\nhtml {\n  font-family: var(--df-font-sans);\n  font-size: var(--df-text-sm);\n  color: var(--df-fg-default);\n  background: var(--df-bg-default);\n  line-height: var(--df-lh-normal);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* Display — section openers, hero numbers */\n.df-display {\n  font-family: var(--df-font-sans);\n  font-size: 56px;\n  font-weight: var(--df-weight-semibold);\n  line-height: var(--df-lh-tight);\n  letter-spacing: -0.02em;\n}\n\nh1, .df-h1 {\n  font-family: var(--df-font-sans);\n  font-size: var(--df-text-xl);          /* 32px */\n  font-weight: var(--df-weight-semibold);\n  line-height: var(--df-lh-tight);\n  letter-spacing: -0.015em;\n  margin: 0;\n}\n\nh2, .df-h2 {\n  font-family: var(--df-font-sans);\n  font-size: 24px;\n  font-weight: var(--df-weight-semibold);\n  line-height: var(--df-lh-snug);\n  letter-spacing: -0.01em;\n  margin: 0;\n}\n\nh3, .df-h3 {\n  font-family: var(--df-font-sans);\n  font-size: var(--df-text-lg);          /* 20px */\n  font-weight: var(--df-weight-semibold);\n  line-height: var(--df-lh-snug);\n  margin: 0;\n}\n\nh4, .df-h4 {\n  font-family: var(--df-font-sans);\n  font-size: var(--df-text-md);          /* 16px */\n  font-weight: var(--df-weight-semibold);\n  line-height: var(--df-lh-normal);\n  margin: 0;\n}\n\np, .df-body {\n  font-size: var(--df-text-sm);\n  line-height: var(--df-lh-normal);\n  margin: 0;\n}\n\n.df-body-lg {\n  font-size: var(--df-text-md);\n  line-height: var(--df-lh-normal);\n}\n\n.df-caption, small {\n  font-size: var(--df-text-xs);\n  color: var(--df-fg-muted);\n  line-height: var(--df-lh-normal);\n}\n\ncode, kbd, samp, .df-code {\n  font-family: var(--df-font-mono);\n  font-size: 0.875em;\n  background: var(--df-bg-muted);\n  border-radius: var(--df-radius-2);\n  padding: 0.15em 0.4em;\n  color: var(--df-fg-default);\n}\n\npre, .df-pre {\n  font-family: var(--df-font-mono);\n  font-size: var(--df-text-xs);\n  line-height: var(--df-lh-relaxed);\n  background: var(--df-bg-inset);\n  border: 1px solid var(--df-border-muted);\n  border-radius: var(--df-radius-2);\n  padding: var(--df-space-4);\n  overflow-x: auto;\n  margin: 0;\n}\n\npre code, .df-pre code {\n  background: transparent;\n  padding: 0;\n  font-size: inherit;\n}\n\na, .df-link {\n  color: var(--df-fg-link);\n  text-decoration: none;\n}\na:hover, .df-link:hover { text-decoration: underline; }\n\n/* Slash-command voice — distinctive DevFlow visual */\n.df-slash {\n  font-family: var(--df-font-mono);\n  font-weight: var(--df-weight-medium);\n  color: var(--df-fg-accent);\n}\n<\u002Fstyle>\n<style>\n  :root {\n    --page-w:   1280px;\n    --pad-x:    80px;\n    --section-gap: 72px;\n  }\n\n  html, body {\n    margin: 0;\n    padding: 0;\n    background: var(--df-neutral-2);\n    font-family: var(--df-font-sans);\n    color: var(--df-fg-default);\n    -webkit-font-smoothing: antialiased;\n  }\n\n  .page {\n    width: var(--page-w);\n    margin: 0 auto;\n    background: var(--df-bg-canvas);\n    box-shadow: 0 24px 64px rgba(31, 35, 40, 0.08);\n  }\n\n  /* ===== HERO BAND ===== */\n  .hero {\n    background: var(--df-neutral-13);\n    color: var(--df-white);\n    padding: 64px var(--pad-x) 72px;\n    display: flex;\n    flex-direction: column;\n    gap: 40px;\n  }\n  .hero .head {\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n    font-family: var(--df-font-mono);\n    font-size: 14px;\n    color: var(--df-neutral-7);\n    letter-spacing: 0.02em;\n  }\n  .hero .head .brand {\n    display: flex;\n    align-items: center;\n    gap: 14px;\n  }\n  .hero .head .mark {\n    width: 36px; height: 36px;\n    border-radius: 8px;\n    background: var(--df-black);\n    border: 1px solid var(--df-neutral-11);\n    display: grid; place-items: center;\n    font-family: var(--df-font-sans);\n    font-weight: 700;\n    color: var(--df-purple-4);\n    font-size: 22px;\n    line-height: 1;\n    position: relative;\n  }\n  .hero .head .mark::after {\n    content: \"\";\n    position: absolute;\n    width: 7px; height: 7px;\n    border-radius: 50%;\n    background: var(--df-green-4);\n    right: 4px; bottom: 4px;\n  }\n  .hero .head .wordmark {\n    font-family: var(--df-font-mono);\n    font-weight: 600;\n    color: var(--df-white);\n    font-size: 18px;\n    letter-spacing: -0.005em;\n  }\n  .hero .head .wordmark .slash { color: var(--df-purple-3); }\n  .hero .head .rhs { color: var(--df-neutral-7); font-size: 13px; }\n\n  .hero .eyebrow {\n    font-family: var(--df-font-mono);\n    font-size: 13px;\n    color: var(--df-purple-3);\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n    margin: 0;\n  }\n  .hero h1 {\n    font-family: var(--df-font-sans);\n    font-size: 80px;\n    font-weight: 600;\n    line-height: 1.0;\n    letter-spacing: -0.035em;\n    margin: 0;\n    color: var(--df-white);\n    text-wrap: balance;\n    max-width: 1000px;\n  }\n  .hero h1 .accent { color: var(--df-purple-3); }\n  .hero .sub {\n    font-family: var(--df-font-sans);\n    font-size: 22px;\n    line-height: 1.4;\n    color: var(--df-neutral-5);\n    max-width: 980px;\n    margin: 0;\n    text-wrap: pretty;\n  }\n  .hero .badges {\n    display: flex;\n    gap: 10px;\n    align-items: center;\n    flex-wrap: wrap;\n    margin-top: 4px;\n  }\n  .hero .badge {\n    display: inline-flex;\n    align-items: center;\n    gap: 8px;\n    border: 1px solid var(--df-neutral-11);\n    color: var(--df-neutral-3);\n    padding: 8px 14px;\n    border-radius: var(--df-radius-full);\n    font-family: var(--df-font-mono);\n    font-size: 13px;\n    letter-spacing: 0.02em;\n  }\n  .hero .badge.slash-pill { background: rgba(130,80,223,0.08); border-color: var(--df-purple-6); color: var(--df-white); }\n  .hero .badge.slash-pill .slash { color: var(--df-purple-3); }\n  .hero .badge .dot {\n    width: 6px; height: 6px;\n    border-radius: 50%;\n    background: var(--df-green-4);\n  }\n  .hero .badge.os .dot { background: var(--df-green-4); }\n  .hero .badge.anthropic .dot { background: var(--df-blue-4); }\n\n  /* ===== SECTION CHROME ===== */\n  section.block {\n    padding: var(--section-gap) var(--pad-x);\n    border-top: 1px solid var(--df-border-muted);\n  }\n  section.block.inset { background: var(--df-bg-inset); }\n  section.block .section-head {\n    display: flex;\n    flex-direction: column;\n    gap: 10px;\n    margin-bottom: 40px;\n  }\n  section.block .section-eyebrow {\n    font-family: var(--df-font-mono);\n    font-size: 13px;\n    color: var(--df-fg-accent);\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n    margin: 0;\n  }\n  section.block h2 {\n    font-family: var(--df-font-sans);\n    font-size: 40px;\n    font-weight: 600;\n    line-height: 1.1;\n    letter-spacing: -0.02em;\n    color: var(--df-fg-default);\n    margin: 0;\n    text-wrap: balance;\n    max-width: 900px;\n  }\n\n  /* ===== PIPELINE ===== */\n  .pipeline {\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: 16px;\n  }\n  .phase {\n    background: var(--df-bg-default);\n    border: 1px solid var(--df-border-default);\n    border-radius: var(--df-radius-3);\n    box-shadow: var(--df-shadow-resting);\n    padding: 22px 22px 22px;\n    display: flex;\n    flex-direction: column;\n    gap: 12px;\n    position: relative;\n    overflow: hidden;\n  }\n  .phase .phase-top {\n    height: 3px;\n    position: absolute;\n    inset: 0 0 auto 0;\n  }\n  .phase[data-phase=\"setup\"]     .phase-top { background: var(--df-phase-setup); }\n  .phase[data-phase=\"implement\"] .phase-top { background: var(--df-phase-implement); }\n  .phase[data-phase=\"review\"]    .phase-top { background: var(--df-phase-review); }\n  .phase[data-phase=\"document\"]  .phase-top { background: var(--df-phase-document); }\n\n  .phase .index {\n    font-family: var(--df-font-mono);\n    font-size: 12px;\n    color: var(--df-fg-subtle);\n    letter-spacing: 0.04em;\n    text-transform: uppercase;\n  }\n  .phase[data-phase=\"setup\"]     .index { color: var(--df-phase-setup); }\n  .phase[data-phase=\"implement\"] .index { color: var(--df-phase-implement); }\n  .phase[data-phase=\"review\"]    .index { color: var(--df-phase-review); }\n  .phase[data-phase=\"document\"]  .index { color: var(--df-phase-document); }\n  .phase .name {\n    font-size: 22px;\n    font-weight: 600;\n    letter-spacing: -0.015em;\n    line-height: 1.15;\n    color: var(--df-fg-default);\n  }\n  .phase .cmd {\n    font-family: var(--df-font-mono);\n    font-size: 13px;\n    line-height: 1.4;\n    color: var(--df-fg-default);\n    background: var(--df-bg-inset);\n    border: 1px solid var(--df-border-muted);\n    border-radius: var(--df-radius-2);\n    padding: 8px 10px;\n    word-break: break-all;\n  }\n  .phase .cmd .slash { color: var(--df-purple-5); }\n  .phase .desc {\n    font-size: 14px;\n    line-height: 1.5;\n    color: var(--df-fg-muted);\n    margin: 0;\n  }\n\n  /* ===== DIFFERENTIATORS ===== */\n  .cards-3 {\n    display: grid;\n    grid-template-columns: 1fr 1fr 1fr;\n    gap: 18px;\n  }\n  .card {\n    background: var(--df-bg-default);\n    border: 1px solid var(--df-border-default);\n    border-radius: var(--df-radius-3);\n    box-shadow: var(--df-shadow-resting);\n    padding: 28px 26px 26px;\n    display: flex;\n    flex-direction: column;\n    gap: 14px;\n  }\n  .card .num {\n    font-family: var(--df-font-mono);\n    font-size: 13px;\n    color: var(--df-fg-accent);\n    letter-spacing: 0.04em;\n  }\n  .card h3 {\n    font-family: var(--df-font-sans);\n    font-size: 22px;\n    font-weight: 600;\n    line-height: 1.15;\n    letter-spacing: -0.015em;\n    color: var(--df-fg-default);\n    margin: 0;\n    text-wrap: balance;\n  }\n  .card p {\n    font-size: 14px;\n    line-height: 1.5;\n    color: var(--df-fg-muted);\n    margin: 0;\n    text-wrap: pretty;\n  }\n  .card .em {\n    margin-top: auto;\n    font-family: var(--df-font-mono);\n    font-size: 12px;\n    color: var(--df-fg-accent);\n    line-height: 1.4;\n    border-top: 1px solid var(--df-border-muted);\n    padding-top: 14px;\n    letter-spacing: 0.01em;\n  }\n  .card strong { color: var(--df-fg-default); font-weight: 600; }\n\n  /* ===== CALIBRATION ===== */\n  .calib-rows {\n    display: flex;\n    flex-direction: column;\n  }\n  .calib-row {\n    display: grid;\n    grid-template-columns: 36px 1fr;\n    gap: 24px;\n    padding: 20px 0;\n    border-top: 1px solid var(--df-border-muted);\n    align-items: baseline;\n  }\n  .calib-row:last-child { border-bottom: 1px solid var(--df-border-muted); }\n  .calib-row .n {\n    font-family: var(--df-font-mono);\n    font-size: 14px;\n    color: var(--df-fg-accent);\n    letter-spacing: 0.04em;\n    line-height: 1.1;\n  }\n  .calib-row .lead {\n    font-family: var(--df-font-sans);\n    font-size: 20px;\n    font-weight: 500;\n    line-height: 1.4;\n    letter-spacing: -0.01em;\n    color: var(--df-fg-default);\n    margin: 0 0 4px;\n    text-wrap: pretty;\n  }\n  .calib-row .muted {\n    font-family: var(--df-font-sans);\n    font-size: 14px;\n    line-height: 1.5;\n    color: var(--df-fg-muted);\n    margin: 0;\n  }\n  .calib-row .slash {\n    font-family: var(--df-font-mono);\n    color: var(--df-fg-accent);\n  }\n\n  /* ===== CTA + FOOTER ===== */\n  .cta-block {\n    background: var(--df-neutral-13);\n    color: var(--df-white);\n    padding: 48px var(--pad-x);\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    gap: 32px;\n  }\n  .cta-block .lhs {\n    display: flex;\n    flex-direction: column;\n    gap: 8px;\n  }\n  .cta-block .lhs .k {\n    font-family: var(--df-font-mono);\n    font-size: 12px;\n    color: var(--df-purple-3);\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n  }\n  .cta-block .lhs .v {\n    font-family: var(--df-font-sans);\n    font-size: 32px;\n    font-weight: 600;\n    line-height: 1.1;\n    letter-spacing: -0.02em;\n    color: var(--df-white);\n  }\n  .cta-block .lhs .v .accent { color: var(--df-purple-3); }\n  .cta-block .cta-btn {\n    background: var(--df-purple-5);\n    color: var(--df-white);\n    text-decoration: none;\n    padding: 18px 28px;\n    border-radius: var(--df-radius-2);\n    font-family: var(--df-font-sans);\n    font-size: 18px;\n    font-weight: 600;\n    letter-spacing: -0.005em;\n    display: inline-flex;\n    align-items: center;\n    gap: 12px;\n    border: 1px solid var(--df-purple-6);\n    box-shadow: var(--df-shadow-button-primary);\n    white-space: nowrap;\n  }\n  .cta-block .cta-btn .arrow { font-weight: 400; }\n\n  .colophon {\n    background: var(--df-black);\n    color: var(--df-neutral-7);\n    padding: 24px var(--pad-x);\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n    font-family: var(--df-font-mono);\n    font-size: 12px;\n    letter-spacing: 0.04em;\n  }\n  .colophon a { color: var(--df-purple-3); text-decoration: none; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"page\">\n\n  <!-- ===== HERO ===== -->\n  <header class=\"hero\">\n    <div class=\"head\">\n      <div class=\"brand\">\n        <span class=\"mark\">/<\u002Fspan>\n        <span class=\"wordmark\"><span class=\"slash\">/<\u002Fspan>devflow<\u002Fspan>\n      <\u002Fdiv>\n      <span class=\"rhs\">a Claude Code plugin · open source<\u002Fspan>\n    <\u002Fdiv>\n\n    <p class=\"eyebrow\">DevFlow autopilot<\u002Fp>\n    <h1>Ship the PR.<br><span class=\"accent\">Not the cleanup.<\u002Fspan><\u002Fh1>\n    <p class=\"sub\">Point an AI coding agent at a real ticket in a large codebase and it comes back half-done — wrong patterns, missing tests, stale docs. DevFlow turns one request into a complete, tested, reviewed, documented pull request. You do the final review and merge, not the cleanup.<\u002Fp>\n\n    <div class=\"badges\">\n      <span class=\"badge slash-pill\"><span class=\"slash\">/<\u002Fspan>devflow:implement<\u002Fspan>\n      <span class=\"badge os\"><span class=\"dot\"><\u002Fspan>open source<\u002Fspan>\n      <span class=\"badge anthropic\"><span class=\"dot\"><\u002Fspan>built on Anthropic’s official plugins<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ===== PIPELINE ===== -->\n  <section class=\"block\">\n    <div class=\"section-head\">\n      <p class=\"section-eyebrow\">how it works<\u002Fp>\n      <h2>The loop a one-shot agent skips.<\u002Fh2>\n    <\u002Fdiv>\n\n    <div class=\"pipeline\">\n      <div class=\"phase\" data-phase=\"setup\">\n        <span class=\"phase-top\"><\u002Fspan>\n        <span class=\"index\">phase 01 · setup<\u002Fspan>\n        <div class=\"name\">Setup<\u002Fdiv>\n        <div class=\"cmd\"><span class=\"slash\">/<\u002Fspan>devflow:create-issue<\u002Fdiv>\n        <p class=\"desc\">Sharp clarifying questions turn a one-line request into an unambiguous, codebase-grounded ticket.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"phase\" data-phase=\"implement\">\n        <span class=\"phase-top\"><\u002Fspan>\n        <span class=\"index\">phase 02 · implement<\u002Fspan>\n        <div class=\"name\">Implement<\u002Fdiv>\n        <div class=\"cmd\"><span class=\"slash\">/<\u002Fspan>devflow:implement<\u002Fdiv>\n        <p class=\"desc\">Architects against your patterns, writes the code <em>and<\u002Fem> the tests the change actually needs, drafts the PR.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"phase\" data-phase=\"review\">\n        <span class=\"phase-top\"><\u002Fspan>\n        <span class=\"index\">phase 03 · review &amp; fix<\u002Fspan>\n        <div class=\"name\">Review &amp; fix<\u002Fdiv>\n        <div class=\"cmd\"><span class=\"slash\">/<\u002Fspan>devflow:review-and-fix<\u002Fdiv>\n        <p class=\"desc\">Specialised reviewers + mechanical corroboration. Findings get fixed, then re-reviewed — until clean.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"phase\" data-phase=\"document\">\n        <span class=\"phase-top\"><\u002Fspan>\n        <span class=\"index\">phase 04 · document<\u002Fspan>\n        <div class=\"name\">Document<\u002Fdiv>\n        <div class=\"cmd\"><span class=\"slash\">/<\u002Fspan>devflow:docs<\u002Fdiv>\n        <p class=\"desc\">Internal &amp; external docs sync to what the code now does. PR marked ready for your review.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== DIFFERENTIATORS ===== -->\n  <section class=\"block inset\">\n    <div class=\"section-head\">\n      <p class=\"section-eyebrow\">what makes it work<\u002Fp>\n      <h2>Three things that make it work.<\u002Fh2>\n    <\u002Fdiv>\n\n    <div class=\"cards-3\">\n      <div class=\"card\">\n        <span class=\"num\">01<\u002Fspan>\n        <h3>Grounded in your codebase.<\u002Fh3>\n        <p>Plans against your architecture and patterns — not greenfield assumptions. Writes the tests the change actually needs, on production code.<\u002Fp>\n        <p class=\"em\">Real codebases, not pet projects.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <span class=\"num\">02<\u002Fspan>\n        <h3>Review that fixes what it finds.<\u002Fh3>\n        <p>The review-and-fix loop applies fixes and re-reviews until clean. A structurally-independent <strong>shadow pass<\u002Fstrong> then re-checks the approval before it stands.<\u002Fp>\n        <p class=\"em\">DevFlow audits its own audit.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <span class=\"num\">03<\u002Fspan>\n        <h3>It learns — honestly.<\u002Fh3>\n        <p>A Reflection log surfaces assumptions and skipped checks instead of burying them. Living docs stay in sync. A <strong>weekly retrospective<\u002Fstrong> opens self-improvement PRs.<\u002Fp>\n        <p class=\"em\">Every run compounds into the next.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== CALIBRATION ===== -->\n  <section class=\"block\">\n    <div class=\"section-head\">\n      <p class=\"section-eyebrow\">calibration over hype<\u002Fp>\n      <h2>Where its judgment ends, yours begins.<\u002Fh2>\n    <\u002Fdiv>\n\n    <div class=\"calib-rows\">\n      <div class=\"calib-row\">\n        <span class=\"n\">01<\u002Fspan>\n        <div>\n          <p class=\"lead\">The in-loop shadow review <strong>narrows the gap<\u002Fstrong> to an independent one.<\u002Fp>\n          <p class=\"muted\">When the stakes warrant it, a standalone <span class=\"slash\">/devflow:review<\u002Fspan> still earns its place.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"calib-row\">\n        <span class=\"n\">02<\u002Fspan>\n        <div>\n          <p class=\"lead\">The self-improvement loop opens PRs <strong>for you to approve or reject.<\u002Fstrong><\u002Fp>\n          <p class=\"muted\">Nothing reaches the engine unreviewed.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"calib-row\">\n        <span class=\"n\">03<\u002Fspan>\n        <div>\n          <p class=\"lead\"><strong>You<\u002Fstrong> do the final review and merge.<\u002Fp>\n          <p class=\"muted\">DevFlow hands back a ready PR — not a merge, not an absolution.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== CTA ===== -->\n  <section class=\"cta-block\">\n    <div class=\"lhs\">\n      <span class=\"k\">try it<\u002Fspan>\n      <span class=\"v\">Point it at one ticket. Judge it on the PR<br>it hands back.<\u002Fspan>\n    <\u002Fdiv>\n    <a class=\"cta-btn\" href=\"https://github.com/The01Geek/devflow-autopilot#install\">\n      Install DevFlow <span class=\"arrow\">→<\u002Fspan>\n    <\u002Fa>\n  <\u002Fsection>\n\n  <footer class=\"colophon\">\n    <span><span style=\"color: var(--df-purple-3);\">/<\u002Fspan>devflow · open source · Claude Code plugin<\u002Fspan>\n    <a href=\"https://github.com/The01Geek/devflow-autopilot\">github.com/The01Geek/devflow-autopilot<\u002Fa>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n\n\n<\u002Fbody><\u002Fhtml>"
